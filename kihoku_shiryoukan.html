<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紀北町郷土資料館</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans JP',sans-serif;min-height:100vh;transition:background .4s,color .3s}

:root{
  --bg:#FAF9F6;--surface:#FFFFFF;--surface-dim:#F5F3F0;--surface-container:#EDE9E3;
  --border:rgba(45,38,33,0.07);--border-mid:rgba(45,38,33,0.12);
  --text:#2d2621;--text-secondary:#6b6560;--text-dim:#a8a29e;
  --accent:#4A7C59;--accent-bg:rgba(74,124,89,0.07);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.04);--shadow-md:0 4px 16px rgba(0,0,0,0.06);--shadow-lg:0 16px 40px rgba(0,0,0,0.1);
  --ease:cubic-bezier(.16,1,.3,1);
}
body{background:var(--bg);color:var(--text)}
body.dark{
  --bg:#111110;--surface:#1a1917;--surface-dim:#1e1d1b;--surface-container:#252320;
  --border:rgba(255,255,255,0.06);--border-mid:rgba(255,255,255,0.1);
  --text:#e8e4df;--text-secondary:#b5afa8;--text-dim:#6b6560;
  --accent:#7aad8a;--accent-bg:rgba(122,173,138,.1);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.15);--shadow-md:0 4px 16px rgba(0,0,0,0.2);--shadow-lg:0 16px 40px rgba(0,0,0,0.3);
}

/* Grain */
body::before{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.03;pointer-events:none;z-index:9999;
}

/* Hero */
.hero{
  position:relative;height:420px;overflow:hidden;
  display:flex;align-items:flex-end;
}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1.5s ease}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.15) 60%,rgba(0,0,0,0.3) 100%)}
.hero-content{position:relative;z-index:2;padding:40px 48px;width:100%}
.hero-title{font-family:'Shippori Mincho',serif;font-size:2.8rem;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:0.05em}
.hero-sub{font-size:1rem;color:rgba(255,255,255,0.8);margin-bottom:16px;font-weight:400}
.hero-stats{display:flex;gap:24px}
.hero-stat{display:flex;flex-direction:column;align-items:center}
.hero-stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#fff;line-height:1}
.hero-stat-label{font-size:0.7rem;color:rgba(255,255,255,0.7);margin-top:2px;font-weight:600;letter-spacing:0.05em}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(250,249,246,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:10px 32px;
  display:flex;align-items:center;gap:12px;
}
body.dark .topbar{background:rgba(17,17,16,0.9)}
.topbar-back{
  display:flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:14px;font-weight:600;
  padding:6px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer;
  transition:background .2s;
}
.topbar-back:hover{background:var(--accent-bg)}
.search-box{
  flex:1;max-width:360px;padding:7px 12px 7px 32px;
  border:1px solid var(--border);border-radius:8px;background:var(--surface);
  color:var(--text);font-family:inherit;font-size:14px;outline:none;
  background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2214%22 height=%2214%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23a8a29e%22 stroke-width=%222%22><circle cx=%2211%22 cy=%2211%22 r=%228%22/><path d=%22m21 21-4.3-4.3%22/></svg>');
  background-repeat:no-repeat;background-position:10px center;
}
.search-box:focus{border-color:var(--accent)}
.theme-btn{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Category pills */
.cat-bar{
  padding:12px 32px;display:flex;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg);
}
.cat-pill{
  padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-secondary);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s var(--ease);display:flex;align-items:center;gap:5px;
  font-family:inherit;
}
.cat-pill:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-pill .cnt{font-size:11px;opacity:0.7;font-weight:700}

/* Content area */
.content{max-width:1400px;margin:0 auto;padding:24px 32px}

/* ===== OVERVIEW GRID (館内案内) ===== */
.overview-section{margin-bottom:32px}
.overview-heading{
  font-family:'Shippori Mincho',serif;font-size:1.3rem;font-weight:700;
  margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.overview-heading span{font-size:13px;font-weight:500;color:var(--text-dim);font-family:'Inter','Noto Sans JP',sans-serif}
.overview-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-auto-rows:auto;
  gap:14px;
}
.ov-card{
  position:relative;border-radius:14px;overflow:hidden;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);
  transition:all .35s var(--ease);display:flex;flex-direction:column;
}
.ov-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.ov-card.large{grid-column:span 2;grid-row:span 2}
.ov-card-photos{
  display:grid;gap:2px;width:100%;overflow:hidden;
}
.ov-card-photos.single{grid-template-columns:1fr}
.ov-card-photos.duo{grid-template-columns:1fr 1fr}
.ov-card-photos.trio{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.ov-card-photos.trio img:first-child{grid-row:span 2}
.ov-card-photos.quad{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.ov-card-photos img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .6s ease;
}
.ov-card:hover .ov-card-photos img{transform:scale(1.04)}
.ov-card-photos.single{aspect-ratio:16/9}
.ov-card-photos.duo,.ov-card-photos.trio,.ov-card-photos.quad{aspect-ratio:16/9}
.ov-card.large .ov-card-photos{aspect-ratio:16/10}
.ov-card-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.ov-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ov-card-icon{
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#fff;flex-shrink:0;
}
.ov-card-name{font-size:16px;font-weight:700}
.ov-card-count{
  margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;
  color:var(--text-dim);line-height:1;
}
.ov-card-desc{font-size:12.5px;color:var(--text-secondary);margin-bottom:8px}
.ov-card-titles{display:flex;flex-direction:column;gap:2px;flex:1}
.ov-card-titles span{
  font-size:12px;color:var(--text-dim);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
}
.ov-card-titles span::before{content:"\2014\00a0";opacity:0.4}
.ov-card-enter{
  display:flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;color:var(--accent);margin-top:8px;
  transition:gap .2s;
}
.ov-card:hover .ov-card-enter{gap:8px}

/* Stats bar */
.stats-bar{
  display:flex;gap:24px;padding:20px 28px;margin-bottom:24px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  flex-wrap:wrap;
}
.stat-item{display:flex;flex-direction:column;align-items:center;min-width:80px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--text);line-height:1}
.stat-label{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:0.05em;margin-top:2px}

/* ===== CONCIERGE ===== */
.concierge{
  margin-bottom:28px;background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:24px 28px;
}
.concierge-title{
  font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;
  margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.concierge-sub{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.concierge-input-wrap{
  display:flex;gap:8px;margin-bottom:14px;
}
.concierge-input{
  flex:1;padding:10px 16px;border:1px solid var(--border-mid);border-radius:10px;
  background:var(--bg);color:var(--text);font-family:inherit;font-size:15px;outline:none;
  transition:border-color .2s;
}
.concierge-input:focus{border-color:var(--accent)}
.concierge-input::placeholder{color:var(--text-dim)}
.concierge-send{
  padding:10px 20px;border-radius:10px;border:none;
  background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;
}
.concierge-send:hover{filter:brightness(1.1)}
.concierge-courses{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.concierge-course{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg);color:var(--text-secondary);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:inherit;
  display:flex;align-items:center;gap:5px;
}
.concierge-course:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* Concierge response */
.concierge-response{
  margin-top:20px;padding-top:18px;border-top:1px solid var(--border);
  animation:fadeUp .4s var(--ease);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.concierge-answer{
  font-size:15px;line-height:1.7;color:var(--text);margin-bottom:16px;
}
.concierge-answer strong{color:var(--accent)}
.concierge-picks{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.concierge-pick{
  display:flex;gap:12px;padding:12px;border-radius:12px;
  background:var(--bg);border:1px solid var(--border);cursor:pointer;
  transition:all .25s var(--ease);align-items:flex-start;
}
.concierge-pick:hover{border-color:var(--accent);background:var(--accent-bg);transform:translateY(-1px)}
.concierge-pick-img{
  width:72px;height:54px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface-dim);
}
.concierge-pick-body{flex:1;min-width:0}
.concierge-pick-cat{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;color:#fff;display:inline-block;margin-bottom:3px}
.concierge-pick-title{font-size:13.5px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.concierge-pick-excerpt{font-size:12px;color:var(--text-dim);line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.concierge-typing{display:flex;align-items:center;gap:4px;padding:8px 0}
.concierge-typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.3;animation:typingDot 1.2s ease-in-out infinite}
.concierge-typing span:nth-child(2){animation-delay:0.2s}
.concierge-typing span:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* ===== MAP VIEW ===== */
.map-container{width:100%;height:calc(100vh - 200px);min-height:500px;border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.map-sidebar{
  position:absolute;top:10px;right:10px;z-index:1000;
  width:320px;max-height:calc(100% - 20px);overflow-y:auto;
  background:var(--surface);border-radius:12px;border:1px solid var(--border);
  box-shadow:var(--shadow-lg);
}
.map-sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.map-sidebar-list{max-height:400px;overflow-y:auto}
.map-sidebar-item{
  display:flex;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--border);align-items:flex-start;
}
.map-sidebar-item:hover{background:var(--accent-bg)}
.map-sidebar-item img{width:52px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0}
.map-sidebar-item-body{flex:1;min-width:0}
.map-sidebar-item-title{font-size:12.5px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.map-sidebar-item-cat{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;display:inline-block;margin-top:2px}
.leaflet-popup-content{font-family:'Inter','Noto Sans JP',sans-serif;font-size:13px;line-height:1.5}
.leaflet-popup-content strong{font-size:14px}

@media(max-width:960px){
  .overview-grid{grid-template-columns:repeat(2,1fr)}
  .ov-card.large{grid-column:span 2;grid-row:span 1}
  .map-sidebar{width:100%;position:relative;top:0;right:0;border-radius:0 0 12px 12px}
}
@media(max-width:600px){
  .overview-grid{grid-template-columns:1fr}
  .ov-card.large{grid-column:span 1}
}

/* Room header */
.room-header{
  margin:32px 0 16px;padding:20px 24px;border-radius:16px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
}
.room-header:first-child{margin-top:0}
.room-icon{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:#fff;flex-shrink:0;
}
.room-info h2{font-size:1.2rem;font-weight:700;margin-bottom:2px}
.room-info p{font-size:13px;color:var(--text-secondary)}
.room-count{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--text-dim);line-height:1}

/* Card grid */
.card-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;
  margin-bottom:8px;
}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:all .35s var(--ease);
}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.card-img{
  width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--surface-dim);
  display:block;
}
.card-img-placeholder{
  width:100%;aspect-ratio:16/10;background:var(--surface-dim);
  display:flex;align-items:center;justify-content:center;
}
.card-img-placeholder i{font-size:2rem;color:var(--text-dim);opacity:0.3}
.card-body{padding:14px 16px 16px}
.card-cat{
  display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;
  margin-bottom:6px;color:#fff;
}
.card-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-excerpt{
  font-size:13px;color:var(--text-secondary);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.card-tag{font-size:10.5px;padding:1px 6px;border-radius:4px;background:var(--surface-dim);color:var(--text-dim)}

/* Detail modal */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s;
  display:flex;justify-content:flex-end;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-panel{
  width:640px;max-width:90vw;height:100vh;background:var(--bg);
  overflow-y:auto;transform:translateX(100%);transition:transform .4s var(--ease);
  box-shadow:-8px 0 32px rgba(0,0,0,0.15);
}
.modal-overlay.open .modal-panel{transform:translateX(0)}
.modal-close{
  position:sticky;top:12px;float:right;margin:12px 12px 0 0;
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.modal-close:hover{border-color:var(--accent);color:var(--accent)}
.modal-gallery{position:relative;width:100%;aspect-ratio:16/10;background:#111;overflow:hidden}
.modal-gallery img{width:100%;height:100%;object-fit:contain;transition:opacity .4s}
.modal-gallery-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);
  color:#fff;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.modal-gallery-nav:hover{background:rgba(255,255,255,0.3)}
.modal-gallery-nav.left{left:12px}
.modal-gallery-nav.right{right:12px}
.modal-gallery-counter{
  position:absolute;bottom:8px;right:12px;
  font-size:12px;color:rgba(255,255,255,0.7);
  background:rgba(0,0,0,0.4);padding:2px 8px;border-radius:4px;
}
.modal-body{padding:24px 28px 40px}
.modal-cat-badge{
  display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;
  color:#fff;margin-bottom:10px;
}
.modal-title{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:700;line-height:1.5;margin-bottom:16px}
.modal-content{font-size:14.5px;line-height:1.9;color:var(--text);margin-bottom:24px;white-space:pre-wrap}
.modal-section{margin-bottom:20px}
.modal-section-title{
  font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.modal-edu{
  font-size:13.5px;line-height:1.8;color:var(--text-secondary);
  padding:16px;border-radius:10px;background:var(--accent-bg);
}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap}
.modal-tag{font-size:12px;padding:3px 10px;border-radius:6px;background:var(--surface-dim);color:var(--text-secondary);font-weight:500}
.modal-source{font-size:12px;color:var(--text-dim);margin-top:12px}

/* History timeline */
.timeline{display:flex;flex-direction:column;gap:12px;margin-top:12px}
.timeline-item{
  display:flex;gap:14px;padding:14px 16px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);transition:all .2s;
}
.timeline-item:hover{border-color:var(--accent);background:var(--accent-bg)}
.timeline-era{
  flex-shrink:0;width:56px;height:56px;border-radius:10px;
  background:linear-gradient(135deg,#8B7355,#A0896A);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;text-align:center;line-height:1.2;
}
.timeline-body h4{font-size:14px;font-weight:700;margin-bottom:4px}
.timeline-body p{font-size:13px;color:var(--text-secondary);line-height:1.6}

/* Scroll top */
.scroll-top{
  position:fixed;bottom:24px;right:24px;z-index:90;
  width:42px;height:42px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;
  box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .3s;pointer-events:none;
}
.scroll-top.show{opacity:1;pointer-events:auto}
.scroll-top:hover{color:var(--accent);border-color:var(--accent)}

/* Loading skeleton */
.skeleton{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Print */
@media print{
  .topbar,.cat-bar,.modal-overlay,.scroll-top,.theme-btn,.search-box{display:none!important}
  .hero{height:200px}
  .card-grid{grid-template-columns:repeat(2,1fr)}
}

/* Responsive */
@media(max-width:768px){
  .hero{height:300px}
  .hero-title{font-size:2rem}
  .hero-content{padding:24px}
  .topbar{padding:10px 16px}
  .cat-bar{padding:10px 16px}
  .content{padding:16px}
  .card-grid{grid-template-columns:1fr}
  .modal-panel{width:100vw;max-width:100vw}
}

const DATA = [{"id":"OW-119","c":"food","t":"渡利牡蠣 — 白石湖で育つ幻の汽水カキ","x":"渡利かき（わたりかき）は、紀北町相賀にある白石湖で養殖されるカキで、生産量の少なさから「幻のカキ」の異名を持つ。白石湖は大台山系の船津川と熊野灘の海水が混じり合う汽水湖で、プランクトンとミネラルが豊富な独特の環境。養殖の歴史は古く、安永年間（1772〜1781年）には本格的な養殖が行われていた記録がある。採卵から種苗育成・養殖・出荷まですべて白石湖内で完結する一貫生産体制は、日本国内でも珍しい。汽水湖育ちのため磯臭さやクセが少なく、生食ではさっぱりとした味わいで、加熱すると旨みが凝縮される。グリコーゲンを多く含み、身全体が黄色みを帯びるのが特徴。出荷時期は冬季（11月〜3月頃）で、地元の飲食店で渡利かき料理を提供する期間は限られる。厳密には紀北町の産品だが、東紀州の食文化圏として尾鷲地域と密接に結びついており、尾鷲から車で20分程度の距離にある。","e":"理科「水の循環」で汽水湖の仕組みを学ぶ実例。社会科「農業・水産業」で養殖の工夫を学ぶ教材。地域の伝統産業として250年の歴史を持つ点も歴史学習に。","tg":["渡利かき","牡蠣","白石湖","汽水湖","養殖","紀北町","food"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Wikipedia「渡利かき」、東紀州の食、大紀商店、さかな通信","su":""},{"id":"OW-126","c":"society","t":"東紀州の中心地・尾鷲と紀北広域連合 — 1市1町の広域行政","x":"尾鷲市は三重県南部の東紀州地域の中央に位置し、北牟婁郡紀北町（旧紀伊長島町・海山町）とともに「紀北広域連合」を構成する。1999年4月に設立されたこの広域連合は、2007年に尾鷲地区広域行政事務組合と統合され、消防・ごみ処理・介護認定審査などを共同で行っている。三重県紀北県民センターの管轄は尾鷲市と北牟婁郡で、この地域は「尾鷲生活創造圏」として位置づけられている。東紀州地域は尾鷲市・紀北町・熊野市・御浜町・紀宝町の2市3町で構成され、尾鷲は商業・医療・行政サービスの中心地として周辺地域の生活を支える。ただし東紀州は三重県の中でも県北部と比べて経済格差や生活基盤整備の遅れが指摘されており、紀勢自動車道の整備によるアクセス改善が地域活性化の鍵とされている。かつては3万人超の人口を抱えた尾鷲市は、東紀州における最大の都市であり続けている。","e":"社会科「市の様子」で尾鷲市と周辺自治体の関係を学ぶ資料。広域連合の仕組みは「みんなで協力する行政」として理解しやすい。","tg":["東紀州","紀北町","広域連合","紀北県民センター","society"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"尾鷲市公式サイト、Wikipedia「紀北広域連合」「東紀州」、三重県公式サイト","su":""},{"id":"OW-160","c":"energy","t":"又口川旧発電所の歴史 — 尾鷲電気と大正期の水力発電","x":"又口川発電所は尾鷲電気株式会社が建設した同社最初の水力発電所で、1920年（大正9年）3月に運転を開始した。所在地は尾鷲町南浦矢所、銚子川水系又口川と古和谷の合流点直前に位置する。技術仕様は出力145kW、取水量0.50m³/s、水路延長約2.7km（川の左岸沿い）、有効落差39.5m。発電設備は電業社製フランシス水車と芝浦製作所製三相交流発電機が各1台、周波数50Hz。尾鷲電気は1910年（明治43年）5月21日に尾鷲町中浦で設立、資本金5万円、創業者は地元有力者の濱田丈助ら。当初は本社隣接の吸入ガス機関（出力75kW）による火力発電で、中部地方初の吸入ガス機関採用だった。供給区域は当初尾鷲町のみ、1915年に引本町（現紀北町）まで拡大。2番目の発電所として1923年（大正12年）11月に銚子川発電所（相賀村、出力120kW）を建設。1927年（昭和2年）5月15日に三重合同電気に合併・解散。又口川発電所は合同電気時代の1935年（昭和10年）8月に廃止された。廃止から90年以上が経過しているが、39.5mの落差と0.50m³/sの取水量は現在のマイクロ水力技術で十分活用可能なスペックであり、同地点での新設が検討に値する。現在この水系にはJ-POWER（電源開発）のクチスボダム（堤高35m、総貯水容量196万m³、1961年完成）があり、尾鷲第二発電所へ送水して発電している。","e":"6年生歴史で明治・大正の産業発展と地域の電化の歴史を学ぶ素材。技術の授業でフランシス水車の仕組みを学ぶ導入にも。","tg":["又口川","尾鷲電気","大正","水力発電","フランシス水車","クチスボダム","銚子川","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.or gram #キャンプinn海山 (2026-03-22)","su":""},{"id":"OW-257","c":"tourism","t":"こんばんは。もりまりです🌳","x":"こんばんは。もりまりです🌳\n\n最近、山歩き目的なキャンパーさんが増えているな～と、山歩きが趣味のもりまりはうれしく思ってます😊🫶\n\n写真のグループさんは三連休中に利用いただきました✨\n林間エムサイトで山岳テント4張り⛺\n夕食は炭火焼ハウス利用で手軽にバーベキュー🍗\n炭火焼ハウスは準備も片付けも楽だし、荷物も少なく済むし、サイトではゆっくり休めて、山歩きキャンプの海山での上手な利用の仕方だと思います😊👍\n\nお声がけさせていただいたところ、チェックインの日は度会町の山を歩いて海山に到着。\n次の日の朝早くから、テントそのままで「便石山・象の背」登頂！\n下山し撤収、チェックアウト後に尾鷲市のオハイヘ😲\n\n一日にふたつのお山歩きとは・・・みなさんタフですね～👏👏\n撮影のご協力や山歩きセンパイのお話いろいろ聞かせていただきありがとうございました😊\n\nキャンプinn海山周辺には熊野古道も含め、魅力的な山歩きスポットがいっぱいです😊✌\nみなさん、山歩き🚶‍♀️×キャンプ⛺でのご利用お待ちしていま～す😀🙌","e":"","tg":["キャンプinn海山","キャンプイン海山","銚子川","紀北町","三重県","自然体験","林間キャンプ","林間サイト","リバーサイト","ソロキャンプ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #キャンプinn海山 (2026-03-23)","su":""},{"id":"OW-258","c":"tourism","t":"キャンプinn海山で","x":"キャンプinn海山で\nこたつキャンプ","e":"","tg":["キャンプinn海山","こたつキャンプ","ジムニー","JB64","デュオキャンプ"],"im":[],"s":"Instagram #キャンプinn海山 (2026-03-23)","su":""},{"id":"OW-259","c":"tourism","t":"【イベント情報】","x":"【イベント情報✨】\n「親子自然体験 できワク！夢中のタネ」開催されます✨\n\n子どもたちのできた！」を、キャンプinn海山から　　　　　　　　　　　　　　　　\n真剣なまなざし、はじけるような笑顔\n自然の中で何かに没頭する子どもたちの姿は、私たち大人の心も動かしてくれます。\n\n澄んだ川の冷たさ。自分の手で何かを作り出す手応え。\n自然のフィールドの遊びを通じて得られる体験は、子ども達にとって大切な「夢中のタネ」になります。\n\nでも「子どもを自然の中で遊ばせたいけど、一歩踏み出せない」ママやパパがいらっしゃると思います。\n\nそこでキャンプinn海山では、\n未就学～低学年の親子に特化した「自然体験の入り口」となる一泊二日のプログラムをスタートします！\n子どもが大好き！キャンプ場スタッフが道具に触ることから大冒険まで全力でサポート。 5-10-26)","su":""},{"id":"OW-272","c":"food","t":"紀伊民報との共同企画ツアーで、熊野古道伊勢路ツヅラト峠を歩きました。","x":"紀伊民報との共同企画ツアーで、熊野古道伊勢路ツヅラト峠を歩きました。\n\n伊勢と紀伊（熊野）の境になる峠です。\n\n大紀町側の定坂小公園でバスを降りると語り部さんが出迎えてくれる\n\nこの辺に花山法皇の遥拝所があったと言われています。近露の牛馬童子像も花山法皇やでな🤔\n\n熊対策のため、みんな鈴🛎️つけて、チリンチリン鳴らしながら歩く🚶‍♂️‍➡️🐻\n\n峠道に入ると登りばっかり、高低差は約150m📈\n\n標高357mのツヅラト峠の頂上からは、熊野の山々と紀伊長島の市街地とその向こうには、熊野灘の景色が一面に広がる👀\n\nこの絶景をみたかったんや👀\n\n伊勢から旅してきた人は、初めて見る熊野の景色と海に感動したことでしょう🤩\n\nここからが紀伊\n\n真下には、昼食の弁当を食べるキャンプ場が見える。\n\nえっ、これ降りるの⁉️というぐらい真下😲\n\n1kmちょっとで、300mも下る📉\n\nえんえんとジグザグした下り坂が続く\n\nこれがツヅラト峠の名前の由来\n\n紀伊だけに、気いつけておりなあかん😆\n\nこれが紀伊の由来🤭　それはちゃう\n\nもう一つの見どころ「野面乱層積」\n\n自然の石を、隙間を開けて積むことによって、山からの水が通り抜けられるので、雨が降っても崩壊せずに今も残っているんやって\n\n降りたら、山を見上げる🙄\n\nあんな高いところから降りてきたんやな、改めて思う\n\nYAMAPを使って奇跡を辿ってたら、動画のような感じになりました。","e":"","tg":["熊野古道","伊勢路","ツヅラト峠","大紀町","紀北町","ヤマップ","YAMAP"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_033_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route).JPG","id":"WEB-319","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_034_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route s3).JPG","id":"WEB-320","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route_s3).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #ツヅラト峠 (2025-12-01)","su":""},{"id":"OW-274","c":"tourism","t":"#ツヅラト峠の投稿","x":".\n🔻ツヅラト峠\n\n峠から紀伊長島の海が見える紀州への玄関口コース。名前の由来である九十九折の坂道に現れる石垣や木々の間の石畳で歴史を感じることができます。","e":"","tg":["三重県","東紀州","紀北町","熊野古道","熊野古道伊勢路","ツヅラト峠"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":".. 野古道を歩きながら馬の背峠を目指し、そこから山頂を一回スルーして尾鷲湾が一望できるおちょぼ岩へ🪨\n\nほーーーーんとに遠かったし5月並の暑さだった😵‍💫\n\n天狗倉山は岩を梯子で登って山頂って感じ⛰️(ガクブル)\n\n下山して道の駅でカキフライ食べて道の駅にいる巨大マンボウと遊んで大内山牛乳ソフトクリーム食べてえみっぺが特大忘れ物をして１日が終わった☺️","e":"","tg":["熊野古道","紀北町","天狗倉山","尾鷲湾","おちょぼ岩"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Instagram #天狗倉山 (2026-03-21)","su":""},{"id":"OW-469","c":"food","t":"【8日目 熊野古道歩き】古里温泉（紀北町）→相賀（紀北町）","x":"【8日目 熊野古道歩き】古里温泉（紀北町）→相賀（紀北町）\n※伊勢神宮から熊野大社までの熊野古道伊勢路を日を分けながら歩いています。目指せ！熊野速玉大社！プライベートな日記です。\n\n初の民宿宿泊は食事も美味しく、懐かしい匂いがする布団であたたかく寝られて快適でした。「いま旅をしている！！」という気持ちを強く感じられて良い経験になりました。また泊まりたい。。。\nこの日は、快晴の青空もとにかく風が強かった！日差しはあたたかいのに、風が吹くと寒いという…服装選びが難しかったです。\n\nさて、前日の遅れを取り戻すべく、朝からズンズンととにかく歩きます。きのうの曇り空ではわかりませんでしたが、とにかく青い海と空が美しい。海岸沿いを走る紀勢線の線路も映えていますね(笑)\nこの熊野古道旅は、特に鉄道ありきで始めたわけではないですが、結果的に紀勢線を歩き通す旅になっています。歩き鉄、とでも言いましょうか？\n\n古里の町を出てすぐの山道にある、サボ道展望台。ここからの海がまたキラキラ輝いてキレイ。ただのペットボトルの水もここで飲むだけでとても美味しく感じます。近くには落石注意の看板。どう注意して歩けばいいのか分からないので、早足で進む。\n\n前日は雨と曇り空で熊出没への恐怖心がかなり強かったものの、晴れているだけで、そんな不安もなんだか半減。春先は若いオスの熊が多いらしいです。どうかこのあとも出会いませんように。峠を越えて、人里に降りてきたときの達成感が、安心感に変わりつつあります(笑)\n\n三浦の町を経て、熊野古道の峠のなかでも人気の始神峠（はじかみとうげ）に入ります。登りがかなり急。1つ前の三浦峠でも、息がかなり上がってキツかったのですが…斜面が急なのか、体力が落ちたのか…。黙々と無心で脚を動かして、ただ登る。この無になれる瞬間がけっこう好きです。何も考えずに登るといつの間にか峠に着いていました。\n始神峠は熊野古道きってのビュースポットだそうで、峠から見える三浦の海と太平洋の青がこれまた美しい。江戸時代にはこの峠に茶屋もあったそう。息を切らしながらここまで上がってきて、峠で甘いものでも食べられたら、たしかに最高だっただろうなぁ。眼下には紀勢線も見えます。ちょうど通過したものの上手く捉えられず！！\n\n船津の町に入ってからは、しばらく紀勢線沿いを歩きます。日中のあまり列車もない時間なので、ぜんぜんすれ違いませんでしたが、線路が見えるだけでもテンションが上がります。（足はガクガクでしたが）途中の踏切の列車のシルエットに違和感をおぼえて思わずパシャリ(笑)\n\n昼食にお刺身定食と道中の和菓子屋さんの大福？を食べて満腹に。予定ではもうひと山越えて、尾鷲まで行こうとしていましたが…すでに19キロ歩いた足がかなり限界。きょうはここまで！よく歩きました。海山町ではもう桜が咲いていましたよ！\n\nその後、相賀駅から帰ってきましたが、付近の道しるべを見たところ「新宮まで70キロ」。気が付いたら半分を越えていました！伊勢神宮から96キロくらい。なんとなく始めた熊野古道ウォーキングですが、本当に踏破できそうでワクワクしています！","e":"","tg":["熊野古道","熊野古道伊勢路","kumano","kumanokodo","三浦峠","始神峠","紀伊長島","尾鷲","紀勢線","紀勢本線"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_033_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route).JPG","id":"WEB-319","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_034_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route s3).JPG","id":"WEB-320","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route_s3).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_056_Magose_pass.jpg","t":"Magose pass.JPG","id":"WEB-342","u":"https://commons.wikimedia.org/wiki/File:Magose_pass.JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #始神峠 (2025-03-19)","su":""},{"id":"OW-472","c":"tourism","t":"美鈴は、50周年を迎えることが出来ました。","x":"美鈴は、50周年を迎えることが出来ました。\nこれからも精進を重ねて参りますので、\n皆様のお越しを心よりお待ちしております。\n　\n上手く画面が表示出来なく、また、文章も重複しており、ご迷惑をおかけいたします。","e":"","tg":["美鈴","からすみ","紀伊長島","紀北町","東紀州","三重県","三重県観光","三重県旅行","小宿","和食"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚 om_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #東紀州 (2026-03-14)","su":""},{"id":"OW-719","c":"nature","t":"新しいnote記事を公開しました。","x":"📘 新しいnote記事を公開しました。\n\n「レモンが一番好きだったんです。」\n\nそう語るのは、紀北町でマイヤーレモンを育てる 伊勢路レモン農園の代表・氏原翔平さん。\n\n地元に戻り、\n“この町で生きていく”ことを選んだ彼の言葉には、\n静かな覚悟がありました。\n\n🍋 「酸っぱいけど、まろやか！」なマイヤーレモン\n🌱 木を植える＝この土地で生きるという決断\n📚 本とレモンを通じて人がつながる場所づくり\n🎁 ふるさと納税で届く、小さな応援のかたち\n\n一箱のレモンの先にある、\nこの町の物語をぜひご覧ください。\n\n最新の記事はプロフィールのURLから！","e":"","tg":["紀北町","ふるさと納税","三重県","東紀州","レモン","マイヤーレモン","地域の魅力","地方創生"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #東紀州 (2026-03-17)","su":""},{"id":"OW-781","c":"food","t":"紀北町周遊ライド③","x":"紀北町周遊ライド③\n渡利牡蠣（一冨士さん）\n三重県北牟婁郡紀北町相賀\n2026.1.28\n\n少しでも暖かくて、穏やかな海が見れて、\n美味しい海鮮が食べれて、まだ行ったことのない所\n今回は、三重県北牟婁郡紀北町を走ることにしました😄🚴\n\nサイクリングコースは、\n「東紀州サイクリングポータルサイト」に紹介されている\n「紀北町周遊＋須賀利ルート」を参考にしました\n\n「道の駅紀伊長島マンボウ」発着で（前々投稿）、\n海岸線を走って（前投稿）折り返し地点の「相賀（あいが）」へ\n\nここは「幻の渡利牡蠣🦪」で有名なんですね😄\n海水と川の水が混じる汽水湖「白石湖」（pic.1)で育てられる\n「渡利牡蠣」今回はこれを食べたくて走ってきました🚴😅\n\nJR相賀駅の近くで相賀橋を渡ったところにある\n「一冨士」さんで頂きました\n迷わず「牡蠣コース」を注文。カウンター席です\n\nとは言うものの私は生牡蠣はあまり好きではないのです😅\nあの独特の生臭が苦手なんです\n\n汽水湖で育った「渡利牡蠣」は塩分が少なく甘味があると\n書いていたので期待していました\n\nまず「酢牡蠣」食べた瞬間思わず\n「生臭くないですね」と言ってしまいました\n「初めてですか？」とご主人が渡利牡蠣について\n詳しくお話ししてくれました\n周囲約4㎞の小さな「白石湖」で養殖されているので\n生産量が少なく地元以外には出回らないそうです\n「渡利」は白石湖周辺の地名です\n\nその後、「焼き牡蠣」、「牡蠣フライ」、「牡蠣鍋」、\n珍しい「牡蠣寿司」、「牡蠣豆腐」どれも美味しい\nほんと臭みがなく甘味旨味があります\n全部で20粒はあったと思います🦪 pic.2,3\n\n最後のデザート「自家製プリン🍮」これも美味しい\n大満足・満腹🫃の「渡利牡蠣 かきコース」でした😄\nこの時期土日は予約で一杯らしいです\nまた食べに来たいです\n\n食事中にご主人より教えて頂いた相賀に流れる\n「奇跡の清流 銚子川」に立ち寄りました\nNHKスペシャルでも紹介されたそうです\n橋の上からでも透明度が高いのが分かりますpic.4\nまたゆっくりさらに上流までライドしたいです\n\n渡利牡蠣を養殖している「白石湖」を一周して\n「太平洋岸自動車道（国道42号）」を走って\n「道の駅 紀伊長島マンボウ」に戻ります🚴〜\n\n満腹なので走るのがしんどい😂\n\n続く","e":"","tg":["渡利牡蠣","紀北町相賀","牡蠣コース","奇跡の清流銚子川","太平洋岸自動車道","ロードバイクおじさん","ロードバイク他府県遠征"],"im":[],"s":"Instagram #渡利牡蠣 (2026-01-31)","su":""},{"id":"OW-782","c":"food","t":"三重県南部に移住して約1年半。","x":"三重県南部に移住して約1年半。\nようやく幻の牡蠣である、紀北町の白石湖で養殖されている渡利牡蠣を食べる事が出来ました。\n渡利牡蠣は三重県の牡蠣の生産量の1%も無いそうです。\n妻が予約してくれて今回頂くことが出来ました。\n\n今回は、焼き牡蠣と鍋で頂くました。\n小柄な身に旨みがギュッと詰まっており、臭みも殆ど無くめちゃくちゃ美味しかったです。特に醤油バターが罪深いなと思いました。\n.\n.\n.","e":"","tg":["牡蠣","渡利牡蠣","三重県紀北町","海鮮","網焼き"],"im":[],"s":"Instagram #渡利牡蠣 (2026-02-01)","su":""},{"id":"OW-784","c":"food","t":"一富士山さんへ","x":"一富士山さんへ\n牡蠣づくし\n🦪🦪🦪🦪🦪大満足　フルコース❤️\nまた行きたい。11月〜3月までの期間みたいです","e":"","tg":["紀北町","渡利牡蠣","東紀州グルメ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #渡利牡蠣 (2026-02-11)","su":""},{"id":"OW-785","c":"food","t":"こんにちは、スタッフちゃあ♪です！","x":"こんにちは、スタッフちゃあ♪です！\n今週末、お出かけを計画中の方へ…。キャンプinn海山で季節の旬を召し上がるのはいかがですか？\n\n今月2月限定で「渡利牡蠣」を週末のみ予約販売中！生産量が少ないので幻の牡蠣と名高い紀北町名産品！スタッフも大好きな渡利牡蠣。ファンの方は毎年、渡利牡蠣を楽しみにしてくれています♪\n今週末も準備していますよ！是非この機会にご予約下さいね♪\n\n週末の旬の味！2つ目！バレンタインデーにちなんでウェルカムサービス【Happy チョコフォンデュ】で「チョコレートフォンデュ」をお召し上がりいただけます。こちらは予約不要2/14（土）14:30～15:00　センターハウスで行います。串に刺したマシュマロや果物にチョコをつけてお召し上がりいただけます♪\n\n週末はまだまだ、コテージ・キャンプサイト共に空きがあります♪\nご予約・ご来場、お待ちしております！","e":"","tg":["渡利牡蠣","牡蠣","幻の牡蠣","2月週末限定","ソロデュオキャンプキャンペーン","チョコフォンデュ","チョコレートフォンデュ","Happyチョコフォンデュ","キャンプinn海山","キャンプイン海山"],"im":[],"s":"Instagram #渡利牡蠣 (2026-02-12)","su":""},{"id":"OW-787","c":"food","t":"2026.2.14","x":"2026.2.14\n渡利牡蠣を食いに紀北町までひとっ走り。\n世古かき店で牡蠣食べ放題！\n牡蠣ご飯、牡蠣の吸い物、牡蠣の佃煮、カキフライが付いての焼き牡蠣食べ放題。\n1人3,500円\n\n焼き牡蠣も殻を剥いた状態で出してくれるのでものすごく食べやすいわけで。\n\n調味料は持ち込みなので、三酢、ポン酢、醤油、マヨネーズ、タルタルソース、ケチャップ、塩を持参。\n\n個人的に好きな三酢→タルタルソース&ケチャップのダブル→三酢に戻る、の無限ループで60個ほど焼き牡蠣を堪能。\n\n腹一杯食べても、すぐにまた食べたくなってくるぐらい、渡利牡蠣、やっぱり美味い！\n\nまた来年も必ず行くから。","e":"","tg":["三重県","紀北町","世古かき店","渡利牡蠣","食べ放題"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #渡利牡蠣 (2026-02-24)","su":""},{"id":"OW-788","c":"food","t":"地元の幻の渡牡蠣🦪","x":"地元の幻の渡牡蠣🦪\n\n弘法牡蠣🦪\n\nここ奥村牡蠣屋さんが❗️\n俺は1番☝️やな🦪　\n身入りも最高😀\n\n今月で終わりだそうで🦪\nまた来年もよろしくお願いします🦪😊","e":"","tg":["渡利牡蠣","🦪奥村牡蠣屋","紀北町白石湖"],"im":[],"s":"Instagram #渡利牡蠣 (2026-03-14)","su":""},{"id":"OW-790","c":"food","t":"三重県北牟婁郡紀北町の一冨士にて。","x":"三重県北牟婁郡紀北町の一冨士にて。\nかますバッテラと渡利牡蠣のかきフライ\n\n渡利牡蠣のシーズンが終わる前に！と思い、今年も一冨士さんへ。\nかますバッテラは透明感ある見た目で美しく、特にからしをつけるとかますと昆布の旨味が引き立ってとても美味しかったです。\nかきフライは揚げたてで旨味が凝縮されておりとても美味しかったです。\nとても良い雰囲気のお店で、気になるメニューもまだまだあるのでまた行きたい。","e":"","tg":["一冨士","かますバッテラ","渡利牡蠣","かきフライ","紀北町グルメ"],"im":[],"s":"Instagram #渡利牡蠣 (2026-03-22)","su":""},{"id":"OW-805","c":"food","t":"紀北町って知ってますか？（その１）","x":"紀北町って知ってますか？（その１）\n\nご縁をいただいて貴重な体験（モニターツアー）に行ってきました\n\n三重県の名古屋からはVISONの先、伊勢のお隣、尾鷲の手前に紀北町はあります\n\n世界遺産熊野古道伊勢路\n漁師町の海の幸\n尾鷲ひのきと紀州備長炭\nヒノキ職人と箸づくり\n\n今まで知らなかったけど\n素晴らしい場所でした\n\n熊野古道でも紀北町にある馬越峠は\n中でも比較的お気軽に歩けるようです\n以前から行ってみたいと思っていて\n石畳を歩いて　木々の間を歩く\n坂道で結構ハードである\n江戸時代にタイムスリップできる\n\n尾鷲ひのきで建てられた熊野古道センターで\nガイドさんが詳しく教えてくれて\n熊野古道の全容と歴史を知ることができた\n\n米の生育に向かないこの地域には\n尾鷲ひのきと紀州備長炭で年貢を納めるよう\n人工林が幕府の命で作られたそう\n\nお遍路コスプレが体験できて楽しかったし\n着物コスプレも男女共にあるようで\n次回はそれもいいなぁと思ったり\n紀州備長炭を叩いて音を奏でると\n金属のような音がするほど硬くて\n火もちのよい上質な炭であることがわかる\n\nノスタルジックな漁師町\n魚まちを語り部さんにご案内してもらった\n子供の頃によく食べたみりん干しを干してある店先を通り昔ながらの漁港やまちを探索\n実際に歩いてお話を聞く機会はなかなかない\n昔と今を知ることができとても楽しかった\n\n炭焼き職人を訪ねる\n窯出しは２週間に1回\nしかも時間はその時の炭次第\n今回ミラクルなことに立ち会うことができた\n赤く輝く備長炭の美しさに感動\n冷めると黒いダイヤモンド紀州備長炭となる\n\n貴重な炭で焙煎された珈琲は\n格別のお味でした\n\n宿　紀伊の松島さんでは港にあがったとれたての魚介づくしのお料理　はじめて　マンボウを刺身でいただいた　その２につづく〜","e":"","tg":["熊野古道伊勢路","紀北町","魚まち","紀州備長炭","尾鷲ひのき"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #熊野古道伊勢路 (2026-03-08)","su":""},{"id":"OW-828","c":"industry","t":"調査便","x":"調査便\n\n引本広進丸では\n調査便に行きたい方募集しています\n1人でも出船して\n1人　通常価格の半額にて出船しています\n新たな釣りや魚種など調査船で出たい方は\n相談してください\n内容によっては調査便で出せない場合があります\n\n連絡先\n\n引本広進丸　船長　野村　09078539160 まで\n\nお待ちしております🙇‍♂️\n\n実釣報告\n\n最近サルパが多く\n釣りにならない時が多いので\n\n今回は昼イカの調査便\n\nイカが釣れなかった場合の保険に\nノマセする事になり\nとりあえず餌にするアジ釣りに行く事になりました\n\nアジのポイントでサビキと落とし込み仕掛けを\n使ってのアジ釣り\n\nあれれ？\nアジも乗りが悪い……\n\nポイント変えてもイマイチ\n\n計7匹ゲットして本命の昼イカ釣りに\n\nポイントは110m〜130mに絞り魚探での散策\n\n魚探の反応が悪く\n砂地の中に点在するシモリ付近で実釣\n\nしかしアタリ無し\n\nもともと初めての昼イカ釣り🦑\n\n見極め早く\nあかんなって事で\n安定のノマセ釣りに変更\n\nん？\n\nノマセにもアタリが無い\n\n潮が早すぎるせいか？\n\nライト天秤も試してみるが\n潮が早すぎてオモリ100号を使用\nもはやライト天秤超えて普通の天秤釣り\n終盤になって\nやっとまともなアタリ\n\n釣れたのは40cm級のシロアマダイ\n\nこの後\nテップラン調査\nでも\nまたまたサルパの猛攻\n\nラインやガイドにもサルパがまとわり付く始末\n\n活き餌が残っていたので\nワンチャンで\n夕まずめのノマセ釣り\n\nその時\nノマセのアタリに船上がざわめく❣️\n上がって来たのは\nなんと\n外道定番のエソ…………\n\nこれで終了\n\nサルパのせいか\n全体的に渋々でした\n\n釣果\n\nシロアマダイ1匹\nアヤメカサゴ2匹\nエソ1匹でした","e":"","tg":["調査船","尾鷲沖","紀北沖","熊野灘","魚釣り"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons.wikimedia.org/wiki/File:熊野灘_-_panoramio_(1).jpg","li":"CC BY 3.0","loc":""}],"s":"Instagram #熊野灘 (2026-03-22)","su":""},{"id":"OW-832","c":"nature","t":"#iphone 風景","x":"#iphone 風景","e":"","tg":["種まき権兵衛の里","写真好き","iphone","風景","桜"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_021_tanemaki_gonbei.jpg","t":"種まき権兵衛の里","id":"WEB-371","u":"https://commons.wikimedia.org/wiki/File:Tanemaki_gonbei_no_sato_01.jpg","li":"Public domain","loc":""}],"s":"Instagram #種まき権兵衛の里 (2026-03-05)","su":""},{"id":"OW-833","c":"nature","t":"桜と一緒に🎵","x":"桜と一緒に🎵\n桜はちょびっとだけど麻衣ちゃんのお耳ぴーんが可愛いから採用🤭\n2026.2.23","e":"","tg":["チワワ","ブランバーズ","麻央麻衣", も達には、自然の豊かさと同時に、敬意を持って向き合うことを伝えました。\n\n冷たくて心地よい水、澄んだ空気、響く笑い声。\n最高のコンディションの中、午後からはシャワークライミングにもチャレンジ！\nチームで助け合いながら進むことで、仲間との絆がより深まった時間になりました✨\n\nこんな貴重な体験ができたのも、子ども達を送り出してくださる保護者の皆さまのおかげです。本当にありがとうございます☺️\n\n今日の様子はYouTubeにもアップしました📹\n今回は自然の音や子ども達の声を大切にしたくて、音楽は極力使わずに構成しました。\n川のせせらぎや足音、笑い声——現地の空気を感じてもらえるような仕上がりになっています🎒\nぜひご覧ください！","e":"","tg":["SACちびっ子教室","魚飛渓","シャワークライミング","自然体験","仲間と育つ","銚子川","子どもの育ち","アウトドア教育","感謝の気持ちを込めて","自然の音を届けたい"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""}],"s":"Instagram #魚飛渓 (2025-08-01)","su":""},{"id":"OW-949","c":"nature","t":"夏旅弾丸……","x":"夏旅弾丸……\n.","e":"","tg":["熊野本宮大社","熊野那智大社","熊野速玉大社","七里御浜","鬼ヶ城","銚子川","魚飛渓","夏旅","コミ夏","川遊び"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_015_onigajo.jpg","t":"鬼ヶ城（熊野市）","id":"WEB-365","u":"https://commons.wikimedia.org/wiki/File:Oniga-jo01.JPG","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #魚飛渓 (2025-08-17)","su":""},{"id":"OW-951","c":"tourism","t":"#魚飛渓の投稿","x":".\n🔻銚子川\n\n日本屈指の透明度を誇り、潜らなくても川の底まで見ることができます。泳いでいる魚の姿もはっきり見え、その透明度の高さから奇跡の川と呼ばれることも。","e":"","tg":["東紀州","紀北町","銚子川","魚飛渓","熊野古道","馬越峠","キャンプinn海山","種まき権兵衛の里"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""}],"s":"Instagram #魚飛渓 (2025-09-05)","su":""},{"id":"OW-952","c":"nature","t":"〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰","x":"〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️\n三重県紀北町にある、銚子川へDayCampに行ってきました✨\n海山ICから約20分\n水質もよくてトイレやゴミステーション等、完備されてましたよ✨\n今回は暑さもあったのですぐに設営できるFILEDOORさんのタープを設営しました⛺️\nこのテントタープ遮光PUコーティングが、とってもおすすめで遮光率100%でUVカットも99.8%で暑さ対策にも最適です😊\n我が家は2.5m×2.5m【サイドシート2枚】を使ってるよ✨\n※オプションでサイドシートも販売してます。\n〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️","e":"","tg":["filedoor","daycamp","三重県紀北町","魚飛渓","銚子川"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""}],"s":"Instagram #魚飛渓 (2025-09-16)","su":""},{"id":"OW-953","c":"tourism","t":"お伽噺旅行　Part 3銚子川編(10/29)","x":"お伽噺旅行　Part 3銚子川編(10/29)\n1ヵ月以上経ってしまい💦\n今さら川の思い出も寒く感じますが😅\n記録しておこうと思います🍀\n\n\"奇跡の川\"と言われる銚子川へ\n\nまずは、種蒔き権兵衛の里へ\n権兵衛さんが種蒔きゃカラスがほじくると言う　\nこの地方の民話らしい📕\n\n実は、コギツネモカさんも、\nホリホリ大得意なのよぉ〜😚\n\n②この公園の銚子川❣️\nこの時期で誰もいないと寂しいものですね😅\n\nでも公園は快適で散歩出来ました♪\n\n⑤池で \"崖の上のポニョ\" 状態の鯉🐟\nウジョウジョ🫢\n\n⑥魚飛渓吊り橋\n⑦釣り橋のグレーチングが怖くて\nほふく前進🐾芋虫モカ🐛\nギブアップ🙌\n\n⑧銚子川上流行くも\n熊🐻出るかも看板🪧に\n少し遊んで、退散😨\n\n初めての銚子川でしたが\nやや不完全燃焼気味😕\n\n来年は、もっと探検して見つけて\n遊びましょう🩵","e":"","tg":["銚子川ブルー","銚子川で川遊び","種蒔き権兵衛の里","魚飛渓","コーギーと猫のいる暮らし","コーギー大好き","コーギーと猫とスローライフ","コーギー好きさんと繋がりたい"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""}],"s":"Instagram #魚飛渓 (2025-12-13)","su":""},{"id":"OW-954","c":"tourism","t":"【きほく発見アカデミーin魚飛渓】","x":"【きほく発見アカデミーin魚飛渓】\n\n紀北町の魅力を学ぶイベント「きほく発見アカデミー」\n第5回は魚飛渓を散策します✨\n\n魚飛渓には様々な奇岩や巨岩があり、水の流れによって侵食された部分や、形が変わっている様子を観察することができます🏞️\n\n今回のきほく発見アカデミーでは、川に沿ってE-BIKEで上流に移動しながら、川の様子を観察し、その後、魚飛生活環境保全林を散策していきます🎵\n保全林には、多種多様な植物や樹木が自生しており、その中で森林浴や、ネイチャーゲームなどをお楽しみください♪\n\n日時：2026年2月15日　12:00〜15:30\n\n料金：500円（保険料を含む）※現金のみ、当日お支払いください。\n\nルート：種まき権兵衛の里駐車場→魚飛吊橋（移動にE-BIKEを使います）→魚飛生活環境保全林一種まき権兵衛の里（終了は15：30）\n\n最後にコーヒーブレイクも予定しています。\n\n持ち物：飲み物・動ける服装・靴（保全林の中は寒くなっていますので上着や手袋も必要あればご持参ください）\n\n定員：3名\n\n申込：紀北町観光協会（TEL：0597-46-3555）\n\n※注意事項※\nE-BIKEを安全にご利用いただくため、身長150cm以下の方はお断りする場合がございます。\n\n参加前に必ず、レンタサイクル利用規約をお読みください。","e":"","tg":["きほく発見アカデミー","紀北町","魚飛渓"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"http const HISTORY = [{"id":"HJ-001","era":"jomon","t":"","oc":"尾鷲周辺にも縄文遺跡あり。リアス式海岸の豊かな海産物は縄文人の食を支えた可能性。","x":""},{"id":"HJ-003","era":"yayoi","t":"","oc":"尾鷲は急峻な地形で平地が少なく、稲作には不向き。漁業・林業中心の生活が続いた理由を考える教材になる。","x":""},{"id":"HJ-008","era":"asuka","t":"","oc":"尾鷲沖は熊野灘の荒波で知られ、古来より航海の難所。遣唐使船も熊野灘を通った可能性がある。","x":""},{"id":"HJ-009","era":"nara","t":"","oc":"大仏建立に使われた木材の一部は紀伊半島から運ばれた可能性。尾鷲ヒノキの良材は古くから知られていた。","x":""},{"id":"HJ-012","era":"kamakura","t":"","oc":"九鬼水軍（HJ-047）の海戦能力は元寇の時代にも熊野水軍として活躍。水軍の伝統が戦国時代に花開く前史。","x":""},{"id":"HJ-014","era":"muromachi","t":"","oc":"京都の文化が地方に広がる過程で、熊野地方にも影響。熊野古道（HJ-048）を通じた文化伝播のルート。","x":""},{"id":"HJ-015","era":"sengoku","t":"","oc":"信長と九鬼嘉隆の関係（HJ-047）。信長が九鬼嘉隆を「日本一の水軍の将」と称えたエピソード。","x":""},{"id":"HJ-016","era":"sengoku","t":"","oc":"九鬼嘉隆の鉄甲船（HJ-047）は鉄砲対策の技術革新。鉄砲が海戦にも影響を与えた。","x":""},{"id":"HJ-017","era":"edo","t":"","oc":"尾鷲の林業（HJ-049）も持続可能な森林管理（密植多間伐）という江戸時代からの循環型技術。速水林業のFSC認証（OW-023）。","x":""},{"id":"HJ-018","era":"edo","t":"","oc":"尾鷲にも寺子屋があり、林業・漁業に必要な読み書き計算が教えられていた。紀州藩の教育政策。","x":""},{"id":"HJ-019","era":"edo","t":"","oc":"紀州藩の大名行列は紀伊半島を通過。尾鷲は海路の要所で、千石船の寄港地として栄えた（OW-010）。","x":""},{"id":"HJ-020","era":"edo","t":"","oc":"尾鷲は紀伊半島の海岸沿いに位置し、海上交通の要所。密貿易の可能性や、漂着外国人の記録も。","x":""},{"id":"HJ-022","era":"edo","t":"","oc":"尾鷲も台風・津波の被害を繰り返し受けてきた災害都市（OW-097）。災害と復興の歴史は尾鷲と江戸で共通のテーマ。","x":""},{"id":"HJ-023","era":"azuchi","t":"","oc":"信長に仕えた九鬼嘉隆（HJ-047）は安土城に招かれ信長から盃を受けた。","x":""},{"id":"HJ-024","era":"azuchi","t":"","oc":"秀吉の紀伊国再編で尾鷲は北牟婁郡に移管（OW-009）。秀吉の政策が尾鷲の行政区分を決めた。","x":""},{"id":"HJ-025","era":"edo","t":"","oc":"紀州藩の統治下で尾鷲は260年の安定を享受。林業・漁業が発展した背景（OW-008,010）。","x":""},{"id":"HJ-026","era":"meiji","t":"","oc":"尾鷲も明治の変化を経験。寺子屋から近代学校への移行。林業の近代化（西洋式測量技術の導入）。","x":""},{"id":"HJ-027","era":"meiji","t":"","oc":"尾鷲の林業も明治期に近代化。木材を海路で大都市に運ぶ仕組みは製糸場の生糸輸出と同じ殖産興業の流れ。","x":""},{"id":"HJ-029","era":"showa_pre","t":"","oc":"1944年東南海地震（HJ-050）は戦時下で発生し被害が秘密にされた。戦争が災害対応すら歪めた事例。","x":""},{"id":"HJ-030","era":"showa_pre","t":"","oc":"1944年東南海地震（HJ-050）は終戦の8ヶ月前に発生。戦争と自然災害の二重苦を経験した地域。","x":""},{"id":"HJ-031","era":"showa_post","t":"","oc":"尾鷲も戦後復興を経験。林業・漁業の再建。1944年東南海地震（HJ-050）からの二重復興。","x":""},{"id":"HJ-032","era":"showa_post","t":"","oc":"新幹線は東京-大阪間。尾鷲はまだ高速道路もつながっていない時期。都市と地方の格差が拡大した側面も。","x":""},{"id":"HJ-033","era":"showa_post","t":"","oc":"四日市ぜんそくは三重県四日市市で発生。同じ三重県として身近に感じられるテーマ。尾鷲の自然環境を守る意識との関連。","x":""},{"id":"HJ-034","era":"heisei","t":"","oc":"尾鷲は南海トラフ地震で最大津波高17m想定。片田教授が尾鷲でも防災教育を監修（OW-082）。向井小学校は津波避難場所に指定（OW-058）。","x":""},{"id":"HJ-039","era":"kamakura","t":"","oc":"九鬼氏の祖は鎌倉時代に既に志摩国に勢力を拡大していた（OW-007）。武士の時代の始まりと九鬼氏の台頭。","x":""},{"id":"HJ-040","era":"muromachi","t":"","oc":"熊野古道（HJ-048）の参詣が庶民にも広まった時代。「蟻の熊野詣」は室町時代から。","x":""},{"id":"HJ-042","era":"edo","t":"","oc":"黒船来航の情報は熊野灘の海岸にも伝わり、沿岸防備が議論された。","x":""},{"id":"HJ-043","era":"meiji","t":"","oc":"尾鷲は紀州藩から三重県に編入。行政区分の変更が地域アイデンティティに与えた影響。","x":""},{"id":"HJ-045","era":"taisho","t":"","oc":"関東大震災の復興で尾鷲ヒノキが注目された。尾鷲ヒノキの柱で建てた家が地震に強いと評判に。","x":""},{"id":"HJ-046","era":"sengoku","t":"","oc":"九鬼町は尾鷲市の中心的な歴史遺産（OW-007,080,094）。迷路のような路地は敵の侵入を防ぐ防衛構造の名残。九鬼嘉隆の生涯は尾鷲の誇り。","x":""},{"id":"HJ-047","era":"heian","t":"","oc":"馬越峠・八鬼山越えは尾鷲市内の世界遺産（OW-006,037）。石畳は尾鷲の豪雨に耐える設計。巡礼者の休息地・宿場としての尾鷲の歴史。","x":""},{"id":"HJ-048","era":"edo","t":"","oc":"尾鷲林業は尾鷲のアイデンティティそのもの（OW-008,015-018）。速水林業（OW-023）。向井小学校周辺の山林。","x":""},{"id":"HJ-049","era":"showa_pre","t":"","oc":"震源が尾鷲沖20km。尾鷲市の津波被害記録（OW-081）。南海トラフ地震への備え（OW-058,082,097）。向井小学校の防災教育の原点。","x":""},{"id":"HJ-050","era":"jomon","t":"","oc":"尾鷲の歴史（九鬼水軍・林業・災害）を4つの視点で分析する地域学習。","x":""},{"id":"HJ-051","era":"jomon","t":"","oc":"尾鷲の歴史を「比較」の軸にできる。「尾鷲の林業の400年」を江戸→明治→戦後→現代で比較するローカル通史。","x":""},{"id":"HJ-052","era":"jomon","t":"","oc":"「なぜ尾鷲に水軍が生まれたのか？」「なぜ尾鷲のヒノキは品質が高いのか？」地域の歴史を「なぜ」で掘り下げる。","x":""},{"id":"HJ-053","era":"jomon","t":"","oc":"「尾鷲の歴史が今の尾鷲にどうつながっているか」を考える。九鬼水軍→漁業の伝統、林業400年→FSC認証、東南海地震→防災教育。","x":""},{"id":"HJ-054","era":"jomon","t":"","oc":"尾鷲の歴史資料（九鬼氏家譜・紀州藩の記録・東南海地震の証言）を実際に読む地域学習。","x":""}];

// ═══ CATEGORY BAR ═══
function renderCatBar() {
  const el = document.getElementById('catBar');
  const counts = {};
  DATA.forEach(r => counts[r.c] = (counts[r.c] || 0) + 1);
  let html = `<button class="cat-pill ${activeCat==='all'?'active':''}" onclick="setCat('all')"><i class="fa-solid fa-grip"></i> すべて <span class="cnt">${DATA.length}</span></button>`;
  CAT_ORDER.forEach(c => {
    const m = CAT_META[c];
    if (!m || !counts[c]) return;
    html += `<button class="cat-pill ${activeCat===c?'active':''}" onclick="setCat('${c}')" style="${activeCat===c?`background:${m.cl};border-color:${m.cl}`:''}"><i class="${m.i}" style="font-size:12px"></i> ${m.n} <span class="cnt">${counts[c]}</span></button>`;
  });
  // History connection tab
  if (HISTORY.length) {
    html += `<button class="cat-pill ${activeCat==='history-connection'?'active':''}" onclick="setCat('history-connection')" style="${activeCat==='history-connection'?'background:#8B7355;border-color:#8B7355':''}"><i class="fa-solid fa-link" style="font-size:12px"></i> 歴史接続 <span class="cnt">${HISTORY.length}</span></button>`;
  }
  // Map view
  html += `<button class="cat-pill ${activeCat==='map'?'active':''}" onclick="setCat('map')" style="${activeCat==='map'?'background:#5B7DB1;border-color:#5B7DB1':''}"><i class="fa-solid fa-map-location-dot" style="font-size:12px"></i> 地図</button>`;
  el.innerHTML = html;
}

function setCat(c) {
  activeCat = c;
  renderCatBar();
  renderContent();
  window.scrollTo({top: document.querySelector('.content').offsetTop - 120, behavior: 'smooth'});
}

// ═══ SEARCH ═══
function handleSearch(q) {
  searchQuery = q.toLowerCase();
  renderContent();
}

function matchSearch(r) {
  if (!searchQuery) return true;
  const hay = (r.t + ' ' + r.x + ' ' + (r.tg||[]).join(' ') + ' ' + r.c).toLowerCase();
  return searchQuery.split(/\s+/).every(w => hay.includes(w));
}

// Location detection from tags/title
const LOC_NAMES = ['九鬼','馬越峠','三木里','賀田','弁財島','須賀利','梶賀','曽根','天狗倉山','便石山','八鬼山','向井','三木浦','古江','早田','大曽根浦','行野浦','中村山','熊野古道'];
function detectLocation(r) {
  const hay = r.t + ' ' + (r.tg||[]).join(' ');
  // Check image location first
  if (r.im.length && r.im[0].loc) return r.im[0].loc;
  for (const loc of LOC_NAMES) {
    if (hay.includes(loc)) return loc;
  }
  return '';
}

function renderCard(r) {
  const m = CAT_META[r.c] || {n:'?',cl:'#888'};
  const imgHtml = r.im.length
    ? `<img class="card-img" loading="lazy" data-src="${r.im[0].p}" alt="${r.t}" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder><i class=\'${m.i}\'></i></div>'">`
    : `<div class="card-img-placeholder"><i class="${m.i}"></i></div>`;
  const imgCount = r.im.length > 1 ? `<span style="position:absolute;top:8px;right:8px;font-size:11px;background:rgba(0,0,0,0.5);color:#fff;padding:1px 7px;border-radius:4px"><i class="fa-solid fa-images" style="margin-right:3px"></i>${r.im.length}</span>` : '';
  const loc = detectLocation(r);
  const locBadge = loc ? `<span style="position:absolute;bottom:8px;left:8px;font-size:10.5px;background:rgba(0,0,0,0.55);color:#fff;padding:2px 8px;border-radius:4px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:3px"><i class="fa-solid fa-map-pin" style="font-size:9px"></i>${loc}</span>` : '';
  const excerpt = r.x.slice(0, 120) + (r.x.length > 120 ? '...' : '');
  const tags = (r.tg || []).slice(0, 4).map(t => `<span class="card-tag">${t}</span>`).join('');
  return `<div class="card" onclick="openModal('${r.id}')">
    <div style="position:relative">${imgHtml}${imgCount}${locBadge}</div>
    <div class="card-body">
      <span class="card-cat" style="background:${m.cl}">${m.n}</span>
      <div class="card-title">${r.t}</div>
      <div class="card-excerpt">${excerpt}</div>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    </div>
  </div>`;
}

function openModal(id) {
  const r = DATA.find(d => d.id === id);
  if (!r) return;
  const m = CAT_META[r.c] || {n:'?',cl:'#888'};

  // Gallery
  modalImgs = r.im;
  modalImgIdx = 0;
  renderGallery();

  // Body
  let bodyHtml = `
    <span class="modal-cat-badge" style="background:${m.cl}">${m.n}</span>
    <div class="modal-title">${r.t}</div>
    <div class="modal-content">${r.x}</div>
  `;

  if (r.e) {
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title"><i class="fa-solid fa-graduation-cap"></i> 教育活用</div>
      <div class="modal-edu">${r.e}</div>
    </div>`;
  }

  if (r.tg && r.tg.length) {
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title"><i class="fa-solid fa-tags"></i> タグ</div>
      <div class="modal-tags">${r.tg.map(t => `<span class="modal-tag">${t}</span>`).join('')}</div>
    </div>`;
  }

  // Source links section
  const sourceLinks = [];
  if (r.su) sourceLinks.push({label: '記事ソース', url: r.su});
  // Image source links (unique)
  const seenUrls = new Set(r.su ? [r.su] : []);
  (r.im || []).forEach(img => {
    if (img.u && !seenUrls.has(img.u)) {
      seenUrls.add(img.u);
      const domain = img.u.split('/')[2] || '';
      const label = domain.includes('wikimedia') ? 'Wikimedia' : domain.includes('mie-eetoko') ? '三重フォトギャラリー' : domain.includes('flickr') || domain.includes('openverse') ? 'Flickr' : domain.includes('owase.lg.jp') ? '尾鷲市公式' : domain.includes('unsplash') ? 'Unsplash' : domain.includes('youtube') ? 'YouTube' : '外部リンク';
      sourceLinks.push({label: `${label}: ${img.t || '画像'}`, url: img.u});
    }
  });
  if (sourceLinks.length || r.s) {
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title"><i class="fa-solid fa-arrow-up-right-from-square"></i> ソース・リンク</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        ${r.s ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:4px"><i class="fa-solid fa-quote-left" style="margin-right:4px;opacity:0.5"></i>${r.s}</div>` : ''}
        ${sourceLinks.map(l => `<a href="${l.url}" target="_blank" rel="noopener" style="font-size:13px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:5px;padding:4px 0;transition:opacity .2s" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px"></i> ${l.label}</a>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderGallery() {
  const el = document.getElementById('modalGallery');
  if (!modalImgs.length) {
    el.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--surface-dim)"><i class="fa-solid fa-image" style="font-size:3rem;color:var(--text-dim);opacity:0.2"></i></div>';
    return;
  }
  const img = modalImgs[modalImgIdx];
  let html = `<img src="${img.p}" alt="${img.t || ''}" style="width:100%;height:100%;object-fit:contain">`;
  if (modalImgs.length > 1) {
    html += `<button class="modal-gallery-nav left" onclick="event.stopPropagation();galleryNav(-1)"><i class="fa-solid fa-chevron-left"></i></button>`;
    html += `<button class="modal-gallery-nav right" onclick="event.stopPropagation();galleryNav(1)"><i class="fa-solid fa-chevron-right"></i></button>`;
    html += `<div class="modal-gallery-counter">${modalImgIdx + 1} / ${modalImgs.length}</div>`;
  }
  // Caption + source link
  let captionHtml = '';
  if (img.t) captionHtml += img.t;
  if (img.u) {
    captionHtml += img.t ? ' ' : '';
    captionHtml += `<a href="${img.u}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:rgba(255,255,255,0.9);text-decoration:underline"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:9px"></i></a>`;
  }
  if (img.li) captionHtml += `<span style="opacity:0.6;margin-left:6px;font-size:10px">${img.li}</span>`;
  if (captionHtml) {
    html += `<div style="position:absolute;bottom:8px;left:12px;right:60px;font-size:12px;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:4px;backdrop-filter:blur(4px)">${captionHtml}</div>`;
  }
  el.innerHTML = html;
}

function galleryNav(dir) {
  modalImgIdx = (modalImgIdx + dir + modalImgs.length) % modalImgs.length;
  renderGallery();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

});

let mapInstance = null;

function matchLocation(r) {
  const hay = (r.t + ' ' + (r.tg||[]).join(' ')).toLowerCase();
  for (const loc of LOCATIONS) {
    for (const kw of loc.kw) {
      if (hay.includes(kw.toLowerCase())) return loc;
    }
  }
  return null;
}

function renderMapView(el) {
  document.getElementById('resultCount').textContent = '';

  el.innerHTML = `
    <div class="room-header" style="margin-top:0">
      <div class="room-icon" style="background:#5B7DB1"><i class="fa-solid fa-map-location-dot"></i></div>
      <div class="room-info"><h2>尾鷲マップ</h2><p>地名をクリックすると関連記事が表示されます</p></div>
    </div>
    <div style="position:relative">
      <div id="leafletMap" class="map-container"></div>
      <div class="map-sidebar" id="mapSidebar" style="display:none"></div>
    </div>
  `;

  // Destroy old map
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }

  // Create map
  const map = L.map('leafletMap', {zoomControl: true}).setView([34.05, 136.18], 12);
  mapInstance = map;

  // Tile layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  // Group records by location
  const locGroups = {};
  DATA.forEach(r => {
    const loc = matchLocation(r);
    if (loc) {
      const key = loc.name;
      if (!locGroups[key]) locGroups[key] = {loc, records: []};
      locGroups[key].records.push(r);
    }
  });

  // Add markers
  const markers = [];
  Object.values(locGroups).forEach(g => {
    const cnt = g.records.length;
    const marker = L.marker([g.loc.lat, g.loc.lng]).addTo(map);
    marker.bindTooltip(`${g.loc.name} (${cnt})`, {direction: 'top', offset: [0, -8]});
    marker.on('click', () => showMapSidebar(g.loc.name, g.records));
    markers.push(marker);
  });

  // Fit bounds
  if (markers.length) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
  }

  // Show summary
  const totalMapped = Object.values(locGroups).reduce((s,g) => s + g.records.length, 0);
  const unmapped = DATA.length - totalMapped;
}

  records.slice(0, 20).forEach(r => {

    html += `<div class="map-sidebar-item" onclick="openModal('${r.id}')">

  });
  if (records.length > 20) {
    html += `<div style="padding:10px 14px;font-size:12px;color:var(--text-dim);text-align:center">...他${records.length - 20}件</div>`;
  }
  html += '</div>';
  sb.innerHTML = html;
}

function askConcierge() {
  const input = document.getElementById('conciergeInput');
  const q = input.value.trim();
  if (!q) return;
  showConciergeResponse(q);
}

function askPreset(key) {
  const preset = PRESET_QUERIES[key];
  if (!preset) return;
  const input = document.getElementById('conciergeInput');
  input.value = preset.q;
  showConciergeResponse(preset.q, preset);
}

function showConciergeResponse(query, preset) {
  const el = document.getElementById('conciergeResponse');

  // Show typing
  el.innerHTML = '<div class="concierge-response"><div class="concierge-typing"><span></span><span></span><span></span></div></div>';

  setTimeout(() => {
    let results = [];
    let answerText = '';

    if (preset) {
      answerText = preset.answer;
      if (preset.cats) {
        results = DATA.filter(r => preset.cats.includes(r.c));
      } else {
        results = [...DATA];
      }
      if (preset.sort === 'random') {
        // Seeded by date for "today's" picks
        const seed = new Date().toDateString();
        results = shuffleSeeded(results, seed);
      } else if (preset.sort === 'edu') {
        results = results.filter(r => r.e).sort((a,b) => b.e.length - a.e.length);
      }
    } else {
      // Free-form query: score records
      const scored = scoreRecords(query);
      results = scored.map(s => s.r);
      const topCats = getTopCats(scored.slice(0, 10));
      const n = scored.length;
      if (n === 0) {
        answerText = `「${query}」に一致する記事は見つかりませんでした。別のキーワードで試してみてください。`;
      } else if (n <= 5) {
        answerText = `「<strong>${query}</strong>」に関連する記事が<strong>${n}件</strong>見つかりました。`;
      } else {
        answerText = `「<strong>${query}</strong>」に関連する記事が<strong>${n}件</strong>見つかりました。${topCats}の分野に多くヒットしています。`;
      }
    }

    const picks = results.slice(0, 6);
    let html = '<div class="concierge-response">';
    html += `<div class="concierge-answer">${answerText}</div>`;

    if (picks.length) {
      html += '<div class="concierge-picks">';
      picks.forEach(r => {
        const m = CAT_META[r.c] || {n:'?',cl:'#888'};
        const imgHtml = r.im.length ? `<img class="concierge-pick-img" src="${r.im[0].p}" alt="">` : `<div class="concierge-pick-img" style="display:flex;align-items:center;justify-content:center"><i class="${m.i}" style="color:var(--text-dim);opacity:0.3"></i></div>`;
        const excerpt = r.x.slice(0, 80) + (r.x.length > 80 ? '...' : '');
        html += `<div class="concierge-pick" onclick="openModal('${r.id}')">
          ${imgHtml}
          <div class="concierge-pick-body">
            <span class="concierge-pick-cat" style="background:${m.cl}">${m.n}</span>
            <div class="concierge-pick-title">${r.t}</div>
            <div class="concierge-pick-excerpt">${excerpt}</div>
          </div>
        </div>`;
      });
      html += '</div>';
    }

    if (results.length > 6) {
      html += `<div style="text-align:center;margin-top:12px"><button onclick="searchFromConcierge()" style="padding:6px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s" onmouseover="this.style.background='var(--accent-bg)'" onmouseout="this.style.background='var(--surface)'">${results.length}件すべて見る <i class="fa-solid fa-arrow-right" style="font-size:11px"></i></button></div>`;
    }

    html += '</div>';
    el.innerHTML = html;
  }, 600);
}

function scoreRecords(query) {
  const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 0);
  const catBoost = new Set();
  words.forEach(w => {
    Object.entries(KEYWORD_MAP).forEach(([k, cats]) => {
      if (w.includes(k.toLowerCase()) || k.toLowerCase().includes(w)) {
        cats.forEach(c => catBoost.add(c));
      }
    });
  });

  const scored = [];
  DATA.forEach(r => {
    let score = 0;
    const hay = (r.t + ' ' + r.x + ' ' + (r.tg||[]).join(' ') + ' ' + r.e).toLowerCase();

    words.forEach(w => {
      // Title match (high weight)
      if (r.t.toLowerCase().includes(w)) score += 10;
      // Tag match
      if ((r.tg||[]).some(t => t.toLowerCase().includes(w))) score += 7;
      // Content match
      const contentMatches = (hay.match(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi')) || []).length;
      score += Math.min(contentMatches * 2, 10);
      // Edu use match
      if (r.e.toLowerCase().includes(w)) score += 3;
    });

    // Category boost from keyword map
    if (catBoost.has(r.c)) score += 5;

    // Bonus for having images
    if (r.im.length > 0) score += 1;

    if (score > 0) scored.push({r, score});
  });

  scored.sort((a,b) => b.score - a.score);
  return scored;
}

function getTopCats(scored) {
  const catCount = {};
  scored.forEach(s => catCount[s.r.c] = (catCount[s.r.c]||0) + 1);
  const top = Object.entries(catCount).sort((a,b) => b[1] - a[1]).slice(0, 2);
  return top.map(([c]) => `<strong>${(CAT_META[c]||{n:c}).n}</strong>`).join('・');
}

function shuffleSeeded(arr, seed) {
  const a = [...arr];
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  for (let i = a.length - 1; i > 0; i--) {
    h = (h * 16807 + 1) & 0x7fffffff;
    const j = h % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function searchFromConcierge() {
  const q = document.getElementById('conciergeInput').value.trim();
  if (q) {
    document.getElementById('searchBox').value = q;
    handleSearch(q);
    window.scrollTo({top: document.querySelector('.topbar').offsetTop, behavior: 'smooth'});
  }
}

// ═══ LAZY LOAD ═══
function lazyLoad() {
  const imgs = document.querySelectorAll('img[data-src]');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.src = e.target.dataset.src;
        e.target.removeAttribute('data-src');
        obs.unobserve(e.target);
      }
    });
  }, {rootMargin: '200px'});
  imgs.forEach(img => obs.observe(img));
}
