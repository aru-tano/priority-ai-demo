<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教頭ダッシュボード — R7年度</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;transition:background .3s,color .3s}

/* ===== THEMES (ライトがデフォルト — 印刷配布で使うから) ===== */
:root{
  --bg:#f5f5f4;--bg2:#fff;--bg3:#fff;--bg4:#fafaf9;--bg5:#e7e5e4;
  --border:#e5e5e5;--border2:#d4d4d4;--border3:#a3a3a3;
  --text:#1c1917;--text2:#57534e;--text-dim:#a8a29e;--text-dim2:#d6d3d1;
  --accent:#6366f1;--accent2:#8b5cf6;--accent-bg:rgba(99,102,241,.08);
  --card-hover:#f5f5f4;--shadow:rgba(0,0,0,.06);
  --green:#059669;--red:#dc2626;--amber:#d97706;--blue:#2563eb;--pink:#db2777;
}
body{background:var(--bg);color:var(--text)}
body.dark{
  --bg:#0a0a0a;--bg2:#111;--bg3:#151515;--bg4:#1a1a1a;--bg5:#222;
  --border:#1e1e1e;--border2:#2a2a2a;--border3:#333;
  --text:#e5e5e5;--text2:#bbb;--text-dim:#666;--text-dim2:#444;
  --accent:#818cf8;--accent2:#a78bfa;--accent-bg:rgba(99,102,241,.12);
  --card-hover:#1c1c1c;--shadow:rgba(0,0,0,.3);
  --green:#34d399;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--pink:#f472b6;
}

/* ===== LAYOUT ===== */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{
  display:flex;align-items:center;padding:0 16px;height:44px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
  gap:8px;
}
.topbar-title{font-size:.85rem;font-weight:700;flex:1}
.topbar-title span{color:var(--accent)}
.theme-toggle{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;
  transition:all .2s;
}
.theme-toggle:hover{border-color:var(--accent);color:var(--text)}

.tabs{
  display:flex;background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;
}
.tab{
  padding:10px 20px;cursor:pointer;font-size:.8rem;font-weight:600;
  color:var(--text-dim);border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.tab:hover{color:var(--text2);background:var(--bg4)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .badge{
  background:var(--accent-bg);color:var(--accent);font-size:.65rem;
  padding:1px 6px;border-radius:99px;font-weight:700;
}

.main{flex:1;overflow-y:auto;padding:20px;max-width:1100px;margin:0 auto;width:100%}
.panel{display:none}
.panel.active{display:block}

/* ===== COMMON ===== */
.domain-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.status-btn{
  padding:2px 10px;border-radius:99px;font-size:.7rem;font-weight:600;
  border:none;cursor:pointer;transition:all .15s;font-family:inherit;
}
.status-btn:hover{filter:brightness(1.2)}
.s-未着手{background:rgba(248,113,113,.15);color:var(--red)}
.s-進行中{background:rgba(96,165,250,.15);color:var(--blue)}
.s-委任{background:rgba(251,191,36,.15);color:var(--amber)}
.s-完了{background:rgba(52,211,153,.15);color:var(--green)}

.checkbox{
  width:18px;height:18px;border-radius:5px;border:2px solid var(--border3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.checkbox:hover{border-color:var(--accent)}
.checkbox.checked{background:var(--green);border-color:var(--green)}
.checkbox.checked::after{content:'✓';color:#fff;font-size:.65rem;font-weight:800}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  padding:8px 20px;border-radius:10px;background:var(--bg5);border:1px solid var(--border3);
  color:var(--text);font-size:.78rem;font-weight:600;z-index:9999;
  transition:transform .25s ease;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes slideOut{to{opacity:0;transform:translateX(40px);height:0;padding:0;margin:0;overflow:hidden}}

/* ===== AI BUTTON ===== */
.ai-btn{
  padding:8px 18px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:700;font-size:.8rem;cursor:pointer;
  font-family:inherit;transition:all .2s;white-space:nowrap;
}
.ai-btn:hover{opacity:.9;transform:scale(1.02)}
.ai-btn:active{transform:scale(.97)}
.ai-btn.processing .btn-label{opacity:.3}
.ai-btn.processing .spinner{display:inline-block}
.spinner{display:none;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.today-initial{text-align:center;padding:50px 0;color:var(--text-dim)}
.today-initial-icon{font-size:2.5rem;margin-bottom:10px}
.today-initial-text{font-size:.88rem;margin-bottom:4px}
.today-initial-sub{font-size:.75rem;color:var(--text-dim2)}

/* ===== FLOW DIAGRAM ===== */
.flow-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px 0;
  font-size:.88rem;font-weight:700;color:var(--text);user-select:none;
}
.flow-toggle:hover{color:var(--accent)}
.flow-toggle .arrow{transition:transform .2s;font-size:.7rem}
.flow-toggle.open .arrow{transform:rotate(90deg)}
.flow-content{display:none;margin-top:8px;padding:12px;background:var(--bg4);border:1px solid var(--border);border-radius:10px}
.flow-content.open{display:block}
.flow-content svg{width:100%;height:auto;display:block}
.flow-decisions{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.flow-dec{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;border-left:3px solid var(--green);font-size:.78rem;line-height:1.6}
.flow-dec.pending{border-left-color:var(--text-dim2);opacity:.7}
.flow-dec strong{font-weight:700}
.flow-dec-title{font-weight:700;margin-bottom:3px}

/* ===== DOMAIN COLORS ===== */
.dc-行事{background:#ef4444}.dc-教職員管理{background:#f59e0b}.dc-文書管理{background:#3b82f6}
.dc-施設管理{background:#10b981}.dc-教育委員会{background:#8b5cf6}.dc-危機管理{background:#dc2626}
.dc-校内調整{background:#06b6d4}.dc-会議運営{background:#f97316}.dc-地域連携{background:#84cc16}
.dc-保護者対応{background:#ec4899}.dc-校長補佐{background:#6366f1}

/* ===== PANEL 1: TODAY ===== */
.today-header{margin-bottom:20px}
.today-date{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.today-sub{font-size:.8rem;color:var(--text-dim)}
.today-cards{display:flex;flex-direction:column;gap:8px}
.today-card{
  padding:14px 16px;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;display:flex;gap:12px;align-items:flex-start;
  transition:all .3s;
}
.today-card:hover{background:var(--card-hover)}
.today-card.done{opacity:.4}
.today-card.done .today-card-title{text-decoration:line-through}
.today-card.removing{animation:slideOut .35s ease forwards}
.today-rank{
  width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.78rem;color:#fff;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}
.today-card-body{flex:1;min-width:0}
.today-card-title{font-weight:700;font-size:.88rem;margin-bottom:2px}
.today-card-why{font-size:.75rem;color:var(--text-dim);line-height:1.5;margin-top:4px}
.today-checklist{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.today-cl-item{font-size:.73rem;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0}
.today-cl-item:hover{color:var(--text)}
.today-cl-item.cl-done{text-decoration:line-through;opacity:.5}
.today-pitfall{
  margin-top:8px;padding:6px 10px;border-radius:6px;font-size:.73rem;
  background:rgba(248,113,113,.08);border-left:3px solid var(--red);
  color:var(--text2);line-height:1.5;
}
.today-remaining{margin-top:20px;text-align:center;color:var(--text-dim);font-size:.78rem;padding:12px;border:1px dashed var(--border2);border-radius:10px}
.hide-done-toggle{font-size:.75rem;color:var(--text-dim);cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;font-family:inherit;transition:all .2s}
.hide-done-toggle:hover{border-color:var(--accent);color:var(--text)}
.hide-done-toggle.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}

/* ===== PANEL 2: LIST (Notion-style table) ===== */
.list-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.list-toolbar select,.list-toolbar input{
  padding:6px 10px;border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:.78rem;font-family:inherit;
}
.list-toolbar input{flex:1;min-width:140px}
.list-count{font-size:.73rem;color:var(--text-dim);margin-bottom:8px}
.list-header{
  display:grid;grid-template-columns:30px 1fr 90px 50px 100px 56px;gap:8px;
  padding:6px 12px;font-size:.7rem;font-weight:700;color:var(--text-dim);
  border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px;
  align-items:center;
}
.list-header span{cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none}
.list-header span:hover{color:var(--text)}
.sort-arrow{font-size:.6rem;opacity:.5}
.list-header span.sorted{color:var(--accent)}
.list-header span.sorted .sort-arrow{opacity:1}
.list-rows{display:flex;flex-direction:column}
.list-row{
  display:grid;grid-template-columns:30px 1fr 90px 50px 100px 56px;gap:8px;
  padding:8px 12px;border-bottom:1px solid var(--border);
  align-items:center;font-size:.82rem;transition:all .2s;cursor:pointer;
}
.list-row:hover{background:var(--card-hover)}
.list-row.done{opacity:.4}
.list-row.done .list-task{text-decoration:line-through}
.list-row.removing{animation:slideOut .3s ease forwards}
.list-task{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-domain{font-size:.7rem;font-weight:600;display:flex;align-items:center;gap:4px}
.list-month{font-size:.73rem;color:var(--text2)}
.list-cycle{font-size:.68rem;color:var(--text-dim)}
.list-detail{
  grid-column:2/7;padding:8px 0 4px;font-size:.75rem;color:var(--text2);line-height:1.6;
  display:none;
}
.list-row.open .list-detail{display:block}
.list-checklist{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.list-cl{display:flex;align-items:center;gap:6px;font-size:.73rem;cursor:pointer;padding:2px 0}
.list-cl:hover{color:var(--text)}
.list-cl.cl-done{text-decoration:line-through;opacity:.5}

/* ===== PANEL 3: CALENDAR ===== */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-nav-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s}
.cal-nav-btn:hover{background:var(--bg5)}
.cal-month-label{font-weight:700;font-size:1rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hdr{text-align:center;font-size:.72rem;font-weight:600;color:var(--text-dim);padding:6px 0}
.cal-hdr:first-child{color:var(--red)}
.cal-hdr:last-child{color:var(--blue)}
.cal-cell{min-height:80px;padding:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.today{border-color:var(--accent);background:var(--accent-bg)}
.cal-day{font-size:.73rem;font-weight:600;margin-bottom:2px;color:var(--text2)}
.cal-cell:nth-child(7n+1) .cal-day{color:var(--red)}
.cal-cell:nth-child(7n) .cal-day{color:var(--blue)}
.cal-item{
  font-size:.6rem;padding:2px 4px;border-radius:3px;margin-bottom:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:var(--bg5);color:var(--text2);cursor:default;display:flex;align-items:center;gap:3px;
}
.cal-item:hover{background:var(--card-hover)}
.cal-item .domain-dot{width:5px;height:5px}
.cal-item.done-item{opacity:.35;text-decoration:line-through}
.cal-more{font-size:.58rem;color:var(--text-dim);padding:0 4px}
/* weekly view */
.cal-view-btns{display:flex;gap:4px;margin-left:auto}
.cal-view-btn{padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text-dim);font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.cal-view-btn:hover{border-color:var(--accent);color:var(--text)}
.cal-view-btn.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.week-hdr{text-align:center;font-size:.75rem;font-weight:700;color:var(--text-dim);padding:6px 0}
.week-cell{min-height:120px;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
.week-cell.today{border-color:var(--accent);background:var(--accent-bg)}
.week-day{font-size:.82rem;font-weight:700;margin-bottom:6px;color:var(--text2)}
.week-item{font-size:.72rem;padding:4px 6px;border-radius:4px;margin-bottom:3px;background:var(--bg5);color:var(--text2);display:flex;align-items:center;gap:4px;line-height:1.4}
.week-item:hover{background:var(--card-hover)}
.week-item .domain-dot{width:6px;height:6px}
.week-item.done-item{opacity:.35;text-decoration:line-through}
.week-due{font-size:.6rem;margin-left:auto;white-space:nowrap}

/* ===== RESPONSIVE (MOBILE) ===== */
@media(max-width:640px){
  .topbar-title{font-size:.78rem}
  .tab{padding:8px 12px;font-size:.72rem}
  .main{padding:12px}
  /* list: stack vertically */
  .list-header{display:none}
  .list-row{grid-template-columns:24px 1fr auto;font-size:.78rem;gap:6px}
  .list-row .list-domain,.list-row .list-month,.list-row .list-cycle{display:none}
  .list-row .list-task{white-space:normal}
  .list-detail{grid-column:1/4}
  /* calendar: force list on mobile */
  .cal-grid,.week-grid{grid-template-columns:1fr!important}
  .cal-hdr,.week-hdr{display:none}
  .cal-cell.empty{display:none}
  .cal-cell{min-height:auto;display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:6px 8px}
  .cal-day{margin:0;margin-right:8px;font-size:.78rem}
  .cal-item{font-size:.68rem}
  .week-cell{min-height:auto}
  /* kanban: 1 col */
  .kanban{grid-template-columns:1fr!important}
  /* today */
  .today-card{flex-direction:column;gap:8px}
  .today-rank{align-self:flex-start}
  /* overview */
  .ov-grid{grid-template-columns:1fr}
  .month-heat{grid-template-columns:repeat(6,1fr)}
  .bar-label{width:65px;font-size:.65rem}
  /* filter toolbar */
  .list-toolbar{flex-direction:column;align-items:stretch}
  .list-toolbar select,.list-toolbar input{width:100%}
  /* sub-row in list detail */
  .sub-row{grid-template-columns:1fr!important}
}

/* ===== PANEL 4: KANBAN ===== */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;min-height:400px}
@media(max-width:800px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kanban{grid-template-columns:1fr}}
.kanban-col{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:10px;min-height:200px;
}
.kanban-col-header{
  font-size:.78rem;font-weight:700;margin-bottom:10px;padding-bottom:6px;
  border-bottom:2px solid var(--border2);display:flex;align-items:center;gap:6px;
}
.kanban-col-header .count{
  font-size:.65rem;background:var(--bg5);padding:1px 6px;border-radius:99px;
  color:var(--text-dim);font-weight:600;
}
.kanban-col.drag-over{background:var(--accent-bg);border-color:var(--accent)}
.kanban-card{
  padding:10px 12px;background:var(--bg4);border:1px solid var(--border);
  border-radius:8px;margin-bottom:6px;cursor:grab;transition:all .15s;
  font-size:.78rem;
}
.kanban-card:hover{background:var(--card-hover);border-color:var(--border3)}
.kanban-card:active{cursor:grabbing;opacity:.7}
.kanban-card.dragging{opacity:.3}
.kanban-card.done-card{opacity:.45}
.kanban-card.done-card .kc-title{text-decoration:line-through}
.kc-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.kc-title{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-domain{font-size:.65rem;color:var(--text-dim)}
.kc-meta{font-size:.68rem;color:var(--text-dim);display:flex;gap:8px}

/* ===== PANEL 5: OVERVIEW ===== */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:640px){.ov-grid{grid-template-columns:1fr}}
.ov-card{padding:16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px}
.ov-card-title{font-size:.7rem;color:var(--text-dim);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ov-big{font-size:2rem;font-weight:800;color:var(--accent)}
.ov-sub{font-size:.73rem;color:var(--text-dim)}
.bar-chart{display:flex;flex-direction:column;gap:5px}
.bar-row{display:flex;align-items:center;gap:6px}
.bar-label{width:85px;font-size:.72rem;color:var(--text2);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:16px;background:var(--bg5);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bar-count{font-size:.65rem;color:var(--text-dim);width:24px;text-align:right}
.month-heat{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:6px}
.month-cell{text-align:center;padding:6px 2px;border-radius:5px;font-size:.65rem;font-weight:600}
.pitfall-card{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--red)}
.pitfall-task{font-weight:600;font-size:.8rem;margin-bottom:3px}
.pitfall-text{font-size:.73rem;color:var(--text2);line-height:1.5}
.rule-card{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--accent)}
.rule-trigger{font-size:.7rem;color:var(--accent);font-weight:600;margin-bottom:3px}
.rule-text{font-size:.8rem;font-weight:600;margin-bottom:3px}
.rule-reason{font-size:.73rem;color:var(--text-dim);line-height:1.5}
.section-title{font-size:.9rem;font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:6px}

/* ===== PRINT ===== */
@media print{
  .topbar,.tabs,.theme-toggle,.toast,.hide-done-toggle,.status-btn{display:none!important}
  body,body.light{background:#fff!important;color:#000!important;--bg:#fff;--bg2:#fff;--bg3:#f5f5f5;--bg4:#fafafa;--bg5:#eee;--border:#ddd;--text:#000;--text2:#333;--text-dim:#888}
  .main{padding:10px;max-width:100%}
  .panel{display:block!important;page-break-inside:avoid}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25);border-radius:3px}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="topbar-title">教頭ダッシュボード <span>R7</span></div>
    <button class="theme-toggle" id="themeBtn" title="テーマ切替">🌙</button>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="main">
    <div class="panel active" id="p-today"></div>
    <div class="panel" id="p-list"></div>
    <div class="panel" id="p-cal"></div>
    <div class="panel" id="p-board"></div>
    <div class="panel" id="p-overview"></div>
  </div>
</div>

const LS_KEY='kyoto-dash-v2';
let S;
function loadState(){
  try{S=JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){S={}}
  if(!S.status)S.status={};if(!S.cl)S.cl={};if(!S.theme)S.theme='';
  if(!S.tab)S.tab='today';if(!S.hideDone)S.hideDone=false;
  if(!S.sort)S.sort={col:'m',dir:1};if(!S.boardScope)S.boardScope='soon';if(!S.calView)S.calView='month';if(!S.calWeekStart)S.calWeekStart=null;
  TASKS.forEach(tk=>{if(!S.status[tk.id])S.status[tk.id]=(tk.cy==='daily'||tk.cy==='weekly'||tk.cy==='monthly')?'進行中':'未着手'});
}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(S))}
function getStatus(id){return S.status[id]||'未着手'}
function setStatus(id,st){S.status[id]=st;saveState()}
function isDone(id){return getStatus(id)==='完了'}
function toggleCl(taskId,idx){const k=taskId+'_'+idx;S.cl[k]=!S.cl[k];saveState()}
function isClDone(taskId,idx){return !!S.cl[taskId+'_'+idx]}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function domDot(d){return `<span class="domain-dot dc-${d}"></span>`}
function statusBtn(id){const st=getStatus(id);return `<button class="status-btn s-${st}" data-id="${id}" onclick="cycleStatus('${id}',event)">${st}</button>`}
function cb(id){const done=isDone(id);return `<div class="checkbox${done?' checked':''}" onclick="toggleDone('${id}',event)"></div>`}
function cycleStatus(id,e){e&&e.stopPropagation();const cur=getStatus(id);const i=(STATUSES.indexOf(cur)+1)%STATUSES.length;setStatus(id,STATUSES[i]);renderAll();showToast(`→ ${STATUSES[i]}`)}
function toggleDone(id,e){e&&e.stopPropagation();setStatus(id,isDone(id)?'未着手':'完了');renderAll();showToast(isDone(id)?'✓ 完了':'↩ 戻しました')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// 締切・着手目安の算出
function getDueInfo(tk){
  // due があればそれを使う
  if(tk.due){
    const d=new Date(tk.due);
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.ceil((d-now)/(1000*60*60*24));
    const label=`${d.getMonth()+1}/${d.getDate()}`;
    const urgency=diff<0?'overdue':diff<=3?'urgent':diff<=7?'soon':'ok';
    return {label,diff,urgency,type:'提出'};
  }
  // month + week_before から着手推奨週を推定
  if(tk.m && tk.cy==='yearly'){
    // 月初を基準に week_before 週前
    const targetDay=new Date(2026,tk.m-1,1); // その月の1日
    const startDay=new Date(targetDay);
    startDay.setDate(startDay.getDate()-(tk.wb||0)*7);
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.ceil((startDay-now)/(1000*60*60*24));
    const label=`${startDay.getMonth()+1}/${startDay.getDate()}〜`;
    const urgency=diff<0?'overdue':diff<=3?'urgent':diff<=7?'soon':'ok';
    return {label,diff,urgency,type:'着手'};
  }
  return null;
}
function dueTag(tk){
  if(isDone(tk.id))return ''; // 完了タスクは締切非表示
  const info=getDueInfo(tk);
  if(!info)return '';
  const colors={overdue:'var(--red)',urgent:'var(--red)',soon:'var(--amber)',ok:'var(--text-dim)'};
  const bgColors={overdue:'rgba(220,38,38,.1)',urgent:'rgba(220,38,38,.08)',soon:'rgba(217,119,6,.08)',ok:'transparent'};
  const prefix=info.type==='提出'?'〆':'▶';
  const diffLabel=info.diff<0?`${Math.abs(info.diff)}日超過`:info.diff===0?'今日':info.diff<=7?`あと${info.diff}日`:'';
  return `<span style="font-size:.65rem;padding:1px 6px;border-radius:4px;background:${bgColors[info.urgency]};color:${colors[info.urgency]};font-weight:600;white-space:nowrap">${prefix}${info.label}${diffLabel?' '+diffLabel:''}</span>`;
}

function renderListHeader(){
  const cols=[
    {key:'',label:'',nosort:true},
    {key:'t',label:'タスク'},
    {key:'d',label:'領域'},
    {key:'m',label:'月'},
    {key:'due',label:'締切'},

  ];

    return `<span class="${sorted?'sorted':''}" onclick="sortBy('${c.key}')">${c.label} <span class="sort-arrow">${sorted?(S.sort.dir>0?'▲':'▼'):'⇅'}</span></span>`;
  }).join('');
}

function sortBy(col){
  if(S.sort.col===col)S.sort.dir*=-1;else{S.sort.col=col;S.sort.dir=1}
  saveState();renderListHeader();renderListRows();
}

function getFiltered(){
  const dom=document.getElementById('fDom')?.value||'';
  const mon=document.getElementById('fMon')?.value||'';
  const st=document.getElementById('fSt')?.value||'';
  const q=(document.getElementById('fSearch')?.value||'').toLowerCase();
  return TASKS.filter(tk=>{
    if(dom&&tk.d!==dom)return false;
    if(mon==='null'&&tk.m!==null)return false;
    if(mon&&mon!=='null'&&tk.m!==+mon)return false;
    if(st&&getStatus(tk.id)!==st)return false;
    if(S.hideDone&&isDone(tk.id))return false;
    if(q&&!tk.t.toLowerCase().includes(q)&&!tk.d.toLowerCase().includes(q)&&!tk.tg.join(' ').toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{
    const {col,dir}=S.sort;
    let va,vb;
    if(col==='t'){va=a.t;vb=b.t}
    else if(col==='d'){va=a.d;vb=b.d}
    else if(col==='m'){va=a.m||99;vb=b.m||99}
    else if(col==='due'){const da=getDueInfo(a),db=getDueInfo(b);va=da?da.diff:999;vb=db?db.diff:999}
    else if(col==='st'){const o={'未着手':0,'進行中':1,'委任':2,'完了':3};va=o[getStatus(a.id)];vb=o[getStatus(b.id)]}
    else{va=a.m||99;vb=b.m||99}
    if(va<vb)return -dir;if(va>vb)return dir;return 0;
  });
}

let calY=2026,calM=4;

function getTasksForDay(dt,mTasks){
  const d=dt.getDate(),dow=dt.getDay(),m=dt.getMonth()+1;
  const fd=new Date(dt.getFullYear(),dt.getMonth(),1).getDay();
  const wom=Math.ceil((d+fd)/7);
  let dayTasks=[];
  mTasks.forEach(tk=>{
    if(tk.cy==='monthly'&&d<=7&&dow===1)dayTasks.push(tk);
    else if(tk.cy==='termly'&&d===1)dayTasks.push(tk);
    else if(tk.cy==='yearly'&&tk.m===m){
      const tw=Math.max(1,Math.min(4,4-(tk.wb||0)));
      if((wom===tw&&dow===1)||(d===1&&tw===1))dayTasks.push(tk);
    }
  });
  mTasks.filter(tk=>tk.due).forEach(tk=>{
    const dd=new Date(tk.due);
    if(dd.getDate()===d&&dd.getMonth()===dt.getMonth()&&!dayTasks.includes(tk))dayTasks.push(tk);
  });
  return dayTasks;
}

function getMonthTasks(y,m){
  return TASKS.filter(tk=>{
    if(tk.cy==='daily'||tk.cy==='weekly')return false;
    if(tk.m===m)return true;
    if(tk.cy==='monthly')return true;
    return false;
  });
}

function renderCal(){
  const el=document.getElementById('p-cal');
  const today=new Date();

  // Week start: Monday of current week (or saved)
  let weekStart;
  if(S.calWeekStart){weekStart=new Date(S.calWeekStart)}
  else{weekStart=new Date(today);weekStart.setDate(weekStart.getDate()-((weekStart.getDay()+6)%7))} // Monday

  const navLabel=S.calView==='month'?`${calY}年${calM}月`:`${weekStart.getMonth()+1}/${weekStart.getDate()}〜 の週`;

  el.innerHTML=`
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calNavPrev()">◀</button>
      <span class="cal-month-label">${navLabel}</span>
      <button class="cal-nav-btn" onclick="calNavNext()">▶</button>
      <button class="cal-nav-btn" onclick="calNavToday()" style="margin-left:4px;font-size:.7rem">今日</button>
      <div class="cal-view-btns">
        <button class="cal-view-btn${S.calView==='month'?' active':''}" onclick="S.calView='month';saveState();renderCal()">月間</button>
        <button class="cal-view-btn${S.calView==='week'?' active':''}" onclick="S.calView='week';saveState();renderCal()">週間</button>
      </div>
    </div>
    <div id="calContent"></div>
  `;

  if(S.calView==='month') renderCalMonth(today);
  else renderCalWeek(today,weekStart);
}

function renderCalMonth(today){
  const cc=document.getElementById('calContent');
  let html=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-hdr">${d}</div>`).join('');
  const fd=new Date(calY,calM-1,1).getDay();
  const dim=new Date(calY,calM,0).getDate();
  for(let i=0;i<fd;i++)html+='<div class="cal-cell empty"></div>';
  const mTasks=getMonthTasks(calY,calM);
  for(let d=1;d<=dim;d++){
    const dt=new Date(calY,calM-1,d);
    const isToday=dt.toDateString()===today.toDateString();
    const dayTasks=getTasksForDay(dt,mTasks);
    html+=`<div class="cal-cell${isToday?' today':''}"><div class="cal-day">${d}</div>${dayTasks.slice(0,3).map(tk=>`<div class="cal-item${isDone(tk.id)?' done-item':''}" title="${esc(tk.t)}">${domDot(tk.d)} ${esc(tk.t)}</div>`).join('')}${dayTasks.length>3?`<div class="cal-more">+${dayTasks.length-3}</div>`:''}</div>`;
  }
  const rem=(7-(fd+dim)%7)%7;
  for(let i=0;i<rem;i++)html+='<div class="cal-cell empty"></div>';
  cc.innerHTML=`<div class="cal-grid">${html}</div>`;
}

function renderCalWeek(today,weekStart){
  const cc=document.getElementById('calContent');
  const days=[];
  for(let i=0;i<5;i++){const d=new Date(weekStart);d.setDate(d.getDate()+i);days.push(d)} // Mon-Fri
  const dow=['月','火','水','木','金'];

  let html=days.map((d,i)=>`<div class="week-hdr">${dow[i]}</div>`).join('');
  html+=days.map(d=>{
    const isToday=d.toDateString()===today.toDateString();
    const mTasks=getMonthTasks(d.getFullYear(),d.getMonth()+1);
    const dayTasks=getTasksForDay(d,mTasks);
    const dateLabel=`${d.getMonth()+1}/${d.getDate()}`;
    return `<div class="week-cell${isToday?' today':''}">
      <div class="week-day">${dateLabel}${isToday?' <span style="font-size:.65rem;color:var(--accent)">(今日)</span>':''}</div>
      ${dayTasks.map(tk=>{
        const info=getDueInfo(tk);
        const dueLabel=info&&!isDone(tk.id)?`<span class="week-due" style="color:${{overdue:'var(--red)',urgent:'var(--red)',soon:'var(--amber)',ok:'var(--text-dim)'}[info.urgency]}">${info.type==='提出'?'〆':'▶'}${info.label}</span>`:'';
        return `<div class="week-item${isDone(tk.id)?' done-item':''}">${domDot(tk.d)} <span style="flex:1">${esc(tk.t)}</span>${dueLabel}</div>`;
      }).join('')}
      ${dayTasks.length===0?'<div style="font-size:.68rem;color:var(--text-dim2);padding:4px">予定なし</div>':''}
    </div>`;
  }).join('');
  cc.innerHTML=`<div class="week-grid">${html}</div>`;
}

function calNavPrev(){
  if(S.calView==='month'){calM--;if(calM<1){calM=12;calY--}}
  else{const ws=S.calWeekStart?new Date(S.calWeekStart):new Date();ws.setDate(ws.getDate()-7);S.calWeekStart=ws.toISOString();saveState()}
  renderCal();
}
function calNavNext(){
  if(S.calView==='month'){calM++;if(calM>12){calM=1;calY++}}
  else{const ws=S.calWeekStart?new Date(S.calWeekStart):new Date();ws.setDate(ws.getDate()+7);S.calWeekStart=ws.toISOString();saveState()}
  renderCal();
}
function calNavToday(){
  const now=new Date();calY=now.getFullYear();calM=now.getMonth()+1;
  const mon=new Date(now);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  S.calWeekStart=mon.toISOString();saveState();renderCal();
}

let _dragId=null;
function getBoardTasks(){
  const now=new Date(),cm=now.getMonth()+1;

  return TASKS.filter(tk=>{

  const cols=STATUSES.map(st=>{

      <span style="font-size:.72rem;color:var(--text-dim);margin-left:auto">${filtered.length}件表示 / 全${TASKS.length}件</span>
    </div>
    <div class="kanban">${cols.map(c=>`
    <div class="kanban-col" data-st="${c.st}">
      <div class="kanban-col-header">
        <span class="domain-dot" style="background:${{未着手:'var(--red)',進行中:'var(--blue)',委任:'var(--amber)',完了:'var(--green)'}[c.st]}"></span>
        ${c.st} <span class="count">${c.tasks.length}</span>
      </div>
      ${c.tasks.map(tk=>`
        <div class="kanban-card${isDone(tk.id)?' done-card':''}" draggable="true" data-id="${tk.id}">
          <div class="kc-top">${domDot(tk.d)} <span class="kc-title">${esc(tk.t)}</span></div>
          <div class="kc-meta"><span>${tk.m?tk.m+'月':'通年'}</span>${dueTag(tk)}${tk.cl.length?`<span>📋${tk.cl.length}</span>`:''}</div>
        </div>
      `).join('')}
    </div>
  `).join('')}</div>`;

  // Drag & drop
  document.querySelectorAll('.kanban-card[draggable]').forEach(card=>{
    card.addEventListener('dragstart',e=>{_dragId=card.dataset.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'});

  document.querySelectorAll('.kanban-col').forEach(col=>{

      if(_dragId){setStatus(_dragId,col.dataset.st);renderAll();showToast(`→ ${col.dataset.st}`)}
    });
  });
}
