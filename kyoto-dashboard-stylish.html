<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教頭ダッシュボード — R7年度 [Stylish]</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px}
body{font-family:'Inter','Noto Sans JP',sans-serif;min-height:100vh;letter-spacing:-0.01em;transition:background .4s cubic-bezier(.16,1,.3,1),color .3s}

/* ===== STYLISH UI REDESIGN v2 =====
   [SU-001] 60-30-10: 60%=#FAF9F6 / 30%=#FFFFFF / 10%=#4A7C59
   [SU-002] Elevated Neutrals
   [SU-004] 8px Grid
   [SU-008] Semantic Border Radius: 8/16/24
   [SU-011] Soft Shadow (Josh Comeau)
   [SU-012] Glassmorphism (sidebar + header)
   [SU-014] Animation timing: enter 0.35s, hover 0.2s, exit 0.15s
   [SU-015] Easing: cubic-bezier(.16,1,.3,1)
   [SU-016] Visual Hierarchy: Cormorant Garamond for big numbers
   [SU-020] Grainy texture, elevated neutrals, micro-animations
   [SU-023] Card Golden Pattern: padding 20-24px, radius 16px
   [SU-025] 5 Principles: Consistency, Restraint, Breathing, Order, Feedback
===== */

:root{
  --bg:#FAF9F6;
  --surface:#FFFFFF;
  --surface-dim:#F5F3F0;
  --surface-container:#EDE9E3;
  --border:rgba(45,38,33,0.07);
  --border-mid:rgba(45,38,33,0.12);
  --border-strong:rgba(45,38,33,0.2);
  --text:#2d2621;
  --text-secondary:#6b6560;
  --text-dim:#a8a29e;
  --text-dim2:#d6d3d1;
  --accent:#4A7C59;
  --accent-hover:#3d6b4a;
  --accent-bg:rgba(74,124,89,0.07);
  --card-hover:rgba(74,124,89,0.03);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 16px 40px rgba(0,0,0,0.1);
  --green:#4A7C59;
  --red:#C45D5D;
  --amber:#C8934A;
  --blue:#5B7DB1;
  --pink:#B85A7A;
  --ease:cubic-bezier(.16,1,.3,1);
  --sidebar-w:56px;
}
body{background:var(--bg);color:var(--text)}

/* [SU-020] Grainy texture overlay */
body::before{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.03;pointer-events:none;z-index:9999;
}

/* Dark mode */
body.dark{
  --bg:#111110;--surface:#1a1917;--surface-dim:#1e1d1b;--surface-container:#252320;
  --border:rgba(255,255,255,0.06);--border-mid:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.16);
  --text:#e8e4df;--text-secondary:#b5afa8;--text-dim:#6b6560;--text-dim2:#3d3a36;
  --accent:#7aad8a;--accent-hover:#5d946e;--accent-bg:rgba(122,173,138,.1);
  --card-hover:rgba(122,173,138,.05);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.15);--shadow-md:0 4px 16px rgba(0,0,0,0.2);--shadow-lg:0 16px 40px rgba(0,0,0,0.3);
  --green:#7aad8a;--red:#e88888;--amber:#e8b86a;--blue:#8aabe8;--pink:#e88ab0;
}

/* ===== LAYOUT: Sidebar + Main ===== */
.app{display:flex;height:100vh;overflow:hidden}

/* [SU-012] Glassmorphism sidebar */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:4px;
  background:rgba(250,249,246,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-right:1px solid var(--border);z-index:100;
}
body.dark .sidebar{background:rgba(17,17,16,0.85)}

.sidebar-logo{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1rem;font-style:italic;
  margin-bottom:16px;
}

.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}

.nav-btn{
  width:40px;height:40px;border-radius:12px;border:none;
  background:transparent;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;cursor:pointer;position:relative;
  transition:all .2s var(--ease);
}
.nav-btn:hover{background:var(--accent-bg);color:var(--text-secondary)}
.nav-btn.active{background:var(--accent-bg);color:var(--accent)}
.nav-btn.active::before{
  content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--accent);
}
.nav-btn .badge{
  position:absolute;top:4px;right:4px;
  background:var(--red);color:#fff;font-size:.55rem;
  min-width:14px;height:14px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;line-height:1;
}

.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:4px}

.theme-toggle{
  width:40px;height:40px;border-radius:12px;border:none;
  background:transparent;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;cursor:pointer;transition:all .2s var(--ease);
}
.theme-toggle:hover{background:var(--accent-bg);color:var(--text)}

/* Main content area */
.main-wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* [SU-012] Glassmorphism header */
.header{
  padding:20px 32px 16px;flex-shrink:0;
  background:rgba(250,249,246,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
body.dark .header{background:rgba(17,17,16,0.85)}

.header-left{}
.header-date{
  font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;
  letter-spacing:-0.02em;line-height:1.2;
}
.header-sub{font-size:.78rem;color:var(--text-dim);margin-top:2px}

.header-right{display:flex;align-items:center;gap:8px}
.stat-chip{
  padding:4px 12px;border-radius:99px;font-size:.72rem;font-weight:600;
  background:var(--surface-dim);border:1px solid var(--border);color:var(--text-secondary);
}
.stat-chip.highlight{background:var(--accent-bg);color:var(--accent);border-color:rgba(74,124,89,0.15)}

/* Content area */
.content{flex:1;overflow-y:auto;padding:24px 32px 40px;max-width:1100px;width:100%}
.panel{display:none}
.panel.active{display:block}

/* ===== COMMON COMPONENTS ===== */
.domain-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.status-btn{
  padding:3px 10px;border-radius:99px;font-size:.68rem;font-weight:600;
  border:none;cursor:pointer;transition:all .15s var(--ease);font-family:inherit;
  letter-spacing:.02em;
}
.status-btn:hover{filter:brightness(1.1);transform:scale(1.04)}
.s-未着手{background:rgba(196,93,93,.12);color:var(--red)}
.s-進行中{background:rgba(91,125,177,.12);color:var(--blue)}
.s-委任{background:rgba(200,147,74,.12);color:var(--amber)}
.s-完了{background:rgba(74,124,89,.12);color:var(--green)}

.checkbox{
  width:18px;height:18px;border-radius:6px;border:2px solid var(--border-strong);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease);flex-shrink:0;
}
.checkbox:hover{border-color:var(--accent);background:var(--accent-bg)}
.checkbox.checked{background:var(--green);border-color:var(--green)}
.checkbox.checked::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;color:#fff;font-size:.55rem}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  padding:10px 24px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border-mid);
  color:var(--text);font-size:.78rem;font-weight:600;z-index:9999;
  box-shadow:var(--shadow-md);transition:transform .25s var(--ease);pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideOut{to{opacity:0;transform:translateX(40px);height:0;padding:0;margin:0;overflow:hidden}}

/* ===== AI BUTTON ===== */
.ai-btn{
  padding:10px 20px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;font-weight:700;font-size:.8rem;
  cursor:pointer;font-family:inherit;
  transition:all .25s var(--ease);white-space:nowrap;
  box-shadow:0 2px 8px rgba(74,124,89,0.2);
}
.ai-btn:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 6px 16px rgba(74,124,89,0.25)}
.ai-btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(74,124,89,0.15)}
.ai-btn.processing .btn-label{opacity:.3}
.ai-btn.processing .spinner{display:inline-block}
.spinner{display:none;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.today-initial{text-align:center;padding:56px 0;color:var(--text-dim)}
.today-initial-icon{font-size:2.5rem;margin-bottom:12px;opacity:.5}
.today-initial-text{font-size:.88rem;margin-bottom:4px}
.today-initial-sub{font-size:.75rem;color:var(--text-dim2)}

/* ===== FLOW DIAGRAM ===== */
.flow-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 0;
  font-size:.88rem;font-weight:700;color:var(--text);user-select:none;
}
.flow-toggle:hover{color:var(--accent)}
.flow-toggle .arrow{transition:transform .2s var(--ease);font-size:.7rem}
.flow-toggle.open .arrow{transform:rotate(90deg)}
.flow-content{display:none;margin-top:8px;padding:16px;background:var(--surface-dim);border:1px solid var(--border);border-radius:16px}
.flow-content.open{display:block}
.flow-content svg{width:100%;height:auto;display:block}
.flow-decisions{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.flow-dec{padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;border-left:3px solid var(--green);font-size:.78rem;line-height:1.6}
.flow-dec.pending{border-left-color:var(--text-dim2);opacity:.7}
.flow-dec strong{font-weight:700}
.flow-dec-title{font-weight:700;margin-bottom:4px}

/* ===== DOMAIN COLORS ===== */
.dc-行事{background:#ef4444}.dc-教職員管理{background:#f59e0b}.dc-文書管理{background:#3b82f6}
.dc-施設管理{background:#10b981}.dc-教育委員会{background:#8b5cf6}.dc-危機管理{background:#dc2626}
.dc-校内調整{background:#06b6d4}.dc-会議運営{background:#f97316}.dc-地域連携{background:#84cc16}
.dc-保護者対応{background:#ec4899}.dc-校長補佐{background:#6366f1}

/* ===== PANEL 1: TODAY ===== */
.today-cards{display:flex;flex-direction:column;gap:16px}
/* [SU-023] Card Golden Pattern + [SU-011] Soft Shadow */
.today-card{
  padding:20px 24px;background:var(--surface);
  border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:16px;display:flex;gap:16px;align-items:flex-start;
  transition:all .35s var(--ease);box-shadow:var(--shadow-sm);
}
.today-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.today-card.done{opacity:.4}
.today-card.done .today-card-title{text-decoration:line-through}
.today-card.removing{animation:slideOut .35s ease forwards}
.today-rank{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0;
  background:var(--accent);font-family:'Cormorant Garamond',serif;
}
.today-card-body{flex:1;min-width:0}
.today-card-title{font-weight:700;font-size:.88rem;margin-bottom:2px}
.today-card-why{
  font-size:.75rem;color:var(--text-secondary);line-height:1.6;margin-top:8px;
  padding:8px 12px;border-radius:8px;background:var(--accent-bg);
}
.today-checklist{margin-top:12px;display:flex;flex-direction:column;gap:4px}
.today-cl-item{
  font-size:.75rem;color:var(--text-secondary);display:flex;align-items:center;gap:8px;
  cursor:pointer;padding:4px 0;transition:color .15s;
}
.today-cl-item:hover{color:var(--text)}
.today-cl-item.cl-done{text-decoration:line-through;opacity:.5}
.today-cl-check{
  width:14px;height:14px;border-radius:4px;border:1.5px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s var(--ease);
}
.today-cl-item.cl-done .today-cl-check{background:var(--green);border-color:var(--green)}
.today-cl-item.cl-done .today-cl-check::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;color:#fff;font-size:.45rem}
.today-pitfall{
  margin-top:12px;padding:8px 12px;border-radius:8px;font-size:.75rem;
  background:rgba(196,93,93,.06);border-left:3px solid var(--red);
  color:var(--text-secondary);line-height:1.6;
}
.today-remaining{margin-top:24px;text-align:center;color:var(--text-dim);font-size:.78rem;padding:16px;border:1px dashed var(--border-mid);border-radius:12px}
.hide-done-toggle{
  font-size:.72rem;color:var(--text-dim);cursor:pointer;padding:6px 12px;
  border-radius:8px;border:1px solid var(--border-mid);background:transparent;
  font-family:inherit;transition:all .2s var(--ease);font-weight:500;
}
.hide-done-toggle:hover{border-color:var(--accent);color:var(--text)}
.hide-done-toggle.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(74,124,89,0.2)}

/* ===== PANEL 2: LIST ===== */
.list-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.list-toolbar select,.list-toolbar input{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border-mid);
  background:var(--surface);color:var(--text);font-size:.78rem;font-family:inherit;
  transition:border-color .2s;
}
.list-toolbar select:focus,.list-toolbar input:focus{outline:none;border-color:var(--accent)}
.list-toolbar input{flex:1;min-width:140px}
.list-count{font-size:.72rem;color:var(--text-dim);margin-bottom:8px;font-weight:500}
.list-header{
  display:grid;grid-template-columns:30px 1fr 90px 50px 100px 56px;gap:8px;
  padding:8px 16px;font-size:.68rem;font-weight:700;color:var(--text-dim);
  border-bottom:1px solid var(--border-mid);text-transform:uppercase;letter-spacing:.5px;
  align-items:center;
}
.list-header span{cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none;transition:color .15s}
.list-header span:hover{color:var(--text)}
.sort-arrow{font-size:.6rem;opacity:.5}
.list-header span.sorted{color:var(--accent)}
.list-header span.sorted .sort-arrow{opacity:1}
.list-rows{display:flex;flex-direction:column}
.list-row{
  display:grid;grid-template-columns:30px 1fr 90px 50px 100px 56px;gap:8px;
  padding:10px 16px;border-bottom:1px solid var(--border);
  align-items:center;font-size:.82rem;
  transition:all .2s var(--ease);cursor:pointer;border-radius:0;
}
.list-row:hover{background:var(--card-hover);transform:translateY(-1px)}
.list-row.done{opacity:.4}
.list-row.done .list-task{text-decoration:line-through}
.list-row.removing{animation:slideOut .3s ease forwards}
.list-task{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-domain{font-size:.7rem;font-weight:600;display:flex;align-items:center;gap:4px}
.list-month{font-size:.73rem;color:var(--text-secondary)}
.list-cycle{font-size:.68rem;color:var(--text-dim)}
.list-detail{
  grid-column:2/7;padding:12px 0 8px;font-size:.75rem;color:var(--text-secondary);line-height:1.6;
  display:none;
}
.list-row.open .list-detail{display:block}
.list-checklist{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.list-cl{display:flex;align-items:center;gap:8px;font-size:.73rem;cursor:pointer;padding:3px 0;transition:color .15s}
.list-cl:hover{color:var(--text)}
.list-cl.cl-done{text-decoration:line-through;opacity:.5}

/* ===== PANEL 3: CALENDAR ===== */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-nav-btn{
  padding:6px 12px;border-radius:8px;border:1px solid var(--border-mid);
  background:var(--surface);color:var(--text);cursor:pointer;
  font-family:inherit;font-size:.85rem;transition:all .2s var(--ease);
}
.cal-nav-btn:hover{background:var(--surface-dim);border-color:var(--accent)}
.cal-month-label{font-weight:700;font-size:1rem;font-family:'Cormorant Garamond',serif;font-size:1.2rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hdr{text-align:center;font-size:.85rem;font-weight:700;color:var(--text-dim);padding:10px 0;letter-spacing:.05em}
.cal-hdr:first-child{color:var(--red)}
.cal-hdr:last-child{color:var(--blue)}
.cal-cell{
  min-height:88px;padding:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  transition:all .2s var(--ease);
}
.cal-cell:hover{box-shadow:var(--shadow-sm)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.empty:hover{box-shadow:none}
.cal-cell.today{border-color:var(--accent);background:var(--accent-bg)}
.cal-day{font-size:.73rem;font-weight:600;margin-bottom:4px;color:var(--text-secondary)}
.cal-cell:nth-child(7n+1) .cal-day{color:var(--red)}
.cal-cell:nth-child(7n) .cal-day{color:var(--blue)}
.cal-item{
  font-size:.6rem;padding:3px 6px;border-radius:6px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:var(--surface-dim);color:var(--text-secondary);cursor:default;
  display:flex;align-items:center;gap:3px;transition:background .15s;
}
.cal-item:hover{background:var(--card-hover)}
.cal-item .domain-dot{width:5px;height:5px}
.cal-item.done-item{opacity:.35;text-decoration:line-through}
.cal-more{font-size:.58rem;color:var(--text-dim);padding:0 4px}

/* Weekly view */
.cal-view-btns{display:flex;gap:4px;margin-left:auto}
.cal-view-btn{
  padding:4px 12px;border-radius:8px;border:1px solid var(--border-mid);
  background:transparent;color:var(--text-dim);font-size:.72rem;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .2s var(--ease);
}
.cal-view-btn:hover{border-color:var(--accent);color:var(--text)}
.cal-view-btn.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(74,124,89,0.2)}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.week-hdr{text-align:center;font-size:.75rem;font-weight:700;color:var(--text-dim);padding:8px 0}
.week-cell{
  min-height:120px;padding:12px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  transition:all .2s var(--ease);
}
.week-cell:hover{box-shadow:var(--shadow-sm)}
.week-cell.today{border-color:var(--accent);background:var(--accent-bg)}
.week-day{font-size:.82rem;font-weight:700;margin-bottom:8px;color:var(--text-secondary)}
.week-item{
  font-size:.72rem;padding:6px 8px;border-radius:8px;margin-bottom:4px;
  background:var(--surface-dim);color:var(--text-secondary);
  display:flex;align-items:center;gap:4px;line-height:1.4;transition:background .15s;
}
.week-item:hover{background:var(--card-hover)}
.week-item .domain-dot{width:6px;height:6px}
.week-item.done-item{opacity:.35;text-decoration:line-through}
.week-due{font-size:.6rem;margin-left:auto;white-space:nowrap}

/* ===== PANEL 4: KANBAN ===== */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;min-height:400px}
@media(max-width:800px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kanban{grid-template-columns:1fr}}
.kanban-col{
  background:var(--surface-dim);border:1px solid var(--border);border-radius:20px;
  padding:20px;min-height:200px;
}
.kanban-col-header{
  font-size:.78rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;padding-left:8px;
  border-bottom:none;border-left:3px solid var(--border-mid);
  display:flex;align-items:center;gap:8px;
}
.kanban-col-header .count{
  font-size:.65rem;background:var(--surface-container);padding:2px 8px;border-radius:99px;
  color:var(--text-dim);font-weight:600;
}
.kanban-col.drag-over{background:var(--accent-bg);border-color:var(--accent)}
.kanban-card{
  padding:14px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;cursor:grab;
  transition:all .35s var(--ease);font-size:.78rem;box-shadow:var(--shadow-sm);
}
.kanban-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.kanban-card:active{cursor:grabbing;opacity:.7}
.kanban-card.dragging{opacity:.3}
.kanban-card.done-card{opacity:.45}
.kanban-card.done-card .kc-title{text-decoration:line-through}
.kc-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.kc-title{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-domain{font-size:.65rem;color:var(--text-dim)}
.kc-meta{font-size:.68rem;color:var(--text-dim);display:flex;gap:8px}

/* ===== PANEL 5: OVERVIEW ===== */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:640px){.ov-grid{grid-template-columns:1fr}}
/* [SU-023] Card Golden Pattern */
.ov-card{
  padding:24px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow-sm);
  transition:all .35s var(--ease);
}
.ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
/* [SU-016] Visual Hierarchy */
.ov-card-title{
  font-size:.68rem;color:var(--text-dim);font-weight:700;margin-bottom:12px;
  text-transform:uppercase;letter-spacing:.8px;
}
.ov-big{
  font-size:2.8rem;font-weight:700;color:var(--accent);
  font-family:'Cormorant Garamond',serif;line-height:1;
}
.ov-sub{font-size:.73rem;color:var(--text-dim);margin-top:4px}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{width:85px;font-size:.72rem;color:var(--text-secondary);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--surface-dim);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;transition:width .5s var(--ease)}
.bar-count{font-size:.65rem;color:var(--text-dim);width:24px;text-align:right;font-weight:600}
.month-heat{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:8px}
.month-cell{text-align:center;padding:8px 2px;border-radius:8px;font-size:.65rem;font-weight:600}
.pitfall-card{
  padding:14px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;border-left:3px solid var(--red);
  box-shadow:var(--shadow-sm);transition:all .2s var(--ease);
}
.pitfall-card:hover{box-shadow:var(--shadow-md)}
.pitfall-task{font-weight:600;font-size:.8rem;margin-bottom:4px}
.pitfall-text{font-size:.73rem;color:var(--text-secondary);line-height:1.6}
.rule-card{
  padding:14px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;border-left:3px solid var(--accent);
  box-shadow:var(--shadow-sm);transition:all .2s var(--ease);
}
.rule-card:hover{box-shadow:var(--shadow-md)}
.rule-trigger{font-size:.7rem;color:var(--accent);font-weight:600;margin-bottom:4px}
.rule-text{font-size:.8rem;font-weight:600;margin-bottom:4px}
.rule-reason{font-size:.73rem;color:var(--text-dim);line-height:1.6}
.section-title{
  font-size:.9rem;font-weight:700;margin:24px 0 12px;
  display:flex;align-items:center;gap:8px;
}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:640px){
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;
    width:100%;height:56px;flex-direction:row;
    padding:0 8px;gap:0;
    border-right:none;border-top:1px solid var(--border);
    z-index:200;
  }
  .sidebar-logo{display:none}
  .sidebar-nav{flex-direction:row;gap:0;justify-content:center;flex:1}
  .sidebar-bottom{margin-top:0;flex-direction:row}
  .nav-btn{width:48px;height:48px}
  .nav-btn.active::before{
    left:50%;top:auto;bottom:-4px;transform:translateX(-50%);

  }
  .main-wrapper{padding-bottom:56px}
  .header{padding:16px}
  .header-date{font-size:1.2rem}
  .content{padding:16px}
  .list-header{display:none}
  .list-row{grid-template-columns:24px 1fr auto;font-size:.78rem;gap:6px}
  .list-row .list-domain,.list-row .list-month,.list-row .list-cycle{display:none}
  .list-row .list-task{white-space:normal}
  .list-detail{grid-column:1/4}
  .cal-grid,.week-grid{grid-template-columns:1fr!important}
  .cal-hdr,.week-hdr{display:none}
  .cal-cell.empty{display:none}
  .cal-cell{min-height:auto;display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:8px}
  .cal-day{margin:0;margin-right:8px;font-size:.78rem}
  .cal-item{font-size:.68rem}
  .week-cell{min-height:auto}
  .kanban{grid-template-columns:1fr!important}

  .today-rank{align-self:flex-start}
  .ov-grid{grid-template-columns:1fr}
  .month-heat{grid-template-columns:repeat(6,1fr)}
  .bar-label{width:65px;font-size:.65rem}
  .list-toolbar{flex-direction:column;align-items:stretch}
  .list-toolbar select,.list-toolbar input{width:100%}
  .sub-row{grid-template-columns:1fr!important}
}

/* ===== PRINT ===== */
@media print{
  .sidebar,.header,.toast,.hide-done-toggle,.status-btn,.theme-toggle,.nav-btn{display:none!important}
  body,body.light{background:#fff!important;color:#000!important;--bg:#fff;--surface:#fff;--surface-dim:#f5f5f5;--surface-container:#eee;--border:#ddd;--text:#000;--text-secondary:#333;--text-dim:#888}
  .main-wrapper{padding:0}
  .content{padding:10px;max-width:100%}
  .panel{display:block!important;page-break-inside:avoid}
}

// ═══════════════════════════════════════════════════════════════
// STATE (localStorage-backed)
// ═══════════════════════════════════════════════════════════════
const LS_KEY='kyoto-dash-v2';
let S;
function loadState(){
  try{S=JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){S={}}
  if(!S.status)S.status={};if(!S.cl)S.cl={};if(!S.theme)S.theme='';
  if(!S.tab)S.tab='today';if(!S.hideDone)S.hideDone=false;
  if(!S.sort)S.sort={col:'m',dir:1};if(!S.boardScope)S.boardScope='soon';if(!S.calView)S.calView='month';if(!S.calWeekStart)S.calWeekStart=null;
  TASKS.forEach(tk=>{if(!S.status[tk.id])S.status[tk.id]=(tk.cy==='daily'||tk.cy==='weekly'||tk.cy==='monthly')?'進行中':'未着手'});
}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(S))}
function getStatus(id){return S.status[id]||'未着手'}
function setStatus(id,st){S.status[id]=st;saveState()}
function isDone(id){return getStatus(id)==='完了'}
function toggleCl(taskId,idx){const k=taskId+'_'+idx;S.cl[k]=!S.cl[k];saveState()}
function isClDone(taskId,idx){return !!S.cl[taskId+'_'+idx]}

// ═══════════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════════
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function domDot(d){return `<span class="domain-dot dc-${d}"></span>`}
function statusBtn(id){const st=getStatus(id);return `<button class="status-btn s-${st}" data-id="${id}" onclick="cycleStatus('${id}',event)">${st}</button>`}
function cb(id){const done=isDone(id);return `<div class="checkbox${done?' checked':''}" onclick="toggleDone('${id}',event)"></div>`}
function cycleStatus(id,e){e&&e.stopPropagation();const cur=getStatus(id);const i=(STATUSES.indexOf(cur)+1)%STATUSES.length;setStatus(id,STATUSES[i]);renderAll();showToast(`${STATUSES[i]}`)}
function toggleDone(id,e){e&&e.stopPropagation();setStatus(id,isDone(id)?'未着手':'完了');renderAll();showToast(isDone(id)?'完了':'戻しました')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// 締切・着手目安の算出
function getDueInfo(tk){
  if(tk.due){
    const d=new Date(tk.due);
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.ceil((d-now)/(1000*60*60*24));
    const label=`${d.getMonth()+1}/${d.getDate()}`;
    const urgency=diff<0?'overdue':diff<=3?'urgent':diff<=7?'soon':'ok';
    return {label,diff,urgency,type:'提出'};
  }
  if(tk.m && tk.cy==='yearly'){
    const targetDay=new Date(2026,tk.m-1,1);
    const startDay=new Date(targetDay);
    startDay.setDate(startDay.getDate()-(tk.wb||0)*7);
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.ceil((startDay-now)/(1000*60*60*24));
    const label=`${startDay.getMonth()+1}/${startDay.getDate()}~`;
    const urgency=diff<0?'overdue':diff<=3?'urgent':diff<=7?'soon':'ok';
    return {label,diff,urgency,type:'着手'};
  }
  return null;
}
function dueTag(tk){
  if(isDone(tk.id))return '';
  const info=getDueInfo(tk);
  if(!info)return '';
  const colors={overdue:'var(--red)',urgent:'var(--red)',soon:'var(--amber)',ok:'var(--text-dim)'};
  const bgColors={overdue:'rgba(196,93,93,.1)',urgent:'rgba(196,93,93,.08)',soon:'rgba(200,147,74,.08)',ok:'transparent'};
  const prefix=info.type==='提出'?'〆':'';
  const diffLabel=info.diff<0?`${Math.abs(info.diff)}日超過`:info.diff===0?'今日':info.diff<=7?`あと${info.diff}日`:'';
  return `<span style="font-size:.65rem;padding:2px 8px;border-radius:6px;background:${bgColors[info.urgency]};color:${colors[info.urgency]};font-weight:600;white-space:nowrap">${prefix}${info.label}${diffLabel?' '+diffLabel:''}</span>`;
}

const TAB_DEF=[
  {id:'today',icon:'fa-solid fa-crosshairs',label:'今日'},
  {id:'list',icon:'fa-solid fa-list-check',label:'リスト'},
  {id:'cal',icon:'fa-regular fa-calendar',label:'カレンダー'},
  {id:'board',icon:'fa-solid fa-columns',label:'ボード'},
  {id:'overview',icon:'fa-solid fa-chart-bar',label:'概要'},
  {id:'resources',icon:'fa-solid fa-folder-open',label:'資料'},
];
function renderNav(){
  const todo=TASKS.filter(tk=>getStatus(tk.id)==='未着手').length;
  document.getElementById('sidebarNav').innerHTML=TAB_DEF.map(t=>{
    const badge=t.id==='list'&&todo>0?`<span class="badge">${todo}</span>`:'';
    return `<button class="nav-btn${S.tab===t.id?' active':''}" data-tab="${t.id}" title="${t.label}"><i class="${t.icon}"></i>${badge}</button>`;
  }).join('');
  document.querySelectorAll('.nav-btn').forEach(el=>el.addEventListener('click',()=>{
    S.tab=el.dataset.tab;saveState();renderAll();
  }));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+S.tab).classList.add('active');
}

function renderHeader(){
  const now=new Date(),mm=now.getMonth()+1,dd=now.getDate();
  const dow=['日','月','火','水','木','金','土'][now.getDay()];
  const todoCount=TASKS.filter(t=>getStatus(t.id)==='未着手').length;
  const total=TASKS.length;
  const panelLabel=TAB_DEF.find(t=>t.id===S.tab)?.label||'';

  document.getElementById('headerArea').innerHTML=`
    <div class="header-left">
      <div class="header-date">${now.getFullYear()}年${mm}月${dd}日（${dow}）</div>
      <div class="header-sub">${panelLabel}</div>
    </div>
    <div class="header-right">

function sortBy(col){
  if(S.sort.col===col)S.sort.dir*=-1;else{S.sort.col=col;S.sort.dir=1}
  saveState();renderListHeader();renderListRows();
}

function getFiltered(){
  const dom=document.getElementById('fDom')?.value||'';
  const mon=document.getElementById('fMon')?.value||'';
  const st=document.getElementById('fSt')?.value||'';
  const q=(document.getElementById('fSearch')?.value||'').toLowerCase();
  return TASKS.filter(tk=>{
    if(dom&&tk.d!==dom)return false;
    if(mon==='null'&&tk.m!==null)return false;
    if(mon&&mon!=='null'&&tk.m!==+mon)return false;
    if(st&&getStatus(tk.id)!==st)return false;
    if(S.hideDone&&isDone(tk.id))return false;
    if(q&&!tk.t.toLowerCase().includes(q)&&!tk.d.toLowerCase().includes(q)&&!tk.tg.join(' ').toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{
    const {col,dir}=S.sort;
    let va,vb;
    if(col==='t'){va=a.t;vb=b.t}
    else if(col==='d'){va=a.d;vb=b.d}
    else if(col==='m'){va=a.m||99;vb=b.m||99}
    else if(col==='due'){const da=getDueInfo(a),db=getDueInfo(b);va=da?da.diff:999;vb=db?db.diff:999}
    else if(col==='st'){const o={'未着手':0,'進行中':1,'委任':2,'完了':3};va=o[getStatus(a.id)];vb=o[getStatus(b.id)]}
    else{va=a.m||99;vb=b.m||99}
    if(va<vb)return -dir;if(va>vb)return dir;return 0;
  });
}

let calY=2026,calM=4;

function getTasksForDay(dt,mTasks){
  const d=dt.getDate(),dow=dt.getDay(),m=dt.getMonth()+1;
  const fd=new Date(dt.getFullYear(),dt.getMonth(),1).getDay();
  const wom=Math.ceil((d+fd)/7);
  const overrides=loadOverrides();
  let dayTasks=[];
  mTasks.forEach(tk=>{
    // If this task has a due override from drag, only show on that date
    if(overrides[tk.id]&&overrides[tk.id].due){
      const dd=new Date(overrides[tk.id].due);
      if(dd.getDate()===d&&dd.getMonth()===dt.getMonth()&&dd.getFullYear()===dt.getFullYear())dayTasks.push(tk);
      return; // skip cycle rules
    }
    if(tk.cy==='monthly'&&d<=7&&dow===1)dayTasks.push(tk);
    else if(tk.cy==='termly'&&d===1)dayTasks.push(tk);
    else if(tk.cy==='yearly'&&tk.m===m){
      const tw=Math.max(1,Math.min(4,4-(tk.wb||0)));
      if((wom===tw&&dow===1)||(d===1&&tw===1))dayTasks.push(tk);
    }
  });
  // Non-overridden tasks with original due dates
  mTasks.filter(tk=>tk.due&&!(overrides[tk.id]&&overrides[tk.id].due)).forEach(tk=>{
    const dd=new Date(tk.due);
    if(dd.getDate()===d&&dd.getMonth()===dt.getMonth()&&!dayTasks.includes(tk))dayTasks.push(tk);
  });
  return dayTasks;
}

function getMonthTasks(y,m){
  return TASKS.filter(tk=>{
    if(tk.cy==='daily'||tk.cy==='weekly')return false;
    if(tk.m===m)return true;
    if(tk.cy==='monthly')return true;
    return false;
  });
}

function renderCal(){
  const el=document.getElementById('p-cal');
  const today=new Date();

  let weekStart;
  if(S.calWeekStart){weekStart=new Date(S.calWeekStart)}
  else{weekStart=new Date(today);weekStart.setDate(weekStart.getDate()-((weekStart.getDay()+6)%7))}

  const navLabel=S.calView==='month'?`${calY}年${calM}月`:`${weekStart.getMonth()+1}/${weekStart.getDate()}~ の週`;

  el.innerHTML=`
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calNavPrev()"><i class="fa-solid fa-chevron-left" style="font-size:.7rem"></i></button>
      <span class="cal-month-label">${navLabel}</span>
      <button class="cal-nav-btn" onclick="calNavNext()"><i class="fa-solid fa-chevron-right" style="font-size:.7rem"></i></button>
      <button class="cal-nav-btn" onclick="calNavToday()" style="margin-left:4px;font-size:.72rem;font-weight:600">今日</button>
      <div class="cal-view-btns">
        <button class="cal-view-btn${S.calView==='month'?' active':''}" onclick="S.calView='month';saveState();renderCal()">月間</button>
        <button class="cal-view-btn${S.calView==='week'?' active':''}" onclick="S.calView='week';saveState();renderCal()">週間</button>
      </div>
    </div>
    <div id="calContent"></div>
  `;

  if(S.calView==='month') renderCalMonth(today);
  else renderCalWeek(today,weekStart);
}

let calDragId=null;
function renderCalMonth(today){
  const cc=document.getElementById('calContent');
  let html=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-hdr">${d}</div>`).join('');
  const fd=new Date(calY,calM-1,1).getDay();
  const dim=new Date(calY,calM,0).getDate();
  for(let i=0;i<fd;i++)html+='<div class="cal-cell empty"></div>';
  const mTasks=getMonthTasks(calY,calM);
  for(let d=1;d<=dim;d++){
    const dt=new Date(calY,calM-1,d);
    const isToday=dt.toDateString()===today.toDateString();
    const dayTasks=getTasksForDay(dt,mTasks);
    const dateStr=`${calY}-${String(calM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html+=`<div class="cal-cell${isToday?' today':''}" data-date="${dateStr}" ondragover="event.preventDefault();this.style.background='var(--accent-bg)';this.style.borderColor='var(--accent)'" ondragleave="this.style.background='';this.style.borderColor=''" ondrop="calDrop(event,'${dateStr}');this.style.background='';this.style.borderColor=''"><div class="cal-day">${d}</div>${dayTasks.slice(0,3).map(tk=>`<div class="cal-item${isDone(tk.id)?' done-item':''}" draggable="true" ondragstart="calDragId='${tk.id}';this.style.opacity='0.4'" ondragend="this.style.opacity=''" title="${esc(tk.t)}" style="cursor:grab">${domDot(tk.d)} ${esc(tk.t)}</div>`).join('')}${dayTasks.length>3?`<div class="cal-more">+${dayTasks.length-3}</div>`:''}</div>`;
  }
  const rem=(7-(fd+dim)%7)%7;
  for(let i=0;i<rem;i++)html+='<div class="cal-cell empty"></div>';
  cc.innerHTML=`<div class="cal-grid">${html}</div>`;
}
function calDrop(e,dateStr){
  e.preventDefault();
  if(!calDragId)return;
  const tk=TASKS.find(t=>t.id===calDragId);
  if(!tk)return;
  // Update due date (or set it)
  const o=loadOverrides();
  if(!o[calDragId])o[calDragId]={};
  o[calDragId].due=dateStr;
  saveOverrides(o);
  // Also update the in-memory task for immediate rendering
  tk.due=dateStr;
  // Update month if needed
  const newM=parseInt(dateStr.split('-')[1]);
  if(tk.m && tk.m!==newM){
    o[calDragId].m=newM;
    tk.m=newM;
  }
  calDragId=null;
  showToast('タスクを '+dateStr.replace(/^\d+-/,'').replace('-','/')+' に移動しました');
  renderAll();
}
function loadOverrides(){try{return JSON.parse(localStorage.getItem('kyoto_cal_overrides'))||{}}catch{return {}}}
function saveOverrides(o){localStorage.setItem('kyoto_cal_overrides',JSON.stringify(o))}

function renderCalWeek(today,weekStart){
  const cc=document.getElementById('calContent');
  const days=[];
  for(let i=0;i<5;i++){const d=new Date(weekStart);d.setDate(d.getDate()+i);days.push(d)}
  const dow=['月','火','水','木','金'];

  let html=days.map((d,i)=>`<div class="week-hdr">${dow[i]}</div>`).join('');
  html+=days.map(d=>{
    const isToday=d.toDateString()===today.toDateString();
    const mTasks=getMonthTasks(d.getFullYear(),d.getMonth()+1);
    const dayTasks=getTasksForDay(d,mTasks);
    const dateLabel=`${d.getMonth()+1}/${d.getDate()}`;
    const dateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return `<div class="week-cell${isToday?' today':''}" data-date="${dateStr}" ondragover="event.preventDefault();this.style.background='var(--accent-bg)';this.style.borderColor='var(--accent)'" ondragleave="this.style.background='';this.style.borderColor=''" ondrop="calDrop(event,'${dateStr}');this.style.background='';this.style.borderColor=''">
      <div class="week-day">${dateLabel}${isToday?' <span style="font-size:.65rem;color:var(--accent)">(今日)</span>':''}</div>
      ${dayTasks.map(tk=>{
        const info=getDueInfo(tk);
        const dueLabel=info&&!isDone(tk.id)?`<span class="week-due" style="color:${{overdue:'var(--red)',urgent:'var(--red)',soon:'var(--amber)',ok:'var(--text-dim)'}[info.urgency]}">${info.type==='提出'?'〆':''} ${info.label}</span>`:'';
        return `<div class="week-item${isDone(tk.id)?' done-item':''}" draggable="true" ondragstart="calDragId='${tk.id}';this.style.opacity='0.4'" ondragend="this.style.opacity=''" style="cursor:grab">${domDot(tk.d)} <span style="flex:1">${esc(tk.t)}</span>${dueLabel}</div>`;
      }).join('')}
      ${dayTasks.length===0?'<div style="font-size:.68rem;color:var(--text-dim2);padding:4px">予定なし</div>':''}
    </div>`;
  }).join('');
  cc.innerHTML=`<div class="week-grid">${html}</div>`;
}

function calNavPrev(){
  if(S.calView==='month'){calM--;if(calM<1){calM=12;calY--}}
  else{const ws=S.calWeekStart?new Date(S.calWeekStart):new Date();ws.setDate(ws.getDate()-7);S.calWeekStart=ws.toISOString();saveState()}
  renderCal();
}
function calNavNext(){
  if(S.calView==='month'){calM++;if(calM>12){calM=1;calY++}}
  else{const ws=S.calWeekStart?new Date(S.calWeekStart):new Date();ws.setDate(ws.getDate()+7);S.calWeekStart=ws.toISOString();saveState()}
  renderCal();
}
function calNavToday(){
  const now=new Date();calY=now.getFullYear();calM=now.getMonth()+1;
  const mon=new Date(now);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  S.calWeekStart=mon.toISOString();saveState();renderCal();
}

function getBoardTasks(){

    <div class="kanban">${cols.map(c=>`
    <div class="kanban-col" data-st="${c.st}">
      <div class="kanban-col-header" style="border-left-color:${statusColors[c.st]}">
        <span class="domain-dot" style="background:${statusColors[c.st]}"></span>
        ${c.st} <span class="count">${c.tasks.length}</span>
      </div>
      ${c.tasks.map(tk=>`
        <div class="kanban-card${isDone(tk.id)?' done-card':''}" draggable="true" data-id="${tk.id}">
          <div class="kc-top">${domDot(tk.d)} <span class="kc-title">${esc(tk.t)}</span></div>
          <div class="kc-meta"><span>${tk.m?tk.m+'月':'通年'}</span>${dueTag(tk)}${tk.cl.length?`<span><i class="fa-solid fa-list-check" style="font-size:.6rem"></i> ${tk.cl.length}</span>`:''}</div>
        </div>
      `).join('')}
    </div>
  `).join('')}</div>`;

  // Drag & drop
  document.querySelectorAll('.kanban-card[draggable]').forEach(card=>{
    card.addEventListener('dragstart',e=>{_dragId=card.dataset.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'))});
  });
  document.querySelectorAll('.kanban-col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over')});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(_dragId){setStatus(_dragId,col.dataset.st);renderAll();showToast(`${col.dataset.st}`)}
    });
  });
}

      const label=DB_CAT_LABELS[d.cat]||d.cat;
      return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;transition:all .25s" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 16px rgba(0,0,0,0.05)'" onmouseout="this.style.transform='';this.style.boxShadow='none'">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:5px;background:var(--accent-bg);color:var(--accent)">${label}</span><i class="${icon}" style="font-size:.75rem;color:var(--text-dim);opacity:0.5"></i></div>
        <div style="font-size:.82rem;font-weight:600;margin-bottom:4px;line-height:1.4">${d.desc}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px"><span style="font-size:.68rem;color:var(--text-dim);display:flex;align-items:center;gap:3px"><i class="fa-solid fa-database" style="font-size:.6rem"></i>${d.records.toLocaleString()}</span><span style="font-size:.58rem;font-family:monospace;color:var(--text-dim);opacity:0.5">${d.key}</span></div>
      </div>`;
    }).join('')}</div>`;
    if(!filtered.length) html+=`<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:.85rem">該当するDBがありません</div>`;
  }

  el.innerHTML=html;
}

// INIT — apply calendar overrides to TASKS
(function(){const o=loadOverrides();Object.keys(o).forEach(id=>{const tk=TASKS.find(t=>t.id===id);if(tk){if(o[id].due)tk.due=o[id].due;if(o[id].m)tk.m=o[id].m}})})();
loadState();applyTheme();renderAll();
</script>
</body>
