<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教頭ダッシュボード — R8年度 向井小学校 [Improved]</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Inter','Noto Sans JP',sans-serif;min-height:100vh;letter-spacing:-0.01em;transition:background .4s cubic-bezier(.16,1,.3,1),color .3s}

/* ===== STYLISH UI REDESIGN v2 =====
   [SU-001] 60-30-10: 60%=#FAF9F6 / 30%=#FFFFFF / 10%=#4A7C59
   [SU-002] Elevated Neutrals
   [SU-004] 8px Grid
   [SU-008] Semantic Border Radius: 8/16/24
   [SU-011] Soft Shadow (Josh Comeau)
   [SU-012] Glassmorphism (sidebar + header)
   [SU-014] Animation timing: enter 0.35s, hover 0.2s, exit 0.15s
   [SU-015] Easing: cubic-bezier(.16,1,.3,1)
   [SU-016] Visual Hierarchy: Cormorant Garamond for big numbers
   [SU-020] Grainy texture, elevated neutrals, micro-animations
   [SU-023] Card Golden Pattern: padding 20-24px, radius 16px
   [SU-025] 5 Principles: Consistency, Restraint, Breathing, Order, Feedback
===== */

:root{
  --bg:#FAF9F6;
  --surface:#FFFFFF;
  --surface-dim:#F5F3F0;
  --surface-container:#EDE9E3;
  --border:rgba(45,38,33,0.07);
  --border-mid:rgba(45,38,33,0.12);
  --border-strong:rgba(45,38,33,0.2);
  --text:#2d2621;
  --text-secondary:#6b6560;
  --text-dim:#a8a29e;
  --text-dim2:#d6d3d1;
  --accent:#4A7C59;
  --accent-hover:#3d6b4a;
  --accent-bg:rgba(74,124,89,0.07);
  --card-hover:rgba(74,124,89,0.03);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 16px 40px rgba(0,0,0,0.1);
  --green:#4A7C59;
  --red:#C45D5D;
  --amber:#C8934A;
  --blue:#5B7DB1;
  --pink:#B85A7A;
  --ease:cubic-bezier(.16,1,.3,1);
  --sidebar-w:56px;
}
body{background:var(--bg);color:var(--text)}

/* [SU-020] Grainy texture overlay */
body::before{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.03;pointer-events:none;z-index:9999;
}

/* Dark mode */
body.dark{
  --bg:#111110;--surface:#1a1917;--surface-dim:#1e1d1b;--surface-container:#252320;
  --border:rgba(255,255,255,0.06);--border-mid:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.16);
  --text:#e8e4df;--text-secondary:#b5afa8;--text-dim:#6b6560;--text-dim2:#3d3a36;
  --accent:#7aad8a;--accent-hover:#5d946e;--accent-bg:rgba(122,173,138,.1);
  --card-hover:rgba(122,173,138,.05);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.15);--shadow-md:0 4px 16px rgba(0,0,0,0.2);--shadow-lg:0 16px 40px rgba(0,0,0,0.3);
  --green:#7aad8a;--red:#e88888;--amber:#e8b86a;--blue:#8aabe8;--pink:#e88ab0;
}

/* ===== LAYOUT: Sidebar + Main ===== */
.app{display:flex;height:100vh;overflow:hidden}

/* [SU-012] Glassmorphism sidebar */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:4px;
  background:rgba(250,249,246,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-right:1px solid var(--border);z-index:100;
}
body.dark .sidebar{background:rgba(17,17,16,0.85)}

.sidebar-logo{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1rem;font-style:italic;
  margin-bottom:16px;
}

.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}

.nav-btn{
  width:40px;height:40px;border-radius:12px;border:none;
  background:transparent;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;cursor:pointer;position:relative;
  transition:all .2s var(--ease);
}
.nav-btn:hover{background:var(--accent-bg);color:var(--text-secondary)}
/* [DU-042] Keyboard shortcut badge on hover */
.nav-btn[data-key]:hover::after{
  content:attr(data-key);position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  font-size:10px;font-weight:600;color:var(--text-dim);background:var(--surface-dim);
  border:1px solid var(--border);border-radius:4px;padding:1px 4px;
  box-shadow:0 1px 0 rgba(0,0,0,0.06);font-family:monospace;pointer-events:none;
}
.nav-btn.active{background:var(--accent-bg);color:var(--accent)}
.nav-btn.active::before{
  content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--accent);
}
.nav-btn .badge{
  position:absolute;top:4px;right:4px;
  background:var(--red);color:#fff;font-size:.55rem;
  min-width:14px;height:14px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;line-height:1;
}

.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:4px}

.theme-toggle{
  width:40px;height:40px;border-radius:12px;border:none;
  background:transparent;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;cursor:pointer;transition:all .2s var(--ease);
}
.theme-toggle:hover{background:var(--accent-bg);color:var(--text)}
.theme-toggle.active{background:var(--accent);color:#fff}

/* Main content area */
.main-wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* [SU-012] Glassmorphism header */
.header{
  padding:20px 32px 16px;flex-shrink:0;
  background:rgba(250,249,246,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
body.dark .header{background:rgba(17,17,16,0.85)}

.header-left{}
.header-date{
  font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;
  letter-spacing:-0.02em;line-height:1.2;
}
.header-sub{font-size:14px;color:var(--text-dim);margin-top:2px}

.header-right{display:flex;align-items:center;gap:8px}
.stat-chip{
  padding:4px 12px;border-radius:99px;font-size:13px;font-weight:600;
  background:var(--surface-dim);border:1px solid var(--border);color:var(--text-secondary);
}
.stat-chip.highlight{background:var(--accent-bg);color:var(--accent);border-color:rgba(74,124,89,0.15)}

/* Content area */
.content{flex:1;overflow-y:auto;padding:24px 32px 40px;max-width:100%;width:100%}
.panel{display:none}
.panel.active{display:block}

/* ===== COMMON COMPONENTS ===== */
.domain-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.status-btn{
  padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;
  border:none;cursor:pointer;transition:all .15s var(--ease);font-family:inherit;
  letter-spacing:.02em;
}
.status-btn:hover{filter:brightness(1.1);transform:scale(1.04)}
.s-未着手{background:rgba(196,93,93,.12);color:var(--red)}
.s-進行中{background:rgba(91,125,177,.12);color:var(--blue)}
.s-委任{background:rgba(200,147,74,.12);color:var(--amber)}
.s-完了{background:rgba(74,124,89,.12);color:var(--green)}

.checkbox{
  width:18px;height:18px;border-radius:6px;border:2px solid var(--border-strong);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease);flex-shrink:0;
}
.checkbox:hover{border-color:var(--accent);background:var(--accent-bg)}
.checkbox.checked{background:var(--green);border-color:var(--green)}
.checkbox.checked::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;color:#fff;font-size:.55rem}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  padding:10px 24px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border-mid);
  color:var(--text);font-size:14px;font-weight:600;z-index:9999;
  box-shadow:var(--shadow-md);transition:transform .25s var(--ease);pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideOut{to{opacity:0;transform:translateX(40px);height:0;padding:0;margin:0;overflow:hidden}}

/* ===== AI BUTTON ===== */
.ai-btn{
  padding:10px 20px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;font-weight:700;font-size:14px;
  cursor:pointer;font-family:inherit;
  transition:all .25s var(--ease);white-space:nowrap;
  box-shadow:0 2px 8px rgba(74,124,89,0.2);
}
.ai-btn:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 6px 16px rgba(74,124,89,0.25)}
.ai-btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(74,124,89,0.15)}
.ai-btn.processing .btn-label{opacity:.3}
.ai-btn.processing .spinner{display:inline-block}
.spinner{display:none;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.today-initial{text-align:center;padding:56px 0;color:var(--text-dim)}
.today-initial-icon{font-size:2.5rem;margin-bottom:12px;opacity:.5}
.today-initial-text{font-size:16px;margin-bottom:4px}
.today-initial-sub{font-size:13.5px;color:var(--text-dim2)}

/* ===== FLOW DIAGRAM ===== */
.flow-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 0;
  font-size:16px;font-weight:700;color:var(--text);user-select:none;
}
.flow-toggle:hover{color:var(--accent)}
.flow-toggle .arrow{transition:transform .2s var(--ease);font-size:.7rem}
.flow-toggle.open .arrow{transform:rotate(90deg)}
.flow-content{display:none;margin-top:8px;padding:16px;background:var(--surface-dim);border:1px solid var(--border);border-radius:16px}
.flow-content.open{display:block}
.flow-content svg{width:100%;height:auto;display:block}
.flow-decisions{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.flow-dec{padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;border-left:3px solid var(--green);font-size:14px;line-height:1.6}
.flow-dec.pending{border-left-color:var(--text-dim2);opacity:.7}
.flow-dec strong{font-weight:700}
.flow-dec-title{font-weight:700;margin-bottom:4px}

/* ===== DOMAIN COLORS ===== */
.dc-行事{background:#ef4444}.dc-教職員管理{background:#f59e0b}.dc-文書管理{background:#3b82f6}
.dc-施設管理{background:#10b981}.dc-教育委員会{background:#8b5cf6}.dc-危機管理{background:#dc2626}
.dc-校内調整{background:#06b6d4}.dc-会議運営{background:#f97316}.dc-地域連携{background:#84cc16}
.dc-保護者対応{background:#ec4899}.dc-校長補佐{background:#6366f1}

/* ===== PANEL 1: TODAY ===== */
.today-cards{display:flex;flex-direction:column;gap:16px}
/* [SU-023] Card Golden Pattern + [SU-011] Soft Shadow */
.today-card{
  padding:20px 24px;background:var(--surface);
  border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:16px;display:flex;gap:16px;align-items:flex-start;
  transition:all .35s var(--ease);box-shadow:var(--shadow-sm);
}
.today-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.today-card.done{opacity:.4}
.today-card.recovery{background:rgba(196,93,93,0.03);border:1px solid rgba(196,93,93,0.15)}
.today-card.done .today-card-title{text-decoration:line-through}
.today-card.removing{animation:slideOut .35s ease forwards}
.today-rank{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0;
  background:var(--accent);font-family:'Cormorant Garamond',serif;
}
.today-card-body{flex:1;min-width:0}
.today-card-title{font-weight:700;font-size:16px;margin-bottom:2px}
.today-card-why{
  font-size:13.5px;color:var(--text-secondary);line-height:1.6;margin-top:8px;
  padding:8px 12px;border-radius:8px;background:var(--accent-bg);
}
.today-checklist{margin-top:12px;display:flex;flex-direction:column;gap:4px}
.today-cl-item{
  font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;
  cursor:pointer;padding:4px 0;transition:color .15s;
}
.today-cl-item:hover{color:var(--text)}
.today-cl-item.cl-done{text-decoration:line-through;opacity:.5}
.today-cl-check{
  width:14px;height:14px;border-radius:4px;border:1.5px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s var(--ease);
}
.today-cl-item.cl-done .today-cl-check{background:var(--green);border-color:var(--green)}
.today-cl-item.cl-done .today-cl-check::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;color:#fff;font-size:.45rem}
.today-pitfall{
  margin-top:12px;padding:8px 12px;border-radius:8px;font-size:13.5px;
  background:rgba(196,93,93,.06);border-left:3px solid var(--red);
  color:var(--text-secondary);line-height:1.6;
}
.today-remaining{margin-top:24px;text-align:center;color:var(--text-dim);font-size:14px;padding:16px;border:1px dashed var(--border-mid);border-radius:12px}

/* ===== BRIEFING PANEL (TODAY tab) ===== */
.briefing-panel{margin-bottom:24px}
.briefing-header{
  display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;user-select:none;
  border-bottom:2px solid var(--border);margin-bottom:12px;
}
.briefing-header:hover{opacity:.8}
.briefing-header h3{font-size:15px;font-weight:700;color:var(--text);margin:0}
.briefing-header .meta{font-size:11px;color:var(--text-dim);font-weight:500}
.briefing-header .chevron{transition:transform .2s;font-size:10px;color:var(--text-dim);margin-left:auto}
.briefing-header.open .chevron{transform:rotate(90deg)}
.briefing-body{overflow:hidden;transition:max-height .35s var(--ease)}
.briefing-body.collapsed{max-height:0!important;padding:0;margin:0}
.briefing-section{margin-bottom:16px}
.briefing-section-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.briefing-task{
  padding:12px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;border-left:3px solid var(--accent);
}
.briefing-task.critical{border-left-color:var(--red)}
.briefing-task-title{font-weight:600;font-size:13.5px;margin-bottom:4px}
.briefing-task-domain{font-size:11px;color:var(--text-dim);font-weight:500}
.briefing-cl{margin-top:6px;display:flex;flex-direction:column;gap:2px}
.briefing-cl-item{font-size:12px;color:var(--text-secondary);padding:2px 0;display:flex;align-items:center;gap:6px}
.briefing-cl-item::before{content:'';width:10px;height:10px;border-radius:3px;border:1.5px solid var(--border-strong);flex-shrink:0}
.briefing-pitfall{
  font-size:12px;padding:6px 10px;margin-top:6px;border-radius:6px;
  background:rgba(196,93,93,.05);border-left:2px solid var(--red);color:var(--text-secondary);
}
.briefing-voice{
  padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start;
}
.briefing-voice.priority{border-color:rgba(196,93,93,.3);background:rgba(196,93,93,.03)}
.briefing-voice-target{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;
  background:var(--accent-bg);color:var(--accent);white-space:nowrap;flex-shrink:0;
}
.briefing-voice-action{font-size:13px;font-weight:500}
.briefing-voice-why{font-size:11px;color:var(--text-dim);margin-top:2px}
.briefing-timeline{display:flex;flex-direction:column;gap:0}
.briefing-tl-row{display:flex;gap:12px;padding:6px 0;font-size:12.5px;align-items:flex-start}
.briefing-tl-time{font-weight:700;color:var(--accent);min-width:42px;flex-shrink:0;font-variant-numeric:tabular-nums}
.briefing-tl-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);flex-shrink:0;margin-top:5px}
.briefing-tl-content{flex:1;min-width:0}
.briefing-tl-title{font-weight:600;color:var(--text)}
.briefing-tl-detail{font-size:11px;color:var(--text-dim);margin-top:1px}
.briefing-empty{text-align:center;padding:24px;color:var(--text-dim);font-size:13px}
.briefing-chat{font-size:12.5px;color:var(--text-secondary);padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.briefing-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;margin-top:8px;font-weight:600}
.briefing-link:hover{text-decoration:underline}

/* ===== TODAY TAB: 3-SECTION LAYOUT ===== */
.today-section{margin-bottom:28px}
.today-section-header{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
  font-size:14px;font-weight:700;color:var(--text);
}
.today-section-header i{color:var(--text-dim);font-size:13px}
.today-section-header .count{
  font-size:11px;font-weight:600;color:var(--text-dim);
  background:var(--surface-dim);padding:2px 8px;border-radius:99px;
}

/* Staff movement cards */
.staff-row{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:6px;font-size:13.5px;transition:all .2s var(--ease);
}
.staff-row:hover{box-shadow:var(--shadow-sm)}
.staff-type{
  font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;
  white-space:nowrap;
}
.staff-type.出張{background:rgba(139,92,246,.1);color:#8b5cf6}
.staff-type.年休{background:rgba(196,93,93,.1);color:var(--red)}
.staff-type.研修{background:rgba(91,125,177,.1);color:var(--blue)}
.staff-type.来校{background:rgba(74,124,89,.1);color:var(--green)}
.staff-type.出張報告{background:rgba(200,147,74,.1);color:var(--amber)}
.staff-name{font-weight:600;min-width:100px}
.staff-time{color:var(--text-dim);font-size:12.5px}
.staff-note{color:var(--text-secondary);font-size:12.5px;flex:1}

/* Journal entries */
.journal-row{
  display:flex;gap:12px;padding:12px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:6px;font-size:13.5px;transition:all .2s var(--ease);
  align-items:flex-start;
}
.journal-row:hover{box-shadow:var(--shadow-sm)}
.journal-time{color:var(--text-dim);font-size:12px;font-weight:600;min-width:44px;padding-top:1px}
.journal-type{
  font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;
  background:var(--surface-dim);color:var(--text-secondary);white-space:nowrap;
}
.journal-content{flex:1;line-height:1.5}
.journal-todo{
  font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;
  background:rgba(196,93,93,.1);color:var(--red);white-space:nowrap;
}
.journal-memo{font-size:12px;color:var(--text-dim);margin-top:3px}
.journal-follow{font-size:11px;color:var(--amber);font-weight:600}

/* Journal input bar */
.journal-input-bar{
  display:flex;gap:8px;padding:12px 16px;
  background:var(--surface);border:1px solid var(--border-mid);border-radius:12px;
  margin-bottom:16px;align-items:center;
}
.journal-input-bar input{
  flex:1;border:none;background:transparent;font-size:14px;
  color:var(--text);font-family:inherit;outline:none;
}
.journal-input-bar input::placeholder{color:var(--text-dim2)}
.journal-input-bar button{
  padding:6px 16px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .2s var(--ease);white-space:nowrap;
}
.journal-input-bar button:hover{background:var(--accent-hover)}
.journal-input-bar button:disabled{opacity:.4;cursor:not-allowed}

/* Empty state */
.today-empty{
  padding:20px;text-align:center;color:var(--text-dim);font-size:13px;
  border:1px dashed var(--border-mid);border-radius:12px;
}
.hide-done-toggle{
  font-size:12.5px;color:var(--text-dim);cursor:pointer;padding:6px 12px;
  border-radius:8px;border:1px solid var(--border-mid);background:transparent;
  font-family:inherit;transition:all .2s var(--ease);font-weight:500;
}
.hide-done-toggle:hover{border-color:var(--accent);color:var(--text)}
.hide-done-toggle.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(74,124,89,0.2)}

/* ===== PANEL 2: LIST ===== */
.list-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.list-toolbar select,.list-toolbar input{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border-mid);
  background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;
  transition:border-color .2s;
}
.list-toolbar select:focus,.list-toolbar input:focus{outline:none;border-color:var(--accent)}
.list-toolbar input{flex:1;min-width:140px}
.list-count{font-size:12.5px;color:var(--text-dim);margin-bottom:8px;font-weight:500}
.list-header{
  display:grid;grid-template-columns:30px 1fr 90px 50px 100px 56px;gap:8px;
  padding:8px 16px;font-size:12px;font-weight:700;color:var(--text-dim);
  border-bottom:1px solid var(--border-mid);text-transform:uppercase;letter-spacing:.5px;
  align-items:center;
}
.list-header span{cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none;transition:color .15s}
.list-header span:hover{color:var(--text)}
.sort-arrow{font-size:.6rem;opacity:.5}
.list-header span.sorted{color:var(--accent)}
.list-header span.sorted .sort-arrow{opacity:1}
.list-rows{display:flex;flex-direction:column}
.list-row{
  display:grid;grid-template-columns:30px 1fr 90px 50px 100px 56px;gap:8px;
  padding:10px 16px;border-bottom:1px solid var(--border);
  align-items:center;font-size:15px;
  transition:all .2s var(--ease);cursor:pointer;border-radius:0;
}
.list-row:hover{background:var(--card-hover);transform:translateY(-1px)}
.list-row.done{opacity:.4}
.list-row.done .list-task{text-decoration:line-through}
.list-row.removing{animation:slideOut .3s ease forwards}
.list-task{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-domain{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:4px}
.list-month{font-size:13px;color:var(--text-secondary)}
.list-cycle{font-size:12px;color:var(--text-dim)}
.list-detail{
  grid-column:2/7;padding:12px 0 8px;font-size:13.5px;color:var(--text-secondary);line-height:1.6;
  display:none;
}
.list-row.open .list-detail{display:block}
.list-checklist{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.list-cl{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:3px 0;transition:color .15s}
.list-cl:hover{color:var(--text)}
.list-cl.cl-done{text-decoration:line-through;opacity:.5}

/* ===== PANEL 3: CALENDAR ===== */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-nav-btn{
  padding:6px 12px;border-radius:8px;border:1px solid var(--border-mid);
  background:var(--surface);color:var(--text);cursor:pointer;
  font-family:inherit;font-size:.85rem;transition:all .2s var(--ease);
}
.cal-nav-btn:hover{background:var(--surface-dim);border-color:var(--accent)}
.cal-month-label{font-weight:700;font-size:1rem;font-family:'Cormorant Garamond',serif;font-size:1.2rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hdr{text-align:center;font-size:13px;font-weight:600;color:var(--text-dim);padding:8px 0}
.cal-hdr:first-child{color:var(--red)}
.cal-hdr:last-child{color:var(--blue)}
.cal-cell{
  min-height:88px;padding:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  transition:all .2s var(--ease);
}
.cal-cell:hover{box-shadow:var(--shadow-sm)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.empty:hover{box-shadow:none}
.cal-cell.today{border-color:var(--accent);background:var(--accent-bg)}
.cal-day{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text-secondary)}
.cal-cell:nth-child(7n+1) .cal-day{color:var(--red)}
.cal-cell:nth-child(7n) .cal-day{color:var(--blue)}
.cal-item{
  font-size:11px;padding:3px 6px;border-radius:6px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:var(--surface-dim);color:var(--text-secondary);cursor:default;
  display:flex;align-items:center;gap:3px;transition:background .15s;
}
.cal-item:hover{background:var(--card-hover)}
.cal-item .domain-dot{width:5px;height:5px}
.cal-item.done-item{opacity:.35;text-decoration:line-through}
.cal-more{font-size:.58rem;color:var(--text-dim);padding:0 4px}

/* Weekly view */
.cal-view-btns{display:flex;gap:4px;margin-left:auto}
.cal-view-btn{
  padding:4px 12px;border-radius:8px;border:1px solid var(--border-mid);
  background:transparent;color:var(--text-dim);font-size:.72rem;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .2s var(--ease);
}
.cal-view-btn:hover{border-color:var(--accent);color:var(--text)}
.cal-view-btn.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(74,124,89,0.2)}
.week-grid{display:grid;grid-template-columns:48px repeat(5,1fr);gap:0;position:relative}
.week-hdr{text-align:center;font-size:.78rem;font-weight:700;color:var(--text-dim);padding:10px 0;border-bottom:1px solid var(--border)}
.week-time-label{font-size:.62rem;font-weight:600;color:var(--text-dim);padding:8px 4px 8px 0;text-align:right;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end;min-height:80px}
.week-block-label{font-size:.55rem;color:var(--text-dim);opacity:.6;text-align:right;padding-right:4px}
.week-cell{
  min-height:80px;padding:8px;background:var(--surface);
  border:1px solid var(--border);border-bottom:1px solid var(--border);
  transition:all .2s var(--ease);
}
.week-cell:hover{background:rgba(74,124,89,0.02)}
.week-cell.today{background:var(--accent-bg)}
.week-day{font-size:.82rem;font-weight:700;margin-bottom:8px;color:var(--text-secondary)}
.week-item{
  font-size:.72rem;padding:6px 8px;border-radius:8px;margin-bottom:4px;
  background:var(--surface-dim);color:var(--text-secondary);
  display:flex;align-items:center;gap:4px;line-height:1.4;transition:background .15s;
}
.week-item:hover{background:var(--card-hover)}
.week-item .domain-dot{width:6px;height:6px}
.week-item.done-item{opacity:.35;text-decoration:line-through}
.week-due{font-size:.6rem;margin-left:auto;white-space:nowrap}

/* ===== PANEL 4: KANBAN ===== */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;min-height:400px}
@media(max-width:800px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kanban{grid-template-columns:1fr}}
.kanban-col{
  background:var(--surface-dim);border:1px solid var(--border);border-radius:20px;
  padding:20px;min-height:200px;
}
.kanban-col-header{
  font-size:14.5px;font-weight:700;margin-bottom:12px;padding-bottom:8px;padding-left:8px;
  border-bottom:none;border-left:3px solid var(--border-mid);
  display:flex;align-items:center;gap:8px;
}
.kanban-col-header .count{
  font-size:11.5px;background:var(--surface-container);padding:2px 8px;border-radius:99px;
  color:var(--text-dim);font-weight:600;
}
.kanban-col.drag-over{background:var(--accent-bg);border-color:var(--accent)}
.kanban-card{
  padding:14px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;cursor:grab;
  transition:all .35s var(--ease);font-size:14px;box-shadow:var(--shadow-sm);
}
.kanban-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.kanban-card:active{cursor:grabbing;opacity:.7}
.kanban-card.dragging{opacity:.3}
.kanban-card.done-card{opacity:.45}
.kanban-card.done-card .kc-title{text-decoration:line-through}
.kc-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.kc-title{font-weight:600;flex:1;overflow-wrap:break-word;word-wrap:break-word;line-height:1.4}
.kc-domain{font-size:12px;color:var(--text-dim)}
.kc-who{font-size:11.5px;color:var(--amber);font-weight:600;margin-top:4px;padding:3px 8px;background:rgba(200,147,74,0.08);border-radius:6px}
.kc-meta{font-size:12px;color:var(--text-dim);display:flex;gap:8px}

/* ===== PANEL 5: OVERVIEW ===== */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:640px){.ov-grid{grid-template-columns:1fr}}
/* [SU-023] Card Golden Pattern */
.ov-card{
  padding:24px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow-sm);
  transition:all .35s var(--ease);
}
.ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
/* [SU-016] Visual Hierarchy */
.ov-card-title{
  font-size:12px;color:var(--text-dim);font-weight:700;margin-bottom:12px;
  text-transform:uppercase;letter-spacing:.8px;
}
.ov-big{
  font-size:2.8rem;font-weight:700;color:var(--accent);
  font-family:'Cormorant Garamond',serif;line-height:1;
}
.ov-sub{font-size:13px;color:var(--text-dim);margin-top:4px}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{width:85px;font-size:13px;color:var(--text-secondary);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--surface-dim);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;transition:width .5s var(--ease)}
.bar-count{font-size:12px;color:var(--text-dim);width:24px;text-align:right;font-weight:600}
.month-heat{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:8px}
.month-cell{text-align:center;padding:8px 2px;border-radius:8px;font-size:12px;font-weight:600}
.pitfall-card{
  padding:14px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;border-left:3px solid var(--red);
  box-shadow:var(--shadow-sm);transition:all .2s var(--ease);
}
.pitfall-card:hover{box-shadow:var(--shadow-md)}
.pitfall-task{font-weight:600;font-size:14px;margin-bottom:4px}
.pitfall-text{font-size:13px;color:var(--text-secondary);line-height:1.6}
.rule-card{
  padding:14px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;border-left:3px solid var(--accent);
  box-shadow:var(--shadow-sm);transition:all .2s var(--ease);
}
.rule-card:hover{box-shadow:var(--shadow-md)}
.rule-trigger{font-size:12.5px;color:var(--accent);font-weight:600;margin-bottom:4px}
.rule-text{font-size:14px;font-weight:600;margin-bottom:4px}
.rule-reason{font-size:13px;color:var(--text-dim);line-height:1.6}
.section-title{
  font-size:16px;font-weight:700;margin:24px 0 12px;
  display:flex;align-items:center;gap:8px;
}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:640px){
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;
    width:100%;height:56px;flex-direction:row;
    padding:0 8px;gap:0;
    border-right:none;border-top:1px solid var(--border);
    z-index:200;
  }
  .sidebar-logo{display:none}
  .sidebar-nav{flex-direction:row;gap:0;justify-content:center;flex:1}
  .sidebar-bottom{margin-top:0;flex-direction:row}
  .nav-btn{width:48px;height:48px}
  .nav-btn.active::before{
    left:50%;top:auto;bottom:-4px;transform:translateX(-50%);
    width:20px;height:3px;border-radius:3px 3px 0 0;
  }
  .main-wrapper{padding-bottom:56px}
  .header{padding:16px}
  .header-date{font-size:1.2rem}
  .content{padding:16px}
  .list-header{display:none}
  .list-row{grid-template-columns:24px 1fr auto;font-size:.78rem;gap:6px}
  .list-row .list-domain,.list-row .list-month,.list-row .list-cycle{display:none}
  .list-row .list-task{white-space:normal}
  .list-detail{grid-column:1/4}
  .cal-grid,.week-grid{grid-template-columns:1fr!important}
  .cal-hdr,.week-hdr{display:none}
  .cal-cell.empty{display:none}
  .cal-cell{min-height:auto;display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:8px}
  .cal-day{margin:0;margin-right:8px;font-size:.78rem}
  .cal-item{font-size:.68rem}
  .week-cell{min-height:auto}
  .kanban{grid-template-columns:1fr!important}
  .today-card{flex-direction:column;gap:8px}
  .today-rank{align-self:flex-start}
  .ov-grid{grid-template-columns:1fr}
  .month-heat{grid-template-columns:repeat(6,1fr)}
  .bar-label{width:65px;font-size:.65rem}
  .list-toolbar{flex-direction:column;align-items:stretch}
  .list-toolbar select,.list-toolbar input{width:100%}
  .sub-row{grid-template-columns:1fr!important}
}

/* ===== PRINT ===== */
@media print{
  .sidebar,.header,.toast,.hide-done-toggle,.status-btn,.theme-toggle,.nav-btn{display:none!important}
  body,body.light{background:#fff!important;color:#000!important;--bg:#fff;--surface:#fff;--surface-dim:#f5f5f5;--surface-container:#eee;--border:#ddd;--text:#000;--text-secondary:#333;--text-dim:#888}
  .main-wrapper{padding:0}
  .content{padding:10px;max-width:100%}
  .panel{display:block!important;page-break-inside:avoid}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(128,128,128,.35)}

/* ===== [DU-011] Now Indicator (Apple Calendar style) ===== */
.now-indicator{
  position:absolute;left:48px;right:0;height:2px;
  background:var(--red);z-index:50;pointer-events:none;
  transition:top .5s ease;
}
.now-indicator::before{
  content:"";position:absolute;left:-5px;top:-4px;
  width:10px;height:10px;border-radius:50%;background:var(--red);
}

/* ===== [DU-043] Command Palette ===== */
.cmd-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:10000;display:none;align-items:flex-start;justify-content:center;padding-top:20vh;
}
.cmd-overlay.open{display:flex}
.command-palette{
  width:480px;max-width:90vw;background:var(--surface);border:1px solid var(--border-mid);
  border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;
}
.cmd-input{
  width:100%;padding:16px 20px;border:none;border-bottom:1px solid var(--border);
  background:transparent;color:var(--text);font-size:16px;font-family:inherit;outline:none;
}
.cmd-input::placeholder{color:var(--text-dim)}
.cmd-results{max-height:320px;overflow-y:auto;padding:8px}
.cmd-item{
  padding:10px 16px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;
  font-size:14px;color:var(--text-secondary);transition:background .1s;
}
.cmd-item:hover,.cmd-item.active{background:var(--accent-bg);color:var(--text)}
.cmd-item .cmd-icon{width:24px;text-align:center;color:var(--text-dim);font-size:13px}
.cmd-item .cmd-key{margin-left:auto;font-size:11px;color:var(--text-dim);font-family:monospace;padding:2px 6px;border-radius:4px;background:var(--surface-dim);border:1px solid var(--border)}

/* ===== [DU-021] Sparkline (CSS-only bar chart) ===== */
.sparkline{display:inline-flex;align-items:flex-end;gap:2px;height:32px;vertical-align:middle;margin-left:12px}
.sparkline-bar{width:6px;border-radius:2px 2px 0 0;background:var(--accent);opacity:.5;transition:height .4s var(--ease)}
.sparkline-bar.current{opacity:1;background:var(--accent)}

/* ===== [DU-022] Ring Chart (SVG completion ring) ===== */
.ring-chart{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-chart svg{transform:rotate(-90deg)}
.ring-label{position:absolute;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:18px;color:var(--accent)}
@keyframes ringFill{from{stroke-dashoffset:157}to{stroke-dashoffset:var(--ring-offset)}}

/* ===== [DU-001] Squircle corner-shape ===== */
.today-card,.kanban-card,.ov-card,.pitfall-card,.rule-card{
  corner-shape:squircle;
}

/* ===== [DU-036] Confetti ===== */
@keyframes confetti-fall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(120vh) rotate(720deg);opacity:0}
}
.confetti-piece{
  position:fixed;top:-10px;width:8px;height:8px;z-index:99999;pointer-events:none;
  animation:confetti-fall 2.5s ease-in forwards;
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">R8</div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-bottom">
      <button class="theme-toggle" id="voicepadBtn" title="VoicePad" onclick="toggleVoicePad()"><i class="fa-solid fa-microphone"></i></button>
      <a href="https://docs.google.com/spreadsheets/d/1bc8UShEyzy38uQhnI1dXCKfns3u_M4GqxaxLVxqLC70/edit" target="_blank" class="theme-toggle" title="スプレッドシートを開く" style="text-decoration:none"><i class="fa-solid fa-table" style="font-size:.8rem"></i></a>
      <button class="theme-toggle" id="themeBtn" title="テーマ切替"><i class="fa-solid fa-moon"></i></button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-wrapper">
    <div class="header" id="headerArea"></div>
    <div class="content">
      <div class="panel active" id="p-today"></div>
      <div class="panel" id="p-list"></div>
      <div class="panel" id="p-cal"></div>
      <div class="panel" id="p-board"></div>
      <div class="panel" id="p-overview"></div>
      <div class="panel" id="p-resources"></div>
      <div class="panel" id="p-input">
        <div style="text-align:center;padding:80px 40px;color:var(--text-dim)">
          <i class="fa-solid fa-pen-to-square" style="font-size:48px;opacity:0.2;margin-bottom:16px;display:block"></i>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)">タスク入力</div>
          <div style="font-size:13px;line-height:1.6">音声入力 or フォームからタスクを登録<br>GAS連携後に有効化</div>
        </div>
      </div>
      <div class="panel" id="p-voicepad" style="height:calc(100vh - 100px)">
        <iframe id="voicepad-frame" src="about:blank" allow="microphone" style="width:100%;height:100%;border:none;border-radius:16px;background:var(--surface)"></iframe>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- [DU-043] Command Palette -->
<div class="cmd-overlay" id="cmdOverlay" onclick="if(event.target===this)closeCmdPalette()">
  <div class="command-palette">
    <input class="cmd-input" id="cmdInput" placeholder="タスク検索 / パネル切り替え...（Cmd+K）" autocomplete="off">
    <div class="cmd-results" id="cmdResults"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const GAS_URL='https://script.google.com/macros/s/AKfycbyJEH9sWhq38fmxMBA8Luu10ARzRRILPfWmXu02Zg5RT9lSXRt8eV0CTpACKrBoo9G0rQ/exec';
let LIVE_MODE=false; // GASからデータ取得成功したらtrue
const LOCAL_TASKS_BACKUP=[]; // GASマージ用にローカルTASKSを保持
let JOURNAL_ENTRIES=[]; // シート2: 日誌・メモ
let STAFF_RECORDS=[]; // シート3: 職員動態
const APRIL_EVENTS = [

const LS_KEY='kyoto-dash-r8-mukai';
let S;
function loadState(){
  try{S=JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){S={}}
  if(!S.status)S.status={};if(!S.cl)S.cl={};if(!S.theme)S.theme='';
  if(!S.tab)S.tab='today';if(!S.hideDone)S.hideDone=false;
  if(!S.sort)S.sort={col:'m',dir:1};if(!S.boardScope)S.boardScope='soon';if(!S.calView)S.calView='month';if(!S.calWeekStart)S.calWeekStart=null;if(!S.weekDays)S.weekDays=5;
  TASKS.forEach(tk=>{if(!S.status[tk.id])S.status[tk.id]=(tk.cy==='daily'||tk.cy==='weekly'||tk.cy==='monthly')?'進行中':'未着手'});
}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(S))}
function getStatus(id){return S.status[id]||'未着手'}
function setStatus(id,st){S.status[id]=st;saveState();gasUpdateStatus(id,st)}
function isDone(id){return getStatus(id)==='完了'}
function toggleCl(taskId,idx){const k=taskId+'_'+idx;S.cl[k]=!S.cl[k];saveState()}
function isClDone(taskId,idx){return !!S.cl[taskId+'_'+idx]}

// 締切・着手目安の算出
function getDueInfo(tk){
  if(tk.due){
    const d=new Date(tk.due);
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.ceil((d-now)/(1000*60*60*24));
    const label=`${d.getMonth()+1}/${d.getDate()}`;
    const urgency=diff<0?'overdue':diff<=3?'urgent':diff<=7?'soon':'ok';
    return {label,diff,urgency,type:'提出'};
  }
  if(tk.m && tk.cy==='yearly'){
    const targetDay=new Date(2026,tk.m-1,1);
    const startDay=new Date(targetDay);
    startDay.setDate(startDay.getDate()-(tk.wb||0)*7);
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.ceil((startDay-now)/(1000*60*60*24));
    const label=`${startDay.getMonth()+1}/${startDay.getDate()}~`;
    const urgency=diff<0?'overdue':diff<=3?'urgent':diff<=7?'soon':'ok';
    return {label,diff,urgency,type:'着手'};
  }
  return null;
}
function dueTag(tk){
  if(isDone(tk.id))return '';
  const info=getDueInfo(tk);
  if(!info)return '';
  const colors={overdue:'var(--red)',urgent:'var(--red)',soon:'var(--amber)',ok:'var(--text-dim)'};
  const bgColors={overdue:'rgba(196,93,93,.1)',urgent:'rgba(196,93,93,.08)',soon:'rgba(200,147,74,.08)',ok:'transparent'};
  const prefix=info.type==='提出'?'〆':'';
  const diffLabel=info.diff<0?`${Math.abs(info.diff)}日超過`:info.diff===0?'今日':info.diff<=7?`あと${info.diff}日`:'';
  return `<span style="font-size:.65rem;padding:2px 8px;border-radius:6px;background:${bgColors[info.urgency]};color:${colors[info.urgency]};font-weight:600;white-space:nowrap">${prefix}${info.label}${diffLabel?' '+diffLabel:''}</span>`;
}

  if(!tk)return;
  const cur=getStatus(id);
  if(cur==='委任'){
    setStatus(id,'進行中');
    tk.who='';
    tk.dueDate='';
    gasUpdateAssignee(id,'','');
    showToast('委任を解除しました');
    renderToday();
  }else{
    const who=prompt('誰に委任しますか？',tk.who||'');
    if(who===null)return;
    tk.who=who.trim();
    // 回収予定日: デフォルト3日後

function getFiltered(){
  const dom=document.getElementById('fDom')?.value||'';
  const mon=document.getElementById('fMon')?.value||'';
  const st=document.getElementById('fSt')?.value||'';
  const q=(document.getElementById('fSearch')?.value||'').toLowerCase();
  return TASKS.filter(tk=>{
    if(dom&&tk.d!==dom)return false;
    if(mon==='null'&&tk.m!==null)return false;
    if(mon&&mon!=='null'&&tk.m!==+mon)return false;
    if(st&&getStatus(tk.id)!==st)return false;
    if(S.hideDone&&isDone(tk.id))return false;
    if(q&&!tk.t.toLowerCase().includes(q)&&!tk.d.toLowerCase().includes(q)&&!tk.tg.join(' ').toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{
    const {col,dir}=S.sort;
    let va,vb;
    if(col==='t'){va=a.t;vb=b.t}
    else if(col==='d'){va=a.d;vb=b.d}
    else if(col==='m'){va=a.date||'9999';vb=b.date||'9999'}
    else if(col==='due'){const da=getDueInfo(a),db=getDueInfo(b);va=da?da.diff:999;vb=db?db.diff:999}
    else if(col==='st'){const o={'未着手':0,'進行中':1,'委任':2,'完了':3};va=o[getStatus(a.id)];vb=o[getStatus(b.id)]}
    else{va=a.date||'9999';vb=b.date||'9999'}
    if(va<vb)return -dir;if(va>vb)return dir;return 0;
  });
}

function getTasksForDay(dt,mTasks){
  const d=dt.getDate(),dow=dt.getDay(),m=dt.getMonth()+1;
  const fd=new Date(dt.getFullYear(),dt.getMonth(),1).getDay();
  const wom=Math.ceil((d+fd)/7);
  const overrides=loadOverrides();
  let dayTasks=[];
  mTasks.forEach(tk=>{
    // If this task has a due override from drag, only show on that date
    if(overrides[tk.id]&&overrides[tk.id].due){
      const dd=new Date(overrides[tk.id].due);
      if(dd.getDate()===d&&dd.getMonth()===dt.getMonth()&&dd.getFullYear()===dt.getFullYear())dayTasks.push(tk);
      return; // skip cycle rules
    }
    // LIVE_MODE: dateフィールドで日付直接マッチ
    if(tk.date){
      const td=new Date(tk.date);
      if(td.getDate()===d&&td.getMonth()===dt.getMonth()&&td.getFullYear()===dt.getFullYear())dayTasks.push(tk);
      return;
    }
    if(tk.cy==='monthly'&&d<=7&&dow===1)dayTasks.push(tk);
    else if(tk.cy==='termly'&&d===1)dayTasks.push(tk);
    else if(tk.cy==='yearly'&&tk.m===m){
      const tw=Math.max(1,Math.min(4,4-(tk.wb||0)));
      if((wom===tw&&dow===1)||(d===1&&tw===1))dayTasks.push(tk);
    }
  });
  // Non-overridden tasks with original due dates
  mTasks.filter(tk=>tk.due&&!(overrides[tk.id]&&overrides[tk.id].due)).forEach(tk=>{
    const dd=new Date(tk.due);
    if(dd.getDate()===d&&dd.getMonth()===dt.getMonth()&&!dayTasks.includes(tk))dayTasks.push(tk);
  });
  return dayTasks;
}

function getMonthTasks(y,m){
  return TASKS.filter(tk=>{
    if(tk.cy==='daily'||tk.cy==='weekly')return false;
    // LIVE_MODE: dateフィールドで月マッチ
    if(tk.date){
      const dm=gasToMonth(tk.date);
      if(dm===m)return true;
      return false;
    }
    if(tk.m===m)return true;
    if(tk.cy==='monthly')return true;
    return false;
  });
}

function calDrop(e,dateStr){
  e.preventDefault();
  if(!calDragId)return;
  const tk=TASKS.find(t=>t.id===calDragId);
  if(!tk)return;
  // Update due date (or set it)
  const o=loadOverrides();
  if(!o[calDragId])o[calDragId]={};
  o[calDragId].due=dateStr;
  saveOverrides(o);
  // Also update the in-memory task for immediate rendering
  tk.due=dateStr;
  if(tk.date)tk.date=dateStr;
  // Update month if needed
  const newM=parseInt(dateStr.split('-')[1]);
  if(tk.m!==newM){
    o[calDragId].m=newM;
    tk.m=newM;
    saveOverrides(o);
  }
  // GASにも書き戻し
  if(LIVE_MODE)fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update_date',id:tk.id,date:dateStr})}).catch(err=>console.error('GAS date update failed:',err));
  calDragId=null;
  showToast('タスクを '+dateStr.replace(/^\d+-/,'').replace('-','/')+' に移動しました');
  renderAll();
}
function loadOverrides(){try{return JSON.parse(localStorage.getItem('kyoto_cal_overrides'))||{}}catch{return {}}}

const TIME_BLOCKS=[
  {id:'morning',label:'朝',sub:'〜8:30',color:'rgba(74,124,89,0.06)'},
  {id:'am',label:'午前',sub:'〜12:00',color:'rgba(91,125,177,0.06)'},
  {id:'pm',label:'午後',sub:'〜16:00',color:'rgba(200,147,74,0.06)'},
  {id:'after',label:'放課後',sub:'16:00〜',color:'rgba(184,90,122,0.06)'},
];
function parseStartHour(slot){
  if(!slot)return -1;
  // "08:30-11:30" or "08:30-" → 8.5
  const hm=slot.match(/^(\d{1,2}):(\d{2})/);
  if(hm)return parseInt(hm[1])+parseInt(hm[2])/60;
  // "13:00/16:00" → 13
  const sl=slot.match(/^(\d{1,2}):(\d{2})\//);
  if(sl)return parseInt(sl[1])+parseInt(sl[2])/60;
  // "1899-12-...T05:30:00.000Z" → UTC時刻+9=JST
  const iso=slot.match(/T(\d{2}):(\d{2}):/);
  if(iso)return (parseInt(iso[1])+parseInt(iso[2])/60+9)%24;
  return -1;
}
function getTaskTimeBlock(tk){
  // Check override first
  const o=loadOverrides();
  if(o[tk.id]&&o[tk.id].timeBlock)return o[tk.id].timeBlock;
  // timeSlotから自動判定
  const h=parseStartHour(tk.timeSlot);
  if(h>=0){
    if(h<8.5)return 'morning';
    if(h<12)return 'am';
    if(h<16)return 'pm';
    return 'after';
  }
  return tk.timeBlock||'unset';
}

        }).join('')}

  html+=days.map(d=>{
    const isToday=d.toDateString()===today.toDateString();
    const mTasks=getMonthTasks(d.getFullYear(),d.getMonth()+1);
    const dayTasks=getTasksForDay(d,mTasks).filter(tk=>getTaskTimeBlock(tk)==='unset');
    const dateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return `<div class="week-cell${isToday?' today':''}" data-date="${dateStr}" data-block="unset" ondragover="event.preventDefault();this.style.outline='2px solid var(--accent)'" ondragleave="this.style.outline=''" ondrop="calDropBlock(event,'${dateStr}','unset');this.style.outline=''">
      ${dayTasks.map(tk=>{
        const info=getDueInfo(tk);
        const dueLabel=info&&!isDone(tk.id)?`<span class="week-due" style="color:${{overdue:'var(--red)',urgent:'var(--red)',soon:'var(--amber)',ok:'var(--text-dim)'}[info.urgency]}">${info.type==='提出'?'〆':''} ${info.label}</span>`:'';
        return `<div class="week-item${isDone(tk.id)?' done-item':''}" draggable="true" ondragstart="calDragId='${tk.id}';this.style.opacity='0.4'" ondragend="this.style.opacity=''" style="cursor:grab">${domDot(tk.d)} <span style="flex:1">${esc(tk.t)}</span>${dueLabel}</div>`;
      }).join('')}
    </div>`;
  }).join('');

  cc.innerHTML=`<div class="week-grid" style="grid-template-columns:48px repeat(${numDays},1fr)">${html}</div>`;
}
function calDropBlock(e,dateStr,blockId){
  e.preventDefault();
  if(!calDragId)return;
  const o=loadOverrides();
  if(!o[calDragId])o[calDragId]={};
  o[calDragId].due=dateStr;
  o[calDragId].timeBlock=blockId;
  saveOverrides(o);
  const tk=TASKS.find(t=>t.id===calDragId);
  if(tk){tk.due=dateStr;if(tk.date)tk.date=dateStr;tk.timeBlock=blockId;const nm=parseInt(dateStr.split('-')[1]);if(tk.m!==nm){o[calDragId].m=nm;tk.m=nm;saveOverrides(o)}}
  // GASにも書き戻し
  if(LIVE_MODE&&tk)fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update_date',id:tk.id,date:dateStr})}).catch(err=>console.error('GAS date update failed:',err));
  const blockLabel=TIME_BLOCKS.find(b=>b.id===blockId)?.label||'終日';
  showToast(`${blockLabel} ${dateStr.replace(/^\d+-/,'').replace('-','/')} に移動`);
  calDragId=null;
  renderAll();
}

// 動態をシート3に追加
async function addStaffRecord(name,type,timeSlot,note){
  const todayStr=new Date().toISOString().slice(0,10);
  STAFF_RECORDS.push({date:todayStr,name,type,timeSlot,note,_row:null});
  renderAll();
  showToast(`動態を登録: ${name}`);
  try{
    await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'add_staff',record:{name,type,timeSlot,note}})});
  }catch(err){console.error('GAS staff add failed:',err)}
}

function submitStaff(){
  const name=document.getElementById('staffName');
  const type=document.getElementById('staffType');
  const time=document.getElementById('staffTime');
  const note=document.getElementById('staffNote');
  if(!name||!name.value.trim()){showToast('名前を入力してください');return}
  addStaffRecord(name.value.trim(),type.value,time.value.trim(),note.value.trim());
  name.value='';time.value='';note.value='';
  name.focus();
}

// 動態の雑投げ込み（1行テキストで入れて、CCが後で整形）
function submitStaffQuick(){
  const inp=document.getElementById('staffInput');
  if(!inp||!inp.value.trim())return;
  // そのままcontentとして日誌シートではなく動態シートに入れる
  // CCが後で name/type/timeSlot/note に分割する
  addStaffRecord(inp.value.trim(),'','','');
  inp.value='';
  inp.focus();

// GAS LIVE SYNC
// ═══════════════════════════════════════════════════════════════
function gasDateToYMD(s){
  if(!s)return '';
  // "Wed Apr 01 2026 ..." → Date → "2026-04-01"
  // or "2026-03-下旬" → そのまま
  if(s.includes('下旬')||s.includes('初旬')||s.includes('中旬'))return s;
  const d=new Date(s);
  if(isNaN(d))return s;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function gasToMonth(dateStr){
  if(!dateStr)return null;
  const m=dateStr.match(/(\d{4})-(\d{2})/);
  return m?parseInt(m[2]):null;
}
function gasToDow(dateStr){
  if(!dateStr)return '';
  const d=new Date(dateStr);
  if(isNaN(d))return '';
  return ['日','月','火','水','木','金','土'][d.getDay()];
}

// GASのタスクデータをHTML内部形式に変換
function convertGasTask(g){
  const date=gasDateToYMD(g.date);
  const m=gasToMonth(date);
  return {
    id:g.id,
    d:g.category||'',
    t:g.task,
    cy:'yearly',
    m:m,
    wb:0,
    cl:[],
    pit:g.detail||'',
    tg:[g.category||''],
    due:parseGasDate(g.dueDate)||'',
    date:parseGasDate(date)||date,
    status:g.status||'未着手',
    priority:g.priority||'',
    timeSlot:g.timeSlot||'',
    sub:!!(g.assignee),
    who:g.assignee||'',
    _row:g._row
  };
}

async function fetchFromGAS(){
  try{
    showToast('スプレッドシートからデータ取得中...');
    // 3シート並列取得（GAS CORS対策: redirect:'follow'明示）
    const fetchOpt={redirect:'follow'};
    const [tasksRes, diaryRes, staffRes] = await Promise.all([
      fetch(GAS_URL+'?action=tasks',fetchOpt).then(r=>{if(!r.ok)throw new Error('tasks:'+r.status);return r.json()}).catch(e=>{console.error('tasks fetch:',e);return null}),
      fetch(GAS_URL+'?action=diary',fetchOpt).then(r=>{if(!r.ok)throw new Error('diary:'+r.status);return r.json()}).catch(e=>{console.error('diary fetch:',e);return null}),
      fetch(GAS_URL+'?action=staff',fetchOpt).then(r=>{if(!r.ok)throw new Error('staff:'+r.status);return r.json()}).catch(e=>{console.error('staff fetch:',e);return null}),
    ]);
    // シート1: タスク
    if(tasksRes&&tasksRes.tasks&&tasksRes.tasks.length>0){
      TASKS.length=0;
      tasksRes.tasks.forEach(g=>{
        const tk=convertGasTask(g);
        TASKS.push(tk);
      });
      TASKS.forEach(tk=>{
        if(tk.status)S.status[tk.id]=tk.status;
      });
      saveState();
      LIVE_MODE=true;
      rebuildTodayPicks();
    }
    // シート2: 日誌・メモ
    if(diaryRes&&diaryRes.entries){
      JOURNAL_ENTRIES=diaryRes.entries.map(e=>({
        date:parseGasDate(e.date),
        time:parseGasTime(e.time),
        type:e.type||'',
        content:e.content||'',
        isTodo:e.isTodo||'',
        memo:e.memo||'',
        follow:e.follow||'',
        _row:e._row
      }));
    }
    // シート3: 職員動態
    if(staffRes&&staffRes.records){
      STAFF_RECORDS=staffRes.records.map(r=>({
        date:parseGasDate(r.date),
        name:r.name||'',
        type:r.type||'',
        timeSlot:r.timeSlot||'',
        note:r.note||'',
        _row:r._row
      }));
    }
    const counts=[tasksRes?tasksRes.count:0,diaryRes?diaryRes.count:0,staffRes?staffRes.count:0];
    showToast(`タスク${counts[0]}件・日誌${counts[1]}件・動態${counts[2]}件`);
  }catch(err){
    console.error('GAS fetch failed:',err);
    showToast('オフラインモード（ローカルデータ使用）');
  }
  renderAll();
}

// GAS日付パーサー（"Wed Apr 08 2026 ..." → "2026-04-08"）
function parseGasDate(val){
  if(!val)return '';
  if(typeof val==='string'&&val.match(/^\d{4}-\d{2}-\d{2}/))return val.slice(0,10);
  const d=new Date(val);
  if(isNaN(d))return String(val);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// GAS時刻パーサー（"1899-12-29T22:30:00.000Z" → "7:30" or 文字列そのまま）
function parseGasTime(val){
  if(!val)return '';
  if(typeof val==='string'&&val.includes('1899-12-')){
    const d=new Date(val);
    // GASのDateはUTCで来るのでJST(+9)に変換
    const h=d.getUTCHours();
    const m=d.getUTCMinutes();
    return h+':'+String(m).padStart(2,'0');
  }
  return String(val);
}

// 日誌にエントリ追加（ダッシュボードから）
async function addJournalEntry(content){
  if(!content||!content.trim())return;
  const now=new Date();
  const entry={
    date:now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'),
    time:now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'),
    content:content.trim()
  };
  // ローカルに即追加
  JOURNAL_ENTRIES.push({date:entry.date,time:entry.time,type:'',content:entry.content,isTodo:'',memo:'',follow:'',_row:null});
  renderAll();
  showToast('日誌に追加しました');
  // GASに送信（LIVE_MODEに関係なく常に送信）
  try{
    await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'add_diary',entry:entry})});
  }catch(err){console.error('GAS diary add failed:',err)}
}

// [DU-011] NOW INDICATOR — Apple Calendar style red line
// ═══════════════════════════════════════════════════════════════
function placeNowIndicator(){
  // Only for week view
  if(S.calView!=='week')return;
  const grid=document.querySelector('.week-grid');
  if(!grid)return;
  // Remove old indicator
  document.querySelectorAll('.now-indicator').forEach(el=>el.remove());
  const now=new Date();
  const h=now.getHours()+now.getMinutes()/60;
  // School hours: 7:00-18:00 mapped to TIME_BLOCKS
  // Calculate which block and position within it
  const blockRanges=[{id:'morning',start:7,end:8.5},{id:'am',start:8.5,end:12},{id:'pm',start:12,end:16},{id:'after',start:16,end:18}];
  let targetBlock=null,pct=0;
  for(const b of blockRanges){
    if(h>=b.start&&h<b.end){targetBlock=b.id;pct=(h-b.start)/(b.end-b.start);break}
  }
  if(!targetBlock)return;
  // Find the week-cell row for this block
  const cells=grid.querySelectorAll(`.week-cell[data-block="${targetBlock}"]`);
  if(!cells.length)return;
  const cell=cells[0];
  const gridRect=grid.getBoundingClientRect();
  const cellRect=cell.getBoundingClientRect();
  const top=cellRect.top-gridRect.top+cellRect.height*pct;
  const line=document.createElement('div');
  line.className='now-indicator';
  line.style.top=top+'px';
  grid.appendChild(line);
}
// [DU-011] 1分ごとに現在時刻インジケータを更新
setInterval(placeNowIndicator,60000);

// [DU-043] COMMAND PALETTE (Cmd+K)
// ═══════════════════════════════════════════════════════════════
let cmdActive=-1;
const CMD_PANELS=[
  {id:'today',icon:'fa-solid fa-crosshairs',label:'今日',key:'1'},
  {id:'list',icon:'fa-solid fa-list-check',label:'リスト',key:'2'},
  {id:'cal',icon:'fa-regular fa-calendar',label:'カレンダー',key:'3'},
  {id:'board',icon:'fa-solid fa-columns',label:'ボード',key:'4'},
  {id:'overview',icon:'fa-solid fa-chart-bar',label:'概要',key:'5'},
  {id:'resources',icon:'fa-solid fa-folder-open',label:'資料集',key:'6'},
];

function openCmdPalette(){
  const ov=document.getElementById('cmdOverlay');
  ov.classList.add('open');
  const inp=document.getElementById('cmdInput');
  inp.value='';
  inp.focus();
  cmdActive=-1;
  renderCmdResults('');
}
function closeCmdPalette(){
  document.getElementById('cmdOverlay').classList.remove('open');
}
function renderCmdResults(q){
  const el=document.getElementById('cmdResults');
  q=q.toLowerCase().trim();
  let items=[];
  // Panel switches
  CMD_PANELS.forEach(p=>{
    if(!q||p.label.includes(q)||p.id.includes(q)){
      items.push({type:'panel',id:p.id,icon:p.icon,label:p.label,key:p.key});
    }
  });
  // Task search
  if(q.length>=1){
    TASKS.filter(tk=>tk.t.toLowerCase().includes(q)||tk.d.toLowerCase().includes(q)).slice(0,8).forEach(tk=>{
      items.push({type:'task',id:tk.id,icon:'fa-solid fa-circle-dot',label:tk.t,sub:tk.d});
    });
  }
  cmdActive=items.length>0?0:-1;
  el.innerHTML=items.map((it,i)=>`<div class="cmd-item${i===cmdActive?' active':''}" data-idx="${i}" data-type="${it.type}" data-id="${it.id}" onclick="execCmdItem(this)"><span class="cmd-icon"><i class="${it.icon}"></i></span><span>${esc(it.label)}${it.sub?' <span style="font-size:12px;color:var(--text-dim)">'+esc(it.sub)+'</span>':''}</span>${it.key?'<span class="cmd-key">'+it.key+'</span>':''}</div>`).join('');
  el._items=items;
}
function execCmdItem(el){
  const type=el.dataset.type,id=el.dataset.id;
  closeCmdPalette();
  if(type==='panel'){S.tab=id;saveState();renderAll()}
  else if(type==='task'){S.tab='list';saveState();renderAll();setTimeout(()=>{const inp=document.getElementById('fSearch');if(inp){const tk=TASKS.find(t=>t.id===id);if(tk)inp.value=tk.t;renderListRows()}},100)}
}
document.getElementById('cmdInput').addEventListener('input',function(){renderCmdResults(this.value)});
document.getElementById('cmdInput').addEventListener('keydown',function(e){
  const el=document.getElementById('cmdResults');
  const items=el._items||[];
  if(e.key==='ArrowDown'){e.preventDefault();cmdActive=Math.min(cmdActive+1,items.length-1)}
  else if(e.key==='ArrowUp'){e.preventDefault();cmdActive=Math.max(cmdActive-1,0)}
  else if(e.key==='Enter'&&cmdActive>=0){e.preventDefault();const sel=el.children[cmdActive];if(sel)execCmdItem(sel);return}
  else if(e.key==='Escape'){closeCmdPalette();return}
  else return;
  el.querySelectorAll('.cmd-item').forEach((c,i)=>c.classList.toggle('active',i===cmdActive));
  if(el.children[cmdActive])el.children[cmdActive].scrollIntoView({block:'nearest'});
});

// [DU-042] Keyboard shortcuts: Cmd+K + number keys 1-6
document.addEventListener('keydown',function(e){
  // Cmd+K or Ctrl+K → open command palette
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();const ov=document.getElementById('cmdOverlay');ov.classList.contains('open')?closeCmdPalette():openCmdPalette();return}
  // Escape to close
  if(e.key==='Escape'&&document.getElementById('cmdOverlay').classList.contains('open')){closeCmdPalette();return}
  // Number keys 1-6 for panel switching (when not typing in an input)
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const n=parseInt(e.key);
  if(n>=1&&n<=6&&!e.metaKey&&!e.ctrlKey&&!e.altKey){
    const panel=CMD_PANELS[n-1];
    if(panel){S.tab=panel.id;saveState();renderAll();showToast(panel.label)}
  }
});

function fireConfetti(){
  const colors=['#4A7C59','#C45D5D','#C8934A','#5B7DB1','#B85A7A','#ef4444','#f59e0b','#10b981'];
  for(let i=0;i<40;i++){

    piece.className='confetti-piece';
    piece.style.left=Math.random()*100+'vw';
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];

  }
}

// ═══════════════════════════════════════════════════════════════
// [DU-009] TODAY_PICKS GAS SYNC FIX — rebuildTodayPicks
// ═══════════════════════════════════════════════════════════════
function rebuildTodayPicks(){
  const now=new Date();
  const cm=now.getMonth()+1;
  TODAY_PICKS.length=0;

  // ① 回収リマインド: 委任中で締切3日以内のタスクを最優先で出す
  const recoveryTasks=TASKS.filter(tk=>{
    if(getStatus(tk.id)!=='委任')return false;
    const due=getDueInfo(tk);
    return due&&due.diff<=3;
  });
  recoveryTasks.sort((a,b)=>{
    const da=getDueInfo(a),db=getDueInfo(b);
    return (da?da.diff:999)-(db?db.diff:999);
  });
  recoveryTasks.forEach(tk=>{
    const due=getDueInfo(tk);
    const whoLabel=tk.who?tk.who+'から':'';
    const why=due.diff<=0?`${whoLabel}回収期限超過！声かけを`:`${whoLabel}あと${due.diff}日で期限。回収確認を`;
    TODAY_PICKS.push({id:tk.id,why:why,recovery:true});
  });

  // ② 通常タスク: 未着手・進行中で締切が近い順に、残り枠を埋める
  const remaining=Math.max(0,5-TODAY_PICKS.length);
  const candidates=TASKS.filter(tk=>{
    if(isDone(tk.id)||getStatus(tk.id)==='委任')return false;
    return tk.m===cm||tk.m===cm+1;
  });
  candidates.sort((a,b)=>{
    const da=getDueInfo(a),db=getDueInfo(b);
    const diffA=da?da.diff:999,diffB=db?db.diff:999;
    if(diffA!==diffB)return diffA-diffB;
    return (a.wb||0)-(b.wb||0);
  });
  candidates.slice(0,remaining).forEach(tk=>{
    const due=getDueInfo(tk);
    const why=due&&due.diff<=0?'期限超過！至急対応':due&&due.diff<=3?`あと${due.diff}日（${due.label}）`:tk.pit||'今月のタスク';
    TODAY_PICKS.push({id:tk.id,why:why,recovery:false});
  });

  if(TODAY_PICKS.length>0)todayRevealed=true;
}

// INIT — apply calendar overrides to TASKS
(function(){const o=loadOverrides();Object.keys(o).forEach(id=>{const tk=TASKS.find(t=>t.id===id);if(tk){if(o[id].due)tk.due=o[id].due;if(o[id].m)tk.m=o[id].m}})})();
// ローカルTASKSをバックアップ（GASマージ用）
TASKS.forEach(tk=>LOCAL_TASKS_BACKUP.push(Object.assign({},tk)));
loadState();applyTheme();renderAll();
// GASからデータを非同期で取得して上書き
fetchFromGAS();
</script>
