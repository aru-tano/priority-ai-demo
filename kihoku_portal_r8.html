  for(let i=4;i<=15;i++){const m=i<=12?i:i-12;const on=mf===m;mh+=`<div class="pill ${on?'on':''}" style="${on?'background:#1e3a5f;color:#fff':''};min-width:38px;justify-content:center" onclick="setM(${m})">${MN[i<=12?i-3:i-15]}</div>`}
  document.getElementById('mpills').innerHTML=mh}
function render(){pills();const items=filt();const el=document.getElementById('main');if(!items.length){el.innerHTML='<div class="empty"><i class="fa-solid fa-folder-open"></i>該当する資料がありません</div>';return}let h='';if(f==='all'&&!q){h+='<div class="bento">';ORD.forEach(k=>{const m=M[k];const ci=D.filter(d=>d.cat===k);if(!ci.length)return;const isLg=TOP.includes(k);const samples=ci.slice(0,isLg?4:2).map(d=>d.name).join('、');h+=`<div class="bento-tile ${isLg?'lg':''}" onclick="setF('${k}')"><div class="bt-header" style="background-image:url('${m.img}');background-color:${m.cl}"><i class="${m.i}"></i></div><div class="bt-body"><div class="bt-name">${m.n}</div><div class="bt-count">${ci.length}件の資料</div><div class="bt-samples">${samples}</div></div></div>`});h+='</div>'}const g={};items.forEach(d=>{if(!g[d.cat])g[d.cat]=[];g[d.cat].push(d)});ORD.forEach(k=>{if(!g[k])return;const m=M[k];h+=`<div class="sec-hdr"><i class="${m.i}" style="color:${m.cl}"></i><span class="sec-hdr-name">${m.n}</span><span class="sec-hdr-cnt">${g[k].length}件</span></div><div class="card-grid">`;g[k].forEach(d=>{const imp=d.important;const tags=d.tags.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('');const MN2=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];const mbadges=d.months&&d.months.length?d.months.map(m=>`<span style="display:inline-block;padding:1px 5px;border-radius:3px;background:#EFF6FF;color:#2563eb;font-size:.6rem;font-weight:600">${MN2[m]}</span>`).join(' '):'';const noteText=d.note?`<div style="font-size:.68rem;color:#94a3b8;margin-top:.35rem;line-height:1.4"><i class="fa-solid fa-lightbulb" style="color:#D97706;margin-right:.2rem;font-size:.6rem"></i>${esc(d.note)}</div>`:'';h+=`<div class="card"><div class="card-top" style="background-image:url('${m.img}');background-color:${m.cl}"><i class="${m.i}"></i></div>${imp?`<div class="card-badge" style="background:#D97706">重要</div>`:''} <div class="card-body"><div class="card-name">${imp?'<span class="imp"></span>':''}<span>${esc(d.name)}</span></div>${mbadges?'<div style="margin:.25rem 0">'+mbadges+'</div>':''}<div class="card-desc">${fmtDesc(d.desc)}</div>${noteText}</div><div class="card-foot"><div class="card-folder"><i class="fa-solid fa-folder-open"></i> ${esc(d.folder)}</div><div class="card-tags">${tags}</div></div></div>`});h+='</div>'});el.innerHTML=h}
render();
</script>
