された\n平均年齢70歳というすごい方々、\n「尾鷲藪漕隊」の皆様とのご縁をいただき、\n枯れ木などを活用して橋を作ることになりました。\n尾鷲市地域おこし協力隊の仲間も来てくださりました🎵\n\n今日一日かかるかと思いきや、\nなんと作業は午前中で終了。\nとても立派な橋を作ってくださいました☺️\n\nそしてなんと…\nこの橋に、私の名前をつけてくださいました。\n\n藪漕隊が手がけた橋はいくつかありますが、\n人の名前がついた橋は今回で3つ目とのこと。\n\nこの橋を、たくさんの人に知っていただき、\n実際に渡ってもらえる場所にしていきたい。\nそう思うと、気が引き締まる思いです。\n\n今後はトレッキングツアーなども企画し、\n須賀利の魅力をもっと多くの方に\n知ってもらえたらと思います。\n\n須賀利ファンを増やし、\n地域全体が盛り上がるよう頑張りたいです。\n\nこの橋の名前は「真由橋」。\nいつか、この橋を渡りに\n須賀利へ来ていただけたら嬉しいです😊","e":"","tg":["地域おこし協力隊","尾鷲市","須賀利町","須賀利","藪漕隊"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_055_須賀利町-19.jpg","t":"須賀利町-19.jpg","id":"WEB-341","u":"https://commons.wikimedia.org/wiki/File:%E9%A0%88%E8%B3%80%E5%88%A9%E7%94%BA-19.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_012_sugari_town_blue_sky.jpg","t":"Sugari Town Blue Sky","id":"WEB-180","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_014_temple_stairs_sugari.jpg","t":"Temple Stairs Sugari","id":"WEB-184","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"}],"s":"Instagram #須賀利 (2026-03-05)","su":"https://www.instagram.com/explore/tags/須賀利/"},{"id":"OW-902","c":"tourism","a":"owase","t":"須賀利のもりえってぃ","x":"須賀利のもりえってぃ\n公式LINEができました✨\n\n須賀利のイベント情報や、\n町の魅力、最新のお知らせなどを\nこちらから発信していきます。\n\n今後、ツアー開催時のご案内や\nお申込み情報なども\nLINEからお届け予定です。\n\n須賀利が気になる方、\nイベント情報を受け取りたい方は\nぜひご登録ください☺️\n\nご登録はQRコードもしくは\n下記・プロフィールのリンクから\nお願いいたします。\n\n👉https://lin.ee/2BDEkN5","e":"","tg":["須賀利","尾鷲","三重県","地域おこし協力隊","公式ライン"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_012_sugari_town_blue_sky.jpg","t":"Sugari Town Blue Sky","id":"WEB-180","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_014_temple_stairs_sugari.jpg","t":"Temple Stairs Sugari","id":"WEB-184","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_020_sugari_town_alley.jpg","t":"Sugari Town Alley","id":"WEB-196","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"}],"s":"Instagram #須賀利 (2026-03-17)","su":"https://www.instagram.com/explore/tags/須賀利/"},{"id":"OW-903","c":"nature","a":"owase","t":"2026.3.19  尾鷲藪漕隊活動日⛰⁡","x":"2026.3.19  尾鷲藪漕隊活動日⛰️⁡\n今回も須賀利の整備の続き🚶‍♀️⁡\n⁡日和山までの道普請。⁡\n⁡予報とは違って風が冷たい1日でしたが、作業も順調に進み、次回からが又楽しみに！⁡\n⁡⁡\n⁡#尾鷲藪漕隊⁡\n⁡#山整備⁡\n⁡#須賀利⁡\n⁡#須賀利日和山","e":"","tg":["尾鷲藪漕隊⁡","山整備⁡","須賀利⁡","須賀利日和山"],"im":[],"s":"Instagram #須賀利 (2026-03-21)","su":"https://www.instagram.com/explore/tags/須賀利/"},{"id":"OW-904","c":"tourism","a":"owase","t":"2026/03/19","x":"2026/03/19\n尾鷲藪漕隊の皆様と、山道整備を行いました。\n今回で同行させていただくのは3回目です。\n\n今回は、真由橋〜日和山までの整備と、\n大池・小池へ向かう序盤の稜線沿いで、\n道幅が狭くなる危険箇所にロープを張る作業を行いました。\n\n日和山の頂上までは比較的歩きやすいので、\n登山がお好きな方はぜひ歩いてみてください☺️✨\n\nまた、大池・小池までの道は、\nロープがあることでかなり安心感があり、\n初心者の私でも歩きやすくなりました。\n\nまだ先は長いですが、これからも同行させていただき、\n整備の一助になれればと思います。\n\nそして今回、ひとつ驚いたことが…\n登山道の入り口に、新しい看板と\nテーブル、椅子が設置されていました😳\n\n藪漕隊の皆様も私もまったく知らず、\n「誰が設置してくれたんだろう…？」と\n不思議に思っていたのですが、\n町の方が、藪漕隊の整備の様子を見て\n設置してくださったことが後でわかりました。\n\nとても素敵なテーブル。\n看板には、ゴミはお持ち帰りください　との文字が。\n\n感動しました。これからも頑張りたいと改めて思います。\n\n皆様、今回もお疲れ様でした。\n須賀利の登山道を全国区に！\n今後ともよろしくお願いします☺️","e":"","tg":["須賀利町","地域おこし協力隊","尾鷲市","須賀利","日和山"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_055_須賀利町-19.jpg","t":"須賀利町-19.jpg","id":"WEB-341","u":"https://commons.wikimedia.org/wiki/File:%E9%A0%88%E8%B3%80%E5%88%A9%E7%94%BA-19.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_012_sugari_town_blue_sky.jpg","t":"Sugari Town Blue Sky","id":"WEB-180","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_014_temple_stairs_sugari.jpg","t":"Temple St ":"OW-918","c":"tourism","a":"owase","t":"天狗倉山522m","x":"天狗倉山522m\n\n父のことがあるので、予定が立たないのだけど、県内ならいいかなぁ…入道に福寿草見にいこうかな。と思ってたけど、この暖かさで雪溶けてぐちゃぐちゃになってるんじゃないかなぁと考えてやめた。\n\nオットが予定ないっていうから、オットでも行けそうな山にいこうか。\n\n熊野古道、馬越峠から便石山か天狗倉山ピストンしようかな。\n元気そうなら尾鷲に周回してもいいし。\n\nと思ったけど、オットが起きてこなかったので、周回はボツ。\n歩き始めると石畳が滑るとかいって、文句ばっかり。\n私の靴は滑らないけど、オットの靴は滑るらしい。\n馬越峠のところで、天狗倉山から降りてきた地元のおじさんに天狗倉短いし、混んでないからいいよ〜と勧められて天狗倉山に進路をとった。\n\n結構な急登で、最後、北ルートとったので、なかなか厳しかった。でも、面白かったです。\n\nおちょぼ岩までは行きたかったけど、オットがもたないとあかんので、諦めてピストンにした。\n\n下山も、後ろから足音聞こえると落ち着かん。と言われたので、先に下山しました。\n\nオットと登るのは、気楽だけど、気をつかう。","e":"","tg":["熊野古道","馬越峠","古道","天狗倉山","三重県"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #馬越峠 (2026-02-23)","su":"https://www.instagram.com/explore/tags/馬越峠/"},{"id":"OW-919","c":"tourism","a":"owase","t":"4月11日（土）・12日（日）山歩き講座を開催します。","x":"4月11日（土）・12日（日）山歩き講座を開催します。\n山歩きを安全に楽しむための基本を学ぶ人気の講座です。\n1日目は座学でしっかり学び、2日目は実践登山で人気の熊野古道『馬越峠道』を歩きます。\n今年の干支『馬』の漢字が含まれている縁起の良い道でもあるため、いつも以上に歩く人が増えているように感じます。そんな人気の場所から熊野古道歩きをスタートしてみませんか？\n\n受付期間：2月28日～3月28日\n詳しくは、三重県立熊野古道センター公式ウェブサイトをご覧ください。\nお申し込みはお電話でお願いします。\n0597-25-2666（受付時間：9時～17時）","e":"","tg":["講座","募集","山歩き","初心者","馬越峠","干支の山"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/f き💙\n色んな大自然の景色を今まで見て来たけど、自然が作った造形が壮大で、海の美しさと怖さも兼ね備えているような凄い場所でした。\n\n岩壁に遊歩道が作られていて歩いて周遊出来るようになっています。\n\n岩や石の階段も多くて登山をしてるような、てんてんにもこの景色を見せてあげたかったので一緒に歩いたけど、高さのある階段も多くて、ほぼパパさんが抱っこしてくれたんだけど、ママも抱っこを交代しながら終着点まで往復歩きました😆\n\n往復、途中休憩しながら１時間45分くらい掛かりました✨\n\n足を踏み外せば断崖絶壁、岩肌へ打ちつけて渦を巻いて凄い音をたてている海へ落ちる😅💦\nてんてんを歩ける場所は歩かせたけど、人一人が通れる幅しかないような場所も多くて、キョロキョロあっちフラフラこっちフラフラ楽しそうに歩くてんてんが足を踏み外さないように最大の注意をはらいながら。\n\nてんてんは全然怖がる事はなくて終始楽しそうに歩いてました😊\n\n普通に歩いても段差と階段の連続で体力がまぁまぁ要るような遊歩道、途中てんてんを抱っこしながら歩いたパパママは汗だくでした😂😆\n\nスタート地点で撮ったパパさんのお顔と帰る前に撮ったお顔、疲れ果てて大笑いでした🤭\n\nでもここは行って良かった場所ベスト3に入ります❣️\n\nママは今日、お尻と脚、太ももがスッゴイ筋肉痛😂💦\nトイレで座るだけでも「あいたたたた〜💦」って声が出る（笑）\nここまで筋肉痛になるのも久しぶりです🤣\n\nてんてんも今日は疲れてるかな？って思ってたけど超元気で、朝も夜もスタスタ♪楽しそうにしっかり歩いてました🥰\n\nいつも思うんだけど、昨日も低い段差はずっと抱っこは無理なので歩いてもらってたり、雪遊びの時もピョンピョン深い雪を飛びながら歩いたりした後って、てんてんは逆に体、脚の調子が良さそうで不思議です。\n歩く時に脚がよく上がってると言うか、軽快な脚どりになるんです。\n体のバランスが整ったように見えるんだよね🤔\n\nてんてんと見る色んな景色✨\nてんてんがいるから行こう！と思える場所✨\nてんてんの記憶の中に楽しかった思い出が沢山残りますように💛🥰","e":"","tg":["コーギーてん","三重県","鬼ヶ城","是非行ってほしい","壮大な景色"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_015_onigajo.jpg","t":"鬼ヶ城（熊野市）","id":"WEB-365","u":"https://commons.wikimedia.org/wiki/File:Oniga-jo01.JPG","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #鬼ヶ城 (2026-03-23)","su":"https://www.instagram.com/explore/tags/鬼ヶ城/"},{"id":"OW-933","c":"nature","a":"owase","t":"3月22日(日)～23日⁡(月) 1泊2日","x":"3月22日(日)～23日⁡(月) 1泊2日\n⁡｢凪のあすから🌊｣ ⁡聖地巡礼旅\n⁡︎⭐️その①⭐鬼ヶ城⁡ 世界遺産⁡\n⁡⁡\n娘と息子と親子3人で聖地巡礼に\n三重県熊野市に行ってきました⁡🫡\n⁡⁡\n熊野は⁡山と海に囲まれて景色も素晴らしく⁡\n⁡とても素敵な所がたくさんあるんですね⁡！\n⁡どこを撮っても写真映えです✨⁡\n⁡⁡\n凪あすの作中に出てくる場所⁡\n⁡世界遺産の鬼ヶ城⁡👹\n⁡\n大岩壁は熊野灘に沿って遊歩道があり\n⁡ゴツゴツとした岩肌を間近で見ながら⁡\n散策することができます\n⁡\n階段を登ったり降りたり⁡人一人しか通れない⁡\n⁡ドキドキハラハラな感じもありますが\n綺麗な海の眺めは最高に素晴らしく絶景でした⁡😊⁡⁡\n⁡⁡\n⁡続く・・⁡⁡\n⁡⁡\n⁡#凪のあすから\n#聖地巡礼 ⁡\n⁡#鬼ヶ城⁡\n⁡#世界遺産\n⁡#三重県熊野市 ⁡⁡","e":"","tg":["凪のあすから","聖地巡礼","鬼ヶ城⁡","世界遺産","三重県熊野市"],"im":[],"s":"Instagram #鬼ヶ城 (2026-03-23)","su":"https://www.instagram.com/explore/tags/鬼ヶ城/"},{"id":"OW-934","c":"food","a":"owase","t":"#鬼ヶ城の投稿","x":".\n2026.03.15-17  和歌山旅行\n.\n前から行きたいと思ってた\n【ラピュタっぽい島 domain","loc":""}],"s":"Instagram #魚飛渓 (2025-05-29)","su":"https://www.instagram.com/explore/tags/魚飛渓/"},{"id":"OW-947","c":"nature","a":"kihoku","t":"【魚飛渓で、自然と、仲間と、心を育てる1日🌿】","x":"【魚飛渓で、自然と、仲間と、心を育てる1日🌿】\n\nhttps://youtu.be/KoL4fN625vE?si=BiGgaYnsdd5dwRds\n\n快晴の銚子川！\n朝早めの出発で渋滞もなくスムーズに現地へ🚌\n到着した瞬間から、目の前に広がる透明度バツグンの川にテンションMAX！\n\nでも今回は、ただ“自然で遊ぶ”んじゃなくて、“この場所で遊ばせてもらう”という気持ちを大切に🌱\n\n子ども達には、自然の豊かさと同時に、敬意を持って向き合うことを伝えました。\n\n冷たくて心地よい水、澄んだ空気、響く笑い声。\n最高のコンディションの中、午後からはシャワークライミングにもチャレンジ！\nチームで助け合いながら進むことで、仲間との絆がより深まった時間になりました✨\n\nこんな貴重な体験ができたのも、子ども達を送り出してくださる保護者の皆さまのおかげです。本当にありがとうございます☺️\n\n今日の様子はYouTubeにもアップしました📹\n今回は自然の音や子ども達の声を大切にしたくて、音楽は極力使わずに構成しました。\n川のせせらぎや足音、笑い声——現地の空気を感じてもらえるような仕上がりになっています🎒\nぜひご覧ください！","e":"","tg":["SACちびっ子教室","魚飛渓","シャワークライミング","自然体験","仲間と育つ","銚子川","子どもの育ち","アウトドア教育","感謝の気持ちを込めて","自然の音を届けたい"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""}],"s":"Instagram #魚飛渓 (2025-08-01)","su":"https://www.instagram.com/explore/tags/魚飛渓/"},{"id":"OW-948","c":"tourism","a":"owase","t":"東紀州の峠は、山深いことが実感できること、木々の緑が濃いように思うことから、私の好きなエリアです。今日はピストンで...","x":"東紀州の峠は、山深いことが実感できること、木々の緑が濃いように思うことから、私の好きなエリアです。今日はピストンで水無峠を目指します。まず種まき権兵衛の里駐車場に車を置いてスタートです。水が綺麗なことで有名な銚子川右岸の道をゆっくり進みます。キャンプ場では朝から子どもたちが川遊びをしていて気持ち良さそう。15分ほどで魚飛渓の吊橋です。そのあたりから林道栃山木組線が始まります。ここから峠までは一本道で迷うことはありません。枯葉や小枝がちらばり、林道の雰囲気は十分です。最初の登り標高300mくらいまではいい感じで踏んでいたのですが、何だか今日は足に力が入らず息もあがってきました。これはいけません。今日は調子が悪いわ…。無理せずに休憩です。その後もダメで乗れる所は乗って、あとは押しの一手、小休止の連続技です。谷から上ってくる風は爽やかで鳥の声もよく聞こえます。ずいぶん時間かかってようやく水無峠725mに着きました。紀州の山の風景を堪能して大休止です。高度感ある峠で期待どおりでした。この先は地図には載っていませんが、ダートの林道が続いていました。元気ないから行きません。下りはいつものように慎重に。林道を横切る溝の鉄格子が外れている所が沢山あるから要注意です。銚子川まで戻ると川遊びの車が多く止まっていました。この川の水は本当に美しいです。今日は思うように上れなかったのは残念ですが、夏の一日を愛車と堪能して満足です。機会あればリベンジ。\n\n走行時間　5時間15分、獲得標高　709ｍ、走行距離　27km。","e":"","tg":["サイクリング","ランドナー","三重県","峠越え","自転車旅行","自転車旅","自転車ツーリング","丸石エンペラー","ツーリングマスター","クロモリ"],"im":[],"s":"Instagram #魚飛渓 (2025-08-01)","su":"https://www.instagram.com/explore/tags/魚飛渓/"},{"id":"OW-950","c":"tourism","a":"owase","t":"My watercolor🎨","x":"My watercolor🎨\n『渓流 ☆  Mie Japan🇯🇵』\n\n三重県の魚飛渓の景色を描きました。\n透明度の高い川の水と芸術的な岩肌が織りなす景色、きっと空気も綺麗で涼しいんだろうな〜。\n行ってみたい場所が増えました。","e":"","tg":["landscapepainting","aquarelle","ภาพวาดสีน้ำ","bucin","lukisancatair","watercolor_gallery","schizzo","akvarell","ร่างกาย","sketsa"],"im":[],"s":"Instagram #魚飛渓 (2025-08-30)","su":"https://www.instagram.com/explore/tags/魚飛渓/"},{"id":"OW-951","c":"tourism","a":"kihoku","t":"#魚飛渓の投稿","x":".\n🔻銚子川\n\n日本屈指の透明度を誇り、潜らなくても川の底まで見ることができます。泳いでいる魚の姿もはっきり見え、その透明度の高さから奇跡の川と呼ばれることも。","e":"","tg":["東紀州","紀北町","銚子川","魚飛渓","熊野古道","馬越峠","キャンプinn海山","種まき権兵衛の里"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""}],"s":"Instagram #魚飛渓 (2025-09-05)","su":"https://www.instagram.com/explore/tags/魚飛渓/"},{"id":"OW-952","c":"nature","a":"kihoku","t":"〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰","x":"〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️\n三重県紀北町にある、銚子川へDayCampに行ってきました✨\n海山ICから約20分\n水質もよくてトイレやゴミステーション等、完備されてましたよ✨\n今回は暑さもあったのですぐに設営できるFILEDOORさんのタープを設営しました⛺️\nこのテントタープ遮光PUコーティングが、とってもおすすめで遮光率100%でUVカットも99.8%で暑さ対策にも最適です😊\n我が家は2.5m×2.5m【サイドシート2枚】を使ってるよ✨\n※オプションでサイドシートも販売してます。\n〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️","e":"","tg":["filedoor","daycamp","三重県紀北町","魚飛渓","銚子川"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""}],"s":"Instagram #魚飛渓 (2025-09-16)","su":"https://www.instagram.com/explore/tags/魚飛渓/"},{"id":"OW-953","c":"tourism","a":"kihoku","t":"お伽噺旅行　Part 3銚子川編(10/29)","x":"お伽噺旅行　Part 3銚子川編(10/29)\n1ヵ月以上経ってしまい💦\n今さら川の思い出も寒く感じますが😅\n記録しておこうと思います🍀\n\n\"奇跡の川\"と言われる銚子川へ\n\nまずは、種蒔き権兵衛の里へ\n権兵衛さんが種蒔きゃカラスがほじくると言う　\nこの地方の民話らしい📕\n\n実は、コギツネモカさんも、\nホリホリ大得意なのよぉ〜😚\n\n②この公園の銚子川❣️\nこの時期で誰もいないと寂しいものですね😅\n\nでも公園は快適で散歩出来ました♪\n\n⑤池で \"崖の上のポニョ\" 状態の鯉🐟\nウジョウジョ🫢\n\n⑥魚飛渓吊り橋\n⑦釣り橋のグレーチングが怖くて\nほふく前進🐾芋虫モカ🐛\nギブアップ🙌\n\n⑧銚子川上流行くも\n熊🐻出るかも看板🪧に\n少し遊んで、退散😨\n\n初めての銚子川でしたが\nやや不完全燃焼気味😕\n\n来年は、もっと探検して見つけて\n遊びましょう🩵","e":"","tg":["銚子川ブルー","銚子川で川遊び","種蒔き権兵衛の里","魚飛渓","コーギーと猫のいる暮らし","コーギー大好き","コーギーと猫とスローライフ","コーギー好きさんと繋がりたい"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""}],"s":"Instagram #魚飛渓 (2025-12-13)","su":"https://www.instagram.com/explore/tags/魚飛渓/"},{"id":"OW-954","c":"tourism","a":"kihoku","t":"【きほく発見アカデミーin魚飛渓】","x":"【きほく発見アカデミーin魚飛渓】\n\n紀北町の魅力を学ぶイベント「きほく発見アカデミー」\n第5回は魚飛渓を散策します✨\n\n魚飛渓には様々な奇岩や巨岩があり、水の流れによって侵食された部分や、形が変わっている様子を観察することができます🏞️\n\n今回のきほく発見アカデミーでは、川に沿ってE-BIKEで上流に移動しながら、川の様子を観察し、その後、魚飛生活環境保全林を散策していきます🎵\n保全林には、多種多様な植物や樹木が自生しており、その中で森林浴や、ネイチャーゲームなどをお楽しみください♪\n\n日時：2026年2月15日　12:00〜15:30\n\n料金：500円（保険料を含む）※現金のみ、当日お支払いください。\n\nルート：種まき権兵衛の里駐車場→魚飛吊橋（移動にE-BIKEを使います）→魚飛生活環境保全林一種まき権兵衛の里（終了は15：30）\n\n最後にコーヒーブレイクも予定しています。\n\n持ち物：飲み物・動ける服装・靴（保全林の中は寒くなっていますので上着や手袋も必要あればご持参ください）\n\n定員：3名\n\n申込：紀北町観光協会（TEL：0597-46-3555）\n\n※注意事項※\nE-BIKEを安全にご利用いただくため、身長150cm以下の方はお断りする場合がございます。\n\n参加前に必ず、レンタサイクル利用規約をお読みください。","e":"","tg":["きほく発見アカデミー","紀北町","魚飛渓"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_uotobikei2.jpg","t":"魚飛渓（渓流）","id":"WEB-370","u":"https://commons.wikimedia.org/wiki/File:Uotobikei02.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""}],"s":"Instagram #魚飛渓 (2026-01-30)","su":"https://www.instagram.com/explore/tags/魚飛渓/"}];
const HISTORY = [{"id":"HJ-001","era":"jomon","t":"","oc":"尾鷲周辺にも縄文遺跡あり。リアス式海岸の豊かな海産物は縄文人の食を支えた可能性。","x":""},{"id":"HJ-003","era":"yayoi","t":"","oc":"尾鷲は急峻な地形で平地が少なく、稲作には不向き。漁業・林業中心の生活が続いた理由を考える教材になる。","x":""},{"id":"HJ-008","era":"asuka","t":"","oc":"尾鷲沖は熊野灘の荒波で知られ、古来より航海の難所。遣唐使船も熊野灘を通った可能性がある。","x":""},{"id":"HJ-009","era":"nara","t":"","oc":"大仏建立に使われた木材の一部は紀伊半島から運ばれた可能性。尾鷲ヒノキの良材は古くから知られていた。","x":""},{"id":"HJ-012","era":"kamakura","t":"","oc":"九鬼水軍（HJ-047）の海戦能力は元寇の時代にも熊野水軍として活躍。水軍の伝統が戦国時代に花開く前史。","x":""},{"id":"HJ-014","era":"muromachi","t":"","oc":"京都の文化が地方に広がる過程で、熊野地方にも影響。熊野古道（HJ-048）を通じた文化伝播のルート。","x":""},{"id":"HJ-015","era":"sengoku","t":"","oc":"信長と九鬼嘉隆の関係（HJ-047）。信長が九鬼嘉隆を「日本一の水軍の将」と称えたエピソード。","x":""},{"id":"HJ-016","era":"sengoku","t":"","oc":"九鬼嘉隆の鉄甲船（HJ-047）は鉄砲対策の技術革新。鉄砲が海戦にも影響を与えた。","x":""},{"id":"HJ-017","era":"edo","t":"","oc":"尾鷲の林業（HJ-049）も持続可能な森林管理（密植多間伐）という江戸時代からの循環型技術。速水林業のFSC認証（OW-023）。","x":""},{"id":"HJ-018","era":"edo","t":"","oc":"尾鷲にも寺子屋があり、林業・漁業に必要な読み書き計算が教えられていた。紀州藩の教育政策。","x":""},{"id":"HJ-019","era":"edo","t":"","oc":"紀州藩の大名行列は紀伊半島を通過。尾鷲は海路の要所で、千石船の寄港地として栄えた（OW-010）。","x":""},{"id":"HJ-020","era":"edo","t":"","oc":"尾鷲は紀伊半島の海岸沿いに位置し、海上交通の要所。密貿易の可能性や、漂着外国人の記録も。","x":""},{"id":"HJ-022","era":"edo","t":"","oc":"尾鷲も台風・津波の被害を繰り返し受けてきた災害都市（OW-097）。災害と復興の歴史は尾鷲と江戸で共通のテーマ。","x":""},{"id":"HJ-023","era":"azuchi","t":"","oc":"信長に仕えた九鬼嘉隆（HJ-047）は安土城に招かれ信長から盃を受けた。","x":""},{"id":"HJ-024","era":"azuchi","t":"","oc":"秀吉の紀伊国再編で尾鷲は北牟婁郡に移管（OW-009）。秀吉の政策が尾鷲の行政区分を決めた。","x":""},{"id":"HJ-025","era":"edo","t":"","oc":"紀州藩の統治下で尾鷲は260年の安定を享受。林業・漁業が発展した背景（OW-008,010）。","x":""},{"id":"HJ-026","era":"meiji","t":"","oc":"尾鷲も明治の変化を経験。寺子屋から近代学校への移行。林業の近代化（西洋式測量技術の導入）。","x":""},{"id":"HJ-027","era":"meiji","t":"","oc":"尾鷲の林業も明治期に近代化。木材を海路で大都市に運ぶ仕組みは製糸場の生糸輸出と同じ殖産興業の流れ。","x":""},{"id":"HJ-029","era":"showa_pre","t":"","oc":"1944年東南海地震（HJ-050）は戦時下で発生し被害が秘密にされた。戦争が災害対応すら歪めた事例。","x":""},{"id":"HJ-030","era":"showa_pre","t":"","oc":"1944年東南海地震（HJ-050）は終戦の8ヶ月前に発生。戦争と自然災害の二重苦を経験した地域。","x":""},{"id":"HJ-031","era":"showa_post","t":"","oc":"尾鷲も戦後復興を経験。林業・漁業の再建。1944年東南海地震（HJ-050）からの二重復興。","x":""},{"id":"HJ-032","era":"showa_post","t":"","oc":"新幹線は東京-大阪間。尾鷲はまだ高速道路もつながっていない時期。都市と地方の格差が拡大した側面も。","x":""},{"id":"HJ-033","era":"showa_post","t":"","oc":"四日市ぜんそくは三重県四日市市で発生。同じ三重県として身近に感じられるテーマ。尾鷲の自然環境を守る意識との関連。","x":""},{"id":"HJ-034","era":"heisei","t":"","oc":"尾鷲は南海トラフ地震で最大津波高17m想定。片田教授が尾鷲でも防災教育を監修（OW-082）。向井小学校は津波避難場所に指定（OW-058）。","x":""},{"id":"HJ-039","era":"kamakura","t":"","oc":"九鬼氏の祖は鎌倉時代に既に志摩国に勢力を拡大していた（OW-007）。武士の時代の始まりと九鬼氏の台頭。","x":""},{"id":"HJ-040","era":"muromachi","t":"","oc":"熊野古道（HJ-048）の参詣が庶民にも広まった時代。「蟻の熊野詣」は室町時代から。","x":""},{"id":"HJ-042","era":"edo","t":"","oc":"黒船来航の情報は熊野灘の海岸にも伝わり、沿岸防備が議論された。","x":""},{"id":"HJ-043","era":"meiji","t":"","oc":"尾鷲は紀州藩から三重県に編入。行政区分の変更が地域アイデンティティに与えた影響。","x":""},{"id":"HJ-045","era":"taisho","t":"","oc":"関東大震災の復興で尾鷲ヒノキが注目された。尾鷲ヒノキの柱で建てた家が地震に強いと評判に。","x":""},{"id":"HJ-046","era":"sengoku","t":"","oc":"九鬼町は尾鷲市の中心的な歴史遺産（OW-007,080,094）。迷路のような路地は敵の侵入を防ぐ防衛構造の名残。九鬼嘉隆の生涯は尾鷲の誇り。","x":""},{"id":"HJ-047","era":"heian","t":"","oc":"馬越峠・八鬼山越えは尾鷲市内の世界遺産（OW-006,037）。石畳は尾鷲の豪雨に耐える設計。巡礼者の休息地・宿場としての尾鷲の歴史。","x":""},{"id":"HJ-048","era":"edo","t":"","oc":"尾鷲林業は尾鷲のアイデンティティそのもの（OW-008,015-018）。速水林業（OW-023）。向井小学校周辺の山林。","x":""},{"id":"HJ-049","era":"showa_pre","t":"","oc":"震源が尾鷲沖20km。尾鷲市の津波被害記録（OW-081）。南海トラフ地震への備え（OW-058,082,097）。向井小学校の防災教育の原点。","x":""},{"id":"HJ-050","era":"jomon","t":"","oc":"尾鷲の歴史（九鬼水軍・林業・災害）を4つの視点で分析する地域学習。","x":""},{"id":"HJ-051","era":"jomon","t":"","oc":"尾鷲の歴史を「比較」の軸にできる。「尾鷲の林業の400年」を江戸→明治→戦後→現代で比較するローカル通史。","x":""},{"id":"HJ-052","era":"jomon","t":"","oc":"「なぜ尾鷲に水軍が生まれたのか？」「なぜ尾鷲のヒノキは品質が高いのか？」地域の歴史を「なぜ」で掘り下げる。","x":""},{"id":"HJ-053","era":"jomon","t":"","oc":"「尾鷲の歴史が今の尾鷲にどうつながっているか」を考える。九鬼水軍→漁業の伝統、林業400年→FSC認証、東南海地震→防災教育。","x":""},{"id":"HJ-054","era":"jomon","t":"","oc":"尾鷲の歴史資料（九鬼氏家譜・紀州藩の記録・東南海地震の証言）を実際に読む地域学習。","x":""}];

// ═══ THEME ═══
function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('owase-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
if (localStorage.getItem('owase-theme') === 'dark') document.body.classList.add('dark');

// ═══ AREA FILTER ═══
function getFilteredByArea() {
  if (activeArea === 'all') return DATA;
  return DATA.filter(r => r.a === activeArea);
}

function renderAreaBar() {
  const el = document.getElementById('areaBar');
  let html = '';
  AREA_ORDER.forEach(a => {
    const m = AREA_META[a];
    const cnt = a === 'all' ? DATA.length : DATA.filter(r => r.a === a).length;
    if (cnt === 0 && a !== 'all') return;
    html += `<button class="area-tab ${activeArea===a?'active':''}" onclick="setArea('${a}')"><i class="${m.icon}" style="font-size:12px"></i> ${m.n} <span class="area-cnt">${cnt}</span></button>`;
  });
  el.innerHTML = html;
}

function setArea(a) {
  activeArea = a;
  activeCat = 'all';
  renderAreaBar();
  renderCatBar();
  renderContent();
  // Update hero title/subtitle
  const titles = {all: ['尾鷲郷土資料館','三重県尾鷲市 — 海と山と雨のまちの記憶'], owase: ['尾鷲郷土資料館','三重県尾鷲市 — 海と山と雨のまちの記憶'], kihoku: ['紀北町郷土資料館','三重県北牟婁郡紀北町 — 清流と峠道のまち'], mukai: ['向井地区資料館','尾鷲市向井 — 海と山に挟まれた小さな集落']};
  const [t, s] = titles[a] || titles.all;
  document.querySelector('.hero-title').textContent = t;
  document.querySelector('.hero-sub').textContent = s;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ═══ CATEGORY BAR ═══
function renderCatBar() {
  const el = document.getElementById('catBar');
  const areaData = getFilteredByArea();
  const counts = {};
  areaData.forEach(r => counts[r.c] = (counts[r.c] || 0) + 1);
  let html = `<button class="cat-pill ${activeCat==='all'?'active':''}" onclick="setCat('all')"><i class="fa-solid fa-grip"></i> すべて <span class="cnt">${areaData.length}</span></button>`;
  CAT_ORDER.forEach(c => {
    const m = CAT_META[c];
    if (!m || !counts[c]) return;
    html += `<button class="cat-pill ${activeCat===c?'active':''}" onclick="setCat('${c}')" style="${activeCat===c?`background:${m.cl};border-color:${m.cl}`:''}"><i class="${m.i}" style="font-size:12px"></i> ${m.n} <span class="cnt">${counts[c]}</span></button>`;
  });
  // History connection tab
  if (HISTORY.length) {
    html += `<button class="cat-pill ${activeCat==='history-connection'?'active':''}" onclick="setCat('history-connection')" style="${activeCat==='history-connection'?'background:#8B7355;border-color:#8B7355':''}"><i class="fa-solid fa-link" style="font-size:12px"></i> 歴史接続 <span class="cnt">${HISTORY.length}</span></button>`;
  }
  // Map view
  html += `<button class="cat-pill ${activeCat==='map'?'active':''}" onclick="setCat('map')" style="${activeCat==='map'?'background:#5B7DB1;border-color:#5B7DB1':''}"><i class="fa-solid fa-map-location-dot" style="font-size:12px"></i> 地図</button>`;
  el.innerHTML = html;
}

function setCat(c) {
  activeCat = c;
  renderCatBar();
  renderContent();
  window.scrollTo({top: document.querySelector('.content').offsetTop - 120, behavior: 'smooth'});
}

// ═══ SEARCH ═══
function handleSearch(q) {
  searchQuery = q.toLowerCase();
  renderContent();
}

function matchSearch(r) {
  if (!searchQuery) return true;
  const hay = (r.t + ' ' + r.x + ' ' + (r.tg||[]).join(' ') + ' ' + r.c).toLowerCase();
  return searchQuery.split(/\s+/).every(w => hay.includes(w));
}

// ═══ RENDER ═══
function renderContent() {

// Location detection from tags/title
const LOC_NAMES = ['九鬼','馬越峠','三木里','賀田','弁財島','須賀利','梶賀','曽根','天狗倉山','便石山','八鬼山','向井','三木浦','古江','早田','大曽根浦','行野浦','中村山','熊野古道'];
function detectLocation(r) {
  const hay = r.t + ' ' + (r.tg||[]).join(' ');
  // Check image location first
  if (r.im.length && r.im[0].loc) return r.im[0].loc;
  for (const loc of LOC_NAMES) {
    if (hay.includes(loc)) return loc;
  }
  return '';
}

function renderCard(r) {
  const m = CAT_META[r.c] || {n:'?',cl:'#888'};
  const imgHtml = r.im.length
    ? `<img class="card-img" loading="lazy" data-src="${r.im[0].p}" alt="${r.t}" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder><i class=\'${m.i}\'></i></div>'">`
    : `<div class="card-img-placeholder"><i class="${m.i}"></i></div>`;
  const imgCount = r.im.length > 1 ? `<span style="position:absolute;top:8px;right:8px;font-size:11px;background:rgba(0,0,0,0.5);color:#fff;padding:1px 7px;border-radius:4px"><i class="fa-solid fa-images" style="margin-right:3px"></i>${r.im.length}</span>` : '';
  const loc = detectLocation(r);
  const locBadge = loc ? `<span style="position:absolute;bottom:8px;left:8px;font-size:10.5px;background:rgba(0,0,0,0.55);color:#fff;padding:2px 8px;border-radius:4px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:3px"><i class="fa-solid fa-map-pin" style="font-size:9px"></i>${loc}</span>` : '';
  const excerpt = r.x.slice(0, 120) + (r.x.length > 120 ? '...' : '');
  const tags = (r.tg || []).slice(0, 4).map(t => `<span class="card-tag">${t}</span>`).join('');
  return `<div class="card" onclick="openModal('${r.id}')">
    <div style="position:relative">${imgHtml}${imgCount}${locBadge}</div>
    <div class="card-body">
      <span class="card-cat" style="background:${m.cl}">${m.n}</span>
      <div class="card-title">${r.t}</div>
      <div class="card-excerpt">${excerpt}</div>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    </div>
  </div>`;
}

// ═══ MODAL ═══
function openModal(id) {
  const r = DATA.find(d => d.id === id);
  if (!r) return;
  const m = CAT_META[r.c] || {n:'?',cl:'#888'};

  // Gallery
  modalImgs = r.im;
  modalImgIdx = 0;
  renderGallery();

  // Body
  let bodyHtml = `
    <span class="modal-cat-badge" style="background:${m.cl}">${m.n}</span>
    <div class="modal-title">${r.t}</div>
    <div class="modal-content">${r.x}</div>
  `;

  if (r.e) {
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title"><i class="fa-solid fa-graduation-cap"></i> 教育活用</div>
      <div class="modal-edu">${r.e}</div>
    </div>`;
  }

  if (r.tg && r.tg.length) {
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title"><i class="fa-solid fa-tags"></i> タグ</div>
      <div class="modal-tags">${r.tg.map(t => `<span class="modal-tag">${t}</span>`).join('')}</div>
    </div>`;
  }

  // Source links section
  const sourceLinks = [];
  if (r.su) sourceLinks.push({label: '記事ソース', url: r.su});
  // Image source links (unique)
  const seenUrls = new Set(r.su ? [r.su] : []);
  (r.im || []).forEach(img => {
    if (img.u && !seenUrls.has(img.u)) {
      seenUrls.add(img.u);
      const domain = img.u.split('/')[2] || '';
      const label = domain.includes('wikimedia') ? 'Wikimedia' : domain.includes('mie-eetoko') ? '三重フォトギャラリー' : domain.includes('flickr') || domain.includes('openverse') ? 'Flickr' : domain.includes('owase.lg.jp') ? '尾鷲市公式' : domain.includes('unsplash') ? 'Unsplash' : domain.includes('youtube') ? 'YouTube' : '外部リンク';
      sourceLinks.push({label: `${label}: ${img.t || '画像'}`, url: img.u});
    }
  });
  if (sourceLinks.length || r.s) {
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title"><i class="fa-solid fa-arrow-up-right-from-square"></i> ソース・リンク</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        ${r.s ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:4px"><i class="fa-solid fa-quote-left" style="margin-right:4px;opacity:0.5"></i>${r.s}</div>` : ''}
        ${sourceLinks.map(l => `<a href="${l.url}" target="_blank" rel="noopener" style="font-size:13px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:5px;padding:4px 0;transition:opacity .2s" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px"></i> ${l.label}</a>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderGallery() {
  const el = document.getElementById('modalGallery');
  if (!modalImgs.length) {
    el.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--surface-dim)"><i class="fa-solid fa-image" style="font-size:3rem;color:var(--text-dim);opacity:0.2"></i></div>';
    return;
  }
  const img = modalImgs[modalImgIdx];
  let html = `<img src="${img.p}" alt="${img.t || ''}" style="width:100%;height:100%;object-fit:contain">`;
  if (modalImgs.length > 1) {
    html += `<button class="modal-gallery-nav left" onclick="event.stopPropagation();galleryNav(-1)"><i class="fa-solid fa-chevron-left"></i></button>`;
    html += `<button class="modal-gallery-nav right" onclick="event.stopPropagation();galleryNav(1)"><i class="fa-solid fa-chevron-right"></i></button>`;
    html += `<div class="modal-gallery-counter">${modalImgIdx + 1} / ${modalImgs.length}</div>`;
  }
  // Caption + source link
  let captionHtml = '';
  if (img.t) captionHtml += img.t;
  if (img.u) {
    captionHtml += img.t ? ' ' : '';
    captionHtml += `<a href="${img.u}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:rgba(255,255,255,0.9);text-decoration:underline"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:9px"></i></a>`;
  }
  if (img.li) captionHtml += `<span style="opacity:0.6;margin-left:6px;font-size:10px">${img.li}</span>`;
  if (captionHtml) {
    html += `<div style="position:absolute;bottom:8px;left:12px;right:60px;font-size:12px;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:4px;backdrop-filter:blur(4px)">${captionHtml}</div>`;
  }
  el.innerHTML = html;
}

function galleryNav(dir) {
  modalImgIdx = (modalImgIdx + dir + modalImgs.length) % modalImgs.length;
  renderGallery();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

let mapInstance = null;

function matchLocation(r) {
  const hay = (r.t + ' ' + (r.tg||[]).join(' ')).toLowerCase();
  for (const loc of LOCATIONS) {
    for (const kw of loc.kw) {
      if (hay.includes(kw.toLowerCase())) return loc;
    }
  }
  return null;
}

function renderMapView(el) {
  document.getElementById('resultCount').textContent = '';

  el.innerHTML = `
    <div class="room-header" style="margin-top:0">
      <div class="room-icon" style="background:#5B7DB1"><i class="fa-solid fa-map-location-dot"></i></div>
      <div class="room-info"><h2>尾鷲マップ</h2><p>地名をクリックすると関連記事が表示されます</p></div>
    </div>
    <div style="position:relative">
      <div id="leafletMap" class="map-container"></div>
      <div class="map-sidebar" id="mapSidebar" style="display:none"></div>
    </div>
  `;

  // Destroy old map
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }

  // Create map
  const map = L.map('leafletMap', {zoomControl: true}).setView([34.05, 136.18], 12);
  mapInstance = map;

  // Tile layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  // Group records by location
  const locGroups = {};
  DATA.forEach(r => {
    const loc = matchLocation(r);
    if (loc) {
      const key = loc.name;
      if (!locGroups[key]) locGroups[key] = {loc, records: []};
      locGroups[key].records.push(r);
    }
  });

  // Add markers
  const markers = [];
  Object.values(locGroups).forEach(g => {
    const cnt = g.records.length;
    const marker = L.marker([g.loc.lat, g.loc.lng]).addTo(map);
    marker.bindTooltip(`${g.loc.name} (${cnt})`, {direction: 'top', offset: [0, -8]});
    marker.on('click', () => showMapSidebar(g.loc.name, g.records));
    markers.push(marker);
  });

  // Fit bounds
  if (markers.length) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
  }

  // Show summary
  const totalMapped = Object.values(locGroups).reduce((s,g) => s + g.records.length, 0);
  const unmapped = DATA.length - totalMapped;
}

function showConciergeResponse(query, preset) {
  const el = document.getElementById('conciergeResponse');

  // Show typing
  el.innerHTML = '<div class="concierge-response"><div class="concierge-typing"><span></span><span></span><span></span></div></div>';

  setTimeout(() => {
    let results = [];
    let answerText = '';

    if (preset) {
      answerText = preset.answer;
      if (preset.cats) {
        results = DATA.filter(r => preset.cats.includes(r.c));
      } else {
        results = [...DATA];
      }
      if (preset.sort === 'random') {
        // Seeded by date for "today's" picks
        const seed = new Date().toDateString();
        results = shuffleSeeded(results, seed);
      } else if (preset.sort === 'edu') {
        results = results.filter(r => r.e).sort((a,b) => b.e.length - a.e.length);
      }
    } else {
      // Free-form query: score records
      const scored = scoreRecords(query);
      results = scored.map(s => s.r);
      const topCats = getTopCats(scored.slice(0, 10));
      const n = scored.length;
      if (n === 0) {
        answerText = `「${query}」に一致する記事は見つかりませんでした。別のキーワードで試してみてください。`;
      } else if (n <= 5) {
        answerText = `「<strong>${query}</strong>」に関連する記事が<strong>${n}件</strong>見つかりました。`;
      } else {
        answerText = `「<strong>${query}</strong>」に関連する記事が<strong>${n}件</strong>見つかりました。${topCats}の分野に多くヒットしています。`;
      }
    }

    const picks = results.slice(0, 6);
    let html = '<div class="concierge-response">';
    html += `<div class="concierge-answer">${answerText}</div>`;

    if (picks.length) {
      html += '<div class="concierge-picks">';
      picks.forEach(r => {
        const m = CAT_META[r.c] || {n:'?',cl:'#888'};
        const imgHtml = r.im.length ? `<img class="concierge-pick-img" src="${r.im[0].p}" alt="">` : `<div class="concierge-pick-img" style="display:flex;align-items:center;justify-content:center"><i class="${m.i}" style="color:var(--text-dim);opacity:0.3"></i></div>`;
        const excerpt = r.x.slice(0, 80) + (r.x.length > 80 ? '...' : '');
        html += `<div class="concierge-pick" onclick="openModal('${r.id}')">
          ${imgHtml}
          <div class="concierge-pick-body">
            <span class="concierge-pick-cat" style="background:${m.cl}">${m.n}</span>
            <div class="concierge-pick-title">${r.t}</div>
            <div class="concierge-pick-excerpt">${excerpt}</div>
          </div>
        </div>`;
      });
      html += '</div>';
    }

    if (results.length > 6) {
      html += `<div style="text-align:center;margin-top:12px"><button onclick="searchFromConcierge()" style="padding:6px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s" onmouseover="this.style.background='var(--accent-bg)'" onmouseout="this.style.background='var(--surface)'">${results.length}件すべて見る <i class="fa-solid fa-arrow-right" style="font-size:11px"></i></button></div>`;
    }

    html += '</div>';
    el.innerHTML = html;
  }, 600);
}

function scoreRecords(query) {
  const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 0);
  const catBoost = new Set();
  words.forEach(w => {
    Object.entries(KEYWORD_MAP).forEach(([k, cats]) => {
      if (w.includes(k.toLowerCase()) || k.toLowerCase().includes(w)) {
        cats.forEach(c => catBoost.add(c));
      }
    });
  });

  const scored = [];
  DATA.forEach(r => {
    let score = 0;
    const hay = (r.t + ' ' + r.x + ' ' + (r.tg||[]).join(' ') + ' ' + r.e).toLowerCase();

    words.forEach(w => {
      // Title match (high weight)
      if (r.t.toLowerCase().includes(w)) score += 10;
      // Tag match
      if ((r.tg||[]).some(t => t.toLowerCase().includes(w))) score += 7;
      // Content match
      const contentMatches = (hay.match(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi')) || []).length;
      score += Math.min(contentMatches * 2, 10);
      // Edu use match
      if (r.e.toLowerCase().includes(w)) score += 3;
    });

    // Category boost from keyword map
    if (catBoost.has(r.c)) score += 5;

    // Bonus for having images
    if (r.im.length > 0) score += 1;

    if (score > 0) scored.push({r, score});
  });

  scored.sort((a,b) => b.score - a.score);
  return scored;
}

function getTopCats(scored) {
  const catCount = {};
  scored.forEach(s => catCount[s.r.c] = (catCount[s.r.c]||0) + 1);
  const top = Object.entries(catCount).sort((a,b) => b[1] - a[1]).slice(0, 2);
  return top.map(([c]) => `<strong>${(CAT_META[c]||{n:c}).n}</strong>`).join('・');
}

function shuffleSeeded(arr, seed) {
  const a = [...arr];
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  for (let i = a.length - 1; i > 0; i--) {
    h = (h * 16807 + 1) & 0x7fffffff;
    const j = h % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ═══ LAZY LOAD ═══
function lazyLoad() {
  const imgs = document.querySelectorAll('img[data-src]');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.src = e.target.dataset.src;
        e.target.removeAttribute('data-src');
        obs.unobserve(e.target);
      }
    });
  }, {rootMargin: '200px'});
  imgs.forEach(img => obs.observe(img));
}
