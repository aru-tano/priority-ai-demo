\n\nまた、この一年は自分にできることから一つひとつ形にしていければと思います。\n\n三木里の皆さま、三木里が好きな方、そしていつも応援してくださる皆さま、本年もどうぞよろしくお願いいたします！\n\nアソビに来てくれるのを、全力でお待ちしています！\n\n↓個人のアカウントもご紹介🫡\n\n黒川のアカウント\n山田のアカウント","e":"","tg":["地域おこし協力隊","尾鷲市","三重県","三木里","三木里海岸"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_045_mikisato.jpg","t":"Mikisato","id":"WEB-229","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_046_mikisato.jpg","t":"Mikisato","id":"WEB-230","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_047_mikisato.jpg","t":"Mikisato","id":"WEB-231","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"}],"s":"Instagram #三木里 (2026-01-04)","su":"https://www.instagram.com/explore/tags/三木里/"},{"id":"OW-329","c":"food","a":"owase","t":"🐴2026030","x":"🐴2026🍜030\n\n寒い日は、あのアッツアツなの食べたなるわ😁\n\n🏬らーめんきくや🍜\n\nそう…ニンニクの効いたアッツアツスープのこれな\n\n🍜ニンタマ辛メンスタミナ塩味　900円\n\n辛さ控えめ、ネギ抜き、麺はだいぶ硬めで注文📢\n\n卵の白と黄色がミンチを包み込んだなんとも旨そうなビジュ🤩\n\nニンニクの効いたちょい辛で優しい塩味のスープはやっぱり旨い😋\n\n卵の下から麺を出してくると、その時点で卵やミンチがええ感じに絡みついてくるんさ🤭\n\nアッツアツのスープと唐辛子🌶️のせいもあり汗がじんわりと…\nやっぱ途中で上着脱いだわいな☺️\n\n※定休日が月金→月木に変更になっとるので注意⚠️","e":"","tg":["ニンタマ辛メンスタミナ塩味","らーめんきくや","三木里","三重ラーメン","ラーメン"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_045_mikisato.jpg","t":"Mikisato","id":"WEB-229","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_046_mikisato.jpg","t":"Mikisato","id":"WEB-230","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_047_mikisato.jpg","t":"Mikisato","id":"WEB-231","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"}],"s":"Instagram #三木里 (2026-01-26)","su":"https://www.instagram.com/explore/tags/三木里/"},{"id":"OW-330","c":"nature","a":"owase","t":"空き家のご相談承ります🏠","x":"空き家のご相談承ります🏠\n\n最近、町を歩いていると「ここ、誰かが住んだら絶対楽しいだろうな〜！」という素敵な空き家をよく見かけます。\n\nでも、お家の持ち主さんにとっては、\n「いつかは片付けなきゃ…」\n「でも、知らない人に貸すのは少し不安」\nという、大切だからこその悩みもあると思います。\n\n私たちは、そんな「大切なお家」を、「三木里で暮らしたい！」という新しい誰かへつなぐお手伝いをします🤝\n\n「海まで徒歩5分で、毎日釣りがしたい！」\n「古民家をDIYして、自分だけのアトリエを作りたい」\nそんな移住希望者さんの夢と💪\n\n「先祖代々の家を、誰かに守ってほしい」\n「町に活気が戻ったら嬉しいな」\nそんな地元の方の想い🙏\n\n是非、その「夢」や「想い」を気軽にお聞かせください！！\n\n三木里の「空き家」を、一緒にワクワクする未来へ変えていきませんか？\n\n📩 ご相談・お問い合わせはDMまでお気軽に！\n\n「まだ何も決まってないけど…」という方も大歓迎。\n\n三木里はいつでもお待ちしております。","e":"","tg":["三木里","尾鷲","地域おこし協力隊","空き家相談","空き家バンク"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_045_mikisato.jpg","t":"Mikisato","id":"WEB-229","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_046_mikisato.jpg","t":"Mikisato","id":"WEB-230","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_047_mikisato.jpg","t":"Mikisato","id":"WEB-231","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"}],"s":"Instagram #三木里 (2026-01-28)","su":"https://www.instagram.com/explore/tags/三木里/"},{"id":"OW-331","c":"nature","a":"owase","t":"シェフの料理の原典をお聞きした。子供の時に渋谷で働く母を鎌倉で待つ間、喜んでくれる顔を思いながら作ったごはん。","x":"シェフの料理の原典をお聞きした。子供の時に渋谷で働く母を鎌倉で待つ間、喜んでくれる顔を思いながら作ったごはん。\n　きっとだからシェフのお料理はワクワク、ドキドキ、斬新だけどほっとして。\n　食べてる人の喜んでくれる笑顔を見ること、料理にこめた想いを伝えること、それが何よりも楽しいという。\n　見た目、アオムシかとびくっとした一品はリーキのリゾット。🦑一匹？と思ったら葉玉ねぎ一本でイカはソースになってたり。\n　尾鷲の海老好きの私のために、もちろん海老の一皿も。\n　小さな男の子がお台所で目を輝かせて、創作料理を作っている姿を空想しながら美味しくいただきました。\n　シェフの夢が叶いますように！","e":"","tg":["alralenti","三木里","新スペイン料理"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_045_mikisato.jpg","t":"Mikisato","id":"WEB-229","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_046_mikisato.jpg","t":"Mikisato","id":"WEB-230","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_047_mikisato.jpg","t":"Mikisato","id":"WEB-231","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"}],"s":"Instagram #三木里 (2026-01-30)","su":"https://www.instagram.com/explore/tags/三木里/"},{"id":"OW-332","c":"food","a":"owase","t":"【熊野古道歩き　10日目】","x":"【熊野古道歩き　10日目】\n尾鷲（尾鷲市）→三木里（尾鷲市）\n\n朝の尾鷲の空気が気持ちいい。天気は快晴。海側から吹いてくる潮風を感じながら歩き出す。今から越える八鬼山もキレイに見える。馬越峠越えとヤーヤ祭の筋肉痛も気持ちよく感じる。練りで強打した膝と馬越峠で捻った足首はちょっとだけ痛いけど（笑）きのうの夜の出来事は旅としてちょっと派手過ぎた。きょうも淡々と古道を歩く。\n尾鷲の街の「やのはま道」は入り組んだ路地を進む。途中、あまりの入り組み方に戸惑っていたら地元の人が「熊野古道ですか？」と助けてくれた。これが旅のありがたみ。しばらく歩いて、八鬼山峠の登山口へ。きのうの馬越峠のようにドドーン！とした入り口ではなく、とても簡素。登山口から見える道が思ったよりも平坦で、馬越峠より楽だろうと思いながら入山。序盤はしばらく緩い登り。道標の1/66という数字に驚きながらも、なだらかに長く続くタイプなら大丈夫だろうと、このときは思っていた。\nきのう同様に音声ガイドを聞きながら歩くと「西国いちの難所」という案内をされている。そんなにきついのか…？と思っていたところ、「七曲り」にたどり着く。目の前に立ちはだかる壁のような石段。しかもこれが何重にもつづら折りになっている。「七曲り」とは七回曲がるわけではなく、「なんども曲がる」ことの例えらしい。音声ガイドいわく「いくつカーブがあるか、数えてみてはいかがでしょうか」。歩き始めてすぐにわかる、そんな余裕はない。考えることもなく、ひたすらに足を動かす。うっすらと暗い森の中で、ゼエゼエと息を立てて登っていく。ひざに手をつきながら、バランスを崩さないように、慎重かつ大胆に…。\n音声ガイドがもう一つ紹介していたのが、道中のお地蔵さん。実はこのお地蔵さんたち、舌を出している。過酷な七曲りの途中で、お地蔵さんが笑わせにきてくれていると思うとちょっと和む。あまりにキツくて、お地蔵さんに「ありがとう！」と声をかけながら登っていく（本当に）。声を出すと元気になるものだ。\nこの八鬼山越えは峠を2つ越える。九木峠と八鬼山峠。七曲りをクリアして頂上に着いたと思ったら、こちらは九木峠で、もう少し登らねばならない。この、終わりだと思ったら、まだ続きがあるというパターン、心身ともに疲れさせてくる…。ちなみに、この九木峠から東に進むと、九鬼水軍の街、九鬼に行ける。峠が「九木」で街が「九鬼」なのはなぜなのだろう。縁起が〜…とかそんな理由で当て字を変えたのだろうか？\n九木峠からも舌出し地蔵の皆さんに見守られながら、八鬼山の頂上を目指す。頂上付近に広場があるらしく、そこでお昼にしよう。\n深い森に、広場のほうから光が差し込んでいる。本当にRPGのマップのような森の出口。歩みを進めると一気に視界がひらける。思わず声を上げてしまった。水平線まで広がる熊野灘。雲一つない青空。複雑な海岸線をなすリアス海岸。まさに絶景だ。八鬼山峠の山頂は標高およそ630m。ゼロから汗だくになって登ってきてからの、この景色は格別。思い切りおにぎりを頬張る！\n結局30分も頂上にいてしまった。あまりに美しい景色と、居心地のよい暖かい日差しで、ぜんぜん立ち上がれなかった。意を決して立ち上がる。ここからは下り。\n最近思ったのだが、比較的、足腰は強いのかもしれない。先日も15㌔歩いた翌日にまた15㌔歩いても、軽い筋肉痛で済んだ。ただ、心肺が弱いのか、いかんせんすぐに息が切れる。昔から運動は苦手。ただ、一度始めたら最後までやりきらないと気が済まない。古道歩きには向いているのかもしれない（笑）\n登りよりは息が切れない下り道で快調に飛ばしていると、筋肉でも関節でもないところが痛み始める。足の裏。親指と薬指の付け根。身体の主要部はぜんぜん動くのに、皮が痛み出す。人は歩き続けると足の皮が痛むんですね。そこをかばいながら、他の部分を地面につこうとすると、バランスを崩しかける。危ない危ない。それでも、登りの急坂よりは楽。道標の番号がどんどん66に近づいていくのもあって、気持ちも軽快に折りきることができた。今回もクマに会わなくて良かった。\n八鬼山峠を越えると、三木里の街だ。リアス海岸の湾内にきれいに弧を描いた海岸が広がっている。山の空気から潮が香る海の空気に変わる。頂上ではおにぎり1個しか食べてないし、まだ列車まで時間があるので、何か食べて海辺でノンビリしたいところだが…コンビニが一軒もない。喫茶店も閉まっている。食べ物を売っている店を求めて、集落をうろうろ…。小さな商店を見つけて、みかんとカレーパンを入手。浜辺で海を眺めて、汗だくになったジャンパーを干しながら、みかんを食べる。好きに生きている感じがして、こういう時間がたまらなく好きです。\nと、いうことで今回は三木里駅で終了！なんだかんだ、新宮まであと50㌔くらい。けっこう来たなぁ。次回へ続く！","e":"","tg":["熊野古道","熊野古道伊勢路","尾鷲","三木里","八鬼山越え"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/unsplash_001_kumano_kodo_forest_path.jpg","t":"Kumano Kodo forest path","id":"WEB-279","u":"https://unsplash.com/s/photos/kumano-kodo","li":"Unsplash License (free for commercial use)","loc":"尾鷲市/熊野古道"}],"s":"Instagram #三木里 (2026-02-07)","su":"https://www.instagram.com/explore/tags/三木里/"},{"id":"OW-333","c":"nature","a":"owase","t":"尾鷲市三木里町の法念寺さんのミモザです。","x":"尾鷲市三木里町の法念寺さんのミモザです。\n\n去年、インスタで拝見して以来\n『来年絶対観に行こう!』.\n.\nと待つこと1年\n\nまだ早いかなぁ…と思いつつ\n今日の温かめの青空に\n我慢出来ずに訪れました♫.\n.\n満開には　ちょっと早かったかなぁ　って\n感じでしたが\n\n思ったより迫力あるミモザと\n梅の良い香り\n\n高台から見える三木里の町がとても綺麗でした。\n\nまた、満開の頃\nゆっくり伺いますね🙏.\n.","e":"","tg":["mie_prefecture","owase","三重県","三木里","法念寺"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_007_Mikisato_jetée.jpg","t":"Mikisato jetée.jpg","id":"WEB-293","u":"https://commons.wikimedia.org/wiki/File:Mikisato_jet%C3%A9e.jpg","li":"CC BY-SA 3.0","loc":"尾鷲市三木里町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owa ど。ピッコロ劇団とは、2016年『天空の恋〜谷崎と猫と三人の女〜』、2022年『脚気にしやがれ！～近代日本最悪の病「脚気」奮闘記～』に続き3度目の創作となる。\n\n〜〜〜〜〜\nSince1994 全国初の県立劇団\n日本が誇る演出家俳優 #岩松了\n劇団代表率いる\n\n※実験的な公演です!\nオフシアター Vol.42\n「#おかしな二人〜女性版〜」\n\n作 ニール サイモン\nNeil Simon 「The OddCouple (Female Version)」\n訳: 酒井洋子\n(ハヤカワ演劇文庫「ニール・サイモン戯曲集III」)\n\n入団4年目✨\n演出初挑戦❣️\n\n演出：木下鮎美\n(#ピッコロ劇団)\n平成元年生まれ。兵庫県西宮市出身。神戸大学国際文化学部卒業。ピッコロ演劇学校卒業。2022年4月から兵庫県立ピッコロ劇団に所属。\n\n私は30代後半です。周りには、離婚を経験した友達や、独身子なし未昇進であることを気に病んでしまう女性、他人の足を引っ張ろうとする…自分の美しさにいつまでも気づけない女性もいます。そりゃそうなっちゃうよね。だってさ、「あなたはおかしくないよ」って誰も言ってくれないんだもん。\nそうだ！隠しきれない醜さも、笑えない失敗も、抱えきれない傷つきも、止まらない愚痴も、たまらない寂しさも、ありえないほどの心強さも全部全部抱えて戦う女たちの物語を作ろう！！ピッコロのキュートでやんちゃなレディーたちに体現してもらおう！\nガハハ😝もヒヤリ💦もキュン💛もある、曝け出し💥エンパワーメント💥シスターフッド💥コメディです！\n\nCast\nフローレンス・アンガー\n\nオリーヴ・マディスン\n\nヴェラ\n\nミッキー\n\nシルヴィ\n\nレネー\n\nマノロ・コスタスエラ\n\nヘイスース・コスタスエラ\n\nStaff\n照明＝南 亜紀（㈱ピーエーシーウエスト）　音響＝三宅住絵（campana）\n舞台監督＝政香里沙　演出助手=中島深志　チラシデザイン＝中島深志\n制作＝横山海大、山中麻由、大段満里子\n\nニール・サイモンの傑作コメディ『おかしな二人』\nピッコロ劇団のレイディーズ(&メンズ)が女性版に挑む！\n\n「あたし疫病神よ。\nどうして一緒に暮らしたいの？」\n「そりゃ…あたしも一人で暮らしているのがいやだからよ…さびしいからよ。」\nオリーヴのアパートには、毎週夜に女友達が集まってくる。ある夜、夫に離婚を告げられたフローレンスが傷心状態でやってきた。本当は独りで寂しいオリーヴは一緒に住もうと提案する。\n家事ができないオリーヴの汚部屋を神経質に掃除するフローレンス。行き交う消臭スプレーと小言、爆発寸前のストレス。\nデコボコ同居生活をする二人の「友情」の行く末やいかに…！？\n＠\n兵庫県立青少年創造劇場\nピッコロシアター 中ホール\n〒661-0012 兵庫県尼崎市南塚口町3-17-8\n\n2026年\n4月10日(金)~ 12日 (日)\n★全5公演 2,500円\n\n主催:\n兵庫県立尼崎青少年創造劇場\n一般財団法人尼信地域振興財団助成公演","e":"","tg":["ツカグチ演劇祭","兵庫","尼崎","塚口","ピッコロシアター","九鬼家の茶碗","白洲次郎のわすれもの」","G2","九鬼","白洲次郎"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_004_kuki.jpg","t":"Kuki","id":"WEB-164","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_005_kuki.jpg","t":"Kuki","id":"WEB-166","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_006_kuki.jpg","t":"Kuki","id":"WEB-167","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町" に歩いて鳥羽を盛り上げよう！\n3月29日は「鳥羽 春の陣」へぜひご参加ください！","e":"","tg":["九鬼嘉隆","九鬼水軍","九鬼嘉隆プロジェクト","鳥羽市観光協会","武者行列"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""}],"s":"Instagram #九鬼水軍 (2026-03-16)","su":"https://www.instagram.com/explore/tags/九鬼水軍/"},{"id":"OW-387","c":"food","a":"owase","t":"鳥羽セントレア特別運航に合わせ『鳥羽春の陣！九鬼水軍武者行列』イベントを開催します!","x":"鳥羽セントレア特別運航に合わせ『鳥羽春の陣！九鬼水軍武者行列』イベントを開催します!\n\n戦国の海を駆けた鳥羽城主水軍の将「九鬼嘉隆」の勇姿を再現しその偉業と歴史の魅力を観光でお越しの皆様そして市民の皆様に広くお伝えします。\n\n戦国ロマンあふれるひとときをどうぞお楽しみください。\n\n日時：2026年3月29日（日）12：00～13：00\n\n場所：伊勢湾フェリー鳥羽のりば\n\n武者行列ルート\n伊勢湾フェリー鳥羽のりば～三の丸広場～ドルフィン広場\n\n参加費：無料\n\nゴール地点のドルフィン広場では、お菓子やお茶の振る舞い菓子まきも行います。ぜひご参加ください。\n\n主催\n\n一般社団法人鳥羽市観光協会 九鬼嘉隆プロジェクト実行委員会☎0599-25-3019","e":"","tg":["鳥羽セントレア特別運航","九鬼水軍","九鬼嘉隆","鳥羽市"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""}],"s":"Instagram #九鬼水軍 (2026-03-17)","su":"https://www.instagram.com/explore/tags/九鬼水軍/"},{"id":"OW-388","c":"food","a":"owase","t":"鳥羽城跡(三重県鳥羽市)","x":"鳥羽城跡(三重県鳥羽市)\n2026年3月14日　訪城\n\n志摩国の良港として知られた泊浦（鳥羽湾）に突出した標高40mの「樋の山」に、1594年（文禄3年）豊臣秀吉の家臣であった九鬼嘉隆が築城したと伝わります。\n織田信長・豊臣秀吉に仕え、「九鬼水軍」として名を馳せた九鬼氏の本拠にふさわしく、大手門が海に面し、陸地側も海水を用いた内堀を配して四方を海に囲まれた珍しい「海城」であった鳥羽城。櫓名にも「アサリ」「アラミ」など海を思わせる名前が付けられていたようです。\n\n九鬼氏は関ケ原の戦いで嘉隆と息子の守隆が東西に分かれて戦い、西軍についた嘉隆は戦後に鳥羽沖の答志島に退去します。後に、家康から助命の許しを得たものの、その報が伝わる前に嘉隆は答志島で自害してしまいます…。\nその後、鳥羽城主は九鬼氏が3代続いた後、内藤氏・土井氏・大給松平氏・板倉氏・戸田松平氏・稲垣氏と続いて明治を迎えます。\n\n①鳥羽湾より鳥羽城跡を望む\n②西方より本丸を望む\n③本丸\n④本丸石垣\n⑤本丸石垣\n⑥本丸石垣\n⑦本丸石垣\n⑧本丸より二の丸跡（鳥羽水族館）を望む\n⑨本丸より答志島を望む\n⑩城内にある大山祇神社 築城に関わる伝説あり\n⑪北東から北方の物見台？を見上げる\n⑫太鼓櫓跡付近から北方の物見台？を望む\n⑬北東から城跡を見上げる\n⑭三の丸広場からの七段壁(後世のもの)\n⑮三の丸広場に設置してあるパンフレット類\n⑯城跡北方の相橋口門石垣遺構\n⑰本丸西側の住宅地に残る石垣遺構\n⑱家老屋敷跡石垣\n⑲九鬼家菩提寺・常安寺\n\n二の丸跡にある｢鳥羽水族館｣は、この日も長蛇の列で大盛況。それを見下ろす城跡には私一人の貸し切り状態。現代の人気スポットの賑わいを見下ろしながら、戦国時代に九鬼水軍として名を轟かせた九鬼氏のかつての栄華・時代の盛衰に思いを馳せるにはもってこいの城跡でありました。","e":"","tg":["鳥羽城","九鬼氏","九鬼嘉隆","九鬼水軍","海城"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""}],"s":"Instagram #九鬼水軍 (2026-03-21)","su":"https://www.instagram.com/explore/tags/九鬼水軍/"},{"id":"OW-389","c":"food","a":"owase","t":"【開催場所📍鳥羽市】","x":"【開催場所📍鳥羽市】\n📆3月29日\n\n#リポスト -  by \n鳥羽セントレア特別運航に合わせ『鳥羽春の陣！九鬼水軍武者行列』イベントを開催します!\n\n戦国の海を駆けた鳥羽城主水軍の将「九鬼嘉隆」の勇姿を再現しその偉業と歴史の魅力を観光でお越しの皆様そして市民の皆様に広くお伝えします。\n\n戦国ロマンあふれるひとときをどうぞお楽しみください。\n\n日時：2026年3月29日（日）12：00～13：00\n\n場所：伊勢湾フェリー鳥羽のりば\n\n武者行列ルート\n伊勢湾フェリー鳥羽のりば～三の丸広場～ドルフィン広場\n\n参加費：無料\n\nゴール地点のドルフィン広場では、お菓子やお茶の振る舞い菓子まきも行います。ぜひご参加ください。\n\n主催\n\n一般社団法人鳥羽市観光協会 九鬼嘉隆プロジェクト実行委員会☎0599-25-3019","e":"","tg":["リポスト","鳥羽セントレア特別運航","九鬼水軍","九鬼嘉隆","鳥羽市"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""}],"s":"Instagram #九鬼水軍 (2026-03-24)","su":"https://www.instagram.com/explore/tags/九鬼水軍/"},{"id":"OW-390","c":"tourism","a":"owase","t":"#便石山の投稿","x":"*\n天狗倉山〜便石山登山⛰️\n\n病み上がりでも元気になれば山に行きたくなる\nという事で予定通り登山へ\nどこにいこうか迷ったすえ選んだのは\n候補にまったく候補に上がっていなかったこちら\n\n色々調べてる時に便石山近くの象の背\nそして天狗倉山からの絶景にたどり着き\nここにしよう！\nと決定✨️\n\n苔生した緑が美しい熊野古道\nウグイスや鳥のさえずり\n天狗倉山から眺める美しい海と山と町並み\nそして象の背からの絶景\n本当に来てよかった心から思える美しい山でした！\n\n…が、その道中はまぁキツい\n登りも下りも果てしない階段と激坂\nゆるりと歩けるボーナスゾーンはほぼなく\n登りっぱなしか下りっぱなし\n多分過去イチ、キツかった\n\nもちろん、それだけの価値ありです✨️\nキツかったけど楽しい山歩きでした♪","e":"","tg":["登山","登山初心者","天狗倉山","便石山","らいちょ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Instagram #便石山 (2026-03-07)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-393","c":"tourism","a":"kihoku","t":"象さんのしっぽと河津桜 〜便石山〜","x":"象さんのしっぽと河津桜 〜便石山〜\n\n2026.3.1  三重県北牟婁郡紀北町\n\n巨岩の背に立ち 春を呼ぶ？ 🕺\n\n三重の絶景  便石山へ\n\nそこにはスリル満点の巨岩と\nひと足早い春の便りが待っていました ✨\n\nビビりの私は\n象の背 ならぬ 象さんのしっぽ まで 😙\n\n下山後に迎えてくれたのは\nひと足早いピンクの微笑み 😍\n\n雪山とはまた違う\n春の訪れを感じる至福のひとときでした 👍","e":"","tg":["便石山","象の背","河津桜","種まき権兵衛の里","登山好きな人と繋がりたい"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_002_kawazu_cherry_from_path.jpg","t":"Kawazu Cherry From Path","id":"WEB-160","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_004_clear_sky_cherry_path.jpg","t":"Clear Sky Cherry Path","id":"WEB-163","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_005_blossoms_toward_blue_sky.jpg","t":"Blossoms Toward Blue Sky","id":"WEB-165","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市"}],"s":"Instagram #便石山 (2026-03-08)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-395","c":"food","a":"owase","t":"3月5日(木) 便石山（599m）天狗倉山（511m）カンカケ山（494m）⁡","x":"3月5日(木) 便石山（599m）天狗倉山（511m）カンカケ山（494m）⁡\n⁡⁡\n⁡オハイに行った時に パンフレットや地図やら⁡\n⁡色々頂いてきて 家で見てると 面白そうな峠が！⁡\n最初は 海山→馬越峠→天狗倉山→馬越峠→海山⁡\n⁡のピストン予定してたんやけど⁡\n⁡ヤマップでコース時間見てたら便石山にも足を延ばせそう？⁡\n⁡結局1番キツい尾鷲トレイル道含む周回コースに😇⁡\n下山道以外はピンクテープがしっかりあるし 登山道も整備され道に迷う事はないかと。⁡\n⁡便石山は馬越から一気に下りまた登る。⁡\nしかも急登階段地獄😇⁡\n⁡でも「象の背」がめちゃくちゃ絶景で⁡\n⁡便石山だけでも楽しめます‼️⁡\n⁡天狗倉山は頂上に登る梯子がめちゃ怖い💦⁡\n⁡足乗せるのが細いしヤバい💦⁡\n⁡しかも登らないと頂上に行けない😭⁡\n⁡が、頂上は絶景‼️‼️⁡\n縦走はしんどいな～って人は⁡\n⁡天狗倉山や便石山どちらで。どっちも絶景‼️⁡\n⁡で、下りがもっとヤバい💦⁡\n⁡旦那が先に降りて降り方を下から伝授してくれるが 最初の1歩の出し方が怖くて無理😣⁡\n⁡なんとか必死で降りた🤣⁡\n⁡旦那もこの姿にはビックリしたやろな（笑）⁡\n⁡次は「おちょぼ岩⁡」こちらも絶景‼️⁡\nどうせ⁡天狗倉山登るなら→おちょぼ岩までのピストンがおすすめ‼️⁡\n⁡そして長い道のりもいよいよ、、下山道⁡\n⁡これ、最悪😭ザレ過ぎで足乗せるの滑る。⁡\n⁡しかも急坂。整備もこの道はあまりされてない。。⁡\n⁡5回ぐらい滑った💦⁡\n低山のほうが怖いな🤮⁡\n⁡無事下界に着いた安心感 達成感半端ない。⁡\n⁡翌日久しぶりに足にきたけど（笑）⁡\n⁡#熊野古道⁡\n⁡⁡#馬越峠⁡\n⁡#便石山⁡\n⁡#天狗倉山⁡\n⁡#おちょぼ岩\n⁡","e":"","tg":["熊野古道⁡","馬越峠⁡","便石山⁡","天狗倉山⁡","おちょぼ岩"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Instagram #便石山 (2026-03-10)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-396","c":"nature","a":"owase","t":"3月5日(木)⁡","x":"3月5日(木)⁡\n⁡便石山（599m）天狗倉山（511m）カンカケ山（494m）⁡\n⁡⁡\n⁡便石山の象の背⁡\n⁡天狗倉山の頂上⁡\n⁡おちょぼ岩⁡\n⁡絶景でおすすめです！⁡\n⁡尾鷲トレイル経由縦走で楽しかったが⁡\n⁡下山道が悪路で疲れた💦⁡\n⁡#天狗倉山⁡\n⁡#便石山⁡\n⁡#おちょぼ岩⁡\n⁡#尾鷲トレイル","e":"","tg":["天狗倉山⁡","便石山⁡","おちょぼ岩⁡","尾鷲トレイル"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Instagram #便石山 (2026-03-10)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-397","c":"food","a":"owase","t":"2026.03.07〜09","x":"2026.03.07〜09\n\n便石山（びんしやま）•天狗倉山（てんぐくらさん）\n\n当家の住職曰く、仏教には「生々流転」という言葉があるそうだ、この冬はその一つの意味を実感させられた。\n\nで、少々疲れたので家族の用事にあわせ、リトリートの旅にでた。\n\n \n見頃を迎えた いなべ梅林公園では梅花の香気に癒された。奥の山は鈴鹿山脈。\n\nそして久しぶりの登山。\n\n今回は少々足を延ばし、三重県尾鷲市の「便石山」と「天狗倉山」、絶景ポイントの象の背からは熊野灘が一望できた。\n\n馬越峠の石畳の道は熊野古道伊勢路の一部だ。\n\n \n\n３日間、登山や地元の名産をいただいたり、買い物したりとのんびり過ごし、自己リセットできたみたい。\n\n紀北町の日帰り温泉は最高だった。\n\n#便石山 天狗倉山","e":"","tg":["台湾ラーメン","いなべは梅林公園","vison","便石山","季の座"],"im":[],"s":"Instagram #便石山 (2026-03-10)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-398","c":"tourism","a":"owase","t":"2026.03.07","x":"2026.03.07\n\nパステルツアーDay1\n\n5回目の今回も良き天気\n\n階段地獄さえ無ければ…\n\n宿の食事は今回も抜群","e":"","tg":["パステルツアー","便石山","天狗倉山","象の背","うまし宿漁亭美乃島"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Instagram #便石山 (2026-03-11)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-399","c":"nature","a":"owase","t":"また山に整えてもらった","x":"また山に整えてもらった\n象の背中は ゴツゴツして 少し温かい\n\n2026.3　便石山","e":"","tg":["象の背","便石山","天狗倉山","バチコン","山で心を整わせる"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Instagram #便石山 (2026-03-14)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-400","c":"tourism","a":"owase","t":"熊野古道伊勢路旅の二日目","x":"熊野古道伊勢路旅の二日目\n\n尾鷲のホテルに宿泊してから、馬越峠という熊野古道伊勢路を歩きます。ザ！熊野古道という江戸時代頃の長い石畳が残ってて、神聖な雰囲気の道が続きます。\n\n途中で便石山方面へ\n激登りの階段が延々と続いてヤバかった〜😂\n山頂に到着してから少し進むと有名な象の背に到着！\n凄い‼️絶景🙌\n私は上に立つのがやっとなのに、ガイドのタイチのジャンプにはびっくり🫢恐ろし〜笑\n\n種まき権兵衛の里を通って、無人駅の相賀駅でゴール\n\n鈍行に2時間揺られて、松坂駅から近鉄特急に。\n関西ハイカーズさんのおかげでこんな遠いところも楽しく行けてありがたかったです☺️\n\n最後の写真は尾鷲の食事処『鬼瓦』さんで\nめちゃくちゃ新鮮で美味しい😋しかも安い！\nまた行きたいけど遠いな〜","e":"","tg":["熊野古道伊勢路","象の背","便石山","関西ハイカーズ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #便石山 (2026-03-15)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-401","c":"tourism","a":"owase","t":"2026.03.08","x":"2026.03.08\n\n便石山⛰️\n\nこれで、「びんしやま」と読むそう\n\n象の背が有名なお山\n\n種まき権兵衛の里に駐車して\nキャンプinn 海山近くの登山口から\n上るコースで連れて行っていただきました♪\n\n登りはずっと階段でしんどいんやけど\n登り切った先に絶景が待っていた！！！！\n\n帰りは登った分足も疲れている上に\n道は暗めなのでとても眠くなります😛\nいつもより気をつけてくだらないといけません。。\n\n山下りがおわったらピストンなので、\n帰りもキャンプinn 海山の場内を歩いて帰るんやけど、\n帰りの時間帯の銚子川はとてもキレイな青🩵\n川沿いは明るいしキレイだし目が覚めて癒された〜\n\nそしてそして\n帰りの車の中で行ってみたいオハイは\nこの近くだったと知ってまたこの辺行かなあかんなあと！\n次の楽しみができたぞ😆\n\n一緒に行ってくれた人たちに感謝です♡\nたくさんいい写真も撮ってくれた！\n良き山行でした✨","e":"","tg":["三重","便石山","象の背","sonyphotography","sonya7cⅱ"],"im":[],"s":"Instagram #便石山 (2026-03-18)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-402","c":"tourism","a":"kihoku","t":"便石山　三重県紀北町〜尾鷲市","x":"便石山　三重県紀北町〜尾鷲市\n熊野古道 伊勢路馬越峠より\n\n念願の便石山、象の背と牛の背\n尾鷲の市街地や尾鷲湾が一望の超大絶景は想像以上で、\nそしてつい地球を押したくなりました。","e":"","tg":["便石山","熊野古道伊勢路","象の背","尾鷲市","自然のアート"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/unsplash_001_kumano_kodo_forest_path.jpg","t":"Kumano Kodo forest path","id":"WEB-279","u":"https://unsplash.com/s/photos/kumano-kodo","li":"Unsplash License (free for commercial use)","loc":"尾鷲市/熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"}],"s":"Instagram #便石山 (2026-03-21)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-404","c":"tourism","a":"owase","t":"便石山、象の背へ。連休で象の背は少し行列。眺望すばらしいもんなー。","x":"便石山、象の背へ。連休で象の背は少し行列。眺望すばらしいもんなー。","e":"","tg":["便石山","象の背","トレッキング","三重県"],"im":[],"s":"Instagram #便石山 (2026-03-23)","su":"https://www.instagram.com/explore/tags/便石山/"},{"id":"OW-405","c":"culture","a":"owase","t":"熊野古道「八鬼山越え山」，這段越嶺道又號稱「西國第一難關」，這也是伊勢路上爬升海拔最高路程最長的一段古道。這段路也...","x":"熊野古道「八鬼山越え山」，這段越嶺道又號稱「西國第一難關」，這也是伊勢路上爬升海拔最高路程最長的一段古道。這段路也是個人認為保留最原始自然、地藏王菩薩最多的一段路，名氣雖然沒有松本峠、馬越峠大，但是我最推薦的一段伊勢路，有來走伊勢路絕對不要錯過！\n\n在過去，朝聖者在朝聖路上不但要千里迢迢徒步千山萬水，還要面臨突如其來的強盜、狼群、熊等致命威脅，八鬼山就是這樣一段困難重重的越嶺道。\n\n多災多難的朝聖路上，許多朝聖者橫死在路上，為了穩定人心，商賈和僧人們會供奉地藏王菩薩在路邊，達到穩定人心的作用，是朝聖者的精神之柱。這段路上的地藏王菩薩多達三十三個，雖然不少尊都敵不過歲月，略有毀損，但很值得細細品味感受懷古之情。\n\n八鬼山越，從尾鷲節道標歌碑開始，全場10.1公里，在海拔647公尺高的八鬼山越嶺，耗時至少五小時，最後結束在三木里的海濱。","e":"","tg":["熊野古道","伊勢路","八鬼山","八鬼山越え山","西國第一難關","滿滿的","地藏王菩薩"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #八鬼山 (2025-12-15)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-406","c":"tourism","a":"owase","t":"熊野古道的第二天，天空烏雲密佈時不時下起陣雨，大多團員選擇待在接駁車上到尾鷲市區逛逛。只有少數團員選擇繼續在雨中挑...","x":"熊野古道的第二天，天空烏雲密佈時不時下起陣雨，大多團員選擇待在接駁車上到尾鷲市區逛逛。只有少數團員選擇繼續在雨中挑戰八鬼山。\n\n八鬼山海拔647公尺，這一天算是整趟熊野古道爬升最高的一天，這號稱西國第一難關的八鬼山越え，曾經有山賊和野狼出沒，讓朝聖者們吃盡了苦頭。時至今日，不再有盜賊和野狼作亂，取而代之的是路上看到的山椒魚和熊出沒注意⚠️！\n\n在古道上有很多不同時代的石疊，有鎌倉道、江戶道、明治道，但不管是任何時代的石疊下方夾縫，都很適合山椒魚生存，尤其是這種濕濕的雨天非常容易看到山椒魚出來玩！\n\n在翻過八鬼山後是「さくらの森広場」，滿佈櫻花的廣場，這裡視野很好可以看到伊勢曲折的海灣佈滿叢叢的櫻花，但這一天的霧氣太濃只能等明年再來拍嘍！\n\n我們的熊野古道團每年會開在櫻花季，在古道漫遊的同時還能順道賞櫻。","e":"","tg":["熊野古道","伊勢路","八鬼山","八鬼山越え","山椒魚","熊出沒注意","さくらの森広場"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #八鬼山 (2025-12-19)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-407","c":"tourism","a":"owase","t":"【熊野古道トレラン】","x":"【熊野古道トレラン】\nいつか走ってみたかった熊野古道\n\nスタート？ゴール地点の三木里ビーチにクルマを仕込みロードバイクで海山の道の駅へ。\n\n海山の道の駅で自転車置かせてもらい(職員さんに確認済)馬越峠口から熊野古道に入る。\n\n峠を抜け馴染みある尾鷲の街並みを走り\n\n熊野古道伊勢路最大の難所とされる八鬼山越え\n\nパヴェは脚に着地のダメージがかなり来るので普通のトレイルに比べてかなり疲れました。","e":"","tg":["熊野古道","熊野古道伊勢路","熊野古道トレラン","パヴェ","石畳","トレラン","八鬼山"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_002_magose_stone_bridge.jpg","t":"石橋と石畳","id":"WEB-154","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #八鬼山 (2025-12-21)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-408","c":"tourism","a":"owase","t":"・・・","x":"・・・\n♫久しぶりに聴いた。\nメロディーが美しすぎて 着メロにしてた。\nずいぶん 昔の話ですが・・・\n\nなので、人生いろいろというわけで\n自分、この曲聴いて思い出すのは クリスマス\nではなく、6月のある朝の出来事。(；ω；)","e":"","tg":["熊野古道伊勢路","八鬼山","紀伊山地の霊場と参詣道","写真好きな人と繋がりたい","ファインダー越しの私の世界","三重県尾鷲市"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #八鬼山 (2025-12-24)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-410","c":"tourism","a":"owase","t":"・・・","x":"・・・\n\n八鬼山荒神堂・荒神茶屋跡。\n\n荒神堂という名のお寺的な？ものがあり\nとなりには、大きめの茶屋があって、前\nは、広めな庭・・・。\n\n熊野街道のサービスエリアやぁ～？！\n\nというわけで、ここで一旦・・・\n後半へつづく。","e":"","tg":["熊野古道伊勢路","紀伊山地の霊場と参詣道","写真好きな人と繋がりたい","ファインダー越しの私の世界","八鬼山"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #八鬼山 (2025-12-26)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-411","c":"food","a":"owase","t":"#八鬼山の投稿","x":"。\n・\n・\n登り納めから4日目、#登り始め 👍\n・\n・\n八鬼山(644)→堂ノ谷の山(573)→塩受山(618)→\n向井山(550)→大曽根山南峰(430)→大曽根山(420)\n・\n・\n・\n2026-1-3\n・\n今年も楽しみです🤩\n・","e":"","tg":["登り始め","八鬼山","熊野古道伊勢路","熊野古道","ゆうちゃんの手作りスイーツ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #八鬼山 (2026-01-07)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-412","c":"tourism","a":"owase","t":"世界遺産　熊野古道　伊勢路　八鬼山越え","x":"世界遺産　熊野古道　伊勢路　八鬼山越え\n\n馬越峠の後、尾鷲市街地を歩いてそのまま八鬼山越えへ行きました。\n\n西国一の難所と呼ばれているからか、\n\nいつ来ても人に出会わない場所。\n\nそのおかげで、\n\nもののけ姫に出てきそうな、\n\n苔生した石畳がキレイに残ってました。\n\n今は昔と違い、\n\n山賊やオオカミに襲われる事はないのですが、\n\n熊が出たみたいです。\n\n行こうと思ってる方はお気おつけて下さい。","e":"","tg":["世界遺産","熊野古道","伊勢路","八鬼山","もののけ姫"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #八鬼山 (2026-01-15)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-413","c":"tourism","a":"owase","t":"尾鷲周辺、シリーズ化してきた。","x":"尾鷲周辺、シリーズ化してきた。\n\nその昔の、一生に一度の伊勢詣のあとに三十三ヶ所巡礼もいこう、そのまえに熊野三山も詣でよう…っていう、とんでもルートの通り道が熊野古道だそうな。\n\n今回はミュージアムに行けて、熊野古道の学びも深まった。\n\nすごくいいとこ。さかなおいしいお店も見つけたし。\nまたいこう。","e":"","tg":["熊野古道","尾鷲","八鬼山","鬼瓦","ミジュマルマンホール"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_002_Magose_Fudo_Waterfall.jpg","t":"Magose Fudo Waterfall.JPG","id":"WEB-288","u":"https://commons.wikimedia.org/wiki/File:Magose_Fudo_Waterfall.JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #八鬼山 (2026-01-24)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-414","c":"tourism","a":"owase","t":"2026.2.9","x":"2026.2.9\n#尾鷲合宿 day7-8\n\n昨日は、尾鷲も雪がちらちら舞って、気温も一桁。\nでも、起きたら幸い雪は積もってなかったので #八鬼山 バーティカル3本！\n風が強かったけど、山の中は風防げるから走ればそんなに寒く感じず助かった🙌\nだけど滑って右膝強打してしまい、内出血🥲\n\n帰ってきて、 のStrength trainingしていたら、めちゃ吹雪いてきた～💦\n午前中はちらちらくらいで良かった🫶\n夕方には山はうっすら白くなってた😲尾鷲では珍しい雪☃️\n\n昨日は全国各地、雪で大変な地域もあり、さいたまマラソンや大会も中止になったり。\n天候には逆らえないから仕方がないとはいえ、準備してきた大会や参加者ランナーの人達の気持ちを思うと心が傷む🥲\n交通が乱れたり、災害、事故など、今年雪でこれ以上被害が出ないことを祈ります🙏\n\n夜は、尾鷲の方々が懇親会を開いてくれました！\n尾鷲合宿も3年目。皆様のおかげでこうして尾鷲合宿ができることに、感謝🙏\nご縁と出会い、そして人の繋がりをこれからも大切にしていきたい🫶\n\n今日は、朝から  #大紀町シーサイドトレイル の試走へ。\n尾鷲はそんなに積もってなかったので大紀町も大丈夫かと思ったら、思った以上に雪積もってました😅💦\n\n滑るし元々テクニカルな急下りが更にテクニカルに😬💨\nおかげでまた滑って右膝強打してしまった💔💔💔\n足場は悪いけど、天気は良くて、景色は海がキラキラ綺麗だった✨️✨️✨️\n土曜日のレースも良い天気になーれ🙌","e":"","tg":["尾鷲合宿","八鬼山","大紀町シーサイドトレイル"],"im":[],"s":"Instagram #八鬼山 (2026-02-09)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-415","c":"tourism","a":"owase","t":"今日は明日・明後日の釣りの前乗り登山⛰","x":"今日は明日・明後日の釣りの前乗り登山⛰️","e":"","tg":["八鬼山","熊野古道","白石湖トレイル","ロッジ山水","三重県"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #八鬼山 (2026-02-11)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-416","c":"food","a":"owase","t":"西国一の難所と言われる熊野古道伊勢路｢八鬼山越え｣。江戸道と言われる苔むした石畳は、未明に降った雨もあって、風情た...","x":"西国一の難所と言われる熊野古道伊勢路｢八鬼山越え｣。江戸道と言われる苔むした石畳は、未明に降った雨もあって、風情たっぷり。ひんやりした空気の中、ひのきの香りや鳥のさえずりを感じながら、楽しく歩けました。ただ、下りはスリップしやすくヒヤヒヤドキドキ💦\n｢七曲り｣は確かに勾配がきつかったですが、最近登った三方分山や本宮山に比べれば楽な方。八鬼山頂上から10分くらい進んださくらの森広場からは、一昨年訪れた九鬼の町やオハイ方面がしっかり見えました。山頂休憩含めて往復4時間。\n下山メシは、尾鷲の｢すし処一重｣。おまかせにぎり、ヒラマサのカマ、カツオ・ホウボウ・アオリイカの刺身、イチゴ・甘夏ジェラートなどなど。これらを食べるために歩きにきたようなものです😅","e":"","tg":["熊野古道","伊勢路","八鬼山","すし処一重"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #八鬼山 (2026-02-23)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-417","c":"nature","a":"owase","t":"八鬼山の好きなところはゴロゴロ岩だらけなところ","x":"八鬼山の好きなところはゴロゴロ岩だらけなところ\nお気に入りの岩を見ながら古の旅人に思いを馳せる","e":"","tg":["八鬼山","奇岩"],"im":[],"s":"Instagram #八鬼山 (2026-02-28)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-418","c":"food","a":"owase","t":"2026.2.21-23 熊野古道 伊勢路 グルメ山行","x":"2026.2.21-23 熊野古道 伊勢路 グルメ山行\n割烹の宿 美鈴さん、酒造と地酒の宿 桃太郎さんに泊まりました✨さんま寿司、福助堂のおわせ節も最高👍","e":"","tg":["頂山","八鬼山","天狗倉山","便石山","オハイ(大配)"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #八鬼山 (2026-03-01)","su":"https://www.instagram.com/explore/tags/八鬼山/"},{"id":"OW-419","c":"food","a":"owase","t":"会社の先輩と e Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Instagram #天狗倉山 (2026-03-21)","su":"https://www.instagram.com/explore/tags/天狗倉山/"},{"id":"OW-468","c":"tourism","a":"owase","t":"#天狗倉山の投稿","x":"","e":"","tg":["12月","三重県","天狗倉山","熊野古道"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"}],"s":"Instagram #天狗倉山 (2026-03-22)","su":"https://www.instagram.com/explore/tags/天狗倉山/"},{"id":"OW-469","c":"food","a":"kihoku","t":"【8日目 熊野古道歩き】古里温泉（紀北町）→相賀（紀北町）","x":"【8日目 熊野古道歩き】古里温泉（紀北町）→相賀（紀北町）\n※伊勢神宮から熊野大社までの熊野古道伊勢路を日を分けながら歩いています。目指せ！熊野速玉大社！プライベートな日記です。\n\n初の民宿宿泊は食事も美味しく、懐かしい匂いがする布団であたたかく寝られて快適でした。「いま旅をしている！！」という気持ちを強く感じられて良い経験になりました。また泊まりたい。。。\nこの日は、快晴の青空もとにかく風が強かった！日差しはあたたかいのに、風が吹くと寒いという…服装選びが難しかったです。\n\nさて、前日の遅れを取り戻すべく、朝からズンズンととにかく歩きます。きのうの曇り空ではわかりませんでしたが、とにかく青い海と空が美しい。海岸沿いを走る紀勢線の線路も映えていますね(笑)\nこの熊野古道旅は、特に鉄道ありきで始めたわけではないですが、結果的に紀勢線を歩き通す旅になっています。歩き鉄、とでも言いましょうか？\n\n古里の町を出てすぐの山道にある、サボ道展望台。ここからの海がまたキラキラ輝いてキレイ。ただのペットボトルの水もここで飲むだけでとても美味しく感じます。近くには落石注意の看板。どう注意して歩けばいいのか分からないので、早足で進む。\n\n前日は雨と曇り空で熊出没への恐怖心がかなり強かったものの、晴れているだけで、そんな不安もなんだか半減。春先は若いオスの熊が多いらしいです。どうかこのあとも出会いませんように。峠を越えて、人里に降りてきたときの達成感が、安心感に変わりつつあります(笑)\n\n三浦の町を経て、熊野古道の峠のなかでも人気の始神峠（はじかみとうげ）に入ります。登りがかなり急。1つ前の三浦峠でも、息がかなり上がってキツかったのですが…斜面が急なのか、体力が落ちたのか…。黙々と無心で脚を動かして、ただ登る。この無になれる瞬間がけっこう好きです。何も考えずに登るといつの間にか峠に着いていました。\n始神峠は熊野古道きってのビュースポットだそうで、峠から見える三浦の海と太平洋の青がこれまた美しい。江戸時代にはこの峠に茶屋もあったそう。息を切らしながらここまで上がってきて、峠で甘いものでも食べられたら、たしかに最高だっただろうなぁ。眼下には紀勢線も見えます。ちょうど通過したものの上手く捉えられず！！\n\n船津の町に入ってからは、しばらく紀勢線沿いを歩きます。日中のあまり列車もない時間なので、ぜんぜんすれ違いませんでしたが、線路が見えるだけでもテンションが上がります。（足はガクガクでしたが）途中の踏切の列車のシルエットに違和感をおぼえて思わずパシャリ(笑)\n\n昼食にお刺身定食と道中の和菓子屋さんの大福？を食べて満腹に。予定ではもうひと山越えて、尾鷲まで行こうとしていましたが…すでに19キロ歩いた足がかなり限界。きょうはここまで！よく歩きました。海山町ではもう桜が咲いていましたよ！\n\nその後、相賀駅から帰ってきましたが、付近の道しるべを見たところ「新宮まで70キロ」。気が付いたら半分を越えていました！伊勢神宮から96キロくらい。なんとなく始めた熊野古道ウォーキングですが、本当に踏破できそうでワクワクしています！","e":"","tg":["熊野古道","熊野古道伊勢路","kumano","kumanokodo","三浦峠","始神峠","紀伊長島","尾鷲","紀勢線","紀勢本線"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_033_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route).JPG","id":"WEB-319","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_034_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route s3).JPG","id":"WEB-320","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route_s3).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_056_Magose_pass.jpg","t":"Magose pass.JPG","id":"WEB-342","u":"https://commons.wikimedia.org/wiki/File:Magose_pass.JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #始神峠 (2025-03-19)","su":"https://www.instagram.com/explore/tags/始神峠/"},{"id":"OW-470","c":"tourism","a":"owase","t":"#始神峠の投稿","x":"🏃\n熊野古道伊勢路4️⃣\n\n紀伊長島駅スタートして尾鷲駅を目指す！\n一石峠、三浦峠、始神峠、馬越峠を越えて\n\n昨日の爆風とはうってかわって、暖かい日射し🌞\n梅、桜がきれいに咲いていて、ウグイスもまぁまぁ上手に鳴いてました笑\n\n途中、行きたかった新甘堂さんへ\nお彼岸だったこともあって、和菓子は残り2個のおはぎだけ。\n購入して外に出たら、先客だったおばちゃんとオットが話をしてる。手には3色団子。\nおばちゃんが「頑張ってね！」とくれました😊\n\nゴールの後は楽しみにしてた、シワリラのナンとカレー\nナンはもちろんおかわりしました😋\n\n帰り道では、カモシカの子ともが鎮座してるのをオットが発見！\n私は全く気がつかなかったのに…野生の匂いがしたのか🙄\n\n今回も出会いあり楽しい1日でした✨\n.","e":"","tg":["熊野古道伊勢路","熊野古道","一石峠","三浦峠","始神峠","馬越峠", 章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #始神峠 (2025-04-18)","su":"https://www.instagram.com/explore/tags/始神峠/"},{"id":"OW-476","c":"tourism","a":"owase","t":"熊野古道始神峠と三浦峠へ🏃","x":"熊野古道始神峠と三浦峠へ🏃\n\nふくい桜マラソンからぼちぼち始動と思っていた矢先に、すでに流行っているのかどうかわからない流行り病を貰い なかなか走れず、ようようそこそこ活動できました✨\n\nガーミン先生曰く「HRVステータスが高すぎてバランス悪いで疲れとんじやない？無理するなよ〜」と言ってましたが、実際疲れを感じつつも強行。終わったら「ほらな😮‍💨」とばかりにオーバーリーチに。\n\n疲れたら飲みたいのが酒好き🍺の性。やっと買うことができたアサヒ ザ・ビタリスと一番搾りホワイトエールを飲み比べ。どちらも美味しいけれど、同じ日に飲むビールではないな😅\nガツンとくる苦味と、まろやかな口当たり。それぞれ際立ち過ぎてマイナスになってしまったかな🤣","e":"","tg":["ハシリマスタグラム","ハシリマシタグラム","走れることに感謝","マラソン","ランニング","ジョギング","サブ3","サブ3次はどうする","ふくい桜マラソン","アラフィフランナー"],"im":[],"s":"Instagram #始神峠 (2025-04-27)","su":"https://www.instagram.com/explore/tags/始神峠/"},{"id":"OW-477","c":"tourism","a":"kihoku","t":"ーーー","x":"ーーー\n古道の右手にはどっしりとした山々、\n左手にはリアス海岸と島々。\n潮の香りの海岸や古い集落道、峠道を歩いて行く。\n\n古い時代には長島から尾鷲への乗船をすすめる船頭たちが待ち受けていた。だが、道中案内記や道中日記ではここでの乗船を固く止めている。\n荒海を行く危険を避け、道沿いの観音や八鬼山荒神堂などを詣でながら厳しい山道を歩むのがあるべき姿だったからだ。\n\n熊野古道 伊勢路をゆく。\n紀伊長島から始神峠を越えた。\n新宮までの旅も半分まで来た。","e":"","tg":["熊野古道","熊野古道伊勢路","紀伊山地の霊場と参詣道","紀伊長島","一石峠","三浦峠","始神峠","世界文化遺産","kumanokodo","kumanokodotrail"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #始神峠 (2025-05-26)","su":"https://www.instagram.com/explore/tags/始神峠/"},{"id":"OW-478","c":"tourism 「尾鷲イタダキ市」でした🎶\n\n出店数は前回に比べ少なかったですが、地物を求めて多くのお客さんが来ていました！\n\n「尾鷲イタダキ市」の楽しみの一つは、“やきやまふぁ〜む”の椎茸詰め放題！！\n\n新鮮採れたて椎茸を、安価で袋一杯詰め込んで、妻にも喜ばれる買い物です👍\n\nこうした、体験型の販売があるのも良いですね🎶 \n\n昼と夜は、今日購入したものに肉などをプラスαして、全て美味しくいただきました😋\n\n1月はお休みですが、毎月第一土曜日午前9時から午後1時までですよ！！","e":"","tg":["三重県","尾鷲市","尾鷲魚市場","尾鷲イタダキ市","毎月第一土曜日"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_010_owase_itadaki_ichi_1.jpg","t":"Owase Itadaki Ichi Festival 1","id":"WEB-110","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_015_owase_itadaki_ichi_2.jpg","t":"Owase Itadaki Ichi Festival 2","id":"WEB-115","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_002_owase_fish_market_bay.jpg","t":"Owase Fish Market and Owase Bay","id":"WEB-102","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"Instagram #尾鷲イタダキ市 (2025-12-20)","su":"https://www.instagram.com/explore/tags/尾鷲イタダキ市/"},{"id":"OW-567","c":"nature","a":"owase","t":"📺 近日放送！","x":"📺 近日放送！\nNHK「まるっとみえ」内で\n尾鷲イタダキ市が特集されます！\n\n四半世紀以上続く尾鷲の朝市「イタダキ市」。\n昨年11月1日には、JR東海“初”となる夜行列車が名古屋からイタダキ市へ到着し、大きな話題となりました🚃✨\n\n近年、人口減少により規模が縮小していた朝市ですが、\nいま、イタダキ市は新しいかたちへと変わろうとしています。\n\n今回は、尾鷲市在住のデザイナー・浅田さんのご協力のもと、\nイタダキ市の想いや魅力を伝えるプロモーションビデオ（PV）制作に取り組んでおります。\n\n「イタダキ市が地元の人と、よその人がつながるきっかけに」\n「この紹介動画を見たことで、会話のはじまりになれば」\n\nそんな想いが込められたPVは、\n📍イタダキ市ホームページ\n📍尾鷲市公式SNS\nにて順次公開予定です。\n\nぜひ、放送と動画の公開をどうぞお楽しみに！\n\n＃つながるきっかけ\n＃尾鷲市","e":"","tg":["尾鷲イタダキ市","尾鷲","まるっとみえ","朝市","地域の魅力"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_010_owase_itadaki_ichi_1.jpg","t":"Owase Itadaki Ichi Festival 1","id":"WEB-110","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_015_owase_itadaki_ichi_2.jpg","t":"Owase Itadaki Ichi Festival 2","id":"WEB-115","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc てくれていた森の豊かさ】\n\n#東の諸戸 西の土井","e":"","tg":["尾鷲ヒノキ","原生林","土井八郎兵衛","東の諸戸","涌井井戸"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #尾鷲ヒノキ (2026-03-19)","su":"https://www.instagram.com/explore/tags/尾鷲ヒノキ/"},{"id":"OW-603","c":"culture","a":"owase","t":"【三重県立熊野古道センター…三重県尾鷲（おわせ）市 part2】","x":"【三重県立熊野古道センター…三重県尾鷲（おわせ）市 part2】\n尾鷲市はリアス式海岸が続く、波が穏やかな天然の港✨\n\n日本の三大美林「尾鷲ヒノキ」が人工林だとは知らなかった😳\n尾鷲は原生林であった😳\n\n「ヒノキ」が奨励され植林したのに政府は購入せずそのまま放置→成長したヒノキの伐採は難しい→原生林だった森がヒノキと杉林になったと地元の方が仰っていた💦\n\n水量が多く地面に吸収しにくい「砂礫地質」の尾鷲市 紀北町…だから昔もヒノキの植樹に土を入れていたのかぁ。\n\n尾鷲ヒノキ…文化の繋がりや伝統とは〜〜九鬼漁港でハリセンボンに出会えた🤗🤗","e":"","tg":["尾鷲ヒノキ","熊野古道センター","土井本家","留山","留木"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #尾鷲ヒノキ (2026-03-20)","su":"https://www.instagram.com/explore/tags/尾鷲ヒノキ/"},{"id":"OW-604","c":"food","a":"owase","t":"昨日、尾鷲に泊まり","x":"昨日、尾鷲に泊まり\n朝、熊野古道センターで尾鷲に生育する\nヒノキやスギについて見学してきました。\n\nスギも生育されているようですが\nより年輪密度が高いヒノキの育成に\n尾鷲では力を入れて、今では\nスギのよりもヒノキの樹木の方が\n多くなり、\n\n尾鷲ヒノキが全国的に\n有名になりました。\n\nその後、尾鷲の海水浴場に行き\n浜辺を裸足で歩いてきました。\nその砂浜は、裸足でも全然痛くなくて\nとても気持ち良い砂浜辺でした。\nぼーとするには、とても良いところでした。\n\nお腹空いてきたので、尾鷲で魚か美味しいと\n有名なおっととでランチを食べ\n干物などを購入しました。\n\nそして渡会郡というとても山が美しい\n所で、尾鷲ヒノキなどの蒸留所や\n木工などを手がけている\n方々のところで見学をさせて\nいただきました。\n\nありがとうございます。\nちょうどそこでは、スギの粉などで\n燻製料理を作っていて\n美味しい、トマトや鶏肉の料理を\nいただきました。\n\nありがとうございました。\nおかげ様で本当にステキな1日を\n過ごす事がどきました。","e":"","tg":["尾鷲ヒノキ","日本の森","yuica認定日本産精油インタープリター","ヒノキの香り","愛・フォレスト"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li を、とても嬉しく思います。\n\nまたのお越しを心よりお待ちしております。\n\nThree former university volleyball teammates reunited at Guesthouse Usagi for a special gathering 🏐\n\nAfter graduation, they each built their lives in Kochi, Hyogo, and Mie, and it was wonderful to see how naturally their friendship picked up right where it left off.\n\nTheir stories were rich with experience and truly fascinating—I found myself completely drawn in. Thank you very much for sharing such memorable conversations.\n\nIt means a lot to us that our guesthouse could be a place for such a meaningful reunion.\n\nWe look forward to welcoming you again!","e":"","tg":["ゲストハウスうさぎ","熊野","三重","東紀州","吉野熊野国立公園","世界遺産","同窓会","再会","古民家ゲストハウス","花の窟神社"],"im":[],"s":"Instagram #東紀州 (2026-03-18)","su":"https://www.instagram.com/explore/tags/東紀州/"},{"id":"OW-722","c":"culture","a":"owase","t":"千葉県から素敵なご家族にお越しいただきました😊","x":"千葉県から素敵なご家族にお越しいただきました😊\n\n皆さんとても元気にご挨拶してくださり、こちらまで明るい気持ちになる、とても気持ちの良いご家族でした。\n\n今回は紀伊半島のご旅行とのこと。\n遠くからの長距離運転、お父さん本当にお疲れ様です🚗\n\nそれでも、ご家族のために頑張る姿はとてもかっこいいです👍\n\nまた機会がありましたら、ぜひ熊野にお越しください。\nお会いできる日を楽しみにしております✨\n\nA lovely family visited us all the way from Chiba 😊\n\nThey greeted us so cheerfully, and their warm, positive energy made us feel happy as well. It was truly a pleasure to host such a wonderful family.\n\nThey were traveling around the Kii Peninsula, and it must have been quite a long drive—great job, Dad 🚗\n\nStill, seeing you doing your best for your family was really inspiring 👍\n\nWe would love to welcome you back to Kumano anytime.\nHope to see you again in the future!","e":"","tg":["熊野","東紀州","ゲストハウスうさぎ","紀伊半島","家族旅行","古民家ゲストハウス","世界遺産","吉野熊野国立公園","花の窟神社","Kumano"],"im":[],"s":"Instagram #東紀州 (2026-03-21)","su":"https://www.instagram.com/explore/tags/東紀州/"},{"id":"OW-723","c":"nature","a":"owase","t":"私が金曜日号のキャスターを担当している","x":"私が金曜日号のキャスターを担当している\n「HOT!東紀州」のスタジオセットをご紹介。\n\nおっちー担当の「サキドリ -東紀州おでかけナビ-」とともに\nこちらも月替りで変化しています🌸\n\n3月はお花が飾られ\n春らしいやわらかな雰囲気に。\n4月の足音が聞こえてきて\nこのセットでお届けするのも\nあと少しになりました。\n\nお伝えするニュ apanese amberjack from Kajika, Japan.jpg","id":"WEB-303","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_047_Kajika_Shrine-01.jpg","t":"Kajika Shrine-01.jpg","id":"WEB-333","u":"https://commons.wikimedia.org/wiki/File:Kajika_Shrine-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"}],"s":"Instagram #梶賀 (2026-02-22)","su":"https://www.instagram.com/explore/tags/梶賀/"},{"id":"OW-732","c":"nature","a":"owase","t":"青木　スベリ","x":"青木　スベリ\nこの日は風もなく、南から北へのマシオが走る。\n50m沖の本流に遠投し、そこから左斜め沖に流して行く。\n\n道糸はフカセモンスター4\n号ハリスはBLACK stream2.5\nウキはエイジアLC 021\n針は瞬貫尾長7号（86.3mg）\nサミング着水時に餌の波紋を確認し、後は仕掛けが馴染むまではテンションフリー… … …道糸とウキが先行するので仕掛けを引っ張らないように、バンバン糸を出す……ウキが沈んで来たところでテンションかけ直して……50センチ…1ヒロ…遠投なので2ヒロはもう見えない🙃\n\nそこからは、さっき張りながら沈めていったスピードの感覚で竿4本から5本（東沖向きは感覚で底）の間でホバリング🚁\n張りを意識して底付近を水平移動させて流して行くとドン！\nこのドンが1日に6回\n（グレ、アカハタ、グレ、オジサン、ササノハベラ、グレ）\nしか無く、ひと流しのストロークがすごく長い神経すり減る釣りになりました😇\nちなみにドン以外は、一日中エサは付きっぱなしでした😅\n※この流速と風と波では エイジア LC 024 しか勝たん！と、調子に乗ってましたが、間違って最後まで着いていたのは021でした🤣","e":"","tg":["梶賀","榎本渡船","グレ","プロフェッショナル池田","神経衰弱釣法"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_001_Kajika_Bridge-01.jpg","t":"Kajika Bridge-01.jpg","id":"WEB-287","u":"https://commons.wikimedia.org/wiki/File:Kajika_Bridge-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_Kajika_no_Aburi_Smoked_Japanese_amberjack_from_Kaj.jpg","t":"Kajika no Aburi, Smoked Japanese amberjack from Kajika, Japan.jpg","id":"WEB-303","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_047_Kajika_Shrine-01.jpg","t":"Kajika Shrine-01.jpg","id":"WEB-333","u":"https://commons.wikimedia.org/wiki/File:Kajika_Shrine-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"}],"s":"Instagram #梶賀 (2026-02-22)","su":"https://www.instagram.com/explore/tags/梶賀/"},{"id":"OW-733","c":"food","a":"owase","t":"梶賀　榎本渡船　春一番　どれくらい吹きますか?釣行　日曜の部(月曜も🤩笑)","x":"梶賀　榎本渡船　春一番　どれくらい吹きますか?釣行　日曜の部(月曜も🤩笑)\n\n先に結果報告ですが　本日　遂に　でっぶり47センチ目方１.9キロやりました🐟️やれやれです😢　今年はほんと　苦労しました😢\nでも　こんなん　まだまだ居てますよ🐟️　\nフナミの壁　際から30センチまで際べったり　２ヒロぐらいでした🐟️\nやっぱり際釣はデカイの出ました🙌\n\n話は戻り　一日目　トーフの地(二番)　でした🌊\nM永さんは１番で　ひたすら頑張ってました😲素晴らしい忍耐🙌\n結果ですが43口太です🐟️　これは正直釣ったとゆうより・・・笑\n\n夜はEびすさんに高級焼肉をお招ばれしました🙇　いつもありがとうございます🙇　ごちそうさまでした🙇　\n\n２日目は　南からの波の予報の為　避けるため　西磯の　フナミの壁?　これまた　えげつないところでした🌊ほぼロッククライミング状態　狭いところでした🌊　ここもボラまみれでしたが　ひたすら際べったりを意識して壁沿いの棚の上に　這わすイメージで🌊\nやっぱり居ましたよ🐟️\n久々の磯弁当は相変わらず　旨かったので　涙が出ました😢\n　\nぼちぼち寒グレ終盤ですが　まだまだ　もっとデカイのが　順番待ちしてるはずなんで　渋い中　我慢すれば　良い結果があるので　我慢と　ぶれない　心で　皆さんも　良型　仕留めて下さい🐟️\nあなたも釣れる　榎本渡船⛵\n僕は引き続き　寒グレシーズン中にサイズアップ目指して　ぼちぼちいきます😁\n　　\n#エサ　池田\nサンライン　ブラックストリーム　3号\nサンラインカップ\nがまかつ　　磯　　フカセ　グレ\n夢とロマンをかきたてる磯\nあなたも釣れる!!\n民宿　榎本渡船","e":"","tg":["榎本渡船","梶賀","エサ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_001_Kajika_Bridge-01.jpg","t":"Kajika Bridge-01.jpg","id":"WEB-287","u":"https://commons.wikimedia.org/wiki/File:Kajika_Bridge-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_Kajika_no_Aburi_Smoked_Japanese_amberjack_from_Kaj.jpg","t":"Kajika no Aburi, Smoked Japanese amberjack from Kajika, Japan.jpg","id":"WEB-303","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_047_Kajika_Shrine-01.jpg","t":"Kajika Shrine-01.jpg","id":"WEB-333","u":"https://commons.wikimedia.org/wiki/File:Kajika_Shrine-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"}],"s":"Instagram #梶賀 (2026-02-23)","su":"https://www.instagram.com/explore/tags/梶賀/"},{"id":"OW-734","c":"nature","a":"owase","t":"梶賀　榎本渡船","x":"梶賀　榎本渡船\n沖は南東の波が高く、中磯の丸石に渡礁。\n\n朝から潮が走っていたので、躊躇なく真鯛狙いを開始！\n竿　トーナメント H-53\nリール　トーナメント LB3000番\n道糸　フカセモンスター 4号\nウキ　エイジア LLC 00\nハリス　ブラックストリーム極 2.5号\nハリ　ヤイバ 真鯛の赤9号\n\n丸石の沖は深いので、棚は感覚で竿4本と設定するが、\n潮が左沖に向けてかなり速く、どこまで入ってるかはまったくわかりません😅\n\n2投目にLINEは張らず緩めずで120mぐらい出した時に、ちょっと持って行ったようなアタリ🙂\nそのまま合わすと、重いだけでぜんぜん引かない。\nイサギかと思い、ゆっくりと磯際まで寄せて来ると、やっとコンコンと頭を振る感じが出て、真鯛の47センチ＾＾\n\nその後終始真鯛狙いに徹しましたが、この1匹で終わりました。\n\n明日を寒グレの最終戦にして、来週からアオリイカのオープニング戦を開始します🫡知らんけど","e":"","tg":["ブラックストリーム極キャンペーン","梶賀","榎本渡船","磯釣り","グレ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_001_Kajika_Bridge-01.jpg","t":"Kajika Bridge-01.jpg","id":"WEB-287","u":"https://commons.wikimedia.org/wiki/File:Kajika_Bridge-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_Kajika_no_Aburi_Smoked_Japanese_amberjack_from_Kaj.jpg","t":"Kajika no Aburi, Smoked Japanese amberjack from Kajika, Japan.jpg","id":"WEB-303","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_047_Kajika_Shrine-01.jpg","t":"Kajika Shrine-01.jpg","id":"WEB-333","u":"https://commons.wikimedia.org/wiki/File:Kajika_Shrine-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"}],"s":"Instagram #梶賀 (2026-02-28)","su":"https://www.instagram.com/explore/tags/梶賀/"},{"id":"OW-735","c":"food","a":"owase","t":"三重県　梶賀　榎本渡船　尾鷲磯釣大会　１位を目指して　最終日(土～日曜の部)","x":"三重県　梶賀　榎本渡船　尾鷲磯釣大会　１位を目指して　最終日(土～日曜の部)\n\nえげつない波の予報でしたが　尾鷲磯釣大会　最終日　きっちり　デカイのを仕留めて　去年の涙を飲んだ２位の屈辱をはらすため　今年こそは堂々の１位と意気込み　トライしてきました🌊\n先に結果ですが　デブデブ45センチと渋い中でも　なんとか良型をゲットできました🐟️　これもパンパンで白子出てました🤩笑\nオベラの高場に渡礁したが　終始　洗濯機状態で　ひたすら　落ち着く際を探して探して　なんとか仕留めました🎣　　　\n夜は池田船長にお鍋をごちそうになり　涙が出ました😢\nいつもありがとうございます🙇\n\n２日目は　前日に釣ったので　安堵のため心に余裕が出来　皆さんのポーターをしてから　余っていた　トーフの地(二番)に渡礁しました🌊　波　ウネリは前日より　少しおさまりましたが　洗濯機　強　でした🌊笑　　謎の透明クラゲ大量発生に悩まされ　道糸に絡んで絡んで　　１日苦戦し　結果　カモメ君達に餌やりと　磯弁当を食べに行っただけですね🤩笑　　\nあ　そう　榎本渡船　弁当が始まりましたよ😋　水筒で温かいお茶も付いてきますので　疲れた体を　旨い弁当と温かいお茶で英気を養って　頑張って　デカぐれ　ゲットして下さい🐟️\n旨すぎて　涙が出ました😢\n\nそろそろ寒グレもラストもラストですかね🐟️　\n皆さん頑張って下さい🐟️\n今シーズンは渋い中　去年と同等の釣果をなんとか　出すことが出来　ぼちぼち集中力も切れてきたので　春風に吹かれて　ポケーっと釣します🙇⤵️\n\n#サンライン　ブラックストリーム　3号\n夢とロマンをかきたてる磯\nあなたも釣れる!!\n民宿　榎本渡船","e":"","tg":["榎本渡船","梶賀","サンライン","がまかつ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_001_Kajika_Bridge-01.jpg","t":"Kajika Bridge-01.jpg","id":"WEB-287","u":"https://commons.wikimedia.org/wiki/File:Kajika_Bridge-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_Kajika_no_Aburi_Smoked_Japanese_amberjack_from_Kaj.jpg","t":"Kajika no Aburi, Smoked Japanese amberjack from Kajika, Japan.jpg","id":"WEB-303","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_047_Kajika_Shrine-01.jpg","t":"Kajika Shrine-01.jpg","id":"WEB-333","u":"https://commons.wikimedia.org/wiki/File:Kajika_Shrine-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"}],"s":"Instagram #梶賀 (2026-03-02)","su":"https://www.instagram.com/explore/tags/梶賀/"},{"id":"OW-737","c":"tourism","a":"owase","t":"紀東めぐり(笑)","x":"紀東めぐり(笑)\n\n今回はついに梶賀へ‼️\n\n前日、ヤンちぬさんが近くにいるみたいでお邪魔しに行きました😄\n\n幅広くいろんな話をしました、が\nなぜかウナギの話題を忘れてた😅\n\n夕方から尾鷲へ向かい、おふくろで夕食✨😁\n夢古道の湯でサッパリ〜😆\n\n翌朝、榎本渡船さんで灯台下へ\n\nいきなり一投目からバラシ😰\nその後は殆どサシエを取らない\nボラだらけ\n\nやっと来たのは何とチヌ‼️\n何でやねん🤣\n\nあとは全くエサを取らない\n潮裏になってんじゃないの❓️😥\n\n水道やると浅いタナでエサを取る🤩\nでもアワセが合わない\nやっとズーン‼️⋯　ボラやねーか😑\n\n思った通り、反対側の磯の方が10時半から良型グレをパタパタ釣ってました💧\n\nグレ無し。あ〜、ついにやらかしてしまった😂","e":"","tg":["梶賀","榎本渡船","がまかつフィールドテスター","釣研フィールドスタッフ","プロモーション"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_001_Kajika_Bridge-01.jpg","t":"Kajika Bridge-01.jpg","id":"WEB-287","u":"https://commons.wikimedia.org/wiki/File:Kajika_Bridge-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_Kajika_no_Aburi_Smoked_Japanese_amberjack_from_Kaj.jpg","t":"Kajika no A e:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""}],"s":"Instagram #楯ヶ崎 (2026-03-22)","su":"https://www.instagram.com/explore/tags/楯ヶ崎/"},{"id":"OW-781","c":"food","a":"kihoku","t":"紀北町周遊ライド③","x":"紀北町周遊ライド③\n渡利牡蠣（一冨士さん）\n三重県北牟婁郡紀北町相賀\n2026.1.28\n\n少しでも暖かくて、穏やかな海が見れて、\n美味しい海鮮が食べれて、まだ行ったことのない所\n今回は、三重県北牟婁郡紀北町を走ることにしました😄🚴\n\nサイクリングコースは、\n「東紀州サイクリングポータルサイト」に紹介されている\n「紀北町周遊＋須賀利ルート」を参考にしました\n\n「道の駅紀伊長島マンボウ」発着で（前々投稿）、\n海岸線を走って（前投稿）折り返し地点の「相賀（あいが）」へ\n\nここは「幻の渡利牡蠣🦪」で有名なんですね😄\n海水と川の水が混じる汽水湖「白石湖」（pic.1)で育てられる\n「渡利牡蠣」今回はこれを食べたくて走ってきました🚴😅\n\nJR相賀駅の近くで相賀橋を渡ったところにある\n「一冨士」さんで頂きました\n迷わず「牡蠣コース」を注文。カウンター席です\n\nとは言うものの私は生牡蠣はあまり好きではないのです😅\nあの独特の生臭が苦手なんです\n\n汽水湖で育った「渡利牡蠣」は塩分が少なく甘味があると\n書いていたので期待していました\n\nまず「酢牡蠣」食べた瞬間思わず\n「生臭くないですね」と言ってしまいました\n「初めてですか？」とご主人が渡利牡蠣について\n詳しくお話ししてくれました\n周囲約4㎞の小さな「白石湖」で養殖されているので\n生産量が少なく地元以外には出回らないそうです\n「渡利」は白石湖周辺の地名です\n\nその後、「焼き牡蠣」、「牡蠣フライ」、「牡蠣鍋」、\n珍しい「牡蠣寿司」、「牡蠣豆腐」どれも美味しい\nほんと臭みがなく甘味旨味があります\n全部で20粒はあったと思います🦪 pic.2,3\n\n最後のデザート「自家製プリン🍮」これも美味しい\n大満足・満腹🫃の「渡利牡蠣 かきコース」でした😄\nこの時期土日は予約で一杯らしいです\nまた食べに来たいです\n\n食事中にご主人より教えて頂いた相賀に流れる\n「奇跡の清流 銚子川」に立ち寄りました\nNHKスペシャルでも紹介されたそうです\n橋の上からでも透明度が高いのが分かりますpic.4\nまたゆっくりさらに上流までライドしたいです\n\n渡利牡蠣を養殖している「白石湖」を一周して\n「太平洋岸自動車道（国道42号）」を走って\n「道の駅 紀伊長島マンボウ」に戻ります🚴〜\n\n満腹なので走るのがしんどい😂\n\n続く","e":"","tg":["渡利牡蠣","紀北町相賀","牡蠣コース","奇跡の清流銚子川","太平洋岸自動車道","ロードバイクおじさん","ロードバイク他府県遠征"],"im":[],"s":"Instagram #渡利牡蠣 (2026-01-31)","su":"https://www.instagram.com/explore/tags/渡利牡蠣/"},{"id":"OW-782","c":"food","a":"kihoku","t":"三重県南部に移住して約1年半。","x":"三重県南部に移住して約1年半。\nようやく幻の牡蠣である、紀北町の白石湖で養殖されている渡利牡蠣を食べる事が出来ました。\n渡利牡蠣は三重県の牡蠣の生産量の1%も無いそうです。\n妻が予約してくれて今回頂くことが出来ました。\n\n今回は、焼き牡蠣と鍋で頂くました。\n小柄な身に旨みがギュッと詰まっており、臭みも殆ど無くめちゃくちゃ美味しかったです。特に醤油バターが罪深いなと思いました。\n.\n.\n.","e":"","tg":["牡蠣","渡利牡蠣","三重県紀北町","海鮮","網焼き"],"im":[],"s":"Instagram #渡利牡蠣 (2026-02-01)","su":"https://www.instagram.com/explore/tags/渡利牡蠣/"},{"id":"OW-783","c":"food","a":"owase","t":"昨年であった、、","x":"昨年であった、、\n職場の先輩に聞いて長年の謎は解かれた、、\n幼少期に尾鷲に売りに来ると母から聞いた\nわたりの牡蠣🦪\n『渡利の牡蠣はいらんかえ〜』\n？？？\nモータサイクルで260号を志摩から長島（紀伊）まで走ると出て tourism","a":"owase","t":"小辺路歩き4日目。最終日である。","x":"小辺路歩き4日目。最終日である。\n今日は高野山に宿を取ろうかと思ったが、高野山はどこも非常に高い。グーグルマップで見ると高いところは10万を超える。宿坊でも2万円。聞くところによると高野山は今外国人観光客に大人気だという。\n\nそんな事で高野山には宿が取れなかったので早めに着いて散策をしたい。6時過ぎには出発した。\n\n今日のコース難所はないが、見どころも少ない。\n序盤はなかなかの登り。道路に出たり山道に入ったり、そんな事を繰り返しお昼前に無事到着した。\n\n80キロ頑張って歩いたが、小辺路を示す看板は古く文字もしっかり判読できない。スタートやゴールの看板もない。せっかく頑張って歩いてきたのだから、そういったモニュメントの前で記念撮影でもしようかと思ったんだけど。(笑)\n\nまあいいや。今回の古道歩きは、昨年のお遍路のお礼参りを兼ねている。誰にお礼を言うかと言うと もちろん 空海さんである。 空海さんのいる奥の院に行こう!\n\n納経所に行きお遍路の時使っていた納経帳を出す。係の人から満願おめでとうございますと労いの言葉を頂く。ありがとうございます。\n\nすると\n\n係の人が、\n\nあれ、すでに奥の院で納経をされていますね。\n\nえっ?!\n\nよく見ると平成23年の7月に奥の院で御朱印を頂いているのだ。お遍路の納経帳には高野山の奥の院のページがある。お遍路を終えた後には、高野山を参拝しましょうということ。お礼参りを勧めているのだ。\n\nだいぶ前に高野山は来ているのだが、お遍路を全部回らないうちに 奥の院で御朱印を頂いたようなのである。スッカリ忘れていた。(笑)\n\nということで以前書いて頂いた上に重ねて頂く。お遍路を何回もやる人は重ねて御朱印をいただくので真っ黒になる。お遍路あるある。\n\nこれで熊野古道小辺路歩きはコンプリートである。お遍路に比べると今回は僅か4日間だけど、毎日山岳コースで山登りが好きな僕にとっては充実した日々だった。\n\n4日間コンビニは全く見ることがなく、コースには商店という商店もほとんどなかった。おかげで事前に準備したたくさんの食料はほぼ無くなり、荷物が日々軽くなった。\n\n色々興味は尽きないが、果無山脈、十津川村にどハマりです!!\n本当凄いところですよ。\n\nさて今回の熊野古道歩きは出張なので後日レポートにまとめて報告したいと思います。レポートというか、ちょっとした小冊子にする予定です。書きたいことはたくさんありますよ。\n\nということで今回の熊野古道小辺路歩きのアップはこれで終了でございます。\n\nお付き合い頂きありがとうございました。\n\n明日からはまた本の紹介をします!!","e":"","tg":["熊野古道","小辺路","高野山","高野山奥の院"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #熊野古道 (2026-03-22)","su":"https://www.instagram.com/explore/tags/熊野古道/"},{"id":"OW-796","c":"tourism","a":"owase","t":"🐦‍⬛熊野古道の花シリーズ🐦‍⬛最近、冬鳥のマヒワたちの声が、高い木のこずえから聞こえます。旅立ちの日が近づいて、...","x":"🐦‍⬛熊野古道の花シリーズ🐦‍⬛最近、冬鳥のマヒワたちの声が、高い木のこずえから聞こえます。旅立ちの日が近づいて、マツやヤシャブシの種をついばんでいるようです。この絵もそんなマヒワを近くの野中集落で観察して描きました✍🏻\n.\n.\n🌿森の工房ばんどり🌿\n-イラストレーター　えびすだにみさこ\n-イラスト制作、ミュージアムグッズ企画デザイン制作、ペットの似顔絵\n-自然や文化の魅力を伝えるコンテンツ制作（ガイドマップ、環境音録音、絵本等）、\n-生き物イラスト教室、植物画レッスンなど、\n-和歌山・熊野の森から発信中 自然アカウント→ 🌳\n.\n🌸Misa🌸\n-Nature artist and naturalist based in Tanabe,  Wakayama pref. 🇯🇵\n.\n.","e":"","tg":["熊野古道","野鳥","マヒワ","kumanokodo","イラスト"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #熊野古道 (2026-03-22)","su":"https://www.instagram.com/explore/tags/熊野古道/"},{"id":"OW-797","c":"tourism","a":"owase","t":"熊野古道古道Day7(紀伊路完全踏破、中邊路）","x":"熊野古道古道Day7(紀伊路完全踏破、中邊路）\n\n今天7點從民宿出發，\n蓋完北郡越與潮見峠越後就完成紀伊路了。\n\n下山時經過天空の里·峰地區展望台，\n享受了一下風景後就先去把滝尻王子的章蓋了。\n走回民宿的路上，在超商看到鯨魚罐頭，\n就順手買來嘗鮮一下，覺得味道很像牛肉。\n\n之後後稍微整頓一下，\n明天就要一路走到近露王子。","e":"","tg":["熊野古道"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Ins \n\n天狗倉山（てんぐらやま）登山を志願\n部長さん、聞き入れてくれて\nありがとう\n（その様子は次回投稿で）\n\n峠に戻って部長さんが準備してくれた\nおむすび弁当とあおさのみそ汁を\nいただいてパワー復活\nさあ下山\n\n下山というのにまた上る？なんていう\nところもあってなかなか大変だったけど、休憩でいただいたおはぎとコーヒーに\n力をもらい無事ゴール\n体力おばけの隆ノ介とにぃには\nへっちゃらの顔\n\n部長さんが撮ってくださった\nたくさんの写真や動画、\n自然な表情をとらえていてどれも素敵❤️\n\nつづく","e":"","tg":["柴犬","家族旅行","熊野古道","馬越峠","トレッキング"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #熊野古道 (2026-03-22)","su":"https://www.instagram.com/explore/tags/熊野古道/"},{"id":"OW-802","c":"tourism","a":"owase","t":"#熊野古道伊勢路の投稿","x":"⁡\n熊野古道伊勢路1️⃣5️⃣⁡\n荷坂峠①⁡\n⁡\n荷坂峠は伊勢と紀伊の国境越えの江戸期の峠道。⁡\n伊勢路３つ目の峠でここの峠道から世界遺産構成区域、世界遺産に指定された道です。⁡\n⁡\n世界遺産でもあり峠道、気合を入れて挑んだんですが、山道が始まってさぁ行くぞ！と意気込んだのもつかの間、ほんの少し緩く登っただけで峠のピークは来ました。⁡\nちょっと拍子抜け💧⁡\n⁡\n⁡\n古道から少し外れた脇に見晴らしのいい展望所と伊勢路のスタンプラリーのポイントがあります。⁡\n伊勢神宮を発って、伊勢路で初めて海が眺めれる展望所です。⁡\n⁡\n#熊野古道伊勢路 ⁡","e":"","tg":["熊野古道⁡","熊野古道伊勢路","歩き旅⁡","街道歩き⁡","旧街道"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #熊野古道伊勢路 (2026-03-04)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-805","c":"food","a":"kihoku","t":"紀北町って知ってますか？（その１）","x":"紀北町って知ってますか？（その１）\n\nご縁をいただいて貴重な体験（モニターツアー）に行ってきました\n\n三重県の名古屋からはVISONの先、伊勢のお隣、尾鷲の手前に紀北町はあります\n\n世界遺産熊野古道伊勢路\n漁師町の海の幸\n尾鷲ひのきと紀州備長炭\nヒノキ職人と箸づくり\n\n今まで知らなかったけど\n素晴らしい場所でした\n\n熊野古道でも紀北町にある馬越峠は\n中でも比較的お気軽に歩けるようです\n以前から行ってみたいと思っていて\n石畳を歩いて　木々の間を歩く\n坂道で結構ハードである\n江戸時代にタイムスリップできる\n\n尾鷲ひのきで建てられた熊野古道センターで\nガイドさんが詳しく教えてくれて\n熊野古道の全容と歴史を知ることができた\n\n米の生育に向かないこの地域には\n尾鷲ひのきと紀州備長炭で年貢を納めるよう\n人工林が幕府の命で作られたそう\n\nお遍路コスプレが体験できて楽しかったし\n着物コスプレも男女共にあるようで\n次回はそれもいいなぁと思ったり\n紀州備長炭を叩いて音を奏でると\n金属のような音がするほど硬くて\n火もちのよい上質な炭であることがわかる\n\nノスタルジックな漁師町\n魚まちを語り部さんにご案内してもらった\n子供の頃によく食べたみりん干しを干してある店先を通り昔ながらの漁港やまちを探索\n実際に歩いてお話を聞く機会はなかなかない\n昔と今を知ることができとても楽しかった\n\n炭焼き職人を訪ねる\n窯出しは２週間に1回\nしかも時間はその時の炭次第\n今回ミラクルなことに立ち会うことができた\n赤く輝く備長炭の美しさに感動\n冷めると黒いダイヤモンド紀州備長炭となる\n\n貴重な炭で焙煎された珈琲は\n格別のお味でした\n\n宿　紀伊の松島さんでは港にあがったとれたての魚介づくしのお料理　はじめて　マンボウを刺身でいただいた　その２につづく〜","e":"","tg":["熊野古道伊勢路","紀北町","魚まち","紀州備長炭","尾鷲ひのき"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #熊野古道伊勢路 (2026-03-08)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-806","c":"tourism","a":"owase","t":"2026.3.11","x":"2026.3.11 \n古道ハイク\n熊野古道伊勢路 松本峠を行く。（三重県熊野市）\n\n① 松本峠 → 鬼ヶ城跡\n\n江戸時代の石畳が残り 古道の雰囲気も半端なく良き。\n苔むす石畳を登り切れば お地蔵さんが迎えてくれる。\n何度 歩いても 飽きることがない。\n今日は木本へ降らず 鬼ヶ城跡方向へ…。\n途中の東屋からの絶景。七里御浜を見下ろしながらしばし休憩。\n\nこの後は 今日の目的②へ。","e":"","tg":["熊野古道トレッキング","熊野古道伊勢路","熊野古道松本峠","鬼ヶ城跡"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #熊野古道伊勢路 (2026-03-11)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-807","c":"tourism","a":"owase","t":"・・・","x":"・・・\n終わりにしよう・・・。\nて、三木峠の話ね！\n\nこの後、羽後峠  甫母峠  二木島峠  逢神坂峠\n松本峠 ～熊野速玉大社  那智大社  本宮大社\nと続きます・・・。\n\nでも、安心して下さい！\nまだ、撮影に行ってません。なので しばらく\nありません。  が・・・その時には、よろしく。","e":"","tg":["紀伊山地の霊場と参詣道","熊野古道伊勢路","三木峠","写真好きな人と繋がりたい","ファインダー越しの私の世界","カメラマンさんと繋がりたい","三重県尾鷲市"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #熊野古道伊勢路 (2026-03-11)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-808","c":"food","a":"owase","t":"いつもありがとうございます♪","x":"いつもありがとうございます♪\n\n今年初の外国人のお客様！南米チリから\n\n熊野古道かと思いきや、賢島からサイクリングで\n尾鷲へ、そして次の日はさらに南下するとの事\nいろんな方がお見えになります\n\nこれから暖かくなると熊野古道の外国人観光客も\n増えてくるのかなと思ってます\n\nこんな時、英語メニューがとても役に立ってます\n\n先日、駅に掲示されていた高校生有志が作った\n英語の熊野古道の案内を\n当店でも掲示したいので尾鷲市にお願いをしています\n少しでも観光客の方々のお役に立てればと\n思っています\n\n尾鷲の街を楽しんでいただけたらと\n\nたくさんの方が尾鷲に訪れますように♪","e":"","tg":["サイクリング","熊野古道伊勢路","下山メシ","居酒屋可笑","尾鷲市"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/unsplash_001_kumano_kodo_forest_path.jpg","t":"Kumano Kodo forest path","id":"WEB-279","u":"https://unsplash.com/s/photos/kumano-kodo","li":"Unsplash License (free for commercial use)","loc":"尾鷲市/熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"}],"s":"Instagram #熊野古道伊勢路 (2026-03-12)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-809","c":"food","a":"owase","t":"山の学校1期生卒業旅行、世界遺産鬼ヶ城を歩いてきました。","x":"山の学校1期生卒業旅行、世界遺産鬼ヶ城を歩いてきました。\n大阪難波より松阪駅乗換で熊野市駅まで約4時間、長い移動も半年間同じプログラムを共にした仲間です。ワイワイと楽しみながら到着。\n\n地元のベーカリーでランチを購入して、熊野古道伊勢路へ。石畳の松本峠から海側へ進むと、絶景の東屋があってランチタイム。\n\n城があったとされる見晴台からは太平洋を一望できました。降りていく道は桜並木で、早咲きの桜がお出迎え。青空とマッチして良い感じ。\n\n世界遺産鬼ヶ城は波が作り出した大岩壁で、写真で見るよりも迫力満点でした。沢山写真を撮りながら進み、岩に登ったりしましたね。\n\n周回コースで熊野市駅へ戻り、カフェでまったりしてから尾鷲駅のホテルへ移動。ボリューム満点の新鮮な魚で晩ごはん。美味しかったなあ。2日目に備え、ゆっくり休みました。\n\n2日目、ホテルで新鮮な魚や鯛めし茶漬けの朝食で精をつけて出発。象の背で有名な便石山へ。\n\nまずは馬越峠という世界遺産熊野古道伊勢路を歩きます。江戸時代頃の石畳が長い区間残っていて、木漏れ日と杉並木が神聖な雰囲気を醸し出していました。峠まで登りきってからは一転して下り坂へ。また登りのに〜なんて声が聞こえてきます。\n\nコルに到達してからは激登り。歩きやすいですが体力を削ってくる階段が延々と続きます。休憩しながら少しずつ進み、山頂に到着！あれ、眺望なし。象の背はこの先なんです。\n\n山頂から少し下ったときところ、一気に視界が広がる感動の絶景「象の背」に到着。太平洋や周辺の山々を一望でき、遮るものがないため独り占めしたような気になります。ゆっくり個人撮影も楽しんで、絶景の中ランチタイム。集合写真もバッチリでした。\n\n長い下り坂を慎重に降りて下山。種まき権兵衛の里は休館でしたが、散りはじめの河津桜が綺麗でした。無人の相賀駅から鈍行列車に揺られ、近鉄特急の階下席でお喋りしていたらあっという間に難波駅。\n\n1年間楽しい思い出ができました。ご参加ありがとうございました！","e":"","tg":["熊野古道伊勢路","鬼ヶ城","象の背","馬越峠","山の学校"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #熊野古道伊勢路 (2026-03-12)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-810","c":"tourism","a":"owase","t":"2026.3.12⁡  尾鷲藪漕隊活動日⛰⁡","x":"2026.3.12⁡  尾鷲藪漕隊活動日⛰️⁡\n⁡今日は熊野古道曽根次郎坂太郎坂の古道脇の立枯れの木などの処理に…⁡\n⁡40本ぐらいはお片付け完了⁡\n高さのある立木は緊張感漂いますね💦⁡\n⁡無事に作業終われて良かったです。⁡\n⁡曽根区の方も同行して下さり、作業後は区長様からの差し入れも…⁡\n⁡ありがとうございました🙇‍♀️⁡\n⁡⁡\n⁡#尾鷲藪漕隊⁡\n⁡#登山道整備⁡\n⁡#熊野古道伊勢路⁡\n⁡#曽根次郎坂太郎坂","e":"","tg":["尾鷲藪漕隊⁡","登山道整備⁡","熊野古道伊勢路⁡","曽根次郎坂太郎坂"],"im":[],"s":"Instagram #熊野古道伊勢路 (2026-03-12)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-811","c":"tourism","a":"owase","t":"・・・","x":"・・・\n速報はさみましたが・・・\n楽曲紹介。\n\n乃木坂46\nアンダーメンバー楽曲のベストアルバム\n斎藤ちはるアナが卒業するちょっと前に\n発売されたので、ちはるの卒業記念じゃね？\nと、後に囁かれたアルバム・・・。\n\nアンダー楽曲のアルバム発売て、前例の\nない快挙な出来事でした。\nそれほど、当時のアンダーメンバーが\n素晴らしかったということ。\n\n2枚組で26曲ほどありますが、万年アンダー\n斎藤ちはる は、ほぼ皆勤状態。笑\n\n参加してないのは、唯一選抜メンバーだった\n10th の楽曲2曲と、中元さんのソロ曲のみ。","e":"","tg":["熊野古道伊勢路","三木峠","写真","楽曲紹介","乃木坂46","僕だけの君","アンダースーパーベスト","2018年発売"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_da ano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #熊野古道伊勢路 (2026-03-21)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-816","c":"tourism","a":"owase","t":"伊勢路　八鬼山越え　と便石山(599m)天狗倉山","x":"伊勢路　八鬼山越え　と便石山(599m)天狗倉山\n\n春の陽気の下、尾鷲を囲む名峰巡り現地1泊\n八鬼山越えはいつものJR回送、少し(いや結構)無駄はあるものの楽しいんですよこれが、あと全然人に会わん\n\n便石山·天狗倉山(とオチョポ岩まで)は今回もダブルピストン、歩きが雑な人にとっては膝クラッシャーな階段地獄、こちらはわかりやすく人気のようでかなり人に会いました\n\n今回尾鷲周辺で全然宿が取れなかったので実は新宮(和歌山ね)まで移動したりとてんやわんや有りましたが、とにかく快晴の好展望に恵まれて良かったです、次回あるならもうちょいスムーズに通したいなー","e":"","tg":["登山","熊野古道伊勢路","尾鷲トレイル気になって〼"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #熊野古道伊勢路 (2026-03-21)","su":"https://www.instagram.com/explore/tags/熊野古道伊勢路/"},{"id":"OW-817","c":"food","a":"owase","t":"久々の‼ 20kupの天然ブリ定置物　٩( ᐛ )و","x":"久々の‼️ 20kupの天然ブリ定置物　٩( ᐛ )و\n\n身質も脂乗りも抜群の一級品‼️\n熊野灘からの贈り物です、ありがたく商いさせて頂きます\nm(_ _)m  色んな方々に感謝。","e":"","tg":["熊野灘","天然ぶり","最高級","定置網"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_ asaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons.wikimedia.org/wiki/File:熊野灘_-_panoramio_(1).jpg","li":"CC BY 3.0","loc":""}],"s":"Instagram #熊野灘 (2026-03-20)","su":"https://www.instagram.com/explore/tags/熊野灘/"},{"id":"OW-822","c":"nature","a":"owase","t":"【大切なお知らせ】","x":"【大切なお知らせ】\nmogcookをご愛用いただいた皆様へ。\n三重の海と、お魚のバトンを株式会社ゲイトさんの「お魚ごはん」へ繋ぎます🤝🐟\n\nこれまでmogcookを通じて、たくさんのお子様の離乳食期に寄り添わせていただき、本当にありがとうございました。\n\n私たちが大切にしてきた「三重の豊かな海産物を、安心できる形でお届けしたい」という想い。\nこのバトンを、同じ三重県で漁業から加工までを一貫して行う株式会社ゲイト様へ託すことになりました。\n\n株式会社ゲイト様は、熊野灘（くまのなだ）を拠点に、自社の船で漁に出る「漁師」でありながら、加工・販売までを手掛けるプロフェッショナルです。\n私たちが自信を持っておすすめできる、新しいお魚の楽しみ方をご紹介します。\n\n🐟 「お魚ごはん」、ここがおすすめ！\n① 漁師直送だからできる、圧倒的な鮮度！\n② 塩や水すら加えない、お魚100%の完全無添加製法！\n③ 常温で1年保存できる便利なレトルトパック！\n\n🎁 mogcookユーザー様へのお約束 🎁\n「お魚ごはん」オンラインストアでお買い物をする際、購入画面の備考欄に【mogcook】または【モグック】とご入力ください。\nmogcookオリジナルの「レシピカード」をプレゼントとして同梱させていただきます🐟✨\n（※入力してくださった方限定の特典となります！）\n\nmogcookとしての販売はお休みとなりますが、これからは「お魚ごはん」で、皆さまの食卓がもっと笑顔になることを願っています。\n\n新しいサイト（引き継ぎページ）の詳細は、プロフィール欄のリンクからぜひご覧ください！\n▶︎\n\n【お魚ごはん　インスタグラム】","e":"","tg":["mogcook","モグック","離乳食","お魚離乳食","ベビーフード","ゲイト","熊野灘","三重県","無添加離乳食","漁師直送"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons. 乗りが悪い……\n\nポイント変えてもイマイチ\n\n計7匹ゲットして本命の昼イカ釣りに\n\nポイントは110m〜130mに絞り魚探での散策\n\n魚探の反応が悪く\n砂地の中に点在するシモリ付近で実釣\n\nしかしアタリ無し\n\nもともと初めての昼イカ釣り🦑\n\n見極め早く\nあかんなって事で\n安定のノマセ釣りに変更\n\nん？\n\nノマセにもアタリが無い\n\n潮が早すぎるせいか？\n\nライト天秤も試してみるが\n潮が早すぎてオモリ100号を使用\nもはやライト天秤超えて普通の天秤釣り\n終盤になって\nやっとまともなアタリ\n\n釣れたのは40cm級のシロアマダイ\n\nこの後\nテップラン調査\nでも\nまたまたサルパの猛攻\n\nラインやガイドにもサルパがまとわり付く始末\n\n活き餌が残っていたので\nワンチャンで\n夕まずめのノマセ釣り\n\nその時\nノマセのアタリに船上がざわめく❣️\n上がって来たのは\nなんと\n外道定番のエソ…………\n\nこれで終了\n\nサルパのせいか\n全体的に渋々でした\n\n釣果\n\nシロアマダイ1匹\nアヤメカサゴ2匹\nエソ1匹でした","e":"","tg":["調査船","尾鷲沖","紀北沖","熊野灘","魚釣り"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons.wikimedia.org/wiki/File:熊野灘_-_panoramio_(1).jpg","li":"CC BY 3.0","loc":""}],"s":"Instagram #熊野灘 (2026-03-22)","su":"https://www.instagram.com/explore/tags/熊野灘/"},{"id":"OW-830","c":"culture","a":"owase","t":"ソルティガ6500整備依頼","x":"ソルティガ6500整備依頼\n\nグリスが回った様でワンウェイクラッチが昔のリールな感じ笑\n兎に角ネジが緩まず炙ったり叩いたりで悪戦苦闘の末どうにか摘出できました、塩っていうかネジロック剤がペンキ塗った？って位に強かった💦","e":"","tg":["熊野灘"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg"," gari Town Alley","id":"WEB-196","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"}],"s":"Instagram #須賀利 (2026-01-22)","su":"https://www.instagram.com/explore/tags/須賀利/"},{"id":"OW-895","c":"tourism","a":"owase","t":"2026/01/22","x":"2026/01/22\n\n尾鷲の山道整備のボランティア団体\n藪漕隊(やぶこぎたい)さんと、\n須賀利の天然記念物大池小池までの、山道の下見と整備を\nさせて頂きました😊\n\n藪漕隊さんは、尾鷲トレイルという全長約40キロの山道を\n整備されたすごい方々。\n\n今回は、たまたまSNSでご縁をいただいたことがきっかけでしたが、\n須賀利の観光資源を生かしたいという想いに共感してくださり、\n一緒に活動させていただくこととなりました☺️\n\n大池小池までの登山道は、藪はありませんでしたが、\n堆積された落ち葉が積もる急斜面があり、\n滑りやすく上級者向けな箇所もありました。\n\n藪漕隊の皆様、落ち葉を避けたり、倒木を切ったりと\n行動力に圧倒されました。\n平均年齢70歳とのこと！すごいです🥰\n\n今後、この登山道も須賀利の大切な観光資源として\n少しずつPRと整備を進めて行きたいです☺️\n\n藪漕隊の皆様、本当にありがとうございました。","e":"","tg":["地域おこし協力隊","須賀利","尾鷲市","大池小池","登山"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_055_須賀利町-19.jpg","t":"須賀利町-19.jpg","id":"WEB-341","u":"https://commons.wikimedia.org/wiki/File:%E9%A0%88%E8%B3%80%E5%88%A9%E7%94%BA-19.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_012_sugari_town_blue_sky.jpg","t":"Sugari Town Blue Sky","id":"WEB-180","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_014_temple_stairs_sugari.jpg","t":"Temple Stairs Sugari","id":"WEB-184","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"}],"s":"Instagram #須賀利 (2026-01-22)","su":"https://www.instagram.com/explore/tags/須賀利/"},{"id":"OW-896","c":"tourism","a":"owase","t":"2026/01/25","x":"2026/01/25\n\n今日は須賀利町内の皆さんでお食事とカラオケを楽しむ\nふれあい会が行われました。\n\nそこで、NHK激突メシあがれで作り優勝させていただいた\nマグロの頭おむすびを振る舞わせて頂きました☺️\n\n献立としては\nマグロの頭含めた3種類のおむすび、\n私の実家の定番の松前漬け、\n旦那の実家のひのな漬け、自家製かりんシロップ、\n地元の方が作ってくださった豚汁、みかんです。\n\n皆さんの前で握りながら提供するということで、\nバタバタでしたが町内の方にもご協力頂き\n滞りなく無事皆さんにお召し上がりいただけました✨\n\n最後の挨拶の時に温かい拍手までいただけました。\n皆様、喜んでいただけた様で、\n本当に嬉しかったです☺️\n\n今後マグロの頭おむすびも、須賀利ツアーに組み込んだりして\nたくさんの方に味わっていただける様にしていきたいです☺️","e"
