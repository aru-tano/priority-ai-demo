","x":"尾鷲は熊野灘で獲れるカツオの水揚げ地として知られ、特に「日帰りカツオ」と呼ばれる同日水揚げの鮮度が自慢。漁師が朝に熊野灘の漁場で釣り上げたカツオを昼には尾鷲港に水揚げし、尾鷲漁協の市場でセリにかけられる。漁協関係者は漁場からの連絡を受けると直ちに受け入れ準備を始め、入港と同時にセリ・出荷という迅速な体制を敷く。専門機器による分析では、日帰りカツオは翌日水揚げのものより歯応えが強く、鮮度の差が科学的にも実証されている。水揚げ時期の最盛期には市内の鮮魚店やスーパーで手軽に購入でき、地元飲食店では刺身・たたき・カツオ茶漬けなどで提供される。尾鷲市公式サイトでも「鮮度が命 尾鷲のカツオ」として特集されており、尾鷲を代表する海の幸の一つ。黒潮が運ぶ回遊魚のカツオは、尾鷲の漁業の多様性と熊野灘の豊かさを象徴する魚種である。","e":"社会科「水産業」の学習で、鮮度管理と流通の仕組みを地元の実例で学べる。「朝獲れたものが昼に届く」スピード感は子どもにも伝わりやすい。","tg":["カツオ","日帰り漁","鮮度","熊野灘","水揚げ","food"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons.wikimedia.org/wiki/File:熊野灘_-_panoramio_(1).jpg","li":"CC BY 3.0","loc":""}],"s":"尾鷲市公式サイト「鮮度が命 尾鷲のカツオ」、尾鷲観光物産協会","su":"https://www.city.owase.lg.jp/"},{"id":"OW-118","c":"food","a":"owase","t":"尾鷲のマハタ — 日本一の養殖生産量を誇る幻の高級魚","x":"マハタはハタ科の大型魚で天然の漁獲量が少なく「幻の高級魚」と呼ばれる。尾鷲では昭和60年代（1980年代）から養殖が始まり、三重県内で最も長い養殖の歴史を持つ。三重県のマハタ種苗生産は全国の約90%を占め、その約80%が尾鷲市で生産されており、尾鷲は日本一のマハタ養殖産地。リアス式海岸が生む穏やかな入り江が養殖に適しており、大量出荷を可能にしている。マハタの身はコラーゲンが豊富で透明感のある白身、弾力があり加熱しても崩れにくいのが特徴で、和食・洋食・中華を問わず多様な料理に使える。「尾鷲真羽太協議会」が生産者・漁協・県・市の連携でブランド化を推進し、知名度向上と販路拡大に取り組んでいる。尾鷲市のふるさと納税返礼品としても人気が高い。学校給食にも取り入れられ、子どもたちが地元の養殖魚を食べる食育にもつながっている。","e":"社会科「水産業」で養殖業の仕組みと地域ブランド戦略を学ぶ教材。給食に出るマハタを通じて食育と地域産業を結びつけられる。理科の海洋環境学習にも。","tg":["マハタ","養殖","高級魚","ブランド","リアス式海岸","food"],"im":[],"s":"尾鷲市公式サイト「尾鷲のマハタ」、尾鷲観光物産協会、三重県プライドフィッシュ","su":"https://www.city.owase.lg.jp/"},{"id":"OW-119","c":"food","a":"kihoku","t":"渡利牡蠣 — 白石湖で育つ幻の汽水カキ","x":"渡利かき（わたりかき）は、紀北町相賀にある白石湖で養殖されるカキで、生産量の少なさから「幻のカキ」の異名を持つ。白石湖は大台山系の船津川と熊野灘の海水が混じり合う汽水湖で、プランクトンとミネラルが豊富な独特の環境。養殖の歴史は古く、安永年間（1772〜1781年）には本格的な養殖が行われていた記録がある。採卵から種苗育成・養殖・出荷まですべて白石湖内で完結する一貫生産体制は、日本国内でも珍しい。汽水湖育ちのため磯臭さやクセが少なく、生食ではさっぱりとした味わいで、加熱すると旨みが凝縮される。グリコーゲンを多く含み、身全体が黄色みを帯びるのが特徴。出荷時期は冬季（11月〜3月頃）で、地元の飲食店で渡利かき料理を提供する期間は限られる。厳密には紀北町の産品だが、東紀州の食文化圏として尾鷲地域と密接に結びついており、尾鷲から車で20分程度の距離にある。","e":"理科「水の循環」で汽水湖の仕組みを学ぶ実例。社会科「農業・水産業」で養殖の工夫を学ぶ教材。地域の伝統産業として250年の歴史を持つ点も歴史学習に。","tg":["渡利かき","牡蠣","白石湖","汽水湖","養殖","紀北町","food"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Wikipedia「渡利かき」、東紀州の食、大紀商店、さかな通信","su":""},{"id":"OW-120","c":"food","a":"owase","t":"尾鷲の干物文化 — 明治から続く九鬼・港町の手仕事","x":"尾鷲は熊野灘の豊富な魚種と温暖な気候を活かした干物の産地として知られる。特に九鬼町の浜千商店は明治20年（1887年）創業で、130年以上にわたり手作り干物を生産し続けている。黒潮が運ぶ脂ののった魚を天日で干すことで旨みが凝縮され、尾鷲港で水揚げされた地魚を中心に、アジ・サバ・カマス・サンマ・タチウオなど多種多様な干物が作られる。北村商店（創業80年以上）や丸清北村商店など複数の老舗が市内で操業し、それぞれに独自の塩加減・干し具合のこだわりがある。近年はオンライン通販やふるさと納税返礼品としても全国に出荷され、「尾鷲の干物」ブランドが広がっている。海洋深層水の濃縮水を使った干物も開発され、伝統と革新が共存する。干物作りの風景は尾鷲の港町らしい日常の一コマであり、町を歩けば天日干しの風景に出会えることもある。","e":"家庭科の保存食の学習で干物作りの工夫を学ぶ。社会科「工場の仕事」で地元の水産加工業を取材する教材。明治から続く歴史は総合学習の地域産業調べに。","tg":["干物","九鬼","水産加工","浜千商店","天日干し","food"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/himono_001.jpg","t":"干物","id":"WEB-392","u":"https://commons.wikimedia.org/wiki/File:Himono_01.JPG","li":"CC BY 2.5","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/sanma_himono_001.jpg","t":"サンマの一夜干し","id":"WEB-395","u":"https://commons.wikimedia.org/wiki/File:Pacific_saury_dried_overnight.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_004_kuki.jpg","t":"Kuki","id":"WEB-164","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町"}],"s":"浜千商店公式、北村商店公式、尾鷲観光物産協会、全力応援サイト「三重のお宝マーケット」","su":""},{"id":"OW-121","c":"food","a":"owase","t":"尾鷲の学校給食と食育 — ふるさとの魚を食べて育つ子どもたち","x":"尾鷲市では学校給食に地元の新鮮な魚介類を積極的に取り入れ、食育を推進している。ブリ・マダイ・マハタなど地元で水揚げ・養殖された魚を使った給食は子どもたちに大好評で、「地元で獲れた魚を食べることでふるさとの自然や漁業の大切さを実感できる」と評価されている。食育の一環として漁業関係者が学校を訪問し、漁の話や魚の特徴を伝える出前授業も実施。子どもたちが「食べ物の背景」を学ぶ機会が充実している。ふるさと納税の寄附金を活用して2023年に新たな学校給食センターが建設され、衛生管理と地産地消の両立が図られている。尾鷲市の学校給食は単なる昼食ではなく、地域の一次産業と子どもの学びを結ぶ教育の場として機能しており、「魚を育て、食べることがふるさとへの学び」というコンセプトで全国からも注目されている。","e":"食育の授業で「給食の魚はどこから来るの？」という問いから漁業・養殖・流通を探究できる。栄養教諭との連携授業に最適な素材。","tg":["学校給食","食育","地産地消","マハタ","ブリ","給食センター","food"],"im":[],"s":"ふるさと納税バイブル「尾鷲市の食育」、尾鷲市公式サイト給食ページ","su":"https://www.city.owase.lg.jp/"},{"id":"OW-122","c":"food","a":"owase","t":"尾鷲のクラフトビール — 地元食材で醸す新しい味","x":"尾鷲市では地元産の食材を活かしたクラフトビールの開発が進んでいる。2021年、夢古道おわせを運営する「熊野古道おわせ」が、尾鷲市向井の岡祐五さん（真祐丸ファーム）が栽培するフィンガーライムを使ったクラフトビール「フィンガーライムマリンエール」を発売。和歌山県有田川町の醸造所への委託醸造で、柑橘の爽やかな香りが特徴。また、尾鷲名産の完熟甘夏と尾鷲ヒノキを使った「君のいる街」というビールも、尾鷲市役所の委託醸造として開発された。I・Uターンの促進とまちづくりのメッセージを込めた商品で、尾鷲の甘夏畑とヒノキ林をイメージした味わい。地酒としては尾鷲市内に酒蔵はないが、海洋深層水を使った焼酎や日本酒が周辺地域で製造されている。尾鷲しお学舎の甘夏塩サイダーも人気商品で、地元産柑橘と海洋深層水の塩のコラボレーション。","e":"総合学習で「地域の特産品を使った新商品開発」の実例として活用。6次産業化（農漁業×加工×販売）の概念を学ぶ入口に。","tg":["クラフトビール","フィンガーライム","甘夏","6次産業","food"],"im":[],"s":"五月亭日記、CRAFT BEER LIFE「君のいる街」、尾鷲観光物産協会","su":""},{"id":"OW-123","c":"society","a":"owase","t":"尾鷲市の人口減少 — 3万人から1.5万人への半世紀","x":"尾鷲市の人口は市制施行（1954年）当時の約3万人から一貫して減少を続け、2025年1月時点で約15,524人と半世紀で約半減した。国立社会保障・人口問題研究所の2023年12月推計によると、2020年から2050年までにさらに56.2%減少し約7,100人になると予測されている。さらに何も対策を講じなければ2060年には4,302人にまで減少する見通し。減少の主因は若年層の流出で、高校卒業後に進学・就職で市外に出た若者が戻らないパターンが半世紀以上続いている。平成の大合併では紀北町（旧紀伊長島町・海山町）との合併協議が破談になった経緯があり、単独市として人口減少に向き合う形となった。市は人口ビジョン（平成27年策定、令和4年改訂）で「2060年目標人口1万人」を掲げ、移住促進・子育て支援・雇用創出を3本柱とした総合戦略を推進している。","e":"5年生社会科「人口と国土」で過疎地域の実例として活用。人口グラフの作成は算数の統計学習にもなる。「自分たちのまちの未来」を考える総合学習の題材。","tg":["人口減少","過疎","将来推計","人口ビジョン","高齢化","society"],"im":[],"s":"尾鷲市人口ビジョン（令和4年改訂）、国立社会保障・人口問題研究所2023年推計、尾鷲市公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-124","c":"society","a":"owase","t":"尾鷲市の高齢化 — 高齢化率45%超の現実と福祉","x":"尾鷲市の高齢化率（総人口に占める65歳以上の割合）は令和2年（2020年）時点で45.0%に達し、三重県平均（30.2%）を14.8ポイント上回る全国でも屈指の高齢化地域。2025年1月時点では46.3%とさらに上昇し、20〜39歳の若い女性は総人口のわずか6.5%にすぎない。独居高齢者や高齢者のみの世帯が増加しており、市は地域包括ケアシステムの機能強化に取り組んでいる。具体的な福祉施策として、65歳以上の一人暮らし・高齢者世帯で調理困難な方への食の自立支援事業、要介護4以上の在宅介護家族への介護用品利用券の支給などが実施されている。災害時の要援護者把握とネットワーク化も進められており、南海トラフ地震への備えと高齢者福祉は不可分の課題となっている。医療面では市内に総合病院が1か所（尾鷲総合病院）あり、高度医療は松阪市や津市への通院が必要。","e":"道徳や総合学習で「高齢者とともに生きる」テーマに活用。福祉体験学習の導入で地域の現状を数字で示す資料に。防災×福祉の横断学習にも。","tg":["高齢化","福祉","地域包括ケア","独居高齢者","society"],"im":[],"s":"尾鷲市高齢者保健福祉計画、尾鷲市人口ビジョン、日本医師会JMAP地域医療情報","su":""},{"id":"OW-125","c":"society","a":"owase","t":"移住と地域おこし協力隊 — おわせ暮らしサポートと空き家2,000軒","x":"尾鷲市は2014年度から空き家バンク制度を開始し、移住希望者と空き家所有者のマッチングを行っている。2013年の調査で尾鷲周辺地区だけで約1,000軒、市全体では約2,000軒近い空き家があるとされ、空き家率は全国平均の約2倍にあたる約27%に達する。移住相談窓口「おわせ暮らしサポートセンター」は地域おこし協力隊が運営し、移住に関わるイベント・仕事バンク・空き家バンクを一体的に管理。2023年3月末時点で151世帯・256名の移住実績がある。地域おこし協力隊は商工観光・移住支援・森林整備・教育など複数分野で募集され、任期後に定住する隊員もいる。課題は空き家の多さに対して「貸したくない」所有者が多いこと。先祖代々の家を他人に貸すことへの抵抗感が空き家バンクへの登録を阻んでいる。市は2022年に「ゼロカーボンシティ宣言」を行い、環境と移住を結びつけた新しい地域像を提示している。","e":"総合学習で「まちの未来を考える」テーマに活用。空き家問題は社会科の「地域の課題」学習にも直結。移住者の声を聞く取材活動も企画可能。","tg":["移住","空き家バンク","地域おこし協力隊","おわせ暮らし","society"],"im":[],"s":"Kii「空き家バンクを地域おこし協力隊が3年間運営してみた」、尾鷲市公式サイト、SMOUT、LOCAL LETTER","su":"https://www.city.owase.lg.jp/"},{"id":"OW-126","c":"society","a":"kihoku","t":"東紀州の中心地・尾鷲と紀北広域連合 — 1市1町の広域行政","x":"尾鷲市は三重県南部の東紀州地域の中央に位置し、北牟婁郡紀北町（旧紀伊長島町・海山町）とともに「紀北広域連合」を構成する。1999年4月に設立されたこの広域連合は、2007年に尾鷲地区広域行政事務組合と統合され、消防・ごみ処理・介護認定審査などを共同で行っている。三重県紀北県民センターの管轄は尾鷲市と北牟婁郡で、この地域は「尾鷲生活創造圏」として位置づけられている。東紀州地域は尾鷲市・紀北町・熊野市・御浜町・紀宝町の2市3町で構成され、尾鷲は商業・医療・行政サービスの中心地として周辺地域の生活を支える。ただし東紀州は三重県の中でも県北部と比べて経済格差や生活基盤整備の遅れが指摘されており、紀勢自動車道の整備によるアクセス改善が地域活性化の鍵とされている。かつては3万人超の人口を抱えた尾鷲市は、東紀州における最大の都市であり続けている。","e":"社会科「市の様子」で尾鷲市と周辺自治体の関係を学ぶ資料。広域連合の仕組みは「みんなで協力する行政」として理解しやすい。","tg":["東紀州","紀北町","広域連合","紀北県民センター","society"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"尾鷲市公式サイト、Wikipedia「紀北広域連合」「東紀州」、三重県公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-127","c":"society","a":"owase","t":"伊東将志と「つちからみのれ」 — 尾鷲のまちづくりを牽引する地域プロデューサー","x":"伊東将志（いとうまさし）は尾鷲市で長年にわたり地域プロデューサーとして活動する人物で、一般社団法人「つちからみのれ」を率いる。中部電力尾鷲三田火力発電所の廃止（2018年）後、「鉄から土へ」をスローガンに掲げ、発電所跡地の再生と尾鷲のまちづくりに取り組んでいる。官民一体・多世代を巻き込む形で「ふるさと尾鷲」の次の未来につながる事業開発に挑戦。尾鷲市のゼロカーボンシティ宣言（2022年）を受け、日本自然保護協会と連携したネイチャーポジティブなまちづくりにも参画。林業・農業（甘夏）・漁業・定置網などの一次産業と環境保全を融合させた地域モデルの構築を目指している。NPO・行政・民間企業をつなぐ中間支援組織としての役割を果たし、ETIC.のBeyondersプログラムでも尾鷲の取り組みが紹介されるなど、全国的にも注目される地域リーダーの一人。","e":"キャリア教育で「地域で働く大人」の実例として紹介。総合学習の「まちの未来」テーマでゲストティーチャーとして招く可能性も。","tg":["伊東将志","つちからみのれ","まちづくり","地域プロデューサー","ゼロカーボン","society"],"im":[],"s":"日本自然保護協会、ETIC. Beyonders、TUNAGU、SMOUT","su":""},{"id":"OW-128","c":"society","a":"owase","t":"尾鷲の空き家問題 — 27%の空き家率と地域の模索","x":"尾鷲市の空き家率は約27%で全国平均の約2倍。人口減少と高齢化に伴い、住む人がいなくなった家が市内各地に増え続けている。2013年の調査で尾鷲周辺地区だけでも約1,000軒の空き家が確認され、市全体では2,000軒近くに上るとされる。空き家バンク制度は2014年から運用されているが、「先祖代々の家を知らない人に貸したくない」「仏壇があるから手放せない」という心理的障壁が大きく、バンクへの登録は進みにくい。一方で放置された空き家は倒壊リスク・火災リスク・景観悪化・害獣の棲家化などの問題を引き起こす。地域おこし協力隊が空き家の所有者と移住希望者の間に入って信頼関係を構築する「橋渡し」の役割を担い、一軒一軒の事情に寄り添いながら活用を進めている。空き家の改修費用補助制度もあるが、根本的な解決には人口減少そのものへの対策が不可欠。","e":"総合学習で「まちの課題」を考える際のリアルな素材。道徳で「地域を大切にすること」を考える導入にも。空き家マップ作りは地図学習にもなる。","tg":["空き家","空き家バンク","人口減少","地域課題","society"],"im":[],"s":"Kii、尾鷲市公式サイト「地域創生係 空き家バンク」、HOMES空き家バンク","su":"https://www.city.owase.lg.jp/"},{"id":"OW-129","c":"disaster","a":"owase","t":"1854年安政東海・南海地震と尾鷲 — 江戸時代の巨大津波の記憶","x":"嘉永7年11月4〜5日（1854年12月23〜24日）、安政東海地震（M8.4）と安政南海地震（M8.4）が32時間差で連続発生し、紀伊半島東岸の尾鷲にも津波が襲来した。尾鷲は宝永4年（1707年）の宝永地震でも大きな津波被害を受けており、安政地震はその約150年後の再来だった。ただし安政地震の尾鷲での被害は宝永地震の約20%程度にとどまったとされる。これは同年6月の伊賀地震で既にかなりの揺れを経験しており、住民が警戒していた可能性が指摘されている。尾鷲には宝永・安政を含む歴史津波の記録が複数残り、1944年の昭和東南海地震、1960年のチリ津波と合わせ、この地が繰り返し津波に見舞われてきた歴史を物語る。南海トラフ地震は約100〜150年周期で繰り返すとされ、前回の昭和東南海地震（1944年）・昭和南海地震（1946年）から80年以上が経過した現在、次の巨大地震への警戒が高まっている。","e":"防災学習で「過去に何度も津波が来た」ことを歴史データで示す資料。周期性の概念は算数の規則性学習にもつながる。「先人の知恵」として備えの大切さを伝える。","tg":["安政地震","宝永地震","津波","歴史地震","南海トラフ","disaster"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"津波ディジタルライブラリィ「尾鷲に遡上した津波の調査」、内閣府防災「1854安政東海地震・安政南海地震報告書」","su":""},{"id":"OW-130","c":"disaster","a":"owase","t":"1971年三重県南部集中豪雨 — 3日間1,095mmの雨と土石流","x":"1971年（昭和46年）9月9〜10日、台風23号・25号の通過後に前線が活発化し、三重県南部を集中豪雨が襲った。尾鷲測候所では3日間で1,095mmという年間降水量の約4分の1に相当する記録的な雨を観測。この豪雨により各地で土砂崩れ・土石流が発生し、三重県南部全体で死者・行方不明者42名、負傷者39名の被害が出た。特に尾鷲市では賀田町の小浜川で発生した土石流で13名、古江町のおぶこ川の土石流でも13名が犠牲となった。急峻な山地に囲まれた尾鷲は、大雨が短時間に集中すると河川が急激に増水し、土砂災害のリスクが極めて高い。この災害を教訓に砂防ダムの建設や河川改修が進められたが、年間4,000mmの多雨環境は変わらず、豪雨災害への備えは尾鷲の宿命的課題であり続けている。1998年・2004年にも豪雨災害が発生しており、災害の歴史は途切れていない。","e":"防災学習で「雨の多い尾鷲だからこそ備えが必要」というメッセージを具体的な数字で伝える。理科の「流れる水のはたらき」と連携した土砂災害の学習に。","tg":["集中豪雨","土石流","1971年","賀田","古江","水害","disaster"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_Kata_Kotobukiza_2021-07_ac.jpg","t":"Kata Kotobukiza 2021-07 ac.jpg","id":"WEB-306","u":"https://commons.wikimedia.org/wiki/File:Kata_Kotobukiza_2021-07_ac.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市賀田町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_026_Kata_townscape_before_1945.jpg","t":"Kata townscape before 1945.jpg","id":"WEB-312","u":"https://commons.wikimedia.org/wiki/File:Kata_townscape_before_1945.jpg","li":"Public domain","loc":"尾鷲市賀田町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_045_Kata_Community_Center_2021-07_ac.jpg","t":"Kata Community Center 2021-07 ac.jpg","id":"WEB-331","u":"https://commons.wikimedia.org/wiki/File:Kata_Community_Center_2021-07_ac.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市賀田町"}],"s":"Wikipedia「三重県南部集中豪雨」、尾鷲市公式サイト「過去の災害記録」、コメリ災害対策センター","su":"https://www.city.owase.lg.jp/"},{"id":"OW-131","c":"disaster","a":"owase","t":"2011年台風12号と東紀州 — 紀伊半島大水害の記録","x":"2011年（平成23年）8月下旬〜9月上旬、台風12号は動きが遅く紀伊半島を長時間暴風域に巻き込み、記録的な大雨をもたらした。紀伊半島全域で総降水量が1,000mmを超える地域が広がり、奈良県上北山村では観測史上最大の1,808.5mmを記録。全国で死者・行方不明者98名という甚大な被害が出た。三重県内でも熊野市・紀宝町を中心に土砂災害・浸水被害が発生。尾鷲市でも道路の冠水・土砂崩れ・停電などの被害が出た。特に紀伊半島南部の山間部では大規模な深層崩壊が複数発生し、河道閉塞（せき止め湖）が形成されるなど前例のない事態となった。この災害を受けて東紀州各自治体は防災計画の見直しを進め、避難指示の判断基準や情報伝達体制の強化が図られた。尾鷲市にとっても「想定外の雨」への備えの重要性を再認識する出来事だった。","e":"防災学習で近年の災害事例として活用。「台風が遅いほど被害が大きい」という気象の原理を学ぶ教材。避難行動の判断基準を考える実践的な防災教育に。","tg":["台風12号","紀伊半島大水害","2011年","深層崩壊","災害","disaster"],"im":[],"s":"気象庁津地方気象台「紀伊半島大水害」、Wikipedia「平成23年台風第12号」、内閣府防災報告書","su":""},{"id":"OW-132","c":"disaster","a":"owase","t":"尾鷲の年間降水量4,000mmと水害の宿命 — 雨と共に生きるまち","x":"尾鷲は年間降水量約4,000mmという日本屈指の多雨環境にあり、大雨による水害は避けて通れない宿命を背負う。近代以降の主な水害記録は、1953年台風13号、1956年台風5号、1959年伊勢湾台風、1961年第二室戸台風、1971年三重県南部集中豪雨（死者42名）、1982年台風18号、1990年台風19号、2004年台風21号など多数。特に1971年は3日間で1,095mmの集中豪雨が土石流を引き起こし、1998年にも尾鷲市内で浸水被害が発生している。「降る時に一気に降る」という尾鷲の雨の特徴は、短時間に河川が増水して山地から土砂が流出するリスクを高める。市内には砂防ダムが複数建設され、河川改修も進められてきたが、急峻な地形と豊富な降水量の組み合わせは構造的な脆弱性として残る。一方で「雨に強いまち」の自負もあり、住民の防災意識は高い。「尾鷲の雨は下から降る」という言い伝えは、雨と向き合い続けてきた土地の記憶そのものである。","e":"防災学習の年間指導計画に組み込む基礎資料。理科「天気の変化」と社会科「自然災害から守る」の横断教材。データのグラフ化で算数の統計学習にも。","tg":["降水量","水害","豪雨","防災","砂防ダム","disaster"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"Wikipedia「尾鷲の雨」、尾鷲市公式サイト「過去の災害記録」、気象庁データ","su":"https://www.city.owase.lg.jp/"},{"id":"OW-133","c":"energy","a":"owase","t":"尾鷲三田火力発電所 — 54年間の歴史と廃止後の再生構想","x":"尾鷲三田火力発電所は中部電力が尾鷲市三田町に建設した石油火力発電所で、1964年に運転を開始し最大出力87.5万kWを誇った。尾鷲市の経済と雇用を54年間にわたり支えてきたが、老朽化と電力自由化の環境変化を受けて2018年12月19日に廃止。約63.4万平方メートルの広大な跡地の活用が尾鷲市最大の課題となった。2018年8月に尾鷲市・尾鷲商工会議所・中部電力（オブザーバーに三重県・三重大学）で「おわせSEAモデル協議会」を発足。S（市民サービス・文化・観光）、E（エネルギー）、A（農林水産業・商工業）の3プロジェクトが相互連携する地域活性化モデルを構築する。具体的には、野球場を含むスポーツパーク「国井浜パーク」（2024〜25年建設予定）、広域ごみ処理施設（1.6ha）、大型製材工場（2027年頃稼働予定）が計画された。しかし、木質バイオマス発電計画は2023年に中部電力が「材料価格高騰で採算が合わない」として中止を発表。発電所がなくなった後のエネルギー計画は再検討を迫られている。","e":"社会科「電力と暮らし」で発電所の役割と閉鎖の影響を考える教材。「跡地をどう使うか」は地域課題を自分事として考える総合学習のテーマに最適。","tg":["三田火力","中部電力","発電所","おわせSEAモデル","跡地利用","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_008_owase_mita_thermal.jpg","t":"Owase Mita Thermal Power Station","id":"WEB-108","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲三田火力発電所"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_012_owase_mita_thermal_2.jpg","t":"Owase Mita Thermal Power Plant","id":"WEB-112","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲三田火力発電所"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_031_owase_bay_mita.jpg","t":"Owase Bay and Mita Power Station","id":"WEB-131","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲湾"}],"s":"Wikipedia「尾鷲三田火力発電所」、環境省ローカルSDGs、おわせSEAモデル公式、中日新聞","su":""},{"id":"OW-134","c":"energy","a":"owase","t":"海洋深層水の産業利用 — 水深415mの恵みを50以上の商品に","x":"尾鷲市は2006年（平成18年）に古江町に「アクアステーション」を開設し、三木埼沖の水深415mから海洋深層水の取水を開始した。みえ尾鷲海洋深層水の特性は3つ：年間を通じて13〜14度の低温安定性、生命活動に欠かせないミネラル等が豊富な富栄養性、陸水や大気からの汚染が極めて少ない清浄性。取水した深層水は「原水」「淡水（精製水）」「濃縮水」に分離して提供される。原水はミネラルウォーター・製塩・活魚運搬に、淡水はお茶・コーヒー・炊飯・化粧品に、濃縮水は干物・製塩・ラーメンの塩だれに活用。塩・水・干物・酒・麺・シャンプーなど約50点以上の商品が海洋深層水を使って開発されている。「夢古道の湯」の温浴施設でも入浴水として利用される。みえ尾鷲海洋深層水利用協議会が商品開発と販路拡大を推進。尾鷲しお学舎は深層水から製塩した塩や甘夏塩サイダーなどを販売し、観光土産としても人気。","e":"理科の「海の水」学習で深層水と表層水の違いを探究するテーマに。社会科で「地域資源を活かした産業」の実例として活用。体験学習で塩づくりも可能。","tg":["海洋深層水","アクアステーション","塩","産業利用","energy"],"im":[],"s":"尾鷲市公式サイト「みえ尾鷲海洋深層水」、みえ尾鷲海洋深層水利用協議会、尾鷲しお学舎","su":"https://www.city.owase.lg.jp/"},{"id":"OW-135","c":"energy","a":"owase","t":"おわせSEAモデル — 発電所跡地を地域の未来に変える挑戦","x":"おわせSEAモデルは、2018年に廃止された中部電力尾鷲三田火力発電所の63.4万平方メートルの跡地を活用し、持続可能な地域モデルを構築する官民連携プロジェクト。Sはサービス（市民サービス・文化・観光）、Eはエネルギー、AはアクアとAgriculture（農林水産業・商工業）を意味する。当初計画では木質バイオマス発電（出力1万kW）を中核に据え、間伐材を燃料に発電しながら廃熱を養殖や植物工場に活用する循環型モデルを構想。しかし2023年に材料価格高騰を理由にバイオマス発電計画は中止となった。一方で、跡地の一部には広域ごみ処理施設が建設され、大型製材工場（2027年頃稼働予定）やスポーツパーク（国井浜パーク）の計画も進行中。「雇用の創出」と「集客交流人口の増加」を二本柱に、かつて尾鷲経済を支えた発電所の跡地を新たなまちの核に生まれ変わらせる挑戦が続いている。","e":"SDGsの学習で「持続可能なまちづくり」の実例として活用。「大きな工場がなくなったらまちはどうなる？」という問いから社会科の地域産業学習へ。","tg":["おわせSEAモデル","跡地利用","バイオマス","SDGs","循環型社会","energy"],"im":[],"s":"おわせSEAモデル公式サイト、環境省ローカルSDGs、尾鷲市公式サイト、中日新聞","su":"https://www.city.owase.lg.jp/"},{"id":"OW-136","c":"industry","a":"owase","t":"尾鷲の定置網漁（大敷網）— 1,000m超の仕掛けで魚を待つ伝統漁法","x":"定置網漁（大敷網）は尾鷲の漁業を代表する伝統的な漁法で、魚の回遊ルートに沿って1,000m以上の垣網（barrier net）を設置し、運動場や昇り網を通じて箱網に魚を導く「待ちの漁業」。通過する魚群の一部だけを獲る方式のため、資源を枯渇させにくい環境配慮型の漁法として近年再評価されている。尾鷲市早田町の「早田大敷」は町の基幹産業であり、早田漁港から出漁する大敷網は町の暮らしそのもの。約5種類の網を組み合わせた大がかりな仕掛けで、ブリ・サバ・アジ・カツオなど季節ごとの回遊魚を漁獲する。三重県水産研究所尾鷲水産研究室は、昭和8年（1933年）の設立当初から定置網漁の指導・研究を行ってきた歴史があり、漁法改良や漁場環境のモニタリングを続けている。尾鷲物産株式会社も自社定置網を運営し、水揚げした魚を直営の「おとと」で即日販売する6次産業化を実現している。","e":"社会科「水産業のさかんな地域」で伝統漁法と持続可能な漁業を学ぶ教材。網の仕組みの図解は理科の「てこ」「力の働き」にも応用可能。SDGsの海洋資源学習にも。","tg":["定置網","大敷網","早田","持続可能","漁業","industry"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/buri_teichami_001.jpg","t":"九鬼のブリ定置網（歴史写真）","id":"WEB-393","u":"https://commons.wikimedia.org/wiki/File:Kuki_Yellowtail_Set_Net.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_003_owase_fish_market_1.jpg","t":"Owase Fish Market 1","id":"WEB-103","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_004_owase_fish_market_2.jpg","t":"Owase Fish Market 2","id":"WEB-104","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"早田大敷公式、三重県水産研究所、尾鷲物産公式、Wikipedia「定置網」","su":""},{"id":"OW-137","c":"industry","a":"owase","t":"尾鷲のMSC認証マグロはえ縄漁業 — 持続可能な漁業の先駆け","x":"尾鷲物産株式会社は2021年2月にMSC漁業認証（海のエコラベル）を取得し、日本のマグロはえ縄漁業としては先駆的な持続可能な漁業の実践者となった。1972年創業の同社は2013年に良栄丸を建造して近海はえ縄漁業に参入。漁獲対象は主にビンナガマグロで、メバチ・キハダマグロ・カジキ類も扱う。季節や漁況により東沖・中南方・小笠原・近海漁場に出漁し、水揚げ約3時間後にはMSCラベル付きの生マグロパックが最寄り店舗に並ぶ驚異的な鮮度管理を実現。自社定置網・養殖（マダイ・ブリ・マハタ）・はえ縄漁業・直営販売（おとと）を一貫して手がける6次産業化のモデル企業でもある。MSC認証は科学的根拠に基づいた資源管理を証明するもので、漁獲後の鮮度保持技術にも力を入れている。尾鷲から持続可能な漁業を世界に発信する取り組みとして注目されている。","e":"SDGs目標14「海の豊かさを守ろう」の実例として活用。MSC認証マークの意味を学ぶ消費者教育にも。「身近なスーパーで買える持続可能な魚」として伝えやすい。","tg":["MSC認証","マグロ","はえ縄","尾鷲物産","持続可能","industry"],"im":[],"s":"MSC公式サイト「尾鷲物産」、尾鷲物産公式サイト","su":""},{"id":"OW-138","c":"industry","a":"owase","t":"尾鷲漁港の水揚げとセリ — 200種の魚が集まる港町の朝","x":"尾鷲漁港は尾鷲市の10漁港の中核を担う港で、定置網・はえ縄・一本釣り・まき網など多様な漁法で水揚げされた魚が集まる。漁獲される魚種は200種を超え、ブリ・カツオ・マダイ・サバ・アジ・イカ・イセエビ・サザエ・アワビなど四季折々の魚介類が水揚げされる。漁港では早朝にセリが行われ、仲買人が魚の品定めをしながら競り落としていく活気ある光景が見られる。水揚げされた魚は尾鷲市場から地元の鮮魚店・スーパー・飲食店に流通するほか、直営の「おとと」で即日販売される。イセエビ・ホラガイ・車エビ・サザエ・アワビなどの高級魚介類は「魚鉄商店」が尾鷲港直送で販売し、全国へ発送も行っている。尾鷲漁港は日帰りカツオの水揚げ基地としても知られ、朝獲れの魚が昼には食卓に届くスピード感が尾鷲の魚の最大の強み。","e":"社会科見学で漁港を訪問し、セリの仕組みと魚の流通を学ぶ体験学習に。「魚の名前当てクイズ」は低学年の生活科にも使える。","tg":["尾鷲漁港","セリ","魚市場","水揚げ","漁業","industry"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/buri_teichami_001.jpg","t":"九鬼のブリ定置網（歴史写真）","id":"WEB-393","u":"https://commons.wikimedia.org/wiki/File:Kuki_Yellowtail_Set_Net.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_003_owase_fish_market_1.jpg","t":"Owase Fish Market 1","id":"WEB-103","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_004_owase_fish_market_2.jpg","t":"Owase Fish Market 2","id":"WEB-104","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"尾鷲市公式サイト「尾鷲の漁業」、魚鉄商店、尾鷲漁港水揚日報","su":"https://www.city.owase.lg.jp/"},{"id":"OW-139","c":"people","a":"owase","t":"尾鷲義仁 — 尾鷲出身の演歌歌手、レコード大賞新人賞受賞","x":"尾鷲義仁（おわせよしひと、1967年1月16日生まれ）は尾鷲市出身の演歌歌手。芸名に出身地「尾鷲」の名を冠し、地元への愛着を表している。1989年にデビュー曲「恋宿」で日本レコード大賞新人賞を受賞し、全国的に注目を集めた。演歌の世界で尾鷲の名を全国に広めた人物の一人であり、デビュー以降もテレビ出演や地方公演を通じて活動を続けている。尾鷲市内でも地元出身の著名人として知られ、地域のイベントへの出演もある。尾鷲は歴史的に文化人・実業家を輩出してきた土地であり、長野泰一（ウイルス学者）、三鬼陽之助（経済評論家）、伊吹有喜（作家）、福山英朗（レーサー）らと並び、尾鷲ゆかりの著名人の一人に数えられる。","e":"キャリア教育で「地元出身の有名人」として紹介。芸名に地元の名を使う理由を考える道徳・総合学習のテーマにも。","tg":["尾鷲義仁","演歌","レコード大賞","著名人","people"],"im":[],"s":"有名人ナビ、三重県尾鷲市出身の有名人、WEBザテレビジョン","su":""},{"id":"OW-140","c":"food","a":"owase","t":"尾鷲の伊勢えびと旬の高級魚介 — 熊野灘が育む四季の贅沢","x":"尾鷲は三重県有数の伊勢えびの水揚げ地であり、熊野灘のリアス式海岸に生息する天然のイセエビは秋冬の解禁期に漁獲される。三重県の伊勢えび漁期は例年10月1日〜4月30日で、尾鷲の各漁港でも刺し網漁によって水揚げされる。身は甘くプリプリとした食感で、刺身・焼き・味噌汁などで味わえる。魚鉄商店は尾鷲港直送の天然イセエビを全国発送しており、ホラガイ・車エビ・サザエ・アワビといった高級魚介類も取り扱う。尾鷲の飲食店では季節ごとにイセエビ料理を提供し、冬の味覚の主役として観光客にも人気。ブリ・カツオ・マダイと並んで尾鷲を代表する魚介の一つであり、尾鷲市公式サイトでも「尾鷲の魚介料理」としてイセエビを四大魚介に数えている。","e":"社会科「水産業」で高級魚介類の流通と価格について学ぶ教材。生活科の「季節の食べ物」で旬の概念を伝える素材にも。","tg":["伊勢えび","イセエビ","高級魚介","刺し網漁","food"],"im":[],"s":"尾鷲市公式サイト「尾鷲の漁業」、魚鉄商店、尾鷲観光物産協会","su":"https://www.city.owase.lg.jp/"},{"id":"OW-141","c":"disaster","a":"owase","t":"尾鷲の津波碑と災害伝承 — 石に刻まれた警告を次世代へ","x":"尾鷲市内には過去の地震・津波災害を伝える石碑・慰霊碑が複数存在する。1944年昭和東南海地震では尾鷲に8〜10mの津波が襲来し、三重県全体で死者・行方不明者589名（津波による）の甚大な被害が出た。特に尾鷲市の森松・賀田地区では津波高2.7〜9.0mが記録されている。これらの災害を忘れないために各地に建てられた碑は「自然災害伝承碑」として国土地理院の地理院地図にも記載され始めている。石碑には「津波の際は高台に逃げよ」「この場所まで水が来た」といった具体的な教訓が刻まれているものがあり、防災教育の生きた教材となる。尾鷲は宝永（1707年）・安政（1854年）・昭和（1944年）と約100〜150年周期で巨大津波に見舞われてきた歴史があり、「石碑が伝える先人の知恵」は現代の防災計画にも活かされている。学校の防災学習で実際に石碑を訪ねるフィールドワークも行われている。","e":"防災学習のフィールドワークで石碑を訪問し「先人の知恵を読み解く」活動に。6年生歴史で「災害と人々の暮らし」のテーマに活用。国語の「碑文を読む」活動にも。","tg":["津波碑","災害伝承","自然災害伝承碑","防災","石碑","disaster"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"国土地理院「自然災害伝承碑」、津波ディジタルライブラリィ、尾鷲市公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-142","c":"tourism","a":"owase","t":"尾鷲神社 — ヤーヤ祭りの社と樹齢1,000年の夫婦楠","x":"尾鷲神社は尾鷲七郷の総鎮守として市民に親しまれ、天下の奇祭「ヤーヤ祭り」の舞台として全国に知られる。境内に入ると目を引くのが2本の大楠（夫婦楠）で、南側が高さ約10m・北側が約9m、周囲10mにも達し樹齢1,000年以上と推定される。昭和12年（1937年）に三重県指定天然記念物に認定。2本が寄り添うように立つことから夫婦和合のご利益があるとされ、北側の木のコブに触れると子宝に恵まれるという信仰もある。大楠の横には「日本最古の太陽神」と記された小さな祠があり、この場所はかつて尾鷲神社の旧社殿があった地。度重なる風水害のため寛文年間に現在地に社殿を移した。祭神はスサノオノミコト。ヤーヤ祭り以外にも初詣・七五三など年間を通じて参拝者が訪れ、尾鷲の精神的な中心地であり続けている。パワースポットとして観光ガイドにも掲載されている。","e":"生活科「まちたんけん」で神社を訪問し巨木の観察を行う活動に。天然記念物の保全について考える環境教育にも。地域の信仰と行事のつながりを学ぶ総合学習。","tg":["尾鷲神社","大楠","夫婦楠","天然記念物","パワースポット","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_033_sacred_tree_owase_jinja.jpg","t":"Sacred Tree at Owase Jinja","id":"WEB-133","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲神社"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""}],"s":"観光三重「尾鷲神社の大樟」、尾鷲神社公式サイト、尾鷲市公式サイト、Wikipedia「尾鷲神社」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-143","c":"food","a":"owase","t":"尾鷲のMSC認証マグロ — 海のエコラベル付き生マグロ","x":"尾鷲物産株式会社の近海はえ縄漁船「良栄丸」が漁獲するビンナガマグロ・キハダマグロ・メバチマグロは、2021年にMSC漁業認証（海のエコラベル）を取得した。MSC認証は科学的根拠に基づく資源管理・環境への配慮・効果的な管理体制を第三者が審査して認めるもので、「獲りすぎない漁業」の証。水揚げ後約3時間でMSCラベル付きの生マグロパックが店頭に並ぶスピード出荷が特徴で、冷凍ではない生のマグロを日常的に購入できるのは尾鷲ならではの贅沢。直営の「おとと」では刺身・寿司・海鮮丼として提供される。マグロは尾鷲の漁業を象徴する魚種の一つであり、100年以上の歴史を持つ船元「長久丸」も尾鷲のマグロ漁業の老舗として知られる。持続可能な漁業と鮮度を両立させた尾鷲のマグロは、食の安心と環境配慮を重視する時代の食文化を先取りしている。","e":"SDGs目標14の実例として消費者教育に活用。「エコラベルの意味を知ろう」という学習でMSCマークを探す活動ができる。社会科の水産業学習にも。","tg":["MSC","マグロ","エコラベル","持続可能","良栄丸","food"],"im":[],"s":"MSC公式「尾鷲物産」、尾鷲物産公式、ONDOホールディングスブログ「長久丸100周年」","su":""},{"id":"OW-144","c":"archive","a":"owase","t":"みえ防災・減災アーカイブ — 昭和東南海地震 尾鷲被災写真14枚","x":"みえ防災・減災アーカイブ（midori.midimic.jp）に、1944年12月7日の昭和東南海地震による尾鷲市の被災写真14枚が公開されている。撮影者は太田金典氏、尾鷲市より提供。港町〜中井町エリア5枚、朝日町〜港町エリア4枚、北浦町エリア3枚、栄町・国市造船所付近2枚。津波による建物倒壊、瓦礫、市街地の壊滅的被害が記録されている。当時尾鷲には最大9.0m（盛松・賀田地区）の津波が襲来し、三重県全体で約400人が死亡。戦時中の軍事機密として被害が隠蔽された『隠された地震』としても知られる。太田金典氏の写真は尾鷲における東南海地震の数少ない一次資料であり、防災教育・郷土史研究に極めて貴重。","e":"防災学習で「戦時中に隠された地震」というテーマで議論できる。写真資料を読み解く社会科・総合学習に。6年生の歴史で太平洋戦争と地震被害の二重苦を考える授業に活用。","tg":["東南海地震","被災写真","太田金典","防災","アーカイブ","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"みえ防災・減災アーカイブ https://midori.midimic.jp/saigai-taiken/20230203-b.html","su":"https://midori.midimic.jp/saigai-taiken/20230203-b.html"},{"id":"OW-145","c":"archive","a":"owase","t":"気象庁「昭和東南海地震の記録」— 旧尾鷲町津波被害写真23枚","x":"気象庁の「昭和東南海地震の記録」特設ページに、旧尾鷲町における津波被害の写真23枚のサムネイルが掲載されている。画像を選択すると説明が表示されるインタラクティブ形式。1944年12月7日午後1時36分、紀伊半島東部の熊野灘沖約20kmを震源とするM7.9（Mw8.2）の地震で、尾鷲市街に壊滅的津波被害をもたらした。気象庁公式ページであり信頼性が高い。みえ防災・減災アーカイブへのリンクも掲載されており、関連資料の横断的閲覧が可能。","e":"防災学習で気象庁の公式記録を使った調べ学習に。写真から被害の規模を推定する活動。津波の高さと被害の関係を考える理科・社会横断学習に。","tg":["東南海地震","気象庁","津波写真","防災","公式記録","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"気象庁 https://www.data.jma.go.jp/tsu/knowledge/tonankai/sub/03_tonankai_tsu_photo/index.html","su":"https://www.data.jma.go.jp/tsu/knowledge/tonankai/sub/03_tonankai_tsu_photo/index.html"},{"id":"OW-146","c":"archive","a":"owase","t":"津波ディジタルライブラリィ — 尾鷲関連文献群","x":"津波ディジタルライブラリィ（tsunami-dl.jp）に尾鷲関連の文献が複数デジタル化・公開されている。主要なものは：①『東南海地震から50年「尾鷲を襲った地震と津波」』（1994年刊行の50周年記念誌）、②『尾鷲市に遡上した津波の調査—1944年東南海・1960チリおよび1854安政津波』（地震研究所彙報56号）、③『昭和19年12月7日発生 東南海地震津波 体験談と記録集』、④『昭和地震誌』（倉本為一著、南輪内地区の被災調査・聞き取り調査）。これらは尾鷲における複数の津波災害を時系列で追える一次資料群であり、学術的価値が極めて高い。","e":"6年生社会「自然災害の歴史」の調べ学習で、同じ地域が繰り返し津波に襲われた事実を学ぶ教材に。体験談は道徳の「命の大切さ」のテーマにも活用可能。","tg":["津波","東南海地震","安政地震","チリ地震","体験談","デジタルライブラリ","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"津波ディジタルライブラリィ https://tsunami-dl.jp/document/006 https://tsunami-dl.jp/document/012 https://tsunami-dl.jp/document/004 https://tsunami-dl.jp/document/010","su":"https://tsunami-dl.jp/document/006"},{"id":"OW-147","c":"archive","a":"owase","t":"内閣府報告書 — 1944東南海地震・1945三河地震 全文PDF","x":"内閣府防災情報のページに「報告書（1944東南海地震 1945三河地震）」の全文PDFが公開されている。全8章構成で、第3章「東南海地震のインパクト」第1節「津波の被害」に尾鷲を含む熊野灘沿岸の津波被害が詳述されている。写真資料・被害統計・地図を含む包括的な報告書。公文書としての信頼性が高く、尾鷲の被害を広域的な文脈（三重県・愛知県・静岡県の被害比較）で理解できる。","e":"中学校社会科の防災学習で、政府報告書を一次資料として読む訓練に。小学校では教師が抜粋して「地震の被害はどれくらいだったか」を調べる活動に活用。","tg":["東南海地震","内閣府","報告書","PDF","防災","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"内閣府 https://www.bousai.go.jp/kyoiku/kyokun/kyoukunnokeishou/rep/1944_tounankai_jishin/index.html","su":"https://www.bousai.go.jp/kyoiku/kyokun/kyoukunnokeishou/rep/1944_tounankai_jishin/index.html"},{"id":"OW-148","c":"archive","a":"owase","t":"e-tsunami — 東南海地震の尾鷲被災写真4枚（解説付き）","x":"e-tsunami.com に1944年東南海地震津波による尾鷲市の被災写真4枚が解説付きで掲載されている。①市街地の倒壊家屋と瓦礫で塞がれた通り、②多数の家屋が無惨に倒壊した市街地遠景、③陸上に打ち上げられた漁船（津波被害の典型）、④打ち上げられた漁船の横を通る葬式の列。特に④の写真は「災害と日常の境界」を象徴的に捉えた貴重な一枚。最大9.0mの津波が来襲した尾鷲の惨状を伝える資料。","e":"防災学習で「1枚の写真から読み取れること」を考える活動に。④の写真は道徳「命の重さ」の教材としても使える。写真リテラシーの育成にも。","tg":["東南海地震","津波写真","被災","漁船","葬列","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"e-tsunami https://www.e-tsunami.com/what_photo1.htm","su":"https://www.e-tsunami.com/what_photo1.htm"},{"id":"OW-149","c":"archive","a":"owase","t":"今昔写語 — 尾鷲の昔と今を比較する写真ギャラリー","x":"「今昔写語」（konjaku-photo.com）は古い写真と現在の同じ場所の写真を比較できるWebギャラリー。尾鷲市では現在4件の古写真が公開されている：九鬼学校、九鬼港、九木浦、尾鷲駅。三重県全体では168枚収録。昔と今を並べて見ることで、街の変遷を視覚的に理解できる。「おわせ今昔写真の会」（代表：土井素男氏）が1974年に市制20周年記念として古写真アルバム40冊を寄贈しており、明治29年（1896年）頃から昭和40年代（1960年代）に撮影された写真が含まれる。","e":"3年生社会「まちの移り変わり」で昔と今の比較活動に最適。生活科の「まちたんけん」で実際の場所と古写真を比べる活動にも。時間の経過による変化を視覚的に捉える教材。","tg":["古写真","今昔比較","九鬼","尾鷲駅","まちの変遷","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_020_owase_ekimae.jpg","t":"尾鷲駅前","id":"WEB-120","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_022_owase_eki_1.jpg","t":"尾鷲駅構内 (1)","id":"WEB-122","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_023_owase_eki_2.jpg","t":"尾鷲駅構内 (2)","id":"WEB-123","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"}],"s":"今昔写語 https://konjaku-photo.com/?p_mode=view&p_city=787","su":"https://konjaku-photo.com/?p_mode=view&p_city=787"},{"id":"OW-150","c":"archive","a":"owase","t":"尾鷲市中央公民館郷土室 — 古写真アルバム53冊・約4,000枚","x":"尾鷲市立中央公民館1階の郷土室に、尾鷲の古写真アルバム53冊が保管されている。うち40冊は「おわせ今昔写真の会」（代表：土井素男氏）が1974年の市制20周年時に寄贈したもので、明治29年（1896年）頃〜昭和40年代の写真を含む。平成30年度〜令和2年度にかけてスキャン事業が行われ、全体で約4,000枚の写真がデジタル化された。2020年には68枚を選んだ「尾鷲の古写真展」が開催された。明治35年の尾鷲尋常小学校、古戸野の草競馬（明治39年）、八幡神社祭礼（明治40年）、青年会図書館開館（明治35年）など、明治〜昭和の尾鷲の生活・行事・風景を記録した一次資料の宝庫。現地でしか閲覧できないものが多い。","e":"3年生社会「昔のくらし」で郷土室を訪問し、古写真から100年前の尾鷲を読み解く活動に。学校の歴史を調べる総合学習でも活用可能。「まちの記憶を守る」ことの意味を考える道徳にも。","tg":["古写真","郷土室","土井素男","アルバム","4000枚","明治","archive"],"im":[],"s":"太平洋新聞電子版 https://digital.taiheiyo-np.jp/eventlist/index/55692 、熊野古道センター企画展情報","su":"https://digital.taiheiyo-np.jp/eventlist/index/55692"},{"id":"OW-151","c":"archive","a":"owase","t":"九鬼町公式サイト「昔の九鬼」写真館 — 漁村の記憶","x":"三重県尾鷲市九鬼町の公式ウェブサイト（kukicho.jimdofree.com）に「写真館」セクションがあり、「昔の風景」として九鬼町の歴史的写真が掲載されている。九鬼は戦国最強の水軍「九鬼水軍」発祥の地で、人口500人以下の港町。リアス海岸の地形に昔懐かしい漁村が広がる。近世以来「鰤どころ」として有名で、徳川時代には江戸と大阪を行き交う千石船の十大寄港地の一つ、明治〜昭和には日本ブリ三大漁場の一つとして栄えた。現在はトンガ坂文庫（漁村の本屋）やゲストハウスなど、小さな港町の新しい文化拠点も生まれている。","e":"3年生社会「漁業のまち」の調べ学習で九鬼の変遷を追う活動に。「大きな漁村が小さくなった理由」を考える社会科の問い作りに。","tg":["九鬼","漁村","九鬼水軍","ブリ","昔の写真","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/buri_teichami_001.jpg","t":"九鬼のブリ定置網（歴史写真）","id":"WEB-393","u":"https://commons.wikimedia.org/wiki/File:Kuki_Yellowtail_Set_Net.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_004_kuki.jpg","t":"Kuki","id":"WEB-164","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町"}],"s":"九鬼町公式サイト https://kukicho.jimdofree.com/ 、九鬼町公式 https://www.kukicho.com","su":"https://kukicho.jimdofree.com/"},{"id":"OW-152","c":"archive","a":"owase","t":"三重フォトギャラリー — 尾鷲市フリー写真素材187枚","x":"三重フォトギャラリー（photo.mie-eetoko.com）に尾鷲市の写真素材187枚が無料でダウンロード可能。弁財島（赤い鳥居）、九鬼町、須賀利町、三木里ビーチ、尾鷲神社、土井竹林、村嶋不動滝など尾鷲の主要スポットを網羅。4K高画質で、スマホ壁紙・資料・動画素材に利用可能。個人・商用利用とも無料。尾鷲港の写真は14枚あり、夕焼け・漁船・便石山との組み合わせなど多彩な構図。大曽根浦漁港の写真も掲載されている。","e":"社会科のプレゼンテーション・壁新聞・パンフレット作りで尾鷲の写真素材として自由に活用できる。「写真から読み取る地形の特徴」（リアス海岸）の理科学習にも。","tg":["フリー素材","写真","弁財島","九鬼","須賀利","大曽根浦","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_001_benzaijima.jpg","t":"Benzaijima","id":"WEB-157","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市弁財島"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_002_benzaijima.jpg","t":"Benzaijima","id":"WEB-159","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市弁財島"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_003_benzaijima.jpg","t":"Benzaijima","id":"WEB-161","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市弁財島"}],"s":"三重フォトギャラリー https://photo.mie-eetoko.com/city/owase/","su":"https://photo.mie-eetoko.com/city/owase/"},{"id":"OW-153","c":"archive","a":"owase","t":"国土地理院 空中写真閲覧サービス — 尾鷲の年代別航空写真","x":"国土地理院の地理院地図および空中写真閲覧サービスで、尾鷲市の年代別航空写真を無料で閲覧できる。1970年代以降は全国的にカバーされ、一部地域は1936年からの写真も利用可能。2画面表示で異なる年代の同じ場所を並べて比較する機能があり、関山や大曽根など特定地区の開発前後の変化を確認できる。尾鷲市街地の変遷、港湾の拡張、宅地造成の進行などを視覚的に追跡可能。地理院地図（maps.gsi.go.jp）から「年代別の写真」レイヤーを選択して利用する。パブリックドメイン。","e":"3年生社会「まちの移り変わり」で航空写真を使った比較活動に最適。5年生国土学習で「人が住む場所はどう変わったか」を考える教材に。ICT活用の授業実践にも。","tg":["航空写真","国土地理院","年代比較","地理院地図","開発","archive"],"im":[],"s":"国土地理院 https://maps.gsi.go.jp/ 、空中写真閲覧サービス https://service.gsi.go.jp/map-photos/","su":"https://maps.gsi.go.jp/"},{"id":"OW-154","c":"archive","a":"owase","t":"Wikimedia Commons — 尾鷲関連画像（CC/パブリックドメイン）","x":"Wikimedia Commons（commons.wikimedia.org）に「Category:Owase, Mie」として尾鷲関連の画像がまとめられている。サブカテゴリに尾鷲神社（Owase-jinja）、尾鷲駅（Owase Station）、新盛湯（Shinseiyu）、九鬼郵便局、九鬼小学校などがある。画像は地図・市旗・施設写真など。すべてクリエイティブ・コモンズまたはパブリックドメインライセンスで、出典表示のみで自由に利用可能。教材・資料への引用が容易。歴史的写真は限定的だが、現代の施設・風景写真が充実。","e":"社会科・総合学習の調べ学習で、著作権フリーの画像として安全に利用できる。「写真の利用ルール」を学ぶ情報教育の実践にも。","tg":["Wikimedia","CC","パブリックドメイン","写真素材","著作権フリー","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_035_Owase_station_20220625-2.jpg","t":"Owase station 20220625-2.jpg","id":"WEB-321","u":"https://commons.wikimedia.org/wiki/File:Owase_station_20220625-2.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_020_owase_ekimae.jpg","t":"尾鷲駅前","id":"WEB-120","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_022_owase_eki_1.jpg","t":"尾鷲駅構内 (1)","id":"WEB-122","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"}],"s":"Wikimedia Commons https://commons.wikimedia.org/wiki/Category:Owase,_Mie","su":"https://commons.wikimedia.org/wiki/Category:Owase"},{"id":"OW-155","c":"archive","a":"owase","t":"国立国会図書館デジタルコレクション — 尾鷲市史（上下巻）・年表","x":"国立国会図書館デジタルコレクション（dl.ndl.go.jp）に『尾鷲市史 上巻』（1969年刊、850頁）と『尾鷲市史年表』（1994年刊、124頁）がデジタル化されている。尾鷲市役所が刊行した公式市史であり、尾鷲の歴史を包括的に記録した基本文献。ただし著作権保護期間中のため、国立国会図書館内または送信参加図書館でのみ閲覧可能（インターネット公開ではない）。三重県立図書館や尾鷲市立図書館でも閲覧可能な場合がある。図版・写真を含み、関山・大曽根を含む各地区の歴史的変遷が記述されている可能性が高い。","e":"郷土史研究の基本文献として教師の教材研究に。図書館訪問学習で「市史を読む」活動に活用可能。","tg":["尾鷲市史","国会図書館","デジタルコレクション","郷土史","1969年","archive"],"im":[],"s":"国立国会図書館 https://dl.ndl.go.jp/info:ndljp/pid/2989054 https://dl.ndl.go.jp/info:ndljp/pid/2989012","su":"https://dl.ndl.go.jp/info:ndljp/pid/2989054"},{"id":"OW-156","c":"archive","a":"owase","t":"熊野古道センター企画展「尾鷲林業が歩んだ400年」","x":"三重県立熊野古道センター（尾鷲市向井）で企画展「尾鷲林業が歩んだ400年」が開催されている（2025年12月〜2026年3月）。古写真、遺構調査報告、実物展示、映像などで尾鷲林業の発展の歴史を紹介。尾鷲ヒノキは江戸時代から続く林業の柱であり、尾鷲の経済・文化を形作ってきた基幹産業。同センターでは2020年にも「写真で懐古・故郷の暮らしと風景～尾鷲市～」展を開催し、明治以降の古写真68枚を紹介した実績がある。企画展は定期的に行われ、尾鷲の歴史的資料に触れる貴重な機会。","e":"5年生社会「林業のさかんな地域」の校外学習先として最適。古写真と現在の比較で産業の変遷を学ぶ活動に。地域の産業史を体感する総合学習に。","tg":["熊野古道センター","林業","企画展","古写真","尾鷲ヒノキ","archive"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"熊野古道センター https://kumanokodocenter.com/exhibition/251213-260329/ https://kumanokodocenter.com/exhibition/20201024-1/","su":"https://kumanokodocenter.com/exhibition/251213-260329/"},{"id":"OW-157","c":"history","a":"owase","t":"大曽根浦 — 縄文からの古層集落と漁港の歴史","x":"大曽根浦（おおそねうら）は尾鷲市南部の集落で、1889年の町村制施行時に尾鷲町の一部となった。曽根遺跡は旧曽根小学校を中心に広がる複合遺跡で、1923年から調査が始まり、1954年に大阪大学教授の角田文衛らの協力で全貌が明らかになった。縄文時代全期（早期〜晩期）、弥生時代、古墳時代の遺物が出土し、石剣・石短刀・垂れ飾りなどの出土品は首長クラスの居住を示唆する。「曽根遺跡出土品」は尾鷲市指定文化財。「大曽根浦方文書」も市指定文化財として保存されている。大曽根浦漁港は第1種漁港で昭和27年（1952年）漁港指定。古代から人が住み続けた尾鷲有数の歴史的集落。","e":"6年生歴史「縄文・弥生時代」の身近な実例として。「自分たちの住む地域にも古代人が住んでいた」という驚きから歴史への興味を引き出す導入に最適。","tg":["大曽根浦","曽根遺跡","縄文","文化財","漁港","history"],"im":[],"s":"尾鷲市公式 https://www.city.owase.lg.jp/contents_detail.php?frmId=13030 、日本遺産ポータル https://japan-heritage.bunka.go.jp/ja/culturalproperties/result/3840/ 、三重県 https://www.pref.mie.lg.jp/SUIKIBAN/HP/21123021469.htm","su":"https://www.city.owase.lg.jp/contents_detail.php?frmId=13030"},{"id":"OW-158","c":"archive","a":"owase","t":"紀勢新聞・太平洋新聞電子版 — 尾鷲の地元新聞アーカイブ","x":"紀勢新聞は1947年（昭和22年）7月1日創刊の尾鷲市の地元新聞。尾鷲市・紀北町のニュースを主に報道。2019年4月から紀南新聞と共同で「太平洋新聞電子版」（digital.taiheiyo-np.jp）としてWeb配信を開始し、過去記事も検索・閲覧可能。尾鷲の日常・行事・災害・開発の記録として70年以上の蓄積があり、郷土史研究の重要な一次資料。国立国会図書館にも2004年以降のバックナンバーが所蔵されている。太平洋新聞電子版では尾鷲市地域のニュースを「エリア別」で絞り込みできる。","e":"5年生社会「情報を伝える人々」の実例として地元新聞社を取り上げる授業に。郷土の歴史を新聞記事から調べる総合学習にも活用可能。","tg":["紀勢新聞","太平洋新聞","地元新聞","アーカイブ","電子版","archive"],"im":[],"s":"紀勢新聞 Wikipedia、太平洋新聞電子版 https://digital.taiheiyo-np.jp/area/owase 、尾鷲市 https://www.city.owase.lg.jp/0000022022.html","su":"https://digital.taiheiyo-np.jp/area/owase"},{"id":"OW-159","c":"energy","a":"owase","t":"賀田地区・古川の水力発電適性 — 水位観測所「銀杏」と急峻な地形","x":"賀田地区を流れる古川は、尾鷲市賀田町と曽根町の境界を成す二級河川水系で、急峻な紀伊山地から賀田湾へ短距離で注ぐ。三重県が古川水系古川の洪水浸水想定区域図を2022年5月に公表しており、県管理河川として流量・水位データが蓄積されている。県の水位観測所「銀杏」が設置済みで、流量の実測データが存在する点はマイクロ水力発電の事業性評価において極めて有利。通常、小水力発電の事前調査では1年以上の流量観測が必要で数百万円のコストがかかるが、既存データを転用できれば大幅に短縮できる。賀田地区はかつて新宮営林署が1925年（大正14年）に古川上流に「賀田発電所」を設置し、同時期に索道（ケーブルカー）を開設して国有林の木材を賀田港へ運搬していた歴史があり、水力発電と林業の結びつきは100年前に遡る。古川流域は年間降水量4,000mm超の多雨地帯に位置し、90%が山林という地形は高低差を確保しやすく、河川直接利用方式のマイクロ水力発電に最適。賀田地区には簡易水道施設（賀田・古江地区）も存在し、水道管路併用型の複合方式も検討可能。候補地評価では5段階中最高の★★★★★とされている。","e":"理科のエネルギー学習で「地域の水を電気に変える」実例として。社会科で大正時代の林業と電力の歴史を学ぶ素材。","tg":["賀田","古川","銀杏","水位観測所","マイクロ水力","林業","新宮営林署","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_051_Kata_Ropeway.jpg","t":"Kata Ropeway.jpg","id":"WEB-337","u":"https://commons.wikimedia.org/wiki/File:Kata_Ropeway.jpg","li":"Public domain","loc":"尾鷲市賀田町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_Kata_Kotobukiza_2021-07_ac.jpg","t":"Kata Kotobukiza 2021-07 ac.jpg","id":"WEB-306","u":"https://commons.wikimedia.org/wiki/File:Kata_Kotobukiza_2021-07_ac.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市賀田町"}],"s":"三重県河川課洪水浸水想定区域図、Wikipedia「賀田町」、尾鷲市水道事業概要","su":""},{"id":"OW-160","c":"energy","a":"kihoku","t":"又口川旧発電所の歴史 — 尾鷲電気と大正期の水力発電","x":"又口川発電所は尾鷲電気株式会社が建設した同社最初の水力発電所で、1920年（大正9年）3月に運転を開始した。所在地は尾鷲町南浦矢所、銚子川水系又口川と古和谷の合流点直前に位置する。技術仕様は出力145kW、取水量0.50m³/s、水路延長約2.7km（川の左岸沿い）、有効落差39.5m。発電設備は電業社製フランシス水車と芝浦製作所製三相交流発電機が各1台、周波数50Hz。尾鷲電気は1910年（明治43年）5月21日に尾鷲町中浦で設立、資本金5万円、創業者は地元有力者の濱田丈助ら。当初は本社隣接の吸入ガス機関（出力75kW）による火力発電で、中部地方初の吸入ガス機関採用だった。供給区域は当初尾鷲町のみ、1915年に引本町（現紀北町）まで拡大。2番目の発電所として1923年（大正12年）11月に銚子川発電所（相賀村、出力120kW）を建設。1927年（昭和2年）5月15日に三重合同電気に合併・解散。又口川発電所は合同電気時代の1935年（昭和10年）8月に廃止された。廃止から90年以上が経過しているが、39.5mの落差と0.50m³/sの取水量は現在のマイクロ水力技術で十分活用可能なスペックであり、同地点での新設が検討に値する。現在この水系にはJ-POWER（電源開発）のクチスボダム（堤高35m、総貯水容量196万m³、1961年完成）があり、尾鷲第二発電所へ送水して発電している。","e":"6年生歴史で明治・大正の産業発展と地域の電化の歴史を学ぶ素材。技術の授業でフランシス水車の仕組みを学ぶ導入にも。","tg":["又口川","尾鷲電気","大正","水力発電","フランシス水車","クチスボダム","銚子川","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Wikipedia「尾鷲電気」、J-POWERクチスボダム情報、ダム便覧","su":""},{"id":"OW-161","c":"energy","a":"owase","t":"三木浦地区の小水力ポテンシャル — 八十川と独立簡易水道","x":"三木浦町は尾鷲市南部のリアス式海岸に面した漁村集落で、人口約200〜300人。背後に急峻な山地が迫り、八十川（やそがわ）が集落内を流れて熊野灘に注ぐ。尾鷲市の8つの簡易水道地区の一つで、独立した簡易水道施設を持つ。この独立性は小水力発電導入において有利に働く。水道管路型（パイプライン方式）で配水池から集落への落差を利用する方式と、八十川および周辺の沢からの直接取水方式の二つのアプローチが考えられる。急峻地形は短距離で大きな落差を得られるため、小規模ながら効率的な発電が可能。候補地評価は★★★☆☆。課題は流量が小さいこと（小河川・沢レベル）と、漁村集落の電力需要自体が限定的なこと。一方で、FIT制度による売電や集落の防災電源としての価値は高い。三木浦は磯釣りの渡船基地として知られ、城渡船などが営業しており、渡船業の電力需要も取り込める可能性がある。三木浦から三木里へ抜ける山道沿いにも沢筋があり、複数地点での分散型発電も選択肢となる。","e":"社会科の「水はどこから」で簡易水道と上水道の違いを学ぶ素材。防災教育で自立型電源の意義を考える授業に。","tg":["三木浦","八十川","簡易水道","漁村","マイクロ水力","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_new_三木浦_Mie_Gaiwan_Fishery_Cooperative_Association_mikiura_Kajikaura-01.jpg","t":"三重外湾漁業協同組合三木浦事業所梶賀浦　　三重県尾鷲市梶賀町","id":"WEB-359","u":"https://commons.wikimedia.org/wiki/File%3AMie%20Gaiwan%20Fishery%20Cooperative%20Association%20%EF%BC%88mikiura%20Kajikaura%EF%BC%89-01.jpg","li":"Wikimedia Commons (CC BY-SA 4.0)","loc":"三木浦"}],"s":"尾鷲市水道事業概要、マピオン八十川情報、渡船業者情報","su":""},{"id":"OW-162","c":"energy","a":"mukai","t":"向井地区の水道管路型マイクロ水力 — 余剰水圧を電力に変換","x":"向井地区は尾鷲市街地の北西に位置し、三重県立熊野古道センターや夢古道おわせが立地する観光拠点エリア。尾鷲市の上水道本管系統に属し、山間部の配水池から市街地へ送水する過程で生じる余剰水圧をマイクロ水力発電に利用する構想がある。水道管路型マイクロ水力発電は、既存インフラに発電機を設置するだけで新たな水利権取得が不要（従属発電の登録制が適用可能）という大きなメリットを持つ。全国の先行事例として、富田林市金剛東配水池（DK-Power社製）、尾張旭市柏井配水場（4年間で1,070MWh）、江南市下般若配水場（4年間で1,300MWh超）、千葉県企業局の幕張・妙典給水場（年間計画発電量約334万kWh）などがある。ダイキン工業が開発した管水路用マイクロ水力発電システムは環境省の実証事業を経て実用化されており、既製品の導入が可能。向井地区の課題は、水道管路の落差と流量がどの程度あるかの詳細調査が未了であること。候補地評価は★★★☆☆。熊野古道センターという公共施設への電力供給と組み合わせれば、環境教育の実証展示としても機能する。","e":"理科の「水の流れと力」で位置エネルギーを実感する教材。環境教育で公共施設の再エネ活用を考えるワークショップに。","tg":["向井","水道管路","マイクロ水力","余剰水圧","熊野古道センター","DK-Power","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"DK-Power社、ダイキン工業マイクロ水力、環境省管水路用マイクロ水力実証事業、尾鷲市水道事業概要","su":""},{"id":"OW-163","c":"energy","a":"owase","t":"大曽根地区の水力発電適性 — 市街地近接の制約と可能性","x":"大曽根浦は尾鷲市街地の南に隣接する地区で、1889年の町村制施行時に尾鷲町に編入された歴史ある地域。尾鷲湾に面した高台に大曽根公園があり、湾と島々を望む景勝地。小水力発電の候補地としては評価★★☆☆☆と低め。理由は、市街地に近いため河川の落差が小さく、大規模な水力発電には不向きなこと。周辺の小河川は流域面積・流量ともに限定的で、安定した発電量の確保が難しい。ただし、水道管路型マイクロ水力であれば市街地の水道インフラを活用できる可能性はある。尾鷲市は矢ノ浜浄水場を中心とする上水道系統を持ち、山間部から市街地への送水ラインに沿って複数の配水ポイントがある。大曽根地区単独での事業化は難しいが、向井地区や市街地全体の水道管路マイクロ水力計画の一部として組み込む形が現実的。市街地近接という立地は、発電設備のメンテナンスアクセスや系統連系の面ではむしろ有利に働く。","e":"社会科で「地域の特性と適した発電方法」を比較検討するグループワークの素材に。立地条件の重要性を学ぶ。","tg":["大曽根","市街地","マイクロ水力","水道管路","energy"],"im":[],"s":"尾鷲市公式サイト、国土数値情報河川データ、尾鷲市水道事業概要","su":"https://www.city.owase.lg.jp/"},{"id":"OW-164","c":"energy","a":"owase","t":"FIT制度の小水力発電買取価格 — 200kW未満34円/kWhの据え置き","x":"再生可能エネルギーの固定価格買取制度（FIT）における小水力発電の買取価格は、出力規模によって4区分に分かれる。2025〜2026年度の価格は、200kW未満が34円/kWh、200kW以上1,000kW未満が29円/kWh、1,000kW以上5,000kW未満が23円/kWh（2024年度の27円から引き下げ）、5,000kW以上30,000kW未満が16円/kWh。買取期間は全区分20年間。尾鷲市のマイクロ水力発電構想は100kW級を想定しており、最も有利な200kW未満区分（34円/kWh）が適用される。この34円は2012年のFIT制度開始以来ほぼ据え置きで、太陽光発電の買取価格が大幅に下落する中で小水力は高水準を維持している。年間発電量53〜61万kWhの場合、売電収入は年間約1,800〜2,100万円。FIT認定には経済産業大臣への申請が必要で、設備認定と系統連系の手続きを経て売電を開始する。2025年度以降、1,000kW以上5,000kW未満区分の新規FIT認定に変更があり得るが、200kW未満は当面安定。","e":"算数の「割合と見積もり」で発電量×買取価格の計算問題に活用。社会科で再生可能エネルギー政策を考える授業に。","tg":["FIT","買取価格","34円","200kW未満","小水力","売電","energy"],"im":[],"s":"経済産業省資源エネルギー庁FIT制度ページ、pps-net.org水力FIT価格推移","su":""},{"id":"OW-165","c":"energy","a":"owase","t":"小水力発電の水利権手続き — 従属発電登録制による簡素化","x":"小水力発電で河川の水を利用するには水利権の取得が必要だが、2013年12月11日施行の河川法改正により、既存の水利使用（農業用水・水道用水等）に従属する発電は「登録制」に移行し、手続きが大幅に簡素化された。従来の許可制では関係機関との協議や環境影響の審査に2〜3年かかることがあったが、登録制では申請書類が簡略化され、水利権取得までの期間も短縮される。三重県の場合、指定区間内で出力1,000kW未満の発電は県の県土整備事務所が窓口。尾鷲市の候補地のうち、向井地区の水道管路型は既存の水道水利権に従属するため登録制の対象となり最も手続きが容易。三木浦の簡易水道利用も同様に従属発電として登録可能。賀田地区の古川や又口川での河川直接利用は新規の水利権許可が必要だが、農業用排水や下水処理水を利用する場合は許可不要。国土交通省は「発電水利相談窓口」を本省内に設置しており、事前相談が可能。登録申請に必要な書類のガイドブック・記入例・設計事例も公開されている。慣行水利権（歴史的に認められた水利権）に従属する発電も登録制の対象。","e":"社会科で「水は誰のもの？」を考える授業。公共財としての水と個人の利用権のバランスを学ぶ。","tg":["水利権","従属発電","登録制","河川法","手続き","簡素化","energy"],"im":[],"s":"国土交通省「小水力発電と水利使用手続」、河川法改正（2013年）、農林水産省発電用水利権ガイド","su":""},{"id":"OW-166","c":"energy","a":"owase","t":"石徹白の小水力発電 — 人口270人の集落が電力自給率230%を達成","x":"岐阜県郡上市白鳥町石徹白（いとしろ）は、福井県との県境に位置する約100世帯・約270人の山間集落。かつて1,200人を数えた人口は4分の1以下に減少したが、2008年から実験的にマイクロ水力発電機の導入を開始し、地域再生の起爆剤とした。2013年11月時点で螺旋形水車2機と上掛け水車1機が稼働し、その後大型機も追加して計4機体制に。集落全体の電力使用量を補って余りある発電量を実現し、電力自給率230%を達成。石徹白の成功のカギは、水車の電力で休眠していた農産物加工所を復活させ、名産トウモロコシ「あまえんぼう」の乾燥品やドライフルーツ生産につなげたこと。発電→加工→販売→雇用という循環が生まれた。NPO法人地域再生機構の平野彰秀氏が中心的役割を果たし、都市部からの移住者も増加。尾鷲市は石徹白の1.6倍の降水量（年間約4,000mm）を誇り、地形的にも急峻で石徹白以上のポテンシャルがある。石徹白モデルを尾鷲に適用する場合、賀田地区や三木浦など各集落が独立したマイクロ水力を持ち、地域の加工場や防災拠点に電力を供給する分散型が考えられる。","e":"総合的な学習の時間で「エネルギーと地域づくり」を考えるモデル事例。算数で発電量と消費量の比較問題にも。","tg":["石徹白","岐阜","郡上","電力自給","螺旋水車","集落再生","energy"],"im":[],"s":"greenz.jp石徹白レポート、日経新聞石徹白記事、ミツカン水の文化センター機関誌、NPO地域再生機構","su":""},{"id":"OW-167","c":"energy","a":"owase","t":"東吉野村つくばね小水力発電所 — 54年ぶりの復活と住民ファンド","x":"奈良県東吉野村のつくばね発電所は、大正3年（1914年）から昭和38年（1963年）まで村に電力を供給していた水力発電所。過疎化に悩む村の活性化を目指し、2013年8月に東吉野村小水力利用推進協議会が設立され、54年ぶりの復活プロジェクトが始動。2014年10月に東吉野水力発電株式会社を設立、2015年6月着工、2017年7月に稼働を開始した。日裏川上流から取水し、1.4kmの導水管で山頂から水車へ送水、有効落差105m、最大出力82kW、最大取水量毎秒100リットル。総事業費2億3,500万円のうち5,250万円をクラウドファンディング（セキュリテ）で調達、1口3万円で全国から1,750人の出資を集めた。FIT売電価格34円/kWh、年間想定売電収入は約2,000万円。売電収益は基金化し、林業や村の活性化に活用する仕組み。尾鷲の又口川旧発電所（1920年建設・1935年廃止）との共通点が多く、「廃止された旧発電所を現代技術で復活させる」というストーリーは住民の共感を得やすい。東吉野村は紀伊半島の山間部に位置し、地理的条件も尾鷲に近い。","e":"総合的な学習で「地域を元気にするプロジェクト」の事例研究。クラウドファンディングの仕組みを社会科で学ぶ素材。","tg":["東吉野村","つくばね","クラウドファンディング","復活","紀伊半島","小水力","energy"],"im":[],"s":"自然エネルギー財団レポートNo.15、セキュリテファンド情報、東吉野水力発電株式会社、阪南大学調査報告","su":""},{"id":"OW-168","c":"energy","a":"owase","t":"有田川町営二川小水力発電所 — 町営で投資回収7年の成功モデル","x":"和歌山県有田郡有田川町が運営する町営二川小水力発電所は2016年2月に運転を開始。二川ダムから常時放流される毎秒約0.7m³の未利用エネルギーを活用し、横軸フランシス水車（三井三池製作所製）で発電する。最大出力199kW、常時出力160kW、最大取水量0.70m³/s、常時取水量0.68m³/s、有効落差35.4m（最大）・30.9m（常時）。総事業費2億8,623万1,000円は全額町の資金。FIT売電価格37.40円/kWh、年間発電量約120万kWh（一般家庭300世帯分）、令和3年度売電額3,894万6,748円。年間CO2削減量約610トン。役場職員が運営することで外注コストを抑え、一般的な小水力の投資回収15年に対し約7年での回収を実現。売電収益は基金に積み立て、環境教育などに還元。紀伊半島の先行事例として、同じ半島内の尾鷲市にとって最も参考になるモデル。ダム放流水の活用という手法はクチスボダムにも応用可能性がある。","e":"算数で「売電収入と投資回収」の計算問題。社会科で「税金の使い方と町の工夫」を考える授業に。","tg":["有田川町","二川","町営","ダム放流","フランシス水車","紀伊半島","energy"],"im":[],"s":"有田川町公式「二川小水力発電所」、自然エネルギー財団レポート、ジチタイワークス記事、新エネルギー財団","su":""},{"id":"OW-169","c":"energy","a":"owase","t":"小水力発電の国の補助金制度 — 建設費30〜75%補助の仕組み","x":"小水力発電の導入を支援する国の補助金は複数の省庁から提供されている。環境省は「水インフラのCO2削減設備導入支援事業」で小水力発電設備の導入を支援し、令和7年度予算で全国110カ所での導入を目標に掲げている。また「地域脱炭素推進交付金」は意欲的な脱炭素に取り組む地方公共団体に対し、複数年度にわたり継続的・包括的に支援する制度で、小水力を含む再エネ設備の導入に活用可能。経済産業省資源エネルギー庁は2024年2月に「中小水力発電の導入促進に向けた手引き」「中小水力発電の課題解決事例集」を公開し、全国の成功事例と課題解決ノウハウを整理。初期投資2〜3億円の小水力発電に対し、補助率は事業内容や申請区分により30〜75%で、地元の実質負担を6,000万〜1億円程度に抑えることが可能。農林水産省も農業用水路を活用した小水力発電を推進しており、農業水利施設を活用する場合の手続き・事例集を公開。尾鷲市が導入する場合、SEAモデル協議会の枠組みを活用して環境省の地域循環共生圏事業との連携が有効。","e":"社会科で「国の支援制度と地域の自立」を考える授業。公民分野で補助金の仕組みと申請プロセスを学ぶ。","tg":["補助金","環境省","経済産業省","地域脱炭素","交付金","手引き","energy"],"im":[],"s":"環境省エネ特ポータル2025・2026、経済産業省資源エネルギー庁手引き・事例集、農林水産省小水力推進","su":""},{"id":"OW-170","c":"energy","a":"owase","t":"おわせSEAモデルとエネルギー構想の現在地 — バイオマス中止後の模索","x":"おわせSEAモデル協議会は2018年8月に尾鷲市・尾鷲商工会議所・中部電力で設立（オブザーバー：三重県・三重大学）。尾鷲三田火力発電所跡地63.4万m²を活用し、S（市民サービス・文化・観光）、E（エネルギー）、A（農林水産業・商工業）の3プロジェクトで地域再生を図る。当初E部門の中核だった木質バイオマス発電（出力1万kW、間伐材活用）は、2023年4月に中部電力が「資材価格高騰で採算が合わない」として計画中止を発表。この中止はSEAモデルのエネルギー部門に大きな空白を生んだ。一方、跡地には広域ごみ処理施設が建設され、大型製材工場（2027年頃稼働予定）やスポーツパークの計画は進行中。エネルギー部門の再構築が課題となる中、マイクロ水力発電は規模こそ小さいがバイオマスの代替ではなく補完として位置づけられる。伊東将志氏（元尾鷲商工会議所、夢古道おわせ支配人）は2021年に一般社団法人つちからみのれを設立し、向井地区で多世代交流拠点「むむむ。」を運営。伊東氏は2015年グッドデザイン賞受賞の「100のありがとう風呂」プロジェクトなど、尾鷲の地域資源を全国に発信する「ニュースメーカー」として活動。SEAモデルのエネルギー空白を埋める小水力構想は、こうした地域リーダーとの連携で推進力を得られる。","e":"総合的な学習で「まちの未来を考えよう」のテーマ学習。計画の変更と柔軟な対応を考えるキャリア教育にも。","tg":["SEAモデル","バイオマス","中止","伊東将志","つちからみのれ","むむむ","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_008_owase_mita_thermal.jpg","t":"Owase Mita Thermal Power Station","id":"WEB-108","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲三田火力発電所"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_012_owase_mita_thermal_2.jpg","t":"Owase Mita Thermal Power Plant","id":"WEB-112","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲三田火力発電所"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_031_owase_bay_mita.jpg","t":"Owase Bay and Mita Power Station","id":"WEB-131","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲湾"}],"s":"中日新聞2023年4月SEAモデル記事、環境省ローカルSDGs尾鷲事例、おわせSEAモデル公式、another life.伊東将志氏インタビュー","su":""},{"id":"OW-171","c":"energy","a":"owase","t":"尾鷲市の簡易水道8地区 — 分散型マイクロ水力の導入基盤","x":"尾鷲市は旧尾鷲町内の上水道のほか、須賀利・九鬼・早田・三木浦・三木里・賀田古江・曽根・梶賀の8地区に独立した簡易水道施設を持つ。各地区が山間部の水源から独自に取水・配水するこの分散構造は、マイクロ水力発電の導入基盤として有利に機能する。簡易水道は通常、山間部の沢水や地下水を水源とし、配水池まで標高差がある管路で送水するため、余剰水圧が発生しやすい。水道管路型マイクロ水力発電を各地区の配水系統に組み込めば、8地区それぞれが小規模な発電拠点となり得る。課題は老朽化した施設の更新と耐震化が先行課題であること、小規模な簡易水道では流量が限られること、分散した施設の集中管理システム整備が必要なこと。しかし、管路更新のタイミングでマイクロ水力発電機を同時導入すれば、インフラ更新と再エネ導入を一体化でき効率的。環境省は2013年度から管水路用マイクロ水力発電システムの開発・実証を進めており、富山県南砺市や福島県相馬市で実用化実績がある。尾鷲市のように多数の簡易水道を持つ自治体は、全国でも分散型マイクロ水力のモデルケースになり得る。","e":"社会科「水道のしくみ」で上水道と簡易水道の違いを学ぶ。地図学習で8地区の位置を確認し地形との関係を考える。","tg":["簡易水道","8地区","分散型","管路更新","マイクロ水力","インフラ","energy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_004_kuki.jpg","t":"Kuki","id":"WEB-164","u":"https://photo.mi hidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_002_Magose_Fudo_Waterfall.jpg","t":"Magose Fudo Waterfall.JPG","id":"WEB-288","u":"https://commons.wikimedia.org/wiki/File:Magose_Fudo_Waterfall.JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #おわせ (2026-02-22)","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-178","c":"nature","a":"owase","t":"3月に入り、少しずつ日が長くなってきましたね。","x":"3月に入り、少しずつ日が長くなってきましたね。\n写真は昨年11月末に訪れた植林地の様子です。\n\n植林から1年半が経ち、ぐんと成長した木もあれば、食害を受けてしまった木もあり、育てる難しさを実感しています。\n専門家の皆さんに支えていただきながら、生物多様性の実現に向けて、これからも丁寧に取り組んでいきます。\n\n引き続き応援していただけると嬉しいです！\n\n--\n-—-—-\n\n+biotopの名前の由来はビオトープという自然の生き物が住む場所に「寄り添う(家具)」あるいは調和するという意味の「+(プラス)」を加えた『+biotop(プラス・ビオトープ) 』です。\n\n-—-—-\n\n製品の求め、資料請求など詳しくはプロフィールのリンクから","e":"","tg":["プラスビオトープ","plusbiotop","アウトドアファニチャー","ガーデンファニチャー","屋外家具","家具","サーモウッド","ヒノキ","三重県","三重"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_011_magewappa.jpg","t":"曲げわっぱ弁当箱","id":"WEB-361","u":"https://commons.wikimedia.org/wiki/File:Magewappa_2024_Mar_28_07-24PM.jpeg","li":"CC BY 4.0","loc":""}],"s":"Instagram #おわせ (2026-03-02)","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-179","c":"food","a":"owase","t":"矢浜コミュニティセンターの続き。","x":"矢浜コミュニティセンターの続き。\n退役お雛様は、\n昔話にもなり、\n熊野古道も歩き、\n大河ドラマにもなっていた。\n\n教室のお昼休みに、窓から見える満開桜にひかれて公園に出た。早咲きの河津桜かな。\nお弁当は桜の下ではなく、帰り道用。これを食べてまた頑張ろうといつも思う。","e":"","tg":["お雛様","尾鷲おひなさままつり","おわせ","汐はま","三木里"],"im":[{"p":". い🙌","e":"","tg":["三重県","大紀町","熊野古道","バラ園","フジバカマ","アサギマダラ","ツヅラト峠","告知","秋バラ","大内山"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_027_kumano_kodo_trail.jpg","t":"Kumano Kodo trail","id":"WEB-127","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"熊野古道"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #ツヅラト峠 (2025-10-21)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-264","c":"food","a":"kihoku","t":"【古道秋まつりinツヅラト】","x":"【古道秋まつりinツヅラト】\n\n11月2日（日）道の駅紀伊長島マンボウの芝生広場にて、古道秋まつりinツヅラトが開催されます♪♪\n\n世界遺産熊野古道のツヅラト峠を歩いたり、kihoku戦隊アババインのショーなど、イベント盛りだくさんの1日‼️\n飲食ブースも多数出店予定で、あおさ汁のふるまいや、餅まきもありますよ〜‼️\n\nきーほくんも遊びに来るかも....❓\n\nぜひ皆さんお越しください✨\n\n※ツヅラト峠ウォークは定員を超えましたのでご了承ください※\n\n日時:11月2日 10時～15時（ツヅラト峠ウォークは8時30分から）\n場所:道の駅紀伊長島マンボウ 芝生広場","e":"","tg":["紀北町","道の駅紀伊長島マンボウ","ツヅラト峠","古道秋まつり"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_019_uotobikei.jpg","t":"魚飛渓","id":"WEB-369","u":"https://commons.wikimedia.org/wiki/File:Uotobikei01.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #ツヅラト峠 (2025-10-22)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-265","c":"culture","a":"kihoku","t":"秋は歩こう。","x":"秋は歩こう。\n世界遺産・熊野古道を、紀北町内の“歩きやすい”4スポットに絞ってご紹介。\n石畳、森の匂い、海の眺め。はじめてでも楽しめるコース中心です。\n\n見どころ4選\n① ツヅラト峠：伊勢×紀伊の国境。九十九折の道と熊野灘の眺望。\n② 荷坂峠：道幅広めで歩きやすい。季節の植物＆沖見平の景色。\n③ 始神峠：明治の道と江戸の道が交差。紀伊の松島を一望。\n④ 馬越峠：伊勢路で人気。美しい石畳を存分に。\n\n歩いたら、温泉で整える。\n海風が抜ける露天風呂「きほく千年温泉」（ナトリウム塩化物泉）で\n湯冷めしにくく、芯からぽかぽか。旅の締めくくりにどうぞ。\n\nメモ\n・持ち物：滑りにくい靴、タオル、飲み水\n・天候・通行情報は事前にご確認ください\n\n保存して旅の計画に。\nご予約はプロフィールから。\n\n◆◆◆━━━━━━━━━━━━━━━━\n◆◆　ホテル季の座（ときのざ）\n◆━━━━━━━━━━━━━━━━━━\n\n📍三重県北牟婁郡紀北町\n　 東長島3043-4（城ノ浜）\n☎ 0597-46-2111（9時〜19時）\n🕒 チェックイン ：15:00〜\n　 チェックアウト：11:00\n🅿️ 100台あり（無料）\n🚙 紀伊長島ICから約10分\n🚃 JR紀伊長島駅から無料送迎あり\n　（事前連絡・宿泊者のみ）\n\n━━━━━━━━━━━━━━━━━━◆","e":"","tg":["季の座","きほく千年温泉","紀北町","熊野古道","世界遺産","三重旅行","ハイキング","トレッキング","馬越峠","ツヅラト峠"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_002_magose_stone_bridge.jpg","t":"石橋と石畳","id":"WEB-154","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"Instagram #ツヅラト峠 (2025-10-22)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-266","c":"food","a":"kihoku","t":"今年も紀伊民報と共同で「語り部と歩く熊野古道伊勢路ツアー」を企画しました。🚶‍♂🚌💨","x":"今年も紀伊民報と共同で「語り部と歩く熊野古道伊勢路ツアー」を企画しました。🚶‍♂️🚌💨\n\n今回は4回目、11月30日にツヅラト峠（紀伊と伊勢の境）を歩くコースです。\n \n ツヅラト峠は三重県中部にあり、昔はここが伊勢と紀伊（熊野）の境で、伊勢側から来ると、熊野の玄関となる峠です。\n\n晴れていれば峠から雄大な熊野灘を見ることができます。👀\n\n昼食は、駅弁で有名な「あら竹」のモー太郎弁当をご用意しております。🐮🐄🥩\n \n詳細は以下をご覧ください。\n\n●行先　　　ツヅラト峠（大紀町側から紀北町）\n●行程　　　紀伊民報　6時00発\n●定員　　　40名　※最少催行人数30名\n●旅行代金　一人15,000円　　　※昼食弁当付き\n●バス会社　　　龍神バス\n●添乗員　　同行します。\n●申込方法　\n　①申込フォーム　https://docs.google.com/forms/d/e/1FAIpQLSeK4vDlzIUk79sgqFhjdKkrl07WI6UOG7V_oZ6wSX3RRFerFg/viewform\n\n募集広告にはQRコード掲載しています\n　②メール　　info-kumano.jp\n　③FAX　　　募集広告の裏面が申込み用紙になっています。FAX番号0739-26-5820\n\n皆さまのご応募をお待ちしております👋\n\nhttps://www.agara.co.jp/sp/article/554215","e":"","tg":["語り部と歩く","伊勢路","三重県","紀北町","大紀町","ツヅラト峠","熊野古道","あら竹","紀伊長島","熊野トラベル"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_033_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route).JPG","id":"WEB-319","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_034_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route s3).JPG","id":"WEB-320","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route_s3).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #ツヅラト峠 (2025-10-22)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-267","c":"tourism","a":"owase","t":"10月26日 熊野古道 伊勢路 ツヅラト峠 荷坂峠","x":"10月26日 熊野古道 伊勢路 ツヅラト峠 荷坂峠","e":"","tg":["熊野古道伊勢路","熊野古道","ツヅラト峠","荷坂峠","世界遺産"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #ツヅラト峠 (2025-10-26)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-268","c":"culture","a":"kihoku","t":"2025年11月2日(日)10:00-15:00","x":"2025年11月2日(日)10:00-15:00\n古道秋まつり in ツヅラト\n\n・午前は、ツヅラト峠ウォーク\n・午後は、あおさ汁のふるまい、餅まき、紀北町のヒーローアババインショー　など\n・飲食ブースも多数出展予定\n\n季の座からお車で約7分\n\n◆◆◆━━━━━━━━━━━━━━━━\n◆◆　ホテル季の座（ときのざ）\n◆━━━━━━━━━━━━━━━━━━\n\n📍三重県北牟婁郡紀北町\n　 東長島3043-4（城ノ浜）\n☎ 0597-46-2111（9時〜19時）\n🕒 チェックイン ：15:00〜\n　 チェックアウト：11:00\n🅿️ 100台あり（無料）\n🚙 紀伊長島ICから約10分\n🚃 JR紀伊長島駅から無料送迎あり\n　（事前連絡・宿泊者のみ）\n\n━━━━━━━━━━━━━━━━━━◆","e":"","tg":["季の座","きほく千年温泉","紀北町","熊野古道","世界遺産","三重旅行","ハイキング","トレッキング","ツヅラト峠","三重県イベント"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_002_Magose_Fudo_Waterfall.jpg","t":"Magose Fudo Waterfall.JPG","id":"WEB-288","u":"https://commons.wikimedia.org/wiki/File:Magose_Fudo_Waterfall.JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_006_Magose_Fudoson_and_Fudo_Waterfall.jpg","t":"Magose Fudoson and Fudo Waterfall.JPG","id":"WEB-292","u":"https://commons.wikimedia.org/wiki/File:Magose_Fudoson_and_Fudo_Waterfall.JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"}],"s":"Instagram #ツヅラト峠 (2025-10-26)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-269","c":"tourism","a":"owase","t":"「熊野古道伊勢路を歩きたい！」 でも… 「峠口までのアクセスが不安😥」 「峠を越えた後、駐車場まで戻るのが大変…」...","x":"「熊野古道伊勢路を歩きたい！」 でも… 「峠口までのアクセスが不安😥」 「峠を越えた後、駐車場まで戻るのが大変…」など、これまで一歩を踏み出せなかった、皆さんに良いお知らせです！✨\n\n12月21日(日)までの土日祝限定で、 熊野古道伊勢路（三重県 東紀州エリア）の峠歩きをサポートする 「熊野古道アクセスバス」と「熊野古道伊勢路タクシー」が運行中！\n\n🚌 熊野古道アクセスバス：JR特急「南紀」の到着時刻に合わせて運行！ 紀伊長島駅、尾鷲駅、熊野市駅から、ツヅラト峠や馬越峠、松本峠などの峠口へ楽々アクセスできます。\n\n🚕 熊野古道伊勢路タクシー：こちらはマイカー派の強い味方！駐車場に車を停めて峠を歩き終えた後、 なんと《ワンコイン500円》で駐車場まで戻ってこられます！ \n\nこの便利なバス＆タクシーを活用して、 趣のある石畳や熊野灘の絶景など、伊勢路の美しい自然と歴史を存分に感じてくださいね👟\n\n詳細はこちら👉 https://www.kankomie.or.jp/topic/1048","e":"","tg":["PR","熊野古道","馬越峠","ツヅラト峠","松本峠","観光三重"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #ツヅラト峠 (2025-10-29)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-270","c":"food","a":"owase","t":"催行確定まで、あともうちょっと‼‼ 💦💦","x":"催行確定まで、あともうちょっと‼️‼️ 💦💦\n\n再度募集のご案内です。\n紀伊民報と共同企画「語り部と歩く熊野古道伊勢路ツアー」のツヅラト峠（紀伊と伊勢の境）を歩くコースの再度ご案内です。⛰️⛰️\n \nツヅラト峠は、伊勢と紀伊（熊野）の境となる峠です。\n晴れていれば峠から雄大な熊野灘が見ることができます。\n昼食は、駅弁で有名な「あら竹」のモー太郎弁当をご用意しております。🐄🐄\n\n●日程　　　11月30日（日）\n●行先　　　ツヅラト峠（大紀町側から紀北町）\n●行程　　　紀伊民報　6時00発\n●定員　　　40名　※最少催行人数30名\n●旅行代金　一人15,000円　　　※昼食弁当付き\n●バス会社　　　龍神バス\n●添乗員　　同行します。\n●申込方法　\n　①申込フォーム　募集広告にはQRコード掲載しています\n\nhttps://docs.google.com/forms/d/e/1FAIpQLSeK4vDlzIUk79sgqFhjdKkrl07WI6UOG7V_oZ6wSX3RRFerFg/viewform\n\n　②メール　　info-kumano.jp\n　③FAX　　　募集広告の裏面が申込み用紙になっています。FAX番号0739-26-5820\n\n募集広告（申込）が必要な方はメールでお送りします。\n\nみんな秋の伊勢路歩きに行こら〜","e":"","tg":["熊野トラベル","伊勢路","熊野古道","紀伊民報","田辺市熊野ツーリズムビューロー","ツヅラト峠","大紀町","語り部と歩く","あら竹"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_033_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route).JPG","id":"WEB-319","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_034_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route s3).JPG","id":"WEB-320","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route_s3).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #ツヅラト峠 (2025-11-06)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-271","c":"food","a":"owase","t":"世界遺産、熊野古道に行きました！","x":"世界遺産、熊野古道に行きました！\n雰囲気が他の山と違う！\nなんか知らんけどパワーを貰えました👍\n\n熊野古道は長ーい道なんですが\n僕が訪れたのは\n伊勢路のツヅラト峠です\n\n山頂の景色は\n海と山のコラボで\n最高の眺めでした！！\n天気も快晴！\n\n熊がいるらしく\n登山口に熊鈴の\n無料レンタルBOXが\n置いてありました🐻\n\nそして下山の際、熊らしき足音が\nはっきりと聞こえました！\n姿は見ていませんが\nどっしりしてたので\nおそらく熊でしょう😳\n特に何事も無く下山しました⛰️\n\nちなみに登山客は\n僕一人だけでした\n静かで厳かな空間でした⛰️\n\n帰りに道の駅で\nマンボウの串焼きを食べました\nハッキリ言って、おすすめ出来ません😁\n食感はイカとホルモンが混ざったような感じ\n味は若干生臭いので\n塩胡椒で、誤魔化してありました\nまぁ思い出には、なりました😁\n\n熊野古道は、たくさんルートがあるので\nまた時間あるときに\n別のコースを歩きたいと思います😊","e":"","tg":["熊野古道","伊勢路","ツヅラト峠","登山","山好き"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #ツヅラト峠 (2025-11-24)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-272","c":"food","a":"kihoku","t":"紀伊民報との共同企画ツアーで、熊野古道伊勢路ツヅラト峠を歩きました。","x":"紀伊民報との共同企画ツアーで、熊野古道伊勢路ツヅラト峠を歩きました。\n\n伊勢と紀伊（熊野）の境になる峠です。\n\n大紀町側の定坂小公園でバスを降りると語り部さんが出迎えてくれる\n\nこの辺に花山法皇の遥拝所があったと言われています。近露の牛馬童子像も花山法皇やでな🤔\n\n熊対策のため、みんな鈴🛎️つけて、チリンチリン鳴らしながら歩く🚶‍♂️‍➡️🐻\n\n峠道に入ると登りばっかり、高低差は約150m📈\n\n標高357mのツヅラト峠の頂上からは、熊野の山々と紀伊長島の市街地とその向こうには、熊野灘の景色が一面に広がる👀\n\nこの絶景をみたかったんや👀\n\n伊勢から旅してきた人は、初めて見る熊野の景色と海に感動したことでしょう🤩\n\nここからが紀伊\n\n真下には、昼食の弁当を食べるキャンプ場が見える。\n\nえっ、これ降りるの⁉️というぐらい真下😲\n\n1kmちょっとで、300mも下る📉\n\nえんえんとジグザグした下り坂が続く\n\nこれがツヅラト峠の名前の由来\n\n紀伊だけに、気いつけておりなあかん😆\n\nこれが紀伊の由来🤭　それはちゃう\n\nもう一つの見どころ「野面乱層積」\n\n自然の石を、隙間を開けて積むことによって、山からの水が通り抜けられるので、雨が降っても崩壊せずに今も残っているんやって\n\n降りたら、山を見上げる🙄\n\nあんな高いところから降りてきたんやな、改めて思う\n\nYAMAPを使って奇跡を辿ってたら、動画のような感じになりました。","e":"","tg":["熊野古道","伊勢路","ツヅラト峠","大紀町","紀北町","ヤマップ","YAMAP"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_033_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route).JPG","id":"WEB-319","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_034_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route s3).JPG","id":"WEB-320","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route_s3).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"Instagram #ツヅラト峠 (2025-12-01)","su":"https://www.instagram.com/explore/tags/ツヅラト峠/"},{"id":"OW-273","c":"food","a":"owase","t":"紀伊民報の伊勢路ツアー　の続き","x":"紀伊民報の伊勢路ツアー　の続き\n\nツヅラト峠から、麓に降りてきて、昼食は松阪駅の名物駅弁「モー太郎弁当」🐮🐃\n\nこの日は11月30日　前の日だったら、11月29日で「いいにく」の日だったのに、惜しい😅😜\n\n紙の箱を外すと、牛の顔の容器にギョッ‼と睨まれる目🐮🙄\n\n顔のフタを開けると「故郷」のメロディ🎶が鳴って２度びっくり‼️\n\nお弁当を食べながらツヅラト峠を見上げると、あんな高いところから下ってきたんやな🙄　改めておもう\n\nお弁当の容器を持って帰る方も　フタはお面にもなる👺😆\n\n天気もよくて、暖かくて、よかった\n\n次の伊勢路ツアーは、３月に実施予定です。","e":"","tg":["ツヅラト峠","伊勢路","紀伊民報","熊野古道"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owas つかれさーま🌈\nありがとね🌈\n⁡\n\n⁡\n\n2025/12/05の朝意識が無くなったとの事で父と叔母が病院に駆けつけ、到着する頃に意識回復\n⁡\n⁡\n3回目の奇跡との事で3回戻ってきたばぁちゃん🧓🏻\n⁡\n土日は面会してないけど先生から特別に面会許可がおりて週末会わせたい人たちに会わせてあげてくださいとの事で土曜日にばぁちゃんに会いに行ってきました。\n⁡\nせん妄も何度かあったと聞いていたので、わかってくれるかなーと不安を抱えつつ、ばぁちゃん！わかる？と聞くと\n⁡\n｢みーちゃん、よう肥えて🐷｣と\n⁡\n第一声がそれかーいと大笑いしつつ、声はいつもより弱いながらも意識もはっきりして、表情も明るくて、安心しました🌈\n⁡\n⁡\nいつも心配させて、心残りだといい続けられて、まだばぁちゃん、頑張らなかん、みーちゃんを見届けるまではと毎回言われ、それを少しでも気を楽にしてもらおうと\n｢㍉、ちゃんと幸せだからね！安心してね！｣\nと伝えることができて、\n｢早くお家に帰りたい🧓🏻｣と言うばぁちゃんに\n｢すぐ帰れるからね🌈｣と伝えたはいいが、まさか本当に当日に家に帰ってくるとかおもわんじゃん。\n⁡\nその形じゃないよばぁちゃん。と思いつつも、やっと気が楽になったのかな、やっとばぁちゃん心置きなくゆっくり安らかに休めれるようになったのかなと思うように変換しよと考えて、信じられないまま尾鷲に向かいました。\n⁡\n会って喋った翌日にお通夜、そして本日お葬式と淡々と進んでいったここ数日。\n⁡\nばぁちゃん、またねって言ってから3時間ちょいしか経ってないよばぁちゃん。って信じられなくて、独り言のように、え？元気だったよね？え？さっき喋ってたよね？\nえ？え？え？何で？\n何が起こった？と多分尾鷲行くまで何回もずっと言ってた。\n⁡\n命は儚い。\n命は尊い。\n⁡\n\n12月8日ってね、お釈迦様が悟りを開いた日なんだって。\n⁡\n葬儀、開蓮？初七日というものを今日してもらったんだけど、それプラス悟りを開いた記念の法要の一部を付け加えてお経を読んでくれたらしい。\n⁡\n宗教とか宗派とか分からないけど、噛み砕いて色んなことを教えて貰うと、知ってる言葉が沢山出てきて、全てに、( *˙0˙*)ﾎｫｰ.ᐟ.ᐟって言ってたと思う笑\n⁡\n⁡\nそして、悟りと言えば、悟ジィ。\n大好きな悟ジィに12年ぶりに会えるね👫💓🌈\n大好きなたぁくんおいちゃんにも会えるね👫💓🌈\n⁡\n\n⁡皆に、もう来たんかいって言われんようにね笑\n⁡\n⁡\n寂しいけど\nたくさんの花に囲まれて、皆に笑顔と涙で送ってもらって\n騒がしかったと思うけど幸せだったと思いたい💞\n⁡\n⁡\nばぁちゃん、また行くね🌈\n四十九日ってよく聞くけども、それの意味もちゃんと教えて貰って、ずっとそれも( *˙0˙*)ﾎｫｰ.ᐟ.ᐟってなってた\n⁡\n7種の修行の旅を7日間ずつするから四十九日なんだって！\n⁡\nちゃんとそれを見届けに行かねば🌈\n⁡\n⁡\n先日の極寒とは違ってとても暖かい日でよかった☀️｡°\n⁡\nご冥福をお祈りします🙏🌈\n安らかに眠ってください🌈🌹✨️\n⁡\n⁡","e":"","tg":["尾鷲","三木里","空と雲とそれからみり"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_045_mikisato.jpg","t":"Mikisato","id":"WEB-229","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_046_mikisato.jpg","t":"Mikisato","id":"WEB-230","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_047_mikisato.jpg","t":"Mikisato","id":"WEB-231","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"
