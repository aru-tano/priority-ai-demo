<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>尾鷲郷土資料館</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans JP',sans-serif;min-height:100vh;transition:background .4s,color .3s}

:root{
  --bg:#FAF9F6;--surface:#FFFFFF;--surface-dim:#F5F3F0;--surface-container:#EDE9E3;
  --border:rgba(45,38,33,0.07);--border-mid:rgba(45,38,33,0.12);
  --text:#2d2621;--text-secondary:#6b6560;--text-dim:#a8a29e;
  --accent:#4A7C59;--accent-bg:rgba(74,124,89,0.07);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.04);--shadow-md:0 4px 16px rgba(0,0,0,0.06);--shadow-lg:0 16px 40px rgba(0,0,0,0.1);
  --ease:cubic-bezier(.16,1,.3,1);
}
body{background:var(--bg);color:var(--text)}
body.dark{
  --bg:#111110;--surface:#1a1917;--surface-dim:#1e1d1b;--surface-container:#252320;
  --border:rgba(255,255,255,0.06);--border-mid:rgba(255,255,255,0.1);
  --text:#e8e4df;--text-secondary:#b5afa8;--text-dim:#6b6560;
  --accent:#7aad8a;--accent-bg:rgba(122,173,138,.1);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.15);--shadow-md:0 4px 16px rgba(0,0,0,0.2);--shadow-lg:0 16px 40px rgba(0,0,0,0.3);
}

/* Grain */
body::before{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.03;pointer-events:none;z-index:9999;
}

/* Hero */
.hero{
  position:relative;height:420px;overflow:hidden;
  display:flex;align-items:flex-end;
}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1.5s ease}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.15) 60%,rgba(0,0,0,0.3) 100%)}
.hero-content{position:relative;z-index:2;padding:40px 48px;width:100%}
.hero-title{font-family:'Shippori Mincho',serif;font-size:2.8rem;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:0.05em}
.hero-sub{font-size:1rem;color:rgba(255,255,255,0.8);margin-bottom:16px;font-weight:400}
.hero-stats{display:flex;gap:24px}
.hero-stat{display:flex;flex-direction:column;align-items:center}
.hero-stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#fff;line-height:1}
.hero-stat-label{font-size:0.7rem;color:rgba(255,255,255,0.7);margin-top:2px;font-weight:600;letter-spacing:0.05em}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(250,249,246,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:10px 32px;
  display:flex;align-items:center;gap:12px;
}
body.dark .topbar{background:rgba(17,17,16,0.9)}
.topbar-back{
  display:flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:14px;font-weight:600;
  padding:6px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer;
  transition:background .2s;
}
.topbar-back:hover{background:var(--accent-bg)}
.search-box{
  flex:1;max-width:360px;padding:7px 12px 7px 32px;
  border:1px solid var(--border);border-radius:8px;background:var(--surface);
  color:var(--text);font-family:inherit;font-size:14px;outline:none;
  background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2214%22 height=%2214%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23a8a29e%22 stroke-width=%222%22><circle cx=%2211%22 cy=%2211%22 r=%228%22/><path d=%22m21 21-4.3-4.3%22/></svg>');
  background-repeat:no-repeat;background-position:10px center;
}
.search-box:focus{border-color:var(--accent)}
.theme-btn{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Area tabs */
.area-bar{
  padding:0 32px;display:flex;gap:0;
  border-bottom:1px solid var(--border);background:var(--bg);
}
.area-tab{
  padding:10px 20px;font-size:14px;font-weight:600;
  color:var(--text-secondary);cursor:pointer;
  border:none;background:transparent;font-family:inherit;
  border-bottom:2px solid transparent;
  transition:all .2s var(--ease);
  display:flex;align-items:center;gap:6px;
}
.area-tab:hover{color:var(--text);border-bottom-color:var(--border-mid)}
.area-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.area-tab .area-cnt{
  font-size:11px;font-weight:700;opacity:0.6;
  background:var(--surface-dim);padding:1px 6px;border-radius:10px;
}
.area-tab.active .area-cnt{background:var(--accent-bg);opacity:1}

/* Category pills */
.cat-bar{
  padding:12px 32px;display:flex;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg);
}
.cat-pill{
  padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-secondary);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s var(--ease);display:flex;align-items:center;gap:5px;
  font-family:inherit;
}
.cat-pill:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-pill .cnt{font-size:11px;opacity:0.7;font-weight:700}

/* Content area */
.content{max-width:1400px;margin:0 auto;padding:24px 32px}

/* ===== OVERVIEW GRID (館内案内) ===== */
.overview-section{margin-bottom:32px}
.overview-heading{
  font-family:'Shippori Mincho',serif;font-size:1.3rem;font-weight:700;
  margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.overview-heading span{font-size:13px;font-weight:500;color:var(--text-dim);font-family:'Inter','Noto Sans JP',sans-serif}
.overview-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-auto-rows:auto;
  gap:14px;
}
.ov-card{
  position:relative;border-radius:14px;overflow:hidden;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);
  transition:all .35s var(--ease);display:flex;flex-direction:column;
}
.ov-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.ov-card.large{grid-column:span 2;grid-row:span 2}
.ov-card-photos{
  display:grid;gap:2px;width:100%;overflow:hidden;
}
.ov-card-photos.single{grid-template-columns:1fr}
.ov-card-photos.duo{grid-template-columns:1fr 1fr}
.ov-card-photos.trio{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.ov-card-photos.trio img:first-child{grid-row:span 2}
.ov-card-photos.quad{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.ov-card-photos img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .6s ease;
}
.ov-card:hover .ov-card-photos img{transform:scale(1.04)}
.ov-card-photos.single{aspect-ratio:16/9}
.ov-card-photos.duo,.ov-card-photos.trio,.ov-card-photos.quad{aspect-ratio:16/9}
.ov-card.large .ov-card-photos{aspect-ratio:16/10}
.ov-card-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.ov-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ov-card-icon{
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#fff;flex-shrink:0;
}
.ov-card-name{font-size:16px;font-weight:700}
.ov-card-count{
  margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;
  color:var(--text-dim);line-height:1;
}
.ov-card-desc{font-size:12.5px;color:var(--text-secondary);margin-bottom:8px}
.ov-card-titles{display:flex;flex-direction:column;gap:2px;flex:1}
.ov-card-titles span{
  font-size:12px;color:var(--text-dim);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
}
.ov-card-titles span::before{content:"\2014\00a0";opacity:0.4}
.ov-card-enter{
  display:flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;color:var(--accent);margin-top:8px;
  transition:gap .2s;
}
.ov-card:hover .ov-card-enter{gap:8px}

/* Stats bar */
.stats-bar{
  display:flex;gap:24px;padding:20px 28px;margin-bottom:24px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  flex-wrap:wrap;
}
.stat-item{display:flex;flex-direction:column;align-items:center;min-width:80px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--text);line-height:1}
.stat-label{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:0.05em;margin-top:2px}

/* ===== CONCIERGE ===== */
.concierge{
  margin-bottom:28px;background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:24px 28px;
}
.concierge-title{
  font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;
  margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.concierge-sub{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.concierge-input-wrap{
  display:flex;gap:8px;margin-bottom:14px;
}
.concierge-input{
  flex:1;padding:10px 16px;border:1px solid var(--border-mid);border-radius:10px;
  background:var(--bg);color:var(--text);font-family:inherit;font-size:15px;outline:none;
  transition:border-color .2s;
}
.concierge-input:focus{border-color:var(--accent)}
.concierge-input::placeholder{color:var(--text-dim)}
.concierge-send{
  padding:10px 20px;border-radius:10px;border:none;
  background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;
}
.concierge-send:hover{filter:brightness(1.1)}
.concierge-courses{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.concierge-course{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg);color:var(--text-secondary);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:inherit;
  display:flex;align-items:center;gap:5px;
}
.concierge-course:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* Concierge response */
.concierge-response{
  margin-top:20px;padding-top:18px;border-top:1px solid var(--border);
  animation:fadeUp .4s var(--ease);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.concierge-answer{
  font-size:15px;line-height:1.7;color:var(--text);margin-bottom:16px;
}
.concierge-answer strong{color:var(--accent)}
.concierge-picks{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.concierge-pick{
  display:flex;gap:12px;padding:12px;border-radius:12px;
  background:var(--bg);border:1px solid var(--border);cursor:pointer;
  transition:all .25s var(--ease);align-items:flex-start;
}
.concierge-pick:hover{border-color:var(--accent);background:var(--accent-bg);transform:translateY(-1px)}
.concierge-pick-img{
  width:72px;height:54px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface-dim);
}
.concierge-pick-body{flex:1;min-width:0}
.concierge-pick-cat{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;color:#fff;display:inline-block;margin-bottom:3px}
.concierge-pick-title{font-size:13.5px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.concierge-pick-excerpt{font-size:12px;color:var(--text-dim);line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.concierge-typing{display:flex;align-items:center;gap:4px;padding:8px 0}
.concierge-typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.3;animation:typingDot 1.2s ease-in-out infinite}
.concierge-typing span:nth-child(2){animation-delay:0.2s}
.concierge-typing span:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* ===== MAP VIEW ===== */
.map-container{width:100%;height:calc(100vh - 200px);min-height:500px;border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.map-sidebar{
  position:absolute;top:10px;right:10px;z-index:1000;
  width:320px;max-height:calc(100% - 20px);overflow-y:auto;
  background:var(--surface);border-radius:12px;border:1px solid var(--border);
  box-shadow:var(--shadow-lg);
}
.map-sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.map-sidebar-list{max-height:400px;overflow-y:auto}
.map-sidebar-item{
  display:flex;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--border);align-items:flex-start;
}
.map-sidebar-item:hover{background:var(--accent-bg)}
.map-sidebar-item img{width:52px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0}
.map-sidebar-item-body{flex:1;min-width:0}
.map-sidebar-item-title{font-size:12.5px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.map-sidebar-item-cat{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;display:inline-block;margin-top:2px}
.leaflet-popup-content{font-family:'Inter','Noto Sans JP',sans-serif;font-size:13px;line-height:1.5}
.leaflet-popup-content strong{font-size:14px}

@media(max-width:960px){
  .overview-grid{grid-template-columns:repeat(2,1fr)}
  .ov-card.large{grid-column:span 2;grid-row:span 1}
  .map-sidebar{width:100%;position:relative;top:0;right:0;border-radius:0 0 12px 12px}
}
@media(max-width:600px){
  .overview-grid{grid-template-columns:1fr}
  .ov-card.large{grid-column:span 1}
}

/* Room header */
.room-header{
  margin:32px 0 16px;padding:20px 24px;border-radius:16px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
}
.room-header:first-child{margin-top:0}
.room-icon{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:#fff;flex-shrink:0;
}
.room-info h2{font-size:1.2rem;font-weight:700;margin-bottom:2px}
.room-info p{font-size:13px;color:var(--text-secondary)}
.room-count{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--text-dim);line-height:1}

/* Card grid */
.card-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;
  margin-bottom:8px;
}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:all .35s var(--ease);
}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.card-img{
  width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--surface-dim);
  display:block;
}
.card-img-placeholder{
  width:100%;aspect-ratio:16/10;background:var(--surface-dim);
  display:flex;align-items:center;justify-content:center;
}
.card-img-placeholder i{font-size:2rem;color:var(--text-dim);opacity:0.3}
.card-body{padding:14px 16px 16px}
.card-cat{
  display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;
  margin-bottom:6px;color:#fff;
}
.card-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-excerpt{
  font-size:13px;color:var(--text-secondary);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.card-tag{font-size:10.5px;padding:1px 6px;border-radius:4px;background:var(--surface-dim);color:var(--text-dim)}

/* Detail modal */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s;
  display:flex;justify-content:flex-end;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-panel{
  width:640px;max-width:90vw;height:100vh;background:var(--bg);
  overflow-y:auto;transform:translateX(100%);transition:transform .4s var(--ease);
  box-shadow:-8px 0 32px rgba(0,0,0,0.15);
}
.modal-overlay.open .modal-panel{transform:translateX(0)}
.modal-close{
  position:sticky;top:12px;float:right;margin:12px 12px 0 0;
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.modal-close:hover{border-color:var(--accent);color:var(--accent)}
.modal-gallery{position:relative;width:100%;aspect-ratio:16/10;background:#111;overflow:hidden}
.modal-gallery img{width:100%;height:100%;object-fit:contain;transition:opacity .4s}
.modal-gallery-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);
  color:#fff;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.modal-gallery-nav:hover{background:rgba(255,255,255,0.3)}
.modal-gallery-nav.left{left:12px}
.modal-gallery-nav.right{right:12px}
.modal-gallery-counter{
  position:absolute;bottom:8px;right:12px;
  font-size:12px;color:rgba(255,255,255,0.7);
  background:rgba(0,0,0,0.4);padding:2px 8px;border-radius:4px;
}
.modal-body{padding:24px 28px 40px}
.modal-cat-badge{
  display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;
  color:#fff;margin-bottom:10px;
}
.modal-title{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:700;line-height:1.5;margin-bottom:16px}
.modal-content{font-size:14.5px;line-height:1.9;color:var(--text);margin-bottom:24px;white-space:pre-wrap}
.modal-section{margin-bottom:20px}
.modal-section-title{
  font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.modal-edu{
  font-size:13.5px;line-height:1.8;color:var(--text-secondary);
  padding:16px;border-radius:10px;background:var(--accent-bg);
}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap}
.modal-tag{font-size:12px;padding:3px 10px;border-radius:6px;background:var(--surface-dim);color:var(--text-secondary);font-weight:500}
.modal-source{font-size:12px;color:var(--text-dim);margin-top:12px}

/* History timeline */
.timeline{display:flex;flex-direction:column;gap:12px;margin-top:12px}
.timeline-item{
  display:flex;gap:14px;padding:14px 16px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);transition:all .2s;
}
.timeline-item:hover{border-color:var(--accent);background:var(--accent-bg)}
.timeline-era{
  flex-shrink:0;width:56px;height:56px;border-radius:10px;
  background:linear-gradient(135deg,#8B7355,#A0896A);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;text-align:center;line-height:1.2;
}
.timeline-body h4{font-size:14px;font-weight:700;margin-bottom:4px}
.timeline-body p{font-size:13px;color:var(--text-secondary);line-height:1.6}

/* Scroll top */
.scroll-top{
  position:fixed;bottom:24px;right:24px;z-index:90;
  width:42px;height:42px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;
  box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .3s;pointer-events:none;
}
.scroll-top.show{opacity:1;pointer-events:auto}
.scroll-top:hover{color:var(--accent);border-color:var(--accent)}

/* Loading skeleton */
.skeleton{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Print */
@media print{
  .topbar,.cat-bar,.modal-overlay,.scroll-top,.theme-btn,.search-box{display:none!important}
  .hero{height:200px}
  .card-grid{grid-template-columns:repeat(2,1fr)}
}

/* Responsive */
@media(max-width:768px){
  .hero{height:300px}
  .hero-title{font-size:2rem}
  .hero-content{padding:24px}
  .topbar{padding:10px 16px}
  .area-bar{padding:0 16px}
  .area-tab{padding:8px 14px;font-size:13px}
  .cat-bar{padding:10px 16px}
  .content{padding:16px}
  .card-grid{grid-template-columns:1fr}
  .modal-panel{width:100vw;max-width:100vw}
}

<script>
// ═══ DATA ═══
const DATA = [{"id":"OW-001","c":"geography","a":"owase","t":"尾鷲市の基本データ — 三重県南部の海と山のまち","x":"尾鷲市は三重県南部の東紀州地域の中央に位置し、昭和29年（1954年）6月20日に尾鷲町・須賀利村・九鬼村（北牟婁郡）と北輪内村・南輪内村（南牟婁郡）の1町4村合併により市制を施行した。面積は192.71平方キロメートル（東西21km、南北19km）で、総面積の約90%が山林に覆われている。人口は16,252人（男7,562人、女8,690人）、世帯数8,153世帯（令和2年国勢調査）。北は紀北町、南は熊野市、西は奈良県に接し、東は熊野灘（太平洋）に面する。紀伊半島の南東部に位置し、黒潮の影響で冬も温暖な気候。JR紀勢本線の尾鷲駅・大曽根浦駅・九鬼駅・三木里駅・賀田駅の5駅があり、紀勢自動車道（E42）と国道42号・311号・425号が通る。市の花はヤブツバキ、市の木はヒノキ、市の鳥はアオサギ、市の魚はブリ。姉妹都市としてカナダ・ブリティッシュコロンビア州プリンスルパート市（1968年提携）、友好都市として中国・大連市金州区（2007年提携）がある。人口の80%以上が旧尾鷲町の海岸部に集中しており、平坦地が極めて少ないのが地形上の大きな特徴である。市議会は10名の議員で構成され、三重県議会には紀北町と合わせて2名の議員を送っている。","e":"全校朝会の校長講話で「私たちのまち尾鷲」として基本データを紹介する導入に最適。3年生社会科の「わたしたちのまち」単元で市の概要を学ぶ際の基礎資料。保護者会の冒頭で地域の特徴に触れる際にも使える。市のシンボル（花・木・鳥・魚）は低学年の生活科でも活用可能。","tg":["基本データ","人口","面積","東紀州","三重県南部","リアス式海岸","市制施行","geography"],"im":[],"s":"尾鷲市公式サイト「尾鷲市の概要」、Wikipedia「Owase」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-002","c":"geography","a":"owase","t":"日本有数の多雨地帯 — 年間降水量約4,000mmの雨のまち","x":"尾鷲市は年間降水量の平年値（1991〜2020年）が3,969.6mmに達し、日本国内で最も雨が多い都市の一つとして知られる。世界的に見ても、低地の温帯・亜熱帯地域としては最高レベルの降水量であり、南チリ沿岸やカナダ・ブリティッシュコロンビア沿岸と並ぶ。この多雨の原因は三つの要因の組み合わせで説明できる。第一に、日本最大の暖流・黒潮が最も日本列島に近づく場所に位置し、海面から大量の水蒸気が供給される。第二に、海岸線のすぐ背後に大台ケ原山系の急峻な山々がそびえ、湿った空気が山にぶつかって急速に上昇する地形性降雨が発生する。第三に、春から秋にかけて南からの暖かく湿った気流が流れ込みやすい地理的位置にある。「尾鷲の雨は下から降る」という言い伝えがあり、一度に降る雨粒が飴玉ほどに大きく激しいため、地面に当たって跳ね返る水しぶきが下からも降ってくるように感じることに由来する。ただし意外なことに、年間日照時間は約1,966時間と全国平均とほぼ同じで、東京より長い年もある。降る時に一気に降り、晴れる時はしっかり晴れるという極端な気候が最大の特徴。気候区分は温暖湿潤気候（ケッペン分類Cfa）で、冬も温暖で積雪はほぼゼロ。降水量が最も多い月は意外にも4月（879.5mm）で、7月・8月は比較的少ない。","e":"理科の天気や気候の授業で「なぜ尾鷲は雨が多いのか」を探究テーマにできる。黒潮・地形・上昇気流の関係を図解すると5年生の理科と社会の横断学習になる。全校朝会で「雨が多いけど日照時間は東京より長い」「雨が最も多いのは4月」という意外な事実を紹介すると子どもの関心を引ける。降水量データのグラフ化は算数の横断教材にもなる。","tg":["降水量","気候","黒潮","多雨","日照時間","地形性降雨","上昇気流","rain","climate"],"im":[],"s":"気象庁 尾鷲観測所データ（1991-2020平年値）、尾鷲市公式サイト、note「owase things」、Wikipedia「Owase」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-003","c":"geography","a":"owase","t":"リアス式海岸と10の漁港 — 変化に富んだ海岸線100km","x":"尾鷲市の海岸線は熊野灘に面したリアス式海岸で、その総延長は約100kmに達する。リアス式海岸とは、かつて山や丘であった場所が海面上昇や地盤沈降によって海に沈み、谷の部分が入り江になった地形のことで、鋸の歯のように複雑に入り組んだ海岸線が特徴。深く入り組んだ入り江は水深が深いため、古くから天然の良港として利用されてきた。市内には須賀利・尾鷲・大曽根浦・行野浦・九鬼・早田・三木浦・古江・曽根・梶賀の10の漁港があり、それぞれの港に独自の得意漁法が伝わっている。この複雑な海岸線は、波が穏やかな内湾をつくるため港に適し、同時に多様な海底地形が豊かな漁場を生み出している。入り江の奥は養殖にも最適な環境で、尾鷲湾ではブリの養殖が年間40万尾を超える規模で行われている。大学との連携による先進的な養殖技術の開発も進む。九鬼町はリアス式海岸の天然の良港に位置し、戦国時代には九鬼水軍の拠点ともなった。江戸時代には千石船の寄港地として栄え、明治以降は日本三大ブリ漁場の一つに数えられた。海岸線の多様さは景観としても美しく、エメラルドグリーンの海と緑の山々が織りなす風景は尾鷲を訪れる人を魅了し続けている。尾鷲湾は水深が50mを超える場所もあり、大型船の入港も可能。海岸線の景観は山と海のコントラストが美しく、写真家にも人気のスポットとなっている。","e":"5年生社会科「水産業のさかんな地域」で、リアス式海岸と漁業の関係を地元の具体例として学べる。地形の成り立ちは6年生理科「大地のつくり」にも関連する。校外学習で漁港見学をする際の事前学習資料として活用可能。10の漁港を地図上にプロットする活動は地図学習にもなる。","tg":["リアス式海岸","漁港","海岸線","熊野灘","養殖","地形","九鬼","rias"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons.wikimedia.org/wiki/File:熊野灘_-_panoramio_(1).jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""}],"s":"尾鷲市公式サイト「水産振興係」「おわせを知る」、フジクリーン「熊野灘とリアス海岸」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-004","c":"geography","a":"owase","t":"天狗倉山と便石山 — 尾鷲を見守る二つの名山と象の背","x":"尾鷲市街から北を望むと、右に天狗倉山（てんぐらさん、標高522m）、左に便石山（びんしやま、標高599m）がそびえる。両山とも東紀州で最も人気のある登山スポットで、世界遺産・熊野古道の馬越峠から登ることができる。天狗倉山の山頂には巨大な一枚岩があり、その上からは尾鷲市街と紀北町、熊野灘を一望する360度のパノラマが広がる。便石山には「象の背」と呼ばれる巨大な岩があり、象の背中のように丸みを帯びた岩の上に立つと、足元は断崖絶壁、眼下には尾鷲湾と紀北町の海岸線が広がる絶景が楽しめる。この「象の背」はSNS映えするスポットとして全国的に有名になり、多くの登山者やハイカーが訪れている。馬越峠から便石山頂上までは約3時間の行程で、途中には尾鷲ヒノキの美しい人工林が広がり、森林浴にも最適。登山道は整備されているが、象の背周辺は滑りやすいため注意が必要。天狗倉山への登りは約1時間で、初心者でも挑戦しやすい。尾鷲市はこれらの山岳と世界遺産・熊野古道を組み合わせたトレッキング観光に力を入れており、尾鷲三名山ツアーなどのイベントも開催されている。馬越峠から天狗倉山頂までは約1時間で、初心者でも挑戦しやすい。晴れた日には熊野灘の水平線に浮かぶ船が点のように見え、地球の丸さを実感できると言われる。","e":"総合的な学習の時間で「ふるさとの山」をテーマにした探究活動に使える。校外学習のコース設計にも最適。全校朝会で象の背の写真を見せながら「この景色は尾鷲にしかない」と語ると、地域への誇りを育める。体育のハイキング活動の候補地としても。安全面の事前指導資料にもなる。","tg":["天狗倉山","便石山","象の背","登山","絶景","トレッキング","熊野古道","mountain"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"}],"s":"尾鷲市公式サイト「便石山・象の背」、観光三重、Wikipedia「天狗倉山」、尾鷲観光物産協会","su":"https://www.city.owase.lg.jp/"},{"id":"OW-005","c":"geography","a":"owase","t":"みえ尾鷲海洋深層水 — 水深415mからの深海の恵み","x":"尾鷲市は2000年代より海洋深層水の取水・活用事業を展開している。古江漁港から全長約12.5kmに及ぶ取水管を海底に敷設し、三木崎沖の水深約415mから海洋深層水を汲み上げている。取水・分水拠点は「アクアステーション」と呼ばれ、ここで一般や企業への分水が行われる。海洋深層水とは、水深200m以深にある海水のことで、太陽光が届かないため水温が低く安定し（年間を通じて約9℃）、細菌が極めて少なく清浄であり、窒素やリン、ケイ素などの無機栄養塩やミネラルが豊富という三つの特徴がある。これは光合成による消費がないため栄養塩が分解されずに蓄積されることによる。尾鷲市ではこの深層水を飲料水、化粧品原料、水産養殖の水温調整、農業用水の養分補給など多方面で活用し、地域産業の振興に役立てている。夢古道おわせの入浴施設では海洋深層水を使った風呂が楽しめ、肌がすべすべになると評判で観光資源としても機能している。深海からの恵みを地域の力に変える先進的な取り組みとして、全国の海洋深層水活用事例の中でも注目されている。深層水は地球上の海水の約95%を占めるとされ、この広大な資源の活用は地域経済に新たな可能性をもたらしている。分水価格も手頃で、地元の食品加工業者にも利用されている。","e":"5年生理科「水溶液の性質」や「海の水」に関連して、深層水と表層水の違いを学ぶ教材になる。総合学習で「尾鷲の海の恵み」をテーマにする際、漁業だけでなく深層水活用も取り上げると視野が広がる。社会科の産業学習で「地域資源の活用」の好事例。アクアステーション見学も校外学習に可能。","tg":["海洋深層水","アクアステーション","深海","ミネラル","地域資源","清浄","deep sea water"],"im":[],"s":"尾鷲市公式サイト「みえ尾鷲海洋深層水とは」「海洋深層水の種類」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-006","c":"history","a":"owase","t":"熊野古道・伊勢路と馬越峠 — 世界遺産の美しい石畳道","x":"熊野古道は伊勢神宮から熊野三山（熊野本宮大社・熊野速玉大社・熊野那智大社）へ至る参詣道の総称で、2004年7月に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録された。伊勢路は伊勢神宮から熊野速玉大社まで約170kmの道のりで、尾鷲市内を通る「馬越峠（まごせとうげ）」は伊勢路の中でも最も美しい石畳で全国的に知られる。重厚な自然石が折り重なるように敷き詰められた石畳は、日本トップクラスの雨量を誇る尾鷲の激しい雨から道を守るために先人たちが築いたもの。この石畳が何百年もの風雨に耐えてきた事実が、匠の技の凄さを物語っている。峠道の両側には尾鷲ヒノキの美林が広がり、木漏れ日の中を歩くと心が洗われるような体験ができる。コース全長約5km・所要約2時間半と初心者にも歩きやすく、年間数万人が訪れる。道中には夜泣き地蔵、石橋、馬越一里塚、可涼園桃乙の句碑、桜地蔵などの史跡が点在する。峠からは天狗倉山や便石山への登山道にも分岐する。紀北町側から尾鷲市側（熊野方面）に向かうのが本来の巡礼ルートで、下りきった先に尾鷲神社がある。かつての巡礼者は「蟻の熊野詣」と呼ばれるほど大勢で列をなして歩いた。この道を歩くと、千年前の人々と同じ石畳を踏みしめているという時間を超えた感動がある。","e":"6年生社会科の歴史学習で「古代〜中世の信仰と道」のテーマに直結する。世界遺産学習として総合的な学習の時間で「なぜ尾鷲の石畳は世界遺産なのか」を探究できる。校外学習で実際に馬越峠を歩く体験は、地域の歴史を体感する最高の機会。保護者・地域向けにも「世界遺産のあるまち」として誇りを持てる話題。","tg":["熊野古道","馬越峠","世界遺産","石畳","伊勢路","参詣道","UNESCO","Kumano Kodo"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_002_magose_stone_bridge.jpg","t":"石橋と石畳","id":"WEB-154","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_033_Kumano_Kodo.jpg","t":"Kumano Kodo (Magose pass route).JPG","id":"WEB-319","u":"https://commons.wikimedia.org/wiki/File:Kumano_Kodo_(Magose_pass_route).JPG","li":"CC BY-SA 4.0","loc":"尾鷲市馬越峠"}],"s":"尾鷲市公式サイト「世界遺産熊野古道伊勢路 馬越峠」、観光三重、三重県熊野古道伊勢路サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-007","c":"history","a":"owase","t":"九鬼水軍の発祥地 — 戦国最強の海賊衆と鉄甲船","x":"尾鷲市九鬼町は、戦国時代に「日本一の水軍」と称された九鬼水軍の発祥地である。九鬼氏の祖は熊野別当を務め熊野水軍を率いた湛増にさかのぼるとされ、鎌倉時代には既に志摩国全体に勢力を拡大していた。九鬼町はリアス式海岸の天然の良港に位置し、外洋から隠れた入り江が水軍の拠点として最適であった。戦国時代の当主・九鬼嘉隆（1542年生）は織田信長に仕え、隣接する豪族を次々と攻め滅ぼして勢力を拡大した。1578年の第二次木津川口の戦いでは、鉄甲船（鉄板で装甲した巨大安宅船）を建造して毛利水軍を撃破し、近畿圏の制海権を掌握するという歴史的偉業を達成した。鉄甲船は当時の常識を覆す技術革新であり、世界初の装甲艦とも評される。豊臣秀吉にも仕えて志摩国3万5千石の大名となり、鳥羽藩の藩祖となった。関ヶ原の戦いでは父・嘉隆が西軍、子・守隆が東軍に分かれるという悲劇に見舞われ、西軍敗北後に嘉隆は答志島で自害した。現在の九鬼町には迷路のような路地が残り、水軍の拠点としての歴史を今に伝えている。町を歩くと当時の面影を感じられるフィールドワーク向きの場所でもある。九鬼町の細い路地を歩くと、石垣と板壁に囲まれた独特の景観が広がり、まるで戦国時代にタイムスリップしたかのような錯覚を覚える。水軍の歴史を伝える看板も設置されている。","e":"6年生社会科の戦国時代の学習で、地元ゆかりの武将として九鬼嘉隆を取り上げられる。「鉄甲船」は当時の技術革新として子どもの興味を引きやすい。全校朝会で「尾鷲には日本最強の水軍がいた」と語ると地域への誇りにつながる。総合学習で九鬼町のフィールドワークも可能。関ヶ原で親子が敵味方に分かれた話は道徳教材にもなりうる。","tg":["九鬼水軍","九鬼嘉隆","戦国時代","鉄甲船","水軍","織田信長","鳥羽藩","Kuki navy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""}],"s":"Wikipedia「九鬼水軍」「九鬼嘉隆」、VISIT HIGASHI KISHU、歴史人、サライ","su":""},{"id":"OW-008","c":"history","a":"owase","t":"尾鷲林業400年の歴史 — 江戸時代から続く密植多間伐の知恵","x":"尾鷲地方の造林の歴史は約400年前の1620年代にさかのぼり、日本三大人工美林の一つに数えられている。急峻な地形で農地が少なかったこの地域では、紀州藩（和歌山藩）が林業を奨励したことから、商業的な造林が盛んに行われるようになった。尾鷲林業の最大の特徴は「密植多間伐」という独自の施業方法にある。1ヘクタールあたり8,000〜10,000本という極めて密な植林を行い、成長に合わせて何度も間伐を繰り返すことで、年輪が極めて緻密で耐朽性に優れ、赤味が強い高品質な「尾鷲ヒノキ」を育てる。この施業方法は明治初期に確立され、「芯持ち柱材」の生産を目指す独自の技術体系となった。紀州藩時代には木材は海路で江戸や大坂に運ばれ、尾鷲は木材集散地として繁栄した。1923年の関東大震災では、尾鷲ヒノキを柱に使った家屋の倒壊が少なかったことが判明し、優れた耐震強度が全国に知られるようになった。日本有数の多雨と温暖な気候、急峻な地形とやせた土壌という厳しい条件の中で長い年月をかけて育てられたヒノキは、まさに尾鷲の風土が生んだ銘木である。2017年には尾鷲地域の林業が「日本農業遺産」の第1号に認定された。尾鷲ヒノキの年輪は1mm以下の間隔で詰まっており、この緻密さが強度と美しさの源泉である。樹齢100年を超えるヒノキも珍しくなく、長い時間をかけて育てる林業の真髄がここにある。","e":"5年生社会科「林業のさかんな地域」で、400年の歴史を持つ地元の林業を教材化できる。「なぜ密植するのか」「なぜ間伐が必要か」は算数の比例的思考にもつながる探究テーマ。関東大震災との関連は防災教育にも活用可能。日本農業遺産の意味を考える授業にも。","tg":["林業","尾鷲ヒノキ","密植多間伐","紀州藩","造林","関東大震災","日本農業遺産","forestry"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"moriwaku.jp「尾鷲林業の歴史」、三重県林業普及「尾鷲林業のあらまし」、速水林業","su":""},{"id":"OW-009","c":"history","a":"owase","t":"尾鷲の市制施行と地名の由来 — おわしぇからおわせへ","x":"尾鷲という地名は古くから存在するが、その由来には諸説がある。かつては「おわし」と読まれることもあったが、地元では本来「おわしぇ」と発音していたため、これを標準語化した「おわせ」を市名に制定した。古代には志摩国に属していたが、1582年（天正10年）に紀伊国の牟婁郡に移管された。この行政区分の変更は、豊臣秀吉による紀伊国の再編に関連している。明治22年（1889年）の近代市町村制度の発足により、北牟婁郡に尾鷲町が誕生した。昭和29年（1954年）6月20日、尾鷲町・須賀利村・九鬼村（北牟婁郡）と北輪内村・南輪内村（南牟婁郡）の1町4村が合併して尾鷲市が発足した。注目すべきは、市域が北牟婁郡と南牟婁郡の二つの郡にまたがって合併したという珍しい経緯を持つことである。人口のピークは1960年の34,534人で、高度経済成長期に若年層が都市部に流出し始め、以降は一貫して減少が続いている。1920年の国勢調査では21,672人だったが、1950年には31,744人まで増加し、1960年に34,534人のピークを記録した後、2010年には20,013人まで減少した。市名の表記は「尾鷲」で「鷲」の字を使うが、地元の子どもたちにとってはなかなか書くのが難しい漢字でもある。","e":"3年生社会科「わたしたちのまちのうつりかわり」で市の成り立ちを学ぶ際の資料。「おわしぇ」という地元の発音の話は国語の方言学習にもつながる。人口の推移をグラフ化する活動は算数の「表とグラフ」の学習にも。6年生の政治学習で市の成り立ちを扱う際にも使える。","tg":["市制施行","町村合併","地名","歴史","方言","牟婁郡","人口推移","municipality"],"im":[],"s":"尾鷲市公式サイト「尾鷲市の概要」、Wikipedia「Owase」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-010","c":"history","a":"owase","t":"紀州藩と尾鷲 — 藩政時代の山と海の繁栄","x":"江戸時代、尾鷲地方は紀州藩（和歌山藩・御三家の一つ）の領地であった。紀州藩は林業を積極的に奨励し、尾鷲は木材の集散地として大いに栄えた。尾鷲ヒノキやスギの木材は海路を使って江戸や大坂に運ばれ、建築用材として高い評価を受けた。特に尾鷲ヒノキは目が細かく強度が高いことから、江戸の武家屋敷や寺社の建築に重宝された。同時に漁業も盛んで、九鬼港は江戸時代に伊勢と大坂を結ぶ千石船の十大寄港地の一つに数えられた時期もあり、港町としても繁栄した。紀州藩時代には「山方（やまかた）」と「浦方（うらかた）」という二つの産業軸が確立された。山の民は林業を、海の民は漁業を営むという地域の基本的な産業構造がこの時代に形づくられ、この構造は現在に至るまで尾鷲の経済の根幹を成している。明治維新後も林業と漁業は尾鷲の二大産業であり続け、明治から昭和にかけては日本三大ブリ漁場の一つとして知られた。紀州藩の遺産は、現在の尾鷲ヒノキの森や漁村の文化の中に脈々と受け継がれている。木材の運搬には河川を利用した「川流し」も行われ、山から海への物流ルートが確立されていた。紀州藩は徳川御三家の一つであり、その領地に含まれていた尾鷲は政治的にも重要な位置を占めていた。藩の保護のもとで発展した林業技術は、現在も脈々と受け継がれている。","e":"6年生社会科「江戸時代の社会」で、紀州藩と地域産業の関係を学ぶ好材料。御三家の一つである紀州藩の領地だったことは子どもの興味を引く。「山の仕事と海の仕事」という二つの軸は、3年生の地域学習でもわかりやすいテーマ。保護者会で「尾鷲の産業の原点は江戸時代にある」と語ると地域理解が深まる。","tg":["紀州藩","江戸時代","木材","千石船","林業","漁業","藩政","山方","浦方","Kishu domain"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_003_owase_fish_market_1.jpg","t":"Owase Fish Market 1","id":"WEB-103","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_004_owase_fish_market_2.jpg","t":"Owase Fish Market 2","id":"WEB-104","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"moriwaku.jp「尾鷲林業の歴史」、VISIT HIGASHI KISHU、尾鷲市概要","su":""},{"id":"OW-011","c":"culture","a":"owase","t":"ヤーヤ祭り — 天下の奇祭、2月の尾鷲を熱くする5日間","x":"ヤーヤ祭りは毎年2月1日から5日まで行われる尾鷲神社の例祭で、「天下の奇祭」「紀州の奇祭」として全国的に知られる。平成14年に三重県無形民俗文化財に指定された。「ヤーヤ」の名は、戦国時代の武士が合戦の前に名乗りを上げる「ヤーヤ我こそは」に由来するとされる。祭りの期間中、2日から4日の夜には、多くの提灯が灯る中、白装束をまとった男衆が「チョウサじゃ！チョウサじゃ！」の掛け声とともに街中で激しくぶつかり合う「練り」が行われる。この練りは尾鷲のまちを舞台に各町内の男たちが互いに押し合い、組み合いをする勇壮な行事で、祭りの最大の見どころ。最終日の5日は、子どもたちが参加する華やかな大名行列や道中踊りが行われ、夜には篝火が焚かれた尾鷲神社境内での弓射の奉納で祭りはクライマックスを迎える。祭りの主な構成要素は、当屋（祷屋・党屋）での神霊奉斎、共同飲食、弓射行事、獅子行事、当屋の交替で、古い宮座制度と当屋制度の古態を維持している。日本の伝統的な祭礼の姿を今に伝える貴重な文化遺産である。祭りの時期には尾鷲の小中学校の休み時間に「チョウサじゃ！」の掛け声が各所で聞かれるほど、子どもたちの生活にも浸透している。","e":"総合的な学習の時間で「ふるさとの祭り」をテーマにした探究活動の中心教材。祭りの歴史・意味・構造を調べ学習で深められる。道徳で「地域の伝統を守ること」を考える教材にも。学校行事の文化発表会でヤーヤ祭りの紹介は鉄板ネタ。赴任後最初の2月には実際に見に行き、翌朝会で語りたい。最終日の子どもの大名行列は学校との接点。","tg":["ヤーヤ祭り","奇祭","尾鷲神社","白装束","練り","弓射","無形民俗文化財","チョウサ","Ya-Ya Matsuri"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_009_torii_owase_jinja.jpg","t":"Torii of Owase Jinja","id":"WEB-109","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲神社"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_033_sacred_tree_owase_jinja.jpg","t":"Sacred Tree at Owase Jinja","id":"WEB-133","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲神社"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_034_owase_jinja.jpg","t":"Owase Jinja","id":"WEB-134","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲神社"}],"s":"尾鷲市公式サイト「ヤーヤ祭り」「尾鷲ヤーヤ祭」、尾鷲神社公式、VISIT HIGASHI KISHU、名古屋テレビ","su":"https://www.city.owase.lg.jp/"},{"id":"OW-012","c":"culture","a":"owase","t":"尾鷲節 — 真田一族の哀歌から三重県の代表民謡へ","x":"尾鷲節は三重県を代表する民謡で、その起源は1615年の大坂夏の陣にさかのぼるとされる。豊臣方について敗れた真田一族が紀州路の尾鷲に落ち延び、故郷への思いや敗戦の悲しみを歌にしたのが始まりという伝承がある。400年以上にわたり地元で歌い継がれてきたが、1925年（大正14年）に大阪でレコーディングが行われ、初めて「尾鷲節」という名前で世に紹介された。レコード化により全国に広まり、1954年の全国民謡大会では第3位を獲得して、三重県の代表民謡としての地位を確立した。歌詞には尾鷲の美しい自然や海辺の暮らしが織り込まれ、「尾鷲よいとこ」という掛け声が耳に残る。尾鷲節には専用の笛（尾鷲節笛）があり、その独特の音色が歌を彩る。尾鷲節笛の製作技術は尾鷲市の無形文化財に指定されており、職人の高齢化により技術継承が課題となっている。現在も尾鷲節保存会が活動を続け、地域の祭りや行事で歌い継がれている。お盆の踊りや忘年会など、地域の集まりで歌われることも多く、世代を超えた共通の文化として尾鷲の人々をつないでいる。尾鷲節の歌い方には独特の「こぶし」があり、一朝一夕には身につかない技術とされる。地域の保存会では若い世代への伝承活動も行われ、学校の音楽の時間に出前授業を行うこともある。","e":"音楽の授業で地域の民謡を学ぶ際の主要教材。真田一族との関連は6年生社会科の歴史学習（大坂の陣）にもつながる。全校朝会で「400年前から歌い継がれてきた歌がある」と紹介すると文化継承の大切さを伝えられる。学校行事での合唱候補にも。尾鷲節笛の職人さんを招く出前授業も可能。","tg":["尾鷲節","民謡","真田一族","大坂夏の陣","伝統芸能","尾鷲節笛","folk song"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_017_owase_bushi_monument.jpg","t":"Monument of Owase-bushi","id":"WEB-117","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲市"}],"s":"尾鷲市公式サイト「民謡尾鷲節とは」「尾鷲節笛」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-013","c":"culture","a":"owase","t":"尾鷲わっぱ — 1人の職人が45工程で仕上げる究極の弁当箱","x":"尾鷲わっぱは尾鷲ヒノキを素材にした曲げ物の伝統工芸品で、平成6年（1994年）10月19日に三重県指定伝統工芸品に認定された。その起源は江戸初期にさかのぼり、尾鷲林業の発展とともに山林労働者が急増した際、これらの人々の食器として使われ始めた。製作は、厳選した尾鷲ヒノキの材を削り、丁寧に曲げ、桜の木の皮で縫い合わせ、幾重にも天然漆を摺り込むという45もの工程をすべて手作業で行う。一切の化学的混ぜ物のない一級品の天然漆を使用し、木の美しい木目が透けて見える仕上がりとなる。一つのわっぱの完成まで1ヶ月以上かかる。現在、この技術を唯一継承する職人は「ぬし熊」の64歳の職人ただ一人。注文は1年待ちとも言われるが「100年持つ弁当箱」として全国から注文が絶えない。尾鷲ヒノキの美しい木目と天然漆の艶が織りなす逸品は、ご飯の湿気を適度に吸い取り美味しく保つ機能性も兼ね備えている。尾鷲わっぱ製作技術は尾鷲市の無形文化財にも指定されており、後継者育成が地域の文化継承の課題となっている。わっぱの内側は漆の層が幾重にも重なり、使い込むほどに深い艶が出る。このため「100年使える」と言われ、親から子へ、子から孫へと受け継がれる家宝としての側面も持っている。","e":"5年生社会科「伝統工芸品」の単元で地元の具体例として最適。「45工程を1人でやる」「1年待ちだけど100年持つ」という数字は子どもの心に残る。図工の時間に「ものづくりの心」を考える教材にも。職人さんへの手紙やインタビュー学習も可能。後継者問題は社会の課題を考える教材にもなる。","tg":["尾鷲わっぱ","伝統工芸","曲げ物","ヒノキ","漆器","職人","ぬし熊","三重県指定","traditional craft"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_011_magewappa.jpg","t":"曲げわっぱ弁当箱","id":"WEB-361","u":"https://commons.wikimedia.org/wiki/File:Magewappa_2024_Mar_28_07-24PM.jpeg","li":"CC BY 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"尾鷲市公式サイト「尾鷲わっぱ」、東海テレビNEWS、JTCO、ぬし熊公式","su":"https://www.city.owase.lg.jp/"},{"id":"OW-014","c":"culture","a":"owase","t":"八幡神社例大祭・おわせ港まつり・尾鷲イタダキ市","x":"ヤーヤ祭り以外にも尾鷲には多くの祭りや年中行事がある。八幡神社例大祭は毎年9月15日に開催され、一日がかりの行列が町を練り歩き地元の八幡神社に集結する祭礼で、神輿や山車が出る賑やかな行事。おわせ港まつりは8月第1土曜日に開催される夏祭りで、尾鷲湾に打ち上がる花火大会が目玉。海面に映る花火はリアス式海岸ならではの幻想的な光景を生み出す。尾鷲イタダキ市は毎月第1土曜日の朝に開催される朝市で、新鮮な魚介類、干物、海塩、ジャム、野菜などの地元産品が所狭しと並び、地元住民のパフォーマンスも楽しめる。イタダキ市の名前は「いただきます」と「頂（いただき）」を掛けたもので、尾鷲の食の魅力を伝える場として定着している。これらの行事は地域コミュニティの絆を強める重要な役割を果たしており、人口減少が進む中でも住民の手で守り続けられている。特にイタダキ市は観光客と地元住民の交流の場として機能し、尾鷲の日常の魅力を発信する場になっている。季節ごとの行事が地域の暦を刻み、子どもたちの成長の節目を彩っている。これらの行事には、地域外から帰省してきた出身者も参加し、ふるさととの絆を確認する場にもなっている。人口減少が進む中でも、祭りや朝市が「帰ってくる理由」として機能している。","e":"総合学習で「まちの行事カレンダー」を作成する活動に使える。地域連携の観点から、イタダキ市への校外学習は「地域の人々の工夫や努力」を学ぶ好機会。保護者・地域の方を招いた学習発表で祭りの紹介をすることで、学校と地域のつながりを深められる。港まつりや八幡神社祭りへの学校としての参加・協力も検討できる。","tg":["八幡神社","港まつり","イタダキ市","朝市","年中行事","花火","地域行事","festival"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_002_owase_fish_market_bay.jpg","t":"Owase Fish Market and Owase Bay","id":"WEB-102","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"Wikipedia「Owase」、尾鷲観光物産協会「尾鷲イタダキ市」、尾鷲市公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-015","c":"industry","a":"owase","t":"尾鷲ヒノキ — G7サミットの円卓に選ばれた日本農業遺産の銘木","x":"尾鷲ヒノキとは、三重県尾鷲地方（尾鷲市・紀北町）で「密植多間伐」という独自の施業方法で生産されたヒノキのこと。日本三大人工美林の一つに数えられ、約400年の造林の歴史を持つ。日本有数の多雨（年間約4,000mm）と温暖な気候、急峻な地形とやせた土壌という厳しい環境の中で長い年月をかけて育てられたヒノキは、年輪が極めて緻密で、耐朽性に優れ、独特の赤味が美しいのが特徴。強度の高さは1923年の関東大震災でも実証されており、尾鷲ヒノキの柱を使った家屋は倒壊が少なかった。2016年の伊勢志摩サミット（G7先進国首脳会議）では、各国首脳が囲んだ円卓に尾鷲ヒノキが使用され、世界のリーダーが尾鷲の木のもとで議論を交わした。翌2017年には尾鷲地域の林業が「日本農業遺産」の第1号に認定された。速水林業は1790年創業で9代続く林業家で、当主・速水亨氏は2000年に日本初のFSC（森林管理協議会）認証を取得し、持続可能な林業の国際モデルとして注目されている。三重県立熊野古道センターの建物は135mm厚の尾鷲ヒノキ無垢材で全面建設されており、尾鷲ヒノキの美しさを体感できるショーケースとなっている。熊野古道センターのホールに立つと、尾鷲ヒノキの芳香が全身を包み、木の温もりと香りが持つ癒し効果を体感できる。この建物自体が尾鷲ヒノキの最高のプレゼンテーションである。","e":"5年生社会科「林業のさかんな地域」の中心教材。「サミットの円卓に使われた」は子どもの誇りにつながる鉄板エピソード。FSC認証はSDGs目標15の地域実践例。全校朝会や保護者会で「世界に誇れる尾鷲の宝」として紹介すると効果絶大。熊野古道センターの建物で実物に触れる校外学習も。","tg":["尾鷲ヒノキ","日本農業遺産","伊勢志摩サミット","FSC認証","速水林業","密植多間伐","銘木","G7","Owase Hinoki"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_017_choshigawa_mouth.jpg","t":"銚子川の河口","id":"WEB-367","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_(river_mouth).JPG","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_choshigawa_tengura.jpg","t":"銚子川（天狗倉山から）","id":"WEB-368","u":"https://commons.wikimedia.org/wiki/File:Choshi_River_from_Mount_Tengura.JPG","li":"CC BY-SA 4.0","loc":""}],"s":"尾鷲市公式サイト「Tree of Owase」、速水林業公式、FSC応援プロジェクト、三重県林業普及","su":"https://www.city.owase.lg.jp/"},{"id":"OW-016","c":"industry","a":"owase","t":"尾鷲の漁業 — 200種を超える魚種と10の漁港","x":"尾鷲市は10の漁港（須賀利・尾鷲・大曽根浦・行野浦・九鬼・早田・三木浦・古江・曽根・梶賀）を持ち、水揚げされる魚の種類は200種以上とも言われる豊かな漁場を誇る。黒潮が最も日本列島に近づく場所に位置するため、暖流系の回遊魚が豊富に獲れる。主要な漁獲対象はブリ、マグロ、カツオ、サンマ、マダイ、アジ、イセエビなど多岐にわたる。江戸時代にはボラ、イワシ、サンマなどの漁が盛んで、明治時代にはブリの定置網漁が九鬼町周辺で始まり、九木浦・梶賀浦・早田浦と次々に操業が拡大して日本三大ブリ漁場の一つに数えられるほどに発展した。明治20年代にはマグロの大敷網が操業されるようになった。現在は定置網漁、遠洋漁業に加え、ブリ・マダイ・クロマグロの養殖が尾鷲湾で盛んに行われている。尾鷲物産株式会社は自社の巻き網船「良栄丸」でクロマグロ漁も行っている。大学との連携による先進的な養殖技術の開発も進む。各漁港にはそれぞれ得意漁法が伝わっており、漁村ごとに異なる漁業文化が生きている。各漁港にはそれぞれの地形や潮流に適した漁法が発達しており、例えば早田の定置網、梶賀の一本釣り、九鬼の延縄など、多様な漁業文化が集積している。これは尾鷲の漁業の奥深さを示している。","e":"5年生社会科「水産業のさかんな地域」で地元の漁業を教材化できる。「200種以上の魚が揚がる」は子どもを驚かせるインパクトある数字。定置網と養殖の違い、伝統的漁法と先進技術の比較など探究テーマが豊富。漁港見学は校外学習の好候補。漁村ごとの違いを比較する活動も面白い。","tg":["漁業","ブリ","マグロ","定置網","養殖","漁港","水産業","200種","fishery"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/buri_teichami_001.jpg","t":"九鬼のブリ定置網（歴史写真）","id":"WEB-393","u":"https://commons.wikimedia.org/wiki/File:Kuki_Yellowtail_Set_Net.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/furue_port_001.jpg","t":"古江漁港","id":"WEB-382","u":"https://www.pref.mie.lg.jp/SUIKIBAN/HP/21083021428.htm","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_024_Owase_Kuki_Fishing_Port_ac.jpg","t":"Owase Kuki Fishing Port ac (2).jpg","id":"WEB-310","u":"https://commons.wikimedia.org/wiki/File:Owase_Kuki_Fishing_Port_ac_(2).jpg","li":"CC BY-SA 4.0","loc":"尾鷲市九鬼町"}],"s":"尾鷲市公式サイト「水産振興係」「知ってほしい！おわせの魚」「鮮魚」、尾鷲物産公式","su":"https://www.city.owase.lg.jp/"},{"id":"OW-017","c":"industry","a":"owase","t":"梶賀のあぶり — 100年以上続く漁師町の燻製保存食","x":"尾鷲市の最南端・梶賀町は人口200人弱の小さな漁師町で、ここに100年以上前から伝わる「あぶり」は独自の燻製保存食として近年全国的に注目を集めている。冷蔵庫がない時代、漁師のお父さんが獲ってきた魚を、お母さんが軒先で一斗缶の中に薪を焚いて遠火で焼きながら煙で燻して作ったのが始まりとされる。製法は、地元のお母さんたちが魚の下処理を行い、絶妙な塩加減で味付けしたものを、桜や樫の薪で熾した火の上で1〜2時間かけてじっくり燻し焼きにする。焼き魚、干物、燻製のいいとこ取りとも評される独特の味わいで、ご飯のおかずや酒の肴として長く愛されてきた。魚は季節によって異なり、春先の小サバをはじめ、大サバ、ブリ、カツオなどが使われる。毎年4月から6月が主な生産時期。現在は「梶賀コーポレーション」が事業化し、ふるさと納税の返礼品としても大人気。2025年には海外展開を目指す「おすすめセレクション」にも選出されるなど、小さな漁村の伝統食が世界へ羽ばたこうとしている。梶賀のあぶりは三重県の誇る食文化遺産の一つである。梶賀町への道は細い県道一本で、尾鷲市街から車で約20分。限られたアクセスが逆にこの食文化を守ってきたとも言える。訪問すると、海を見下ろす小さな集落の温かさに触れることができる。","e":"総合学習で「昔の人の知恵」をテーマにした探究に最適。保存食の原理（塩漬け・燻製・乾燥）は理科の学習にも関連。「冷蔵庫がない時代にどうやって食べ物を保存したか」は子どもの考える力を引き出す問い。3年生社会科「地域の人々の工夫」でも活用可能。梶賀町の見学は食育の校外学習にもなる。","tg":["梶賀のあぶり","燻製","保存食","漁師町","梶賀町","郷土食","伝統食","海外展開","smoked fish"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_001_kajika_aburi_mackerel.jpg","t":"梶賀のあぶり（サバの燻製）","id":"WEB-350","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Mackerel_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_002_kajika_aburi_amberjack.jpg","t":"梶賀のあぶり（ブリの燻製）","id":"WEB-351","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":""}],"s":"尾鷲市公式サイト「あぶり」、Wikipedia「梶賀のあぶり」、colocal、梶賀コーポレーション","su":"https://www.city.owase.lg.jp/"},{"id":"OW-018","c":"industry","a":"owase","t":"尾鷲の観光拠点 — 夢古道おわせ・熊野古道センター・おとと","x":"尾鷲市の観光を支える三つの主要拠点を紹介する。「夢古道おわせ」は尾鷲市向井にある複合観光施設で、地元のお母さんたちによるランチバイキングが人気を集める。畳席、テーブル席、カウンター席に加えペット同伴可のテラス席もあり、尾鷲湾を眺めながら食事が楽しめる。海洋深層水を使った入浴施設も併設され、肌がすべすべになると評判。「三重県立熊野古道センター」は夢古道おわせに隣接するビジターセンターで、熊野古道や周辺の自然・歴史・文化を深く体験するための拠点施設。建物は135mm厚の尾鷲ヒノキ無垢材で全面建設されており、建築そのものが尾鷲ヒノキの美しさと香りを体感できるショーケースとなっている。山・海・川の自然を活かした体験学習プログラムや歴史文化の講座・セミナーも開催されており、学校の校外学習にも対応している。「おわせお魚いちば おとと」は尾鷲物産直営の海産物直売所で、尾鷲港の鮮魚や養殖魚、自社船で獲ったクロマグロなどが並ぶ。併設の食堂では海鮮丼や寿司、日替わりメニューが味わえ、地元の食の魅力を凝縮した施設である。3施設は互いに近接しており、半日あれば尾鷲の林業・漁業・歴史文化を一度に体験できる効率の良いコースが組める。修学旅行や校外学習のコースとしても実績がある。","e":"校外学習のコース設計に最適な3施設セット。熊野古道センターの体験学習プログラムは事前連絡で学校団体向け対応可能。おととは社会科の産業学習と組み合わせた見学に。保護者や来校者に尾鷲のおすすめスポットとして案内する知識にもなる。3施設を回るだけで地域の主要産業（林業・漁業・観光）を体感できる。","tg":["夢古道おわせ","熊野古道センター","おとと","観光","体験学習","尾鷲ヒノキ","海鮮","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"尾鷲観光物産協会「夢古道おわせ」「熊野古道センター」「おとと」、尾鷲市公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-019","c":"nature","a":"owase","t":"熊野灘の生態系 — 黒潮が育む豊かな海と200種の魚","x":"尾鷲市が面する熊野灘は、日本最大の暖流・黒潮（日本海流）が最も日本列島に近づく海域である。黒潮は水温が高く透明度が高い海流で、幅約100km、流速は毎秒2m以上にも達する。この暖流がもたらす温かく栄養豊富な海水が、リアス式海岸の複雑な地形と相まって多様な海洋生態系を育んでいる。沿岸にはテーブルサンゴの群落も見られ、温帯と亜熱帯の境界域ならではの豊かな生物多様性がある。水揚げされる魚種が200種を超えるのもこの恵まれた海洋環境のおかげ。三木崎周辺の海域は特に豊かで、透明度の高い海ではダイビングも楽しめる。イセエビ、アワビ、サザエなどの磯根資源も豊富で、海女漁の伝統も一部の地域に残る。九木崎には暖地性シダ類の群落があり国の天然記念物に指定されている。尾鷲湾の奥では穏やかな海面を活かしたブリやマダイの養殖が行われ、時にはイルカやクジラが湾内に迷い込むこともある。黒潮の恵みは海だけでなく、温暖な気候をもたらし陸上の植生や農業にも影響を与えている。尾鷲の豊かさの根源は、すべてこの黒潮にあると言っても過言ではない。沿岸の岩場には潮だまり（タイドプール）が多く、ヤドカリ、カニ、ウニ、イソギンチャクなど多様な生き物が観察でき、自然学習の宝庫でもある。磯遊びは子どもたちにとって最高の自然体験になる。","e":"5年生理科「流れる水のはたらき」から発展して海流の学習につなげられる。社会科の水産業学習と合わせて「なぜ尾鷲の海は魚が多いのか」を探究するテーマになる。九木崎の天然記念物は校外学習の見学先候補。SDGs目標14「海の豊かさを守ろう」の地域教材にも。サンゴの存在は環境変化の指標としても学べる。","tg":["黒潮","熊野灘","生態系","サンゴ","生物多様性","九木崎","海女","marine ecosystem"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons.wikimedia.org/wiki/File:熊野灘_-_panoramio_(1).jpg","li":"CC BY 3.0","loc":""}],"s":"尾鷲市公式サイト、フジクリーン「熊野灘とリアス海岸」、尾鷲市文化財情報","su":"https://www.city.owase.lg.jp/"},{"id":"OW-020","c":"nature","a":"owase","t":"尾鷲の森林 — 市域90%を覆う緑のダムと人工美林","x":"尾鷲市の総面積192.71平方キロメートルのうち、約90%が山林で覆われている。これは全国の市の中でも極めて高い森林率である。山林の多くは尾鷲ヒノキやスギの人工林で、400年にわたる造林の歴史が刻まれた「日本三大人工美林」の一つ。紀伊半島の脊梁をなす大台ケ原山系から連なる急峻な山々が海岸線のすぐ背後にそびえ、標高600m級の山が海からわずか数キロの位置にあるという劇的な地形が特徴。この地形が日本有数の多雨をもたらす原因にもなっている。豊かな森林は「緑のダム」として年間約4,000mmもの雨水を蓄え、清流を育み、土砂災害を防ぐ重要な国土保全機能を果たしている。森林から流れ出る養分豊富な水は河川を通じて海に注ぎ、沿岸の生態系を豊かにする「森は海の恋人」の関係が成立している。一方で、林業の担い手不足による手入れ不足の森林も増えており、間伐が行われないと日光が林床に届かず下草が消失し、表土が流出するリスクが高まる。森林の持続的管理は尾鷲の環境と産業の両面で最重要課題の一つであり、FSC認証林を持つ速水林業のような先進的な取り組みが模範となっている。尾鷲ヒノキの森を歩くと、木漏れ日と苔むした地面、そしてヒノキ特有の清々しい香りに包まれる。この森林環境は「森林セラピー」の場としても注目されており、心身の健康に良い影響を与えるとされる。","e":"5年生社会科「国土の自然環境と国民生活」で森林の役割を学ぶ際の地元教材。「緑のダム」「森は海の恋人」の概念は理科の水循環の学習にもつながる。「90%が山」という数字を円グラフにすると算数の割合の学習にも。SDGs目標15「陸の豊かさ」の地域教材。林業体験を通じた環境教育の基礎資料として。","tg":["森林","山林","人工林","森林率","緑のダム","間伐","環境","森は海の恋人","forest"],"im":[],"s":"尾鷲市公式サイト「尾鷲市の概要」、Wikipedia「Owase」、三重県林業普及","su":"https://www.city.owase.lg.jp/"},{"id":"OW-021","c":"nature","a":"owase","t":"九木崎の暖地性シダ群落 — 国指定天然記念物の植物宝庫","x":"尾鷲市九鬼町の九木崎には、暖地性のシダ類が群生する貴重な植物群落があり、国の天然記念物に指定されている。黒潮の影響で温暖な気候と、年間約4,000mmの多雨がもたらす豊富な水分、そしてリアス式海岸の切り立った崖がつくる特殊な微気候環境が、本来はもっと南の地域に分布するはずの亜熱帯性シダ植物の生育を可能にしている。この群落には、九州南部や沖縄に分布する種が含まれており、植物地理学的に極めて重要な場所とされる。なぜ尾鷲という緯度でこれらの南方系植物が生育できるのかという問いは、黒潮の温暖化効果、地形による北風の遮断、多雨による湿度の維持という三つの要因で説明される。九木崎は尾鷲湾の入り口に位置し、灯台もある景勝地。遊歩道が整備されており、海岸の岩場と亜熱帯性の緑が織りなす独特の景観を楽しめる。磯には潮だまりがあり、海の生き物観察にも適した場所。尾鷲の自然の豊かさと多様性を象徴する場所の一つであり、黒潮の恵みが海だけでなく陸上の植物にまで及んでいることを示す好例である。九木崎の遊歩道からは、断崖絶壁に打ち寄せる波と、岩場に根を下ろすシダ植物のたくましい姿を間近に観察できる。灯台までの道のりは約30分で、途中にはベンチも設置されており休憩しながら散策できる。","e":"理科「植物のくらし」で、なぜ南方系のシダが尾鷲に生育するのかを考える探究テーマになる。天然記念物の意味と保護の大切さを学ぶ教材にも。校外学習で遊歩道を歩きながら植物観察と潮だまり観察を組み合わせた活動が可能。SDGs目標15「陸の豊かさ」の地域教材として。","tg":["九木崎","天然記念物","シダ","暖地性植物","植物群落","植物地理学","遊歩道","natural monument"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""}],"s":"尾鷲市公式サイト「尾鷲市の文化財」、尾鷲観光物産協会","su":"https://www.city.owase.lg.jp/"},{"id":"OW-022","c":"people","a":"owase","t":"長野泰一 — インターフェロン発見の先駆者、尾鷲が生んだ世界的医学者","x":"長野泰一（ながの やすいち）は尾鷲市出身の医学者で、東京大学名誉教授。1954年、小島保彦とともにウイルスの増殖を抑制する物質「インターフェロン」の存在を世界で初めて報告した先駆者として医学史に名を刻む人物である。インターフェロンとは、ウイルスに感染した細胞が産生するタンパク質で、周囲の細胞にウイルスへの抵抗力を誘導する免疫系の重要な物質。この発見は後のウイルス学・免疫学・がん治療に革命的な影響を与え、現在ではC型肝炎の治療薬、がんの免疫療法、多発性硬化症の治療など、幅広い医療分野で応用されている。長野の研究がなければ今日の抗ウイルス療法は大きく異なっていた可能性がある。ノーベル賞候補にも名前が挙がったとされ、日本が世界に誇る医学的発見の一つである。尾鷲という三重県南部の小さなまちから、世界の医学を変えた研究者が生まれたという事実は、「環境や規模に関係なく、好奇心と努力で世界を変えられる」という力強いメッセージを含んでいる。尾鷲の子どもたちにとって、最も誇るべき郷土の偉人の一人である。長野泰一の研究室があった東京大学医科学研究所には、インターフェロン研究の礎を築いた業績として記録が残されている。彼の発見は後のノーベル賞受賞者たちの研究にも大きな影響を与えた。","e":"全校朝会で「尾鷲から世界を変えた人がいる」と紹介する鉄板ネタ。6年生理科「人の体のつくりとはたらき」と関連づけて免疫の仕組みを発展的に学ぶきっかけに。「ふるさとの偉人」として総合学習や道徳の教材に。キャリア教育で「好奇心が世界を変える」というメッセージを伝える際にも効果的。","tg":["長野泰一","インターフェロン","医学","東京大学","ウイルス学","免疫","偉人","ノーベル賞","Interferon"],"im":[],"s":"Wikipedia「長野泰一」、尾鷲市関連情報、熊野出身の有名人","su":""},{"id":"OW-023","c":"people","a":"owase","t":"速水亨と速水林業 — 9代目が挑む日本初FSC認証と持続可能な林業","x":"速水亨（はやみ とおる）は尾鷲地方で9代にわたって林業を営む速水林業の当主であり、日本の林業界を牽引するリーダー的存在。速水林業は1790年（寛政2年、江戸後期）の創業で、尾鷲市と紀北町に合計1,070ヘクタールの山林を所有・管理している。速水氏の最大の功績は、2000年に日本で初めてFSC（Forest Stewardship Council＝森林管理協議会）の森林認証を取得したことである。FSC認証は「環境保全の点から適切で、社会的な利益にかない、経済的にも持続可能な森林管理」を国際基準で認定するもので、取得には厳格な審査が必要。速水林業の山林には樹齢400年を超えるヒノキの巨木も含まれ、「伝統と革新の融合」をモットーに次の世代に森を引き継ぐための持続可能な林業を実践している。速水氏は株式会社森林再生システムの代表取締役も務め、日本の森林政策にも提言を行っている。Wedge誌のインタビューでは「変革期にこそ揺るぎない信念が必要」と語り、林業の未来を見据えた経営哲学を示している。尾鷲ヒノキの価値を国際的に発信し続け、地域産業の可能性を広げ続けている。速水林業の山林を訪れると、400年の歴史を持つ森の静寂と、手入れの行き届いた美しい林床に感動する。林業体験ツアーも実施されており、植林や間伐の実際を学ぶことができる。","e":"5年生社会科「林業のさかんな地域」で「持続可能な林業」の具体例として最適。SDGs目標15の地域実践者として紹介可能。「9代続く家業」はキャリア教育や道徳の「伝統を受け継ぐ」テーマにもなる。速水林業の見学は尾鷲ならではの校外学習プログラムになりうる。FSC認証マークの意味を学ぶ消費者教育にも。","tg":["速水亨","速水林業","FSC認証","持続可能","林業家","SDGs","森林管理","9代目","sustainable forestry"],"im":[],"s":"速水林業公式サイト、FSC応援プロジェクト、Wedge ONLINE、私の森.jp、RINYA林野庁","su":""},{"id":"OW-024","c":"people","a":"owase","t":"福山英朗・三鬼陽之助 — 尾鷲が送り出した多彩な人材たち","x":"尾鷲市は人口1.6万人の小さなまちながら、多彩な分野で活躍する人材を輩出してきた。福山英朗（ふくやま ひでお）は尾鷲市出身のプロレーシングドライバーで、全日本ツーリングカー選手権（JTCC）やスーパーGTなど日本のトップカテゴリーのレースで活躍した。同じくレーシングドライバーの中子修も尾鷲出身であり、小さなまちから二人ものレーサーが生まれたのは興味深い。三鬼陽之助（みき ようのすけ、1902〜1990年）は尾鷲市出身の経済評論家・ジャーナリストで、戦後日本の高度経済成長期に活躍し、財界人との幅広い交友関係を持ちながら企業経営や経済政策についての提言を数多く行った。学術分野では、英文学者の土井治（東京大学名誉教授）、新井白石研究の第一人者である宮崎道生（国士舘大学教授・岡山大学名誉教授）が尾鷲出身。音楽では演歌歌手の尾鷲義人、大相撲では力士の黒鷲二千郎など、芸能・スポーツ分野でも人材を送り出している。作家では、林業を題材にした作品で知られる宇江敏勝、直木賞候補作家の伊吹有喜も三重県出身で東紀州にゆかりがある。尾鷲出身の著名人の多くは高校卒業後に市外に出ているが、その後もふるさとへの愛着を持ち続けている人が多い。地元で培った忍耐力と好奇心が、各分野での成功の基盤となっていると言えるだろう。","e":"キャリア教育で「ふるさと出身のプロフェッショナルたち」として各分野の人材を紹介できる。「小さなまちからでも世界を目指せる」というメッセージは子どもの夢を励ます。全校朝会の「ふるさとの先輩」シリーズとして月替わりで紹介も。長野泰一・速水亨と合わせてシリーズ化すると地域への誇りを多角的に育てられる。","tg":["福山英朗","三鬼陽之助","土井治","宮崎道生","レーシングドライバー","経済評論家","偉人","人材"],"im":[],"s":"Wikipedia「Owase」、熊野出身の有名人、尾鷲高等学校出身有名人、各種人物情報","su":""},{"id":"OW-025","c":"modern","a":"owase","t":"人口減少と高齢化 — 尾鷲市の最大の課題と数字で見る現実","x":"尾鷲市の人口は1960年の34,534人をピークに一貫して減少を続け、令和2年（2020年）には16,252人とピーク時の47%にまで落ち込んだ。高齢化率は2015年時点で41.1%に達しており、全国平均の約28%を大きく上回る超高齢社会となっている。尾鷲市人口ビジョンによれば、現状のまま何も対策を講じなければ2060年には人口4,302人、高齢化率56.8%にまで到達するという衝撃的な予測が示されている。2010年には過疎地域自立促進特別措置法の適用を受けて過疎地域に正式に指定された。人口減少の主因は若年層の流出で、高校卒業後や大学進学時に名古屋や大阪などの都市部へ転出し、就職先が限られるためそのまま戻らないケースが大半を占める。出生数も年々減少しており、自然減（死亡数が出生数を上回る状態）と社会減（転出が転入を上回る状態）の両方が進行している。第7次尾鷲市総合計画（2022〜2031年度）では、この課題に正面から取り組む方針が示され、移住促進、産業振興、子育て支援など多角的な施策が展開されている。過疎化は学校の児童生徒数にも直接影響しており、教育環境の維持と質の向上が重要な政策課題となっている。","e":"5年生社会科「国土の自然環境と国民生活」で人口問題を学ぶ際の地元データとして活用可能。人口推移のグラフ作成は算数との横断学習に。教頭として教育委員会との連携や学校経営計画策定の際に、この数値的背景を押さえておくことは必須。保護者会で学校の将来を語る際の基礎データにもなる。「どうすれば人が戻ってくるか」は高学年の討論テーマにも。","tg":["人口減少","高齢化","過疎化","人口ビジョン","総合計画","若年流出","自然減","社会減","depopulation"],"im":[],"s":"尾鷲市人口ビジョン、尾鷲市過疎地域持続的発展計画、国勢調査、尾鷲市第7次総合計画","su":""},{"id":"OW-026","c":"modern","a":"owase","t":"移住促進とおわせ暮らしサポートセンター — 151世帯256名の移住実績","x":"尾鷲市は人口減少対策として移住促進に積極的に取り組んでいる。「おわせ暮らしサポートセンター」は2016年に設立された移住支援の拠点で、移住経験のある地域おこし協力隊が中心となり行政と連携して運営している。2023年3月末時点で累計151世帯・256名の移住者をサポートした実績は、人口1.6万人のまちとしては注目に値する成果である。移住体験住宅「みやか」は築100年以上の古民家を改修した施設で、移住を検討する人が尾鷲での実際の暮らしを数日間体験できる。滞在中は地域おこし協力隊が家探し・仕事探しをきめ細かくサポートする。地域おこし協力隊は都市部から移住し、任期1〜3年で地域ブランドの開発・販売・PR、農林水産業への従事、住民支援などの活動を行う。月額報償は最大233,000円。任期終了後も「ここでやるべきことを見つけられたから」という理由で尾鷲に定着する隊員がおり、移住→定住のロールモデルとなっている。「おわせ暮らし」ポータルサイトでは、仕事バンク・空き家バンクなどの情報も発信している。おわせ暮らしサポートセンターのスタッフ自身が移住者であるため、移住者の不安や疑問に寄り添った支援ができるのが最大の強み。「先輩移住者が伴走する」というスタイルが、高い定着率につながっている。","e":"5年生社会科「過疎地域の取り組み」で、尾鷲市の具体的な対策として教材化可能。移住者の声は「いろいろな人生の選択肢」を考えるキャリア教育にも。地域おこし協力隊の方をゲストティーチャーとして学校に招く連携も可能。教頭として移住者家庭の児童受け入れ対応の知識としても重要。","tg":["移住促進","地域おこし協力隊","おわせ暮らし","古民家","定住支援","過疎対策","みやか","migration"],"im":[],"s":"尾鷲市公式サイト「おわせ暮らし」、おわせ暮らしサポートセンター、SMOUT","su":"https://www.city.owase.lg.jp/"},{"id":"OW-027","c":"modern","a":"owase","t":"南海トラフ地震への備え — 津波最大17m・到達15分の想定と住民主体の防災","x":"尾鷲市は南海トラフ巨大地震発生時に深刻な津波被害が想定される地域である。三重県の被害想定によれば、津波の最大高さは早田町で約17m、尾鷲湾で約11m。三木里地区には高さ15mの津波がわずか15分以内に到達するとされている。1944年の昭和東南海地震でも実際に被害を受けた歴史があり、防災意識は地域に深く根づいている。この厳しい想定を踏まえ、市と住民は多層的な防災対策を展開している。三木里自主防災会は地権者や地元企業の協力を得て自主的に避難通路や避難道路を整備するなど、住民主体の防災活動が活発に行われている。「逃げ地図」プロジェクトでは地区ごとの避難経路と所要時間を地図上に可視化する取り組みが実施された。高台にある廃校の避難拠点としての利活用も検討されており、事前復興まちづくりの先進事例として研究者からも注目されている。学校は災害時の避難所にもなるため、施設の耐震化や備蓄品の整備が進められている。「自分の命は自分で守る」という意識を全市民に徹底することが最大の防災対策とされている。学校では年間複数回の避難訓練が行われ、「おはしも（押さない・走らない・喋らない・戻らない）」の徹底と、高台までの避難経路の反復確認が重点的に実施されている。地域と学校が連携した合同避難訓練も行われる。","e":"防災教育の核心教材。「15分で15mの津波」という具体的数字は避難訓練の動機づけに直結。5年生理科「大地の変化」と連携した地震学習にも。逃げ地図づくりは総合学習の探究活動として実施可能。教頭として学校防災計画の策定・避難訓練の充実に直結する必須知識。保護者への説明にも必要。","tg":["南海トラフ","津波","防災","避難","自主防災","逃げ地図","地震","昭和東南海地震","disaster prevention"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"尾鷲市過疎地域持続的発展計画、逃げ地図プロジェクト、IRP事前復興研究、国土交通省","su":""},{"id":"OW-028","c":"modern","a":"owase","t":"須賀利町 — 陸の孤島から日本の里100選へ、高齢化率8割の限界集落","x":"尾鷲市須賀利町は尾鷲市中心部から海を挟んだ対岸に位置する飛び地の集落で、半島の先端に広がる漁村。昭和57年（1982年）に県道が開通するまでは陸路でのアクセスが困難な「陸の孤島」で、船が唯一の交通手段であった。かつては遠洋漁業で栄え、漁業最盛期には人口も多く活気に満ちていたが、現在は200人弱にまで減少し、高齢化率は8割を超える限界集落となっている。子どもは既にいない。しかし、昭和30年代の日本の漁村風景がそのまま残る貴重な景観が評価され「日本の里100選」に選ばれた。石垣で築かれた路地、板壁の古い家屋、小さな漁港、干された漁網——それらが織りなす風景は日本の原風景そのもの。近年は過疎漁村の活性化モデルとして注目され、ゲストハウスの運営や「呼び込み力」による再生の試みが外部の若者たちの手で始まっている。Business Insider Japanの取材では「高齢化率4割の地方にお試し移住したら、日本の未来がちょっとだけ見えた」として紹介された。須賀利の姿は日本の多くの漁村の未来の姿であり、その挑戦と課題は全国的な意義を持つ。須賀利を訪れると、時間が止まったような静けさの中に、かつての漁村の活気を想像させる痕跡——大きな家屋、立派な石垣、広い港の跡——が残っており、繁栄と衰退の歴史を物語っている。","e":"総合学習で「過疎化とまちの未来」を考える探究テーマに最適。3年生社会科「まちのうつりかわり」で昔の写真と現在を比較する教材にも。「日本の里100選に選ばれた理由」を調べることで地域の価値を再発見する学びに。「子どもがいない集落」という事実は子どもたちに強い印象を与え、自分たちの地域の未来を考えるきっかけになる。","tg":["須賀利","限界集落","飛び地","漁村","日本の里100選","過疎化","陸の孤島","原風景","depopulation"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_012_sugari_town_blue_sky.jpg","t":"Sugari Town Blue Sky","id":"WEB-180","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_014_temple_stairs_sugari.jpg","t":"Temple Stairs Sugari","id":"WEB-184","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_020_sugari_town_alley.jpg","t":"Sugari Town Alley","id":"WEB-196","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市須賀利町"}],"s":"尾鷲観光物産協会「須賀利」、Renews、尾鷲市公式サイト、Business Insider Japan","su":"https://www.city.owase.lg.jp/"},{"id":"OW-029","c":"modern","a":"owase","t":"紀勢自動車道と尾鷲の交通 — アクセス改善とストロー効果","x":"尾鷲市への交通アクセスは長年の課題であったが、紀勢自動車道（E42）の整備により大きく改善された。名古屋方面からは東名阪自動車道・伊勢自動車道・紀勢自動車道を経由して約3時間でアクセス可能になった。鉄道はJR紀勢本線が市内を南北に通り、尾鷲駅・大曽根浦駅・九鬼駅・三木里駅・賀田駅の5駅がある。名古屋からはJR特急「南紀」で約3時間。国道42号は海岸線に沿って熊野市方面と紀北町方面を結ぶ主要幹線道路。国道311号は内陸部の熊野市飛鳥方面、国道425号は奈良県方面への山岳ルートだが、425号は「酷道」として知られる険しい山道でもある。高速道路の開通は観光客の増加や物流の効率化に大きく寄与し、熊野古道を訪れるトレッカーの増加にもつながった。一方で、ストロー効果（高速道路の開通により地方の人口や消費が大都市に吸い取られる現象）の懸念もあり、「通過されるまち」にならないための観光戦略や地域ブランドの強化が課題。尾鷲港は商港としても機能しており、かつての海上交通の伝統を受け継いでいる。尾鷲市内の道路は海岸沿いと山間部に分かれ、特に冬季の山間部は凍結に注意が必要。しかし降雪はほとんどなく、年間を通じて通行可能な道路環境は、南紀の温暖な気候の恩恵である。","e":"3年生社会科「交通のはたらき」で尾鷲の交通インフラを調べる学習に使える。「なぜ高速道路ができると便利になるのか、逆に困ることはないか」は高学年の討論テーマにもなる。保護者会で転入保護者に「名古屋から3時間」と伝えるのは安心材料。5駅の位置を地図に書き込む活動は地図学習に。","tg":["紀勢自動車道","交通","JR紀勢本線","国道42号","アクセス","ストロー効果","特急南紀","transportation"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_020_owase_ekimae.jpg","t":"尾鷲駅前","id":"WEB-120","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_022_owase_eki_1.jpg","t":"尾鷲駅構内 (1)","id":"WEB-122","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_023_owase_eki_2.jpg","t":"尾鷲駅構内 (2)","id":"WEB-123","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲駅"}],"s":"尾鷲市公式サイト、Wikipedia「Owase」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-030","c":"food","a":"owase","t":"さんま寿司 — 尾鷲は腹開き、熊野は背開き、東紀州の郷土の味","x":"さんま寿司は尾鷲市を含む東紀州地域を代表する郷土料理で、古くから祝いの席や祭事、正月料理として食べられてきた歴史がある。農林水産省の「うちの郷土料理」にも登録されている。熊野灘で獲れた脂肪分の少ないサンマを使い、塩漬けにした後、水洗い・塩抜きし、さらに地元産の柑橘（橙やゆず）の酢に漬ける。すし飯の上に尾・頭付きの姿のままのせて押し寿司にするのが伝統的なスタイルで、見た目にも華やか。興味深いのは地域による開き方の違いで、尾鷲市周辺では「腹開き」、熊野市周辺では「背開き」にするという文化の境界線が存在する。この違いの理由は諸説あるが、漁法や調理の伝統が集落ごとに異なることに由来すると考えられている。昭和50年に三紀産業がさんま寿司の製造販売を開始して以来、さまざまな店で販売されるようになった。三紀産業の「さんき茶屋」では、那智の滝の伏流水で作った酢を使ったさんま寿司が名物。冬のサンマの季節にはお土産としても人気が高い。店ごとに味付けが異なり、食べ比べの楽しみもある。地域による調理法の違いは、実はサンマの身の厚さや脂の乗り方の微妙な違いに対応したものとも言われ、それぞれの土地で最も美味しく仕上がる方法が選ばれてきた結果とも解釈できる。","e":"総合学習や家庭科で「郷土料理を知ろう」というテーマに最適。「腹開きと背開きの違い」は食文化の地域差を考える面白い教材になる。給食で地元食材を使う日に関連して紹介可能。地図上に「腹開きの地域」と「背開きの地域」を塗り分ける活動は社会科の地図学習にもつながる。","tg":["さんま寿司","郷土料理","サンマ","東紀州","柑橘酢","腹開き","背開き","sanma sushi"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_003_sanma_zushi.jpg","t":"さんま寿司","id":"WEB-352","u":"https://commons.wikimedia.org/wiki/File:Sanma_zushi.JPG","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_004_samma_sushi.jpg","t":"さんま寿司（南紀）","id":"WEB-353","u":"https://commons.wikimedia.org/wiki/File:Samma_Sushi.JPG","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_005_sanma_sushi_flickr.jpg","t":"さんま寿司（切り分け）","id":"WEB-354","u":"https://commons.wikimedia.org/wiki/File:Sanma_Sushi_(6639283865).jpg","li":"CC BY 2.0","loc":""}],"s":"農林水産省「うちの郷土料理」、東紀州郷土料理さんま寿司マップ、尾鷲観光物産協会","su":""},{"id":"OW-031","c":"food","a":"owase","t":"めはり寿司 — 目を見張るほど大きく、目を見張るほどおいしい紀州の味","x":"めはり寿司（めはりずし）は紀州・熊野地方に伝わる伝統的な郷土料理で、握り飯を浅漬けの高菜の葉で包んだシンプルな食べ物。名前の由来は「目を見張るほど大きな口を開けて食べる」「目を見張るほどおいしい」からとされ、どちらの説もこの料理の特徴を見事に表している。もともとは山仕事や漁に出る際の携行食・弁当として親しまれてきた庶民の味で、林業が盛んな尾鷲では山に入る木こりたちの昼食として欠かせない存在だった。高菜の塩漬けの塩気と酸味が白飯と絶妙にマッチし、素朴だが飽きのこない味わいが400年以上にわたって受け継がれてきた。高菜漬けを巻くだけという単純さゆえに各家庭に独自のレシピがあり、漬け方の違いや中に入れる具材（かつお節、梅など）のバリエーションも楽しい。尾鷲市内の飲食店でも提供されており、さんま寿司と並んで東紀州の二大名物料理の一つ。夢古道おわせやさんき茶屋では両方を一度に楽しめるセットメニューがある。家庭で手軽に作れることも大きな魅力で、食育の原点とも言える料理である。めはり寿司は、そのシンプルさゆえに「ごまかしがきかない」料理でもある。高菜の漬け方、ご飯の炊き加減、握り方の一つひとつに家庭の味が表れ、「おふくろの味」の原点とも言える存在である。","e":"家庭科の調理実習で実際に作れるシンプルさが魅力。「なぜ高菜で包むのか」から保存食の知恵や栄養バランスを学べる。総合学習の「ふるさとの味」探究で、さんま寿司と比較しながら学ぶと深い学びに。学校行事の持ち寄りや給食のメニュー提案にも活用可能。おばあちゃんのレシピを集める活動は世代間交流にもなる。","tg":["めはり寿司","高菜","郷土料理","紀州","携行食","弁当","食文化","mehari sushi"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_007_mehari.jpg","t":"めはり寿司","id":"WEB-356","u":"https://commons.wikimedia.org/wiki/File:Meharizushi.JPG","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_009_mehari_anago.jpg","t":"めはり寿司（穴子入り）","id":"WEB-358","u":"https://commons.wikimedia.org/wiki/File%3AMehari_zushi_with_anago_by_woinary_in_Osaka.jpg","li":"Wikimedia Commons (CC BY-SA 2.0)","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_006_mehari_kumano.jpg","t":"めはり寿司（熊野駅弁）","id":"WEB-355","u":"https://commons.wikimedia.org/wiki/File:Meharizushi-Kumano-Mie.JPG","li":"CC BY-SA 3.0","loc":""}],"s":"観光三重「めはり寿司特集」、尾鷲観光物産協会、さんき茶屋","su":""},{"id":"OW-032","c":"food","a":"owase","t":"尾鷲の魚介料理 — ブリ・カツオ・イセエビ・マダイの四季の恵み","x":"尾鷲市は黒潮の恵みを受け、年間を通じて多種多様な魚介が水揚げされる。市の魚に指定されているブリは定置網漁と養殖の両方が盛んで、特に尾鷲の春ブリは脂が乗って美味しい穴場の時期。養殖ブリの出荷は年間40万尾を超え、刺身・照り焼き・しゃぶしゃぶなど多彩な料理で楽しめる。カツオは熊野灘の回遊魚として春から秋にかけて水揚げされ、獲れたての初鰹の刺身やたたきは格別の味。イセエビは秋から冬が旬で、尾鷲の磯で育ったイセエビは身が甘く濃厚、祝い事には欠かせない高級食材。マダイの養殖も盛んで、尾鷲湾の潮流で育った鯛は身が締まって味が良いと評判。他にもアジ、サバ、ヒラメ、タチウオ、アワビ、サザエなど季節ごとに旬が変わり、一年中新鮮な魚介が味わえる。おわせお魚いちば「おとと」ではその日の水揚げに合わせた海鮮丼が人気で、何度行っても違うネタが楽しめる。地元の飲食店では魚介を使った創作料理も増えており、伝統と革新が共存する食の街でもある。200種以上の魚が揚がるということは、200通り以上の「旬」が尾鷲にはあるということ。尾鷲の漁師は「今日は何が揚がるかわからん」と笑うが、その不確実さこそが四季折々の味覚の楽しみを生んでいる。食卓に上る魚が毎日変わるのは、都市部では味わえない贅沢である。","e":"食育の授業で「旬の魚」を学ぶ教材に。「市の魚はなぜブリなのか」から地域の産業を考える社会科学習にもつながる。給食の魚が尾鷲で獲れたものだと紹介すると食への感謝の心を育める。漁港見学やおとと訪問と組み合わせた校外学習にも最適。四季の魚カレンダーを作る活動は楽しく学べる。","tg":["魚介","ブリ","カツオ","イセエビ","マダイ","鮮魚","旬","seafood"],"im":[],"s":"尾鷲市公式サイト「知ってほしい！おわせの魚」「鮮魚」、尾鷲物産公式","su":"https://www.city.owase.lg.jp/"},{"id":"OW-033","c":"food","a":"owase","t":"尾鷲の柑橘と農産物 — 黒潮の温暖が育む段々畑の恵み","x":"尾鷲市は黒潮の影響で冬も温暖な気候に恵まれ、柑橘類の栽培が盛んな地域でもある。温州みかんを中心にポンカン、甘夏、橙（だいだい）、八朔など多様な柑橘が海を見下ろす段々畑で栽培されている。特に橙は、さんま寿司の酢として古くから使われてきた重要な食材で、尾鷲の食文化と深く結びついている。急峻な地形の段々畑は、日当たりと水はけが良く、海からの反射光も加わるため甘みが凝縮された柑橘が実る。農業は面積の90%が山林という地形上、漁業や林業に比べて規模は小さいが、地域の食を支える大切な産業である。夢古道おわせやイタダキ市では地元農家が育てた新鮮な柑橘やジャム、漬物などの加工品が販売されている。柑橘栽培は高齢者の生きがい農業としての側面もあり、畑仕事が健康維持と地域コミュニティの維持に貢献している。尾鷲の食文化は海の幸だけでなく、山の恵みとの組み合わせで成り立っており、さんま寿司の柑橘酢、めはり寿司の高菜漬け、梶賀のあぶりの薪など、山と海の素材が一皿の中で出会っている。尾鷲の段々畑は先人たちが急斜面を石垣で固めて一段一段作り上げたもので、その労苦は計り知れない。高齢化により耕作放棄が進む畑もあるが、景観としての価値も高く保全が求められている。","e":"3年生社会科「農家の仕事」で尾鷲の柑橘農業を取り上げ可能。「さんま寿司に使う橙」という食文化との結びつきは食育にぴったり。家庭科で柑橘を使った料理や加工品作りの実習もできる。「山と海の恵みが一皿で出会う」という視点は尾鷲の食文化を象徴するメッセージ。","tg":["柑橘","みかん","橙","農業","段々畑","温暖","食文化","citrus"],"im":[],"s":"尾鷲観光物産協会、尾鷲市イタダキ市情報、各種観光サイト","su":""},{"id":"OW-034","c":"education","a":"owase","t":"尾鷲市の学校一覧 — 5小学校・2中学校・1高校・1特別支援学校","x":"尾鷲市の教育施設は小学校5校、中学校2校、県立高校1校、県立特別支援学校1校で構成されている。小学校は尾鷲小学校（中村町、市内最大規模）、宮之上小学校（宮ノ上町）、矢浜小学校（矢浜2丁目）、向井小学校（大字向井）、賀田小学校（賀田町）の5校。中学校は尾鷲中学校（矢浜2丁目）と輪内中学校（賀田町）の2校。矢浜小学校と尾鷲中学校は矢浜地区に隣接して立地している。賀田小学校と輪内中学校は市南部の賀田町にあり、南輪内地区の教育を担っている。三重県立尾鷲高等学校は市唯一の高校で、地域の人材育成の中核。三重県立特別支援学校も市内に設置されている。市立幼稚園は尾鷲幼稚園1園。市全体の児童生徒数は人口減少に伴い減少傾向にあり、かつてはさらに多くの小中学校があったが統廃合により現在の規模に集約された。学校の適正規模・適正配置は教育行政の継続的な課題であり、教頭として着任後すぐに各校の規模と地域特性を把握することが重要。各学校は地域コミュニティの核としての役割も果たしており、学校の存続は地域の存続に直結する問題でもある。尾鷲市の教育予算は市の財政に占める割合が比較的高く、人口が減っても教育の質を維持する市の姿勢が表れている。小規模校ならではの全校児童が顔見知りという環境は教育上の大きなメリットでもある。","e":"教頭として着任前に把握すべき最重要情報の一つ。各学校の位置関係・規模・地域特性を理解することで、教育委員会との連携や管理職としての判断がスムーズになる。学区の地理的特性（山間部・沿岸部）の違いは防災計画や校外学習計画にも影響。統廃合の経緯を知ることで保護者の心情への理解も深まる。","tg":["小学校","中学校","高校","学校一覧","教育","統廃合","学校配置","特別支援学校","school"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_018_Owase_City_Owase_Elementary_School_ac.jpg","t":"Owase City Owase Elementary School ac.jpg","id":"WEB-304","u":"https://commons.wikimedia.org/wiki/File:Owase_City_Owase_Elementary_School_ac.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""}],"s":"尾鷲市公式サイト「尾鷲市立小学校・中学校一覧」、文部科学省資料","su":"https://www.city.owase.lg.jp/"},{"id":"OW-035","c":"education","a":"owase","t":"地域学習の宝庫 — 教科書に載るテーマが凝縮されたまち","x":"尾鷲市は社会科・総合的な学習の時間・理科の教材の宝庫である。世界遺産の熊野古道（歴史・文化）、日本農業遺産の尾鷲林業（産業・環境）、日本有数の多雨気候（気象・地理）、リアス式海岸と10の漁港（地形・水産業）、200種を超える魚介（生態系・食文化）、伝統工芸の尾鷲わっぱ（ものづくり）、天下の奇祭ヤーヤ祭り（伝統文化）、海洋深層水の活用（科学・産業）、過疎化への挑戦（現代社会の課題）、南海トラフへの備え（防災）——これだけのテーマが一つのまちに凝縮されているのは稀有なこと。3年生の「まちのようす」から5年生の「林業・水産業」「国土の環境」、6年生の「歴史」「政治」まで、小学校の社会科のほぼ全単元を地元の具体的素材で学ぶことができる。総合的な学習の時間では「海のまち」「山のまち」「世界遺産のまち」「雨のまち」など、年間を通した探究テーマの設定が可能。地域の方々——漁師、林業家、わっぱ職人、古道語り部ガイド、深層水アクアステーション職員、移住サポーター——をゲストティーチャーとして招く体制も構築しやすい環境にある。尾鷲ほど「地域そのものが教科書」と言えるまちは少ない。教育資源としての尾鷲の強みは、「本物に触れられる」距離感にある。教科書の写真ではなく実際の漁港、実際の石畳、実際の職人に出会えることが、子どもたちの学びを深め、記憶に残るものにする。","e":"教頭としてカリキュラム・マネジメントの視点から最重要な情報。どの学年・どの教科でどの地域素材を活用できるかを一覧化しておくと、校内研修の資料や年間指導計画の見直しに直結する。コミュニティスクール的な地域連携の基盤づくりに。新任教師のオリエンテーションでも「尾鷲の教育資源」として紹介したい内容。","tg":["地域学習","教育資源","カリキュラム","総合学習","社会科","ゲストティーチャー","地域連携","教科書","education"],"im":[],"s":"各種調査の統合、尾鷲市教育関連情報","su":""},{"id":"OW-036","c":"education","a":"owase","t":"防災教育と学校安全 — 南海トラフに備える教育現場の使命","x":"南海トラフ巨大地震で最大17mの津波が想定される尾鷲市において、学校での防災教育は教育課程の中でも最重要の位置を占める。各学校では年間複数回の避難訓練が実施されており、特に津波を想定した高台への避難訓練が重点的に行われている。「15分以内に高台へ」という切迫した想定のもと、児童が迅速かつ安全に避難できる経路の確認と反復訓練が欠かせない。三木里地区では「逃げ地図」プロジェクトが実施され、住民（児童を含む）自身が避難経路と所要時間を地図上に色分けして可視化する取り組みが防災意識の向上に効果を上げた。学校施設は災害時の指定避難所にもなるため、耐震化の完了確認、備蓄品の管理、避難所運営マニュアルの整備は管理職の重要な責務。高台に位置する学校は避難拠点として地域から期待される役割がある。廃校の防災拠点としての利活用も進められている。教育委員会と防災部局との連携、地域の自主防災組織との協力体制の構築は、教頭が中心となって推進すべき業務。「自分の命は自分で守る」判断力を児童に育てることが、尾鷲の学校教育の根幹である。保護者への引き渡し訓練、登下校時の被災想定など、学校特有の場面を想定した訓練も重要。","e":"教頭としての防災管理業務に直結する最重要知識。着任後すぐに学校の避難経路・避難場所・備蓄状況・耐震化状況を確認すべき。学校防災計画の見直し、避難訓練の計画・実施・評価のサイクルを回す責任者として不可欠な情報。保護者への防災方針の説明、地域の自主防災組織との連携体制構築にも。","tg":["防災教育","避難訓練","津波","南海トラフ","逃げ地図","避難所","学校安全","管理職","disaster education"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"尾鷲市過疎地域持続的発展計画、逃げ地図プロジェクト、IRP事前復興研究","su":""},{"id":"OW-037","c":"history","a":"owase","t":"伊勢神宮と熊野三山を結ぶ伊勢路 — 尾鷲は聖地への中間地点","x":"熊野古道伊勢路は伊勢神宮と熊野三山という日本を代表する二つの聖地を結ぶ参詣道で、全長は伊勢から熊野速玉大社まで約170km。中世から近世にかけて、伊勢参りを終えた巡礼者が「蟻の熊野詣」と呼ばれるほど大勢で列をなして熊野を目指した。尾鷲市はこの伊勢路のほぼ中間地点に位置し、巡礼者にとって重要な休息地・宿場であった。尾鷲市内の伊勢路には馬越峠の他に、八鬼山越え（やきやまごえ）という難所もある。八鬼山は標高627mで「西国第一の難所」と恐れられた険しい峠道で、山賊が出没したという伝承も残る。かつての巡礼者は尾鷲の宿場で一夜を過ごし、英気を養って翌日の難所に備えた。伊勢と熊野という二つの信仰圏の結節点としての尾鷲の地理的重要性は計り知れない。巡礼者の往来は沿道の集落に宿泊や物資の需要をもたらし、尾鷲の宿場文化と商業を育てた。2004年の世界遺産登録後は、古の巡礼路を歩くトレッカーが国内外から年間数万人規模で訪れるようになり、熊野古道は尾鷲最大の観光資源となっている。馬越峠の石畳は尾鷲の激しい雨に耐える先人の土木技術の結晶であり、八鬼山には巡礼者の安全を祈願した地蔵が点在する。八鬼山越えの途中には「お綱茶屋跡」など、かつて巡礼者をもてなした茶屋の跡が残っている。当時の人々の「おもてなし」の心は、現在の熊野古道ボランティアガイドの活動にも通じている。","e":"6年生社会科の歴史学習で「信仰と交通」「中世の文化」のテーマに直結。「なぜ人々は何日もかけて歩いたのか」は子どもの想像力をかき立てる問い。世界遺産学習として「なぜこの道が世界遺産なのか」を考える探究にも。八鬼山の難所の話は体育のハイキング前の動機づけにも使える。","tg":["伊勢神宮","熊野三山","伊勢路","参詣道","巡礼","八鬼山","宿場","世界遺産","pilgrimage"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Wikipedia「伊勢路（熊野古道）」、三重県熊野古道伊勢路サイト、観光三重、コベルコ建機ニュース","su":""},{"id":"OW-038","c":"industry","a":"owase","t":"尾鷲の養殖業 — 大学連携の先進技術で挑むブリ・マダイ・クロマグロ","x":"尾鷲湾ではブリの養殖が主要産業の一つとして定着しており、年間40万尾を超える生産量を誇る。リアス式海岸の入り江が外洋の波を遮り、穏やかで水深のある湾内環境が大規模な海面養殖に適している。近年は大学（三重大学等）との産学連携により、養殖場の海洋環境（水温・溶存酸素・潮流）をモニタリングし、その特性に合わせた先進的な養殖技術の開発・確立に取り組んでいる。水温管理、餌の配合の最適化、魚病の早期検知・対策など、科学的アプローチが導入され、品質向上とコスト削減の両立を目指している。マダイの養殖も行われており、尾鷲湾の潮流で鍛えられた養殖マダイは天然に近い身の締まりと味の良さで評価が高い。さらに尾鷲物産株式会社はクロマグロの養殖にも参入しており、ブリ・マダイ・クロマグロという三大養殖魚種を尾鷲湾で生産する体制が整いつつある。養殖業は天候に左右されにくい安定した水産業として漁業者の経営安定に寄与するとともに、「とる漁業」から「育てる漁業」への転換として持続可能な水産業のモデルケースにもなっている。養殖技術の進歩により、かつては天然物に劣るとされていた養殖魚の味が天然に匹敵するレベルまで向上した。尾鷲の養殖ブリは脂の乗りと身の弾力が良く、市場での評価も高い。","e":"5年生社会科「水産業のさかんな地域」で「とる漁業」と「育てる漁業」の比較学習に最適な地元教材。大学との連携は「科学と産業の結びつき」を学ぶ素材にもなる。SDGs目標14「海の豊かさを守ろう」と持続可能な養殖の関係を考える授業に。養殖場の見学は校外学習の有力候補。","tg":["養殖","ブリ","マダイ","クロマグロ","水産業","産学連携","尾鷲湾","持続可能","aquaculture"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_002_owase_fish_market_bay.jpg","t":"Owase Fish Market and Owase Bay","id":"WEB-102","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_011_owase_bay.jpg","t":"Owase Bay","id":"WEB-111","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲湾"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"尾鷲市公式サイト「水産振興係」、尾鷲物産公式「養殖」、浜プラン","su":"https://www.city.owase.lg.jp/"},{"id":"OW-039","c":"industry","a":"owase","t":"定置網漁の伝統 — 明治から続く持続可能な漁法と漁師の知恵","x":"定置網漁は尾鷲市の漁業の中核を担う漁法の一つで、100年以上の歴史がある。沿岸の決まった場所に大規模な網を設置し、潮の流れに乗って回遊してきた魚を網に誘導して捕獲する方式で、魚群を追いかけ回すのではなく「待つ」漁法であるため、資源を取り尽くさない持続可能性の高い漁法として国際的にも注目されている。尾鷲では明治31年（1898年）に隣町の紀北町島勝でブリ定置網が操業を開始し、明治32年に九鬼町の九木浦、明治33年に梶賀浦、明治40年に早田浦と次々に操業が拡大した。早田町の「早田大敷」は現在も定置網漁を継続する地域の代表的な漁業組織で、約140人の小さな集落の生活を支え続けている。定置網には季節に応じてブリ、アジ、サバ、カツオ、タチウオ、サワラなど多様な魚が入り、その日の水揚げによって食卓に並ぶ魚が決まるという「海まかせ」の面白さがある。漁師たちは長年の経験から潮の流れや天候を読み、網の位置や深さを微調整する。この「海を読む」技術は先人から口伝えで受け継がれてきた暗黙知であり、定置網漁師の真骨頂である。定置網を引き揚げる作業は早朝から始まり、網にかかった魚を選別して素早く港に運ぶ。鮮度が命の魚を最短時間で市場に届けるため、漁師たちのチームワークと手際の良さが光る。","e":"5年生社会科「水産業のさかんな地域」で、定置網という漁法の仕組みと持続可能性を学ぶ教材に最適。「とりすぎない漁業」はSDGs目標14と直結する。漁師さんをゲストティーチャーに招き「海を読む」技術について話を聞く授業は子どもの記憶に残る体験になる。早田大敷の見学も可能性がある。","tg":["定置網","漁法","ブリ","持続可能","早田大敷","漁師","暗黙知","set net fishing"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/buri_teichami_001.jpg","t":"九鬼のブリ定置網（歴史写真）","id":"WEB-393","u":"https://commons.wikimedia.org/wiki/File:Kuki_Yellowtail_Set_Net.jpg","li":"Public domain","loc":""}],"s":"尾鷲市公式サイト「水産振興係」「鮮魚」、早田大敷公式、浜プラン","su":"https://www.city.owase.lg.jp/"},{"id":"OW-040","c":"culture","a":"owase","t":"尾鷲神社と大楠 — まちの守り神と千年の巨木","x":"尾鷲神社は尾鷲市北浦町に鎮座する神社で、まちの総鎮守として古くから信仰を集めてきた。毎年2月のヤーヤ祭りの舞台となる神社であり、祭礼期間中は境内が祭りの中心地となる。最終日の5日に篝火に照らされた境内で行われる弓射の奉納は、祭りのクライマックスとして荘厳な雰囲気に包まれる。神社の境内には大楠（クスノキ）の巨木がそびえ立ち、推定樹齢は千年を超えるとも言われる。幹周りは数メートルに達し、その存在感は圧倒的。尾鷲の歴史を見守り続けてきたこの巨木は、天然記念物級の存在として市民に親しまれている。熊野古道伊勢路の馬越峠からの道はこの神社の近くに到着し、かつての巡礼者もここで旅の安全を祈願したとされる。神社は地域コミュニティの核であり、初詣、七五三、祭礼、秋の例祭などの年中行事を通じて住民の絆を深める場所。宮座制度や当屋制度といった古い神社運営の仕組みが残っていることも文化的に価値が高い。学校行事との連携で参拝や地域学習の場としても活用されてきた歴史がある。尾鷲のアイデンティティを象徴する場所の一つ。尾鷲神社の参道は馬越峠の降り口から続いており、世界遺産の古道を歩いた後にそのまま参拝できるという贅沢なロケーション。神社の静寂は、古の巡礼者が感じたであろう安堵と感謝の気持ちを追体験させてくれる。","e":"3年生社会科「古くから残るもの」で、地域の神社を題材にした学習に最適。ヤーヤ祭りの学習と組み合わせると地域文化の理解が深まる。大楠の観察（理科の植物学習）と歴史学習を同時にできる校外学習先として有力。神社関係者や古道語り部をゲストティーチャーに招くことも可能。","tg":["尾鷲神社","大楠","クスノキ","ヤーヤ祭り","参拝","巨木","宮座","shrine"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_033_sacred_tree_owase_jinja.jpg","t":"Sacred Tree at Owase Jinja","id":"WEB-133","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲神社"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_001_shrine_two_camphor_trees.jpg","t":"Shrine Two Camphor Trees","id":"WEB-158","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲神社"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_006_torii_shrine_building.jpg","t":"Torii Shrine Building","id":"WEB-168","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲神社"}],"s":"尾鷲神社公式サイト、尾鷲市公式サイト「ヤーヤ祭り」、尾鷲観光物産協会","su":"https://www.city.owase.lg.jp/"},{"id":"OW-041","c":"culture","a":"owase","t":"尾鷲の方言と紀州弁 — 集落ごとに異なるおわしぇ言葉の世界","x":"尾鷲の言葉は紀州弁（南紀方言）に属し、関西弁の一種でありながら大阪弁や京都弁とは明確に異なる独自の語彙、イントネーション、表現を持つ。市名の「尾鷲」自体、地元では本来「おわしぇ」と発音していたものを標準語化して「おわせ」としたという経緯があり、この一つの例だけでも方言の奥深さが感じられる。尾鷲を含む東紀州地域の方言は、山と海に隔てられた地理的条件から集落ごとに微妙な違いがあるのが大きな特徴。九鬼町の言葉と賀田町の言葉、須賀利の言葉にはそれぞれ違いがあり、地元の人なら話し方でどの集落出身かわかることもある。漁師言葉には海に関する独自の表現が豊富で、天候、潮の状態、風向き、波の高さを表す細やかな語彙がある。これは生死に関わる情報を正確に伝えるために発達した「命の言葉」とも言える。林業に関連する方言も残っており、木の種類や林業作業の細かな工程を表す独自の言い回しがある。こうした方言は高齢者の間では日常的に使われているが、若い世代では使用が急速に減少しており、地域の無形文化遺産として記録・保存する重要性が高まっている。方言は単なる「なまり」ではなく、その土地の歴史・産業・暮らしが凝縮された文化の結晶である。","e":"国語の方言学習で「地元のことば」を調べる活動に直結する。おじいちゃん・おばあちゃんにインタビューして方言を集める活動は世代間交流にもなる。「漁師言葉」「林業言葉」の調査は社会科の産業学習にもつながる横断的テーマ。「市名の読み方の由来」は朝会のトリビアとして面白い。方言辞典づくりは総合学習のプロジェクトに。","tg":["方言","紀州弁","おわしぇ","言葉","漁師言葉","無形文化","集落","dialect"],"im":[],"s":"尾鷲市公式サイト「尾鷲市の概要」、Wikipedia、三重県南部地域活性化情報","su":"https://www.city.owase.lg.jp/"},{"id":"OW-042","c":"modern","a":"owase","t":"ふるさと納税と地域ブランド — 尾鷲の魅力を全国に届ける戦略","x":"尾鷲市はふるさと納税を通じた地域ブランドの全国発信に力を入れている。返礼品には尾鷲ヒノキの木工製品、尾鷲わっぱ、梶賀のあぶり各種、新鮮な魚介（ブリ、マダイ、イセエビ等）、干物セット、さんま寿司、海洋深層水関連商品（化粧水、飲料水）など、地域の特産品が多彩に並ぶ。特に梶賀のあぶりは食べ比べセットが人気で全国的な知名度を獲得し、2025年には海外展開を目指す選考にも選出された。おわせお魚いちば「おとと」、尾鷲イタダキ市は地域ブランドの発信拠点として観光客と地元住民の交流を生む場になっている。尾鷲市の地域ブランド戦略は大きく三つの軸がある。「熊野古道のまち」としての歴史文化観光、「尾鷲ヒノキ」を軸とした林業・木工ブランド、そして「おわせ暮らし」による移住・定住ブランドである。人口1.6万人の小さなまちが、それぞれの強みを磨き上げて独自の存在感を全国に示している。ふるさと納税の収入は地域の福祉や教育にも還元されており、寄附者と地域をつなぐ仕組みとして機能している。返礼品のラインナップは季節ごとに更新され、旬の魚介セットは人気が高く早々に品切れになることも。寄附者からのリピート率の高さは、尾鷲の食の実力を物語っている。","e":"5年生社会科「情報と産業」で、ふるさと納税を通じた地域活性化を学ぶ教材に。「尾鷲の良いところを全国に伝えるには」は国語の意見文やプレゼンの学習にも直結。児童がオリジナルの「尾鷲PR」を考える活動は総合学習に。学校として地域ブランドのPRに協力する（展示、発表会等）ことで地域連携が深まる。","tg":["ふるさと納税","地域ブランド","特産品","返礼品","マーケティング","梶賀のあぶり","尾鷲ヒノキ","regional branding"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_002_kajika_aburi_amberjack.jpg","t":"梶賀のあぶり（ブリの燻製）","id":"WEB-351","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_001_kajika_aburi_mackerel.jpg","t":"梶賀のあぶり（サバの燻製）","id":"WEB-350","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Mackerel_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_003_sanma_zushi.jpg","t":"さんま寿司","id":"WEB-352","u":"https://commons.wikimedia.org/wiki/File:Sanma_zushi.JPG","li":"Public domain","loc":""}],"s":"尾鷲市ふるさと納税情報、各種観光サイト、梶賀コーポレーション","su":""},{"id":"OW-043","c":"nature","a":"owase","t":"尾鷲の河川と水循環 — 年間4,000mmの雨がつくる山から海への命の流れ","x":"日本有数の多雨地帯である尾鷲市には、急峻な山地から海へと流れ落ちる多くの河川がある。市の中心部を流れる矢の川（やのかわ）、北部を流れる船津川などが主要な河川。年間約4,000mmという膨大な降水量がもたらす豊富な水は、まず急峻な山地の尾鷲ヒノキの森林に蓄えられる。森林の土壌はスポンジのように雨水を吸収し、ゆっくりと放出する「緑のダム」として機能。この水は清流となって山を流れ下り、棚田や農地を潤し、生活用水を供給する。最終的に熊野灘へと注いだ水は、森林由来の栄養分（窒素、リン、フルボ酸鉄など）を沿岸に運び、植物プランクトンの成長を促して海の生態系を豊かにする——これが「森は海の恋人」と呼ばれる関係の実態である。かつては木材の運搬にも河川が使われ、山で伐り出した丸太を川に流して海まで運ぶ「川流し」が盛んだった。この方法は紀州藩時代の主要な物流手段で、尾鷲の林業と漁業を結ぶインフラとしても機能した。現在は水力発電にも利用されるなど、水資源は尾鷲の産業と暮らしの基盤を成している。雨が多いことは時に水害や土砂災害のリスクにもなるが、尾鷲の人々は長い歴史の中で雨との共生の知恵を育んできた。尾鷲市内の河川は短く急流であるため、大雨時には水位が急上昇する。そのため河川の増水情報は防災上も重要で、水位計やライブカメラが設置されている場所もある。水害への備えも欠かせない地域特性である。","e":"4年生社会科「水はどこから」の単元で、尾鷲の水循環を地元教材として使える。「森は海の恋人」は理科・社会科・総合学習を横断するテーマ。5年生理科「流れる水のはたらき」とも直結。「雨が多いことの良い面と困る面」を考える学習は多角的思考力を育てる。環境教育の核心教材にも。","tg":["河川","水資源","水循環","緑のダム","森は海の恋人","矢の川","川流し","water resources"],"im":[],"s":"尾鷲市公式サイト、各種地理・環境情報","su":"https://www.city.owase.lg.jp/"},{"id":"OW-044","c":"modern","a":"owase","t":"尾鷲の漁村集落 — 小さな港町が紡ぐ暮らしと文化の多様性","x":"尾鷲市には中心市街地の他に、九鬼、早田、三木浦、古江、曽根、梶賀、須賀利など複数の小さな漁村集落が点在する。各集落はリアス式海岸の入り江に寄り添うように形成され、それぞれが独自の歴史・文化・漁法を持つ「小さな世界」を構成している。三木浦は人口約500人の集落で、築100年の古民家を改修した「織屋（おりや）」がコミュニティスペースとして住民と訪問者の交流の場になっている。農林漁業体験民宿やゲストハウスも運営され、移住希望者の体験拠点にもなっている。早田は約140人の集落で、定置網漁（大敷）が町の核産業として集落を支えている。梶賀は100年以上続く「あぶり」の燻製文化を守り、その食文化が全国区の知名度を獲得した。九鬼は水軍の歴史を持つ迷路のような路地のまち。これらの集落は人口減少と高齢化の最前線にありながら、それぞれの強みを活かした存続の道を模索している。「漁村の活動応援サイト」では「漁師町の知恵は宝もの」と紹介されるなど、外部からの再評価も進む。これらの漁村の暮らしの知恵や文化は、日本の沿岸集落の縮図であり、消えてはならない文化遺産でもある。各集落を訪れると、同じ尾鷲市内でありながら言葉遣いや料理の味付け、祭りの作法が微妙に異なることに気づく。この多様性こそが、リアス式海岸の地形が生んだ尾鷲の文化的豊かさの証である。","e":"3年生社会科「まちのようす」で、中心市街地と漁村集落の違いを比較学習できる。総合学習で「小さな集落が残るために何ができるか」を考える活動は主体的な市民性を育てる。校外学習で漁村を訪れ、地域のお年寄りに話を聞くフィールドワークは深い学びに。各集落の特色を調べて「尾鷲漁村マップ」を作る活動も面白い。","tg":["漁村","集落","三木浦","早田","梶賀","九鬼","コミュニティ","暮らし","fishing village"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_new_三木浦_Mie_Gaiwan_Fishery_Cooperative_Association_mikiura_Kajikaura-01.jpg","t":"三重外湾漁業協同組合三木浦事業所梶賀浦　　三重県尾鷲市梶賀町","id":"WEB-359","u":"https://commons.wikimedia.org/wiki/File%3AMie%20Gaiwan%20Fishery%20Cooperative%20Association%20%EF%BC%88mikiura%20Kajikaura%EF%BC%89-01.jpg","li":"Wikimedia Commons (CC BY-SA 4.0)","loc":"三木浦"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/furue_003.jpg","t":"古江の集落","id":"WEB-381","u":"http://matinami.o.oo7.jp/tyubu-tokai2/owase-furue.htm","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_024_Owase_Kuki_Fishing_Port_ac.jpg","t":"Owase Kuki Fishing Port ac (2).jpg","id":"WEB-310","u":"https://commons.wikimedia.org/wiki/File:Owase_Kuki_Fishing_Port_ac_(2).jpg","li":"CC BY-SA 4.0","loc":"尾鷲市九鬼町"}],"s":"尾鷲市公式サイト、三木浦ゲストハウス、漁村の活動応援サイト、尾鷲観光物産協会","su":"https://www.city.owase.lg.jp/"},{"id":"OW-045","c":"geography","a":"owase","t":"尾鷲市の気温と四季 — 冬は温暖、夏は意外に涼しい海辺のまち","x":"尾鷲市の気候は温暖湿潤気候（ケッペン分類Cfa）に分類され、年平均気温は約16.6℃。冬は黒潮の暖かさに守られて温暖で、最寒月の1月でも平均最低気温は6.0℃、平均最高気温は12.5℃。降雪はほぼ皆無で、年間の積雪日数はわずか0.4日と雪国とは無縁の気候。夏は8月の平均最高気温が30.9℃だが、海風が暑さを和らげるため瀬戸内海沿岸や日本海側の都市と比べて体感は涼しめ。湿度も瀬戸内海沿岸の都市よりやや低い。降水量は春と秋に集中し、最も雨が多いのは意外にも4月（月平均879.5mm）。次いで11月（796
