.5mm）、3月（442.5mm）と続く。逆に7月（40.2mm）と8月（49.5mm）は梅雨明け後で比較的雨が少ない——この事実は「年中雨ばかり」というイメージを覆す。年間日照時間は約1,966時間で全国平均とほぼ同等。台風シーズンには直撃のリスクもあるが、リアス式海岸の入り江が天然の防波堤となる。市の花ヤブツバキは冬でも咲き誇り、温暖な気候を象徴する花。四季を通じて花や緑に恵まれ、自然の中で暮らす豊かさがある。過去の最高気温は38.8℃（8月）、最低気温は-6.9℃（1月）。春は桜と柑橘の花が同時に咲き、夏は海水浴と川遊び、秋は紅葉と祭り、冬は温暖な陽だまりとヤブツバキ——尾鷲の四季は、雨の多さとは裏腹に、晴れ間の美しさが際立つまちでもある。","e":"理科の気温観測や天気の学習で、尾鷲の実データを使った分析が可能。「雨は多いけど夏は涼しめ」「最も雨が多いのは7月ではなく4月」など意外な事実は全校朝会のネタになる。月別降水量の棒グラフ作成は算数の学習に。転入児童や保護者に気候の特徴を伝える際にも使える実用的情報。","tg":["気温","四季","気候","温暖","黒潮","降水量","日照時間","ヤブツバキ","temperature"],"im":[],"s":"気象庁 尾鷲観測所データ（1991-2020平年値）、Wikipedia「Owase」気候表","su":""},{"id":"OW-046","c":"industry","a":"owase","t":"伊勢志摩サミットの円卓と日本農業遺産 — 尾鷲ヒノキが世界に認められた瞬間","x":"2016年5月に三重県で開催されたG7伊勢志摩サミット（先進国首脳会議）において、日本・アメリカ・イギリス・フランス・ドイツ・イタリア・カナダの首脳が議論を交わした円卓に尾鷲ヒノキが使用された。世界のリーダーたちが尾鷲の木のもとで国際問題を議論したという事実は、400年の歴史を持つ尾鷲ヒノキの品質が世界最高水準で認められたことの証である。このサミットのニュースは尾鷲市民に大きな誇りをもたらし、尾鷲ヒノキへの全国的な注目が一気に高まった。翌2017年には、尾鷲地域の林業システムが「日本農業遺産」の第1号に認定されるという快挙を達成。日本農業遺産は、FAO（国連食糧農業機関）の世界農業遺産制度に倣い日本が独自に創設した認定制度で、伝統的な農林水産業とそれに関わる文化・景観・生物多様性が一体となった重要な農林水産業システムを認定するもの。尾鷲の400年にわたる密植多間伐の林業システム、急峻な地形と多雨が育む独特の森林景観、ヒノキの森と漁場の生態学的なつながりなどが、国の審査基準を満たすものとして高く評価された。「世界が認めた尾鷲の木」は、地域ブランドの最強のキャッチフレーズである。サミットの円卓は尾鷲市の熊野古道センターにレプリカが展示されており、実際に触れることができる。その滑らかな木肌と温かみのある手触りは、尾鷲ヒノキの品質を五感で理解させてくれる。","e":"全校朝会の鉄板ネタ中の鉄板。「世界のリーダーが座った机は尾鷲のヒノキでできている」「日本農業遺産の第1号」は子どもの目を輝かせる。5年生社会科で日本の林業を学ぶ際の導入として最強。保護者会でも「尾鷲は世界に誇れるまち」というメッセージを伝える最高の素材。サミットの写真を見せれば一発で伝わる。","tg":["G7サミット","伊勢志摩サミット","円卓","日本農業遺産","尾鷲ヒノキ","世界水準","FAO","G7 Summit"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"尾鷲市公式サイト、三重県林業普及、各種報道","su":"https://www.city.owase.lg.jp/"},{"id":"OW-047","c":"modern","a":"owase","t":"姉妹都市プリンスルパート — 太平洋を挟んで結ばれた林業と漁業の絆","x":"尾鷲市はカナダ・ブリティッシュコロンビア州のプリンスルパート市と1968年9月26日に姉妹都市提携を結んでいる。プリンスルパートは北太平洋に面した港町で、人口約12,000人。尾鷲市と同様に、林業（カナダの豊かな針葉樹林帯）と漁業（サケ・オヒョウ等）が主要産業であるという共通点が提携のきっかけとなった。両市は太平洋を挟んで向かい合う位置関係にあり、尾鷲の年間降水量約4,000mmに対してプリンスルパートも約2,500mmと多雨地帯であることも面白い共通点。いずれも「雨のまち」「森と海のまち」なのである。2007年7月8日には中国・大連市金州区とも友好都市提携を結んだ。人口1.6万人の小さなまちが国際交流を50年以上にわたって維持していることは、グローバルな視野を持つ教育の土台となる。姉妹都市交流は文化交流や教育交流の機会を提供し、児童が異なる文化に触れるきっかけとなりうる。プリンスルパートとの比較学習は、日本とカナダの産業・文化・自然環境の違いを学ぶ格好の教材である。プリンスルパートでもサーモンやハリバット（オヒョウ）の漁業が盛んで、先住民族の文化が残る点も尾鷲の熊野古道文化と通じるものがある。二つのまちの類似性は偶然ではなく、海と森が人間の営みを規定するという普遍的な法則を示している。","e":"6年生外国語の授業で「尾鷲の姉妹都市はカナダにある」は子どもの関心を引く導入に。社会科の国際理解教育で「なぜこの2つのまちが姉妹都市なのか」を考える活動に。総合学習でプリンスルパートとの比較学習（気候・産業・文化の共通点と違い）は深い学びになる。将来的に交流プログラムの可能性も。","tg":["姉妹都市","プリンスルパート","カナダ","国際交流","大連","友好都市","林業","漁業","sister city"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_003_owase_fish_market_1.jpg","t":"Owase Fish Market 1","id":"WEB-103","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_004_owase_fish_market_2.jpg","t":"Owase Fish Market 2","id":"WEB-104","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_005_owase_fish_market_3.jpg","t":"Owase Fish Market 3","id":"WEB-105","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"Wikipedia「Owase」、尾鷲市公式サイト、CLAIR国際交流情報","su":"https://www.city.owase.lg.jp/"},{"id":"OW-048","c":"food","a":"owase","t":"尾鷲の干物・水産加工品と海塩 — 海の恵みを長く美味しく届ける技","x":"尾鷲は新鮮な魚介だけでなく、干物や水産加工品の生産が盛んな地域でもある。200種を超える豊富な魚種を活かし、アジの開き、サバの干物、サンマの丸干し、カマスの干物など多様な製品が作られている。尾鷲の干物が特に美味しいのは、水揚げされたばかりの新鮮な魚をすぐに加工できること、そして海洋深層水から作られた高品質な塩を使えることが大きい。深層水由来の塩はミネラルが豊富でまろやかな味わいがあり、魚の旨みを引き出す。梶賀のあぶりに代表される燻製保存食も水産加工文化の重要な一翼を担う。可成屋のさんま寿司やちりめん山椒は尾鷲を代表するお土産として人気。尾鷲イタダキ市やふるさと納税の返礼品としても水産加工品は主力商品であり、「尾鷲の味」を全国に届ける役割を果たしている。水産加工業は漁業の付加価値を高め、漁業者の収入安定にも寄与する重要な産業。季節の魚を長く美味しく届けるための先人の知恵は、冷蔵技術が発達した現在でも色褪せない価値を持っている。かつお節の伝統的な製法が一部に残っているのも興味深い。尾鷲の干物は「天日干し」と「機械干し」の両方が行われているが、老舗の干物屋では天日干しにこだわる店も多い。太陽と潮風で乾燥させた干物は、機械では出せない風味と食感があると評判。","e":"5年生社会科「水産業」の「加工の工夫」を学ぶ教材に。理科の「ものの溶け方」と関連させて塩漬けの原理を学ぶことも。家庭科で保存食の知恵を考える授業に。イタダキ市で実際の加工品を見て・買って・味わう体験学習も効果的。海洋深層水の塩と普通の塩の味比べ実験も面白い。","tg":["干物","水産加工","保存食","海塩","深層水","ちりめん山椒","加工品","dried fish"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/himono_001.jpg","t":"干物","id":"WEB-392","u":"https://commons.wikimedia.org/wiki/File:Himono_01.JPG","li":"CC BY 2.5","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/sanma_himono_001.jpg","t":"サンマの一夜干し","id":"WEB-395","u":"https://commons.wikimedia.org/wiki/File:Pacific_saury_dried_overnight.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/yumekodo_yu_001.jpg","t":"夢古道の湯","id":"WEB-373","u":"https://www.city.owase.lg.jp/owatabi/0000017461.html","li":"引用（ローカル閲覧用）","loc":""}],"s":"尾鷲観光物産協会、可成屋公式サイト、尾鷲市公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-049","c":"education","a":"owase","t":"尾鷲高等学校 — 地域唯一の高校が担う人材育成と地域存続","x":"三重県立尾鷲高等学校は尾鷲市および東紀州地域唯一の全日制高校であり、地域の人材育成の要を担っている。尾鷲市と紀北町、そして周辺地域の中学生が進学先として選ぶ高校で、普通科を中心とした教育課程を提供している。人口減少と少子化に伴い生徒数は年々減少傾向にあるが、少人数教育の利点を活かしたきめ細かな指導が特徴。部活動も活発で、地域の祭りやボランティア活動にも積極的に参加し、地域に根ざした教育を実践している。卒業生には福山英朗（レーシングドライバー）、中子修（レーシングドライバー）など多方面で活躍する人材がいる。高校の存続は地域の存続に直結する重大な問題であり、高校がなくなれば中学卒業時点での家族ぐるみの転出が加速し、地域の人口減少に拍車がかかる。「高校は地域の命綱」とも言われる所以である。小中学校の教育課程が高校への接続を意識して設計されることの重要性は、教頭として常に念頭に置くべき視点。地域の高校を支える取り組み（地域探究学習の連携、進路指導での地元就職の推奨など）は小中学校の段階から始まっている。尾鷲高校の校舎からは尾鷲湾が一望でき、海を見ながら学ぶという環境は都会の学校にはない贅沢。この環境で育った生徒たちが将来Uターンして地域を支える人材になることが、学校と地域双方の願いである。","e":"中学校との接続を意識した教育課程編成の参考情報として重要。キャリア教育で「地元の高校で学ぶこと」の意義を伝える際にも。教頭として教育委員会との連携や地域教育の議論に参加する際、高校の状況は必ず話題に上がるため把握必須。保護者の最大関心事の一つ。小中高の連携教育の視点も重要。","tg":["尾鷲高校","高等学校","人材育成","教育","地域存続","少子化","進路","接続","high school"],"im":[],"s":"尾鷲高等学校情報、尾鷲市公式サイト、各種学校情報サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-050","c":"nature","a":"owase","t":"三木崎と尾鷲湾の海中景観 — エメラルドグリーンの海とサンゴ","x":"尾鷲市の三木崎は紀伊半島の東端に近い岬で、黒潮が最も日本列島に接近する地点の一つとして海洋学的に重要な場所。この海域は黒潮の影響で透明度が非常に高く、エメラルドグリーンに輝く海の色が特徴的。暖流の恩恵でテーブルサンゴやソフトコーラルなどのサンゴ類が生育し、カラフルな熱帯魚が見られるスポットもあるため、ダイビング愛好家にも知られている。三木崎沖の水深約415mからは海洋深層水が取水されており、表層から深海まで多層的な海洋環境が一つの海域に凝縮されている。尾鷲湾はリアス式海岸の入り江で、湾口が狭く奥が広い地形のため外洋の荒波を受けにくく穏やかな海面が広がる。この穏やかさが大規模なブリ・マダイの養殖を可能にしている。湾内には時折イルカの群れが入り込むこともあり、漁師たちにとっては季節の風物詩。九鬼町から三木浦にかけての海岸線は特に美しく、そのエメラルドグリーンの海は九鬼水軍の時代から変わらぬ宝物。尾鷲の海は上から見ても中に潜っても美しい。三木崎から見る朝日は特に美しく、太平洋の水平線から昇る陽光がエメラルドグリーンの海面を黄金色に染める。この景色を見るためだけに尾鷲を訪れるカメラマンもいるほどの絶景スポットである。","e":"理科「生き物と環境」で、黒潮がもたらす海の生態系を学ぶ教材に。SDGs目標14の地域教材として最適。ダイビングショップや漁協と連携した海中映像を使った授業も可能性がある。「なぜ尾鷲の海はエメラルドグリーンなのか」は子どもの好奇心をくすぐる探究テーマ。潮だまり観察の校外学習にも。","tg":["三木崎","海中景観","サンゴ","ダイビング","尾鷲湾","エメラルドグリーン","海洋環境","黒潮","marine"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_002_owase_fish_market_bay.jpg","t":"Owase Fish Market and Owase Bay","id":"WEB-102","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_011_owase_bay.jpg","t":"Owase Bay","id":"WEB-111","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲湾"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"VISIT HIGASHI KISHU、尾鷲市海洋深層水情報、観光三重","su":""},{"id":"OW-051","c":"education","a":"mukai","t":"尾鷲市立向井小学校 — 全校児童12名の極小規模校の概要","x":"尾鷲市立向井小学校は三重県尾鷲市大字向井134-12に位置する公立小学校で、令和7年度の全校児童数は12名。1年0名、2年2名、3年3名、4年0名、5年2名、6年5名という児童構成で、尾鷲市内5小学校の中で最も小さい極小規模校である。2・3年複式学級（5名）と5・6年複式学級（7名）の2学級編制で運営されている。教職員は校長1名、教頭1名、学級担任2名、その他の教諭、養護教諭、事務職員、用務員で構成され、ALTが週1回来校する。学校は向井集落の高台（標高約45.7m）に位置し、校舎3階からは標高約53.5mとなるため、津波避難場所としても指定されている。尾鷲市南部の海と山に囲まれた環境にあり、自然体験学習の場に恵まれている。全校児童が一つの家族のような関係の中で学び、異学年交流が日常的に行われるのが最大の特徴。スクールバスはなく、保護者の送迎や徒歩通学が中心。2026年度からChromebook 1人1台体制が始まり、ICT教育の本格導入が進む。","e":"教頭として赴任する学校の基本データ。複式学級の編制・運営、少人数指導の工夫、地域連携の全体像を把握する出発点。学校運営計画の策定、教育委員会への報告、保護者説明会の資料作成に必須の情報。","tg":["向井小学校","極小規模校","複式学級","児童数","教職員","学校概要","education"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"尾鷲市公式サイト向井小学校ページ、学校要覧","su":"https://www.city.owase.lg.jp/"},{"id":"OW-052","c":"education","a":"mukai","t":"児童12名・2学級の複式学級編制 — 向井小学校の学級構成と課題","x":"向井小学校は令和7年度、2・3年複式学級（5名）と5・6年複式学級（7名）の2学級で運営されている。1年生と4年生が0名のため、実質的に4学年の児童が2つの教室で学ぶ形態となる。複式学級の最大の課題は、教師が一方の学年を直接指導している間、もう一方の学年が間接指導（自力学習）となる点である。この間接指導の質をいかに高めるかが学力保障の鍵となる。向井小学校ではガイド学習（児童リーダーが学習を進行する方式）を導入し、間接指導時間の学びの質を確保している。少人数ゆえの強みとして、一人ひとりに目が行き届く指導、発言機会の多さ、異学年からの学びがある。一方で、人間関係の固定化、多様な考えに触れる機会の不足、集団での学び合いの制約が課題。特に12名という規模では、グループ活動や話し合い活動で多様な意見が出にくく、教師が意図的に「ゆさぶり」をかける指導技術が求められる。体育の団体競技や音楽の合奏なども人数の制約を受ける。家庭学習は学年×10分＋10分のルールで、基礎学力の定着を補完している。","e":"複式指導の実態を理解するための基礎資料。教頭として授業観察の視点（直接指導と間接指導の切り替え、ガイド学習の機能度）を持つために必須。学力保障と社会性育成の両立という向井小の核心的課題を把握できる。7校合同学習（OW-056）との関連で、少人数の弱みを補う仕組みの全体像が見える。","tg":["複式学級","ガイド学習","間接指導","少人数","人間関係固定化","学力保障","家庭学習","combined class"],"im":[],"s":"向井小学校学校要覧、尾鷲市教育委員会資料","su":""},{"id":"OW-053","c":"education","a":"owase","t":"学校教育目標「向かい合い、みんなが楽しい学校をみんなで創る」と向かいっ子像","x":"向井小学校の学校教育目標は「向かい合い、みんなが楽しい学校をみんなで創る」であり、副題として「つながる・ひろがる・ふかまる」の3つのキーワードを掲げている。「向かい合い」という言葉には、地名の「向井」と、人と人が正面から向き合うという意味の二重の意味が込められている。めざす子ども像は「向かいっ子」と呼ばれ、3つの柱で構成される。第一に「思いやりのある子ども」——12名という小さな集団だからこそ、一人ひとりの存在が大きく、互いを思いやる心が学校生活の基盤となる。第二に「くじけない子ども」——少人数ゆえに一人ひとりの役割と責任が大きく、困難に直面しても粘り強く取り組む姿勢を育てる。第三に「元気に遊ぶ子ども」——体力テストで握力・持久力に課題が見られる中、休み時間の外遊びや一輪車検定を通じて体力向上を図る。「つながる」は人との関わり、「ひろがる」は学びの広がりと視野の拡大、「ふかまる」は思考の深まりを意味し、極小規模校の制約を乗り越える方向性を示している。","e":"学校運営の根幹となる教育目標の理解。教頭として全教職員と教育目標を共有し、各教育活動が目標のどの柱に位置づくかを整理する視点を持つために必要。保護者や地域への説明、学校だよりの巻頭言、学校評価の観点設定にも直結する。「向かいっ子」という親しみやすい呼称は児童の自己肯定感にもつながる。","tg":["学校教育目標","向かいっ子","教育理念","つながる","ひろがる","ふかまる","思いやり","くじけない","school goal"],"im":[],"s":"向井小学校学校要覧、学校教育目標","su":""},{"id":"OW-054","c":"education","a":"owase","t":"むかいっ子タイム — 毎朝8:00〜8:15の基礎学力反復学習","x":"向井小学校では毎朝8:00から8:15までの15分間を「むかいっ子タイム」として、全校一斉の基礎学力反復学習の時間に充てている。この時間帯は脳が最も活性化する朝の時間を活用し、計算ドリル、漢字練習、音読など基礎的・反復的な学習を行う。15分という短い時間設定は、小学生の集中力の持続時間に合致しており、「短く・毎日・確実に」という反復学習の原則に沿っている。極小規模校では授業時間内に個別の遅れを取り戻す時間が限られるため、この朝の帯時間が基礎学力の底上げに重要な役割を果たす。複式学級では学年によって取り組む内容が異なるが、全員が同じ時間に集中して学習に取り組むことで、学校全体の学びのリズムが作られる。教師は机間指導で個別のつまずきを把握し、授業に活かすことができる。基礎学力の定着に課題がある児童に対しては、むかいっ子タイムで重点的にフォローする運用もされている。名称に「むかいっ子」を冠することで、学校独自の取り組みとしてのアイデンティティが生まれている。","e":"朝の帯学習の具体的な運用例として参考になる。教頭として、むかいっ子タイムの効果測定（CRT等のスコア推移との関連）や改善提案を行う視点が求められる。ICT導入後はChromebookを活用したドリル学習への発展も検討課題。類似の取り組みは他校にもあるが、12名の極小規模校での運用ノウハウは独自の価値がある。","tg":["むかいっ子タイム","朝学習","基礎学力","反復学習","帯時間","計算ドリル","漢字","morning study"],"im":[],"s":"向井小学校学校要覧、日課表","su":""},{"id":"OW-055","c":"education","a":"owase","t":"複式指導の工夫 — ガイド学習と間接指導の質の追求","x":"向井小学校の複式指導では、ガイド学習と間接指導の充実を2本柱として教育の質を確保している。ガイド学習とは、教師が他学年の直接指導に移った際に、児童の中からリーダー（ガイド）を立てて学習の進行を任せる方式である。ガイド役の児童は「めあての確認→自力解決→ペア交流→まとめ」といった学習の流れを司会し、学級全体の学びを進める。この経験は児童のリーダーシップ、説明力、学習の自己調整力を高める教育的効果がある。間接指導の質を上げるための工夫として、ワークシートの事前準備、学習の手引き（進め方カード）の掲示、ICT教材の活用がある。教師は「わたり」と呼ばれる学年間の移動を効率的に行い、間接指導時間を最小限に抑えつつ、どちらの学年も確実に学習が進む授業設計が求められる。年間指導計画では、2つの学年の単元配列を工夫し、共通で扱える内容は合同授業、学年固有の内容は分離授業とする「A・B年度方式」も取り入れている。複式指導は教師の力量が如実に出る指導形態であり、教頭として授業改善を支援する重要な領域である。","e":"複式指導の具体的な技術を理解し、授業観察や指導助言に活かすための資料。教頭として若手教員の複式指導力向上を支援する際、ガイド学習の段階的導入（最初は教師がガイドのモデルを見せる→徐々に児童に任せる）のプロセスを理解しておく必要がある。県の複式教育研究会との連携も教頭の役割。","tg":["複式指導","ガイド学習","間接指導","わたり","A・B年度","合同授業","分離授業","リーダーシップ","combined instruction"],"im":[],"s":"向井小学校学校要覧、三重県複式教育研究会資料","su":""},{"id":"OW-056","c":"education","a":"owase","t":"7校合同修学旅行・体験学習 — 極小規模校の壁を越える連携","x":"向井小学校を含む尾鷲市内の小規模校は、5月に7校合同の修学旅行・体験学習を実施している。12名しかいない学校では、修学旅行の班活動やグループ行動が成立しにくく、旅行会社との交渉も難しい。7校が合同で実施することにより、まとまった人数での集団行動の経験、他校の児童との交流、スケールメリットによるコスト削減が実現する。児童にとっては、普段関わることのない同年代の子どもたちと出会い、多様な考え方や行動様式に触れる貴重な機会となる。人間関係が固定化しがちな極小規模校の最大の弱点を補完する仕組みとして、教育的意義は極めて大きい。事前学習では各校がオンラインで自己紹介やグループ分けを行い、当日までにある程度の関係性を構築する工夫もされている。引率教員にとっても他校の教員と連携する機会であり、指導法の情報交換や悩みの共有ができる場となっている。教頭としては、他校との日程調整、費用負担の公平性、安全管理体制の構築など、実務面での調整力が問われる行事である。","e":"小規模校連携の具体的モデルとして参照価値が高い。教頭として7校の教頭間連絡会の運営、合同行事の企画・調整を担う場面が多い。児童の社会性育成と基礎学力の保障を両立する学校経営において、校外連携は不可欠な手段。合同学習を修学旅行以外の場面（合同授業、合同部活動、オンライン交流）にも拡張する視点を持つことが重要。","tg":["合同修学旅行","7校連携","小規模校連携","社会性","集団行動","他校交流","教頭実務","joint trip"],"im":[],"s":"向井小学校年間行事予定、尾鷲市教育委員会","su":""},{"id":"OW-057","c":"education","a":"owase","t":"年間行事と地域連携 — サツマイモから焼きいも、しめ縄からもちつきへ","x":"向井小学校の年間行事は、地域の自然と暮らしのサイクルに深く根ざしている。春の4月にサツマイモの苗植えから始まり、10月に収穫、そして焼きいも大会へとつながる一連の農業体験は、植物の成長を半年間にわたって観察し、収穫の喜びを実感する学びである。秋の11月にはしめ縄作りを地域の高齢者から学び、12月のもちつき大会で年末の伝統行事を体験する。もちつき大会は地域住民と児童が一緒に杵と臼でもちをつく交流行事であり、高齢者にとっても生きがいとなっている。10月のダイコン種まきも農業体験の一環。9月の運動会と10月の地域運動会は学校と地域を結ぶ最大のイベントで、児童12名では成立しない種目を保護者・地域住民と合同で実施する。8月のデイキャンプ（5・6年）、11月の秋の遠足、12月の老人ホーム訪問など、体験的な学びが年間を通じて計画的に配置されている。11月の共育フェスティバルは学習成果の発表の場であり、保護者や地域住民が児童の成長を確認する機会となっている。これらの行事は単なるイベントではなく、地域の文化継承と世代間交流の装置として機能している。","e":"学校行事と地域連携の年間サイクルを把握するための必読資料。教頭として各行事の準備・調整・安全管理を担うため、年間スケジュールの全体像が必要。特にサツマイモ→焼きいも、しめ縄→もちつきという「つながり」のある行事構成は、教育課程への位置づけ（生活科・総合的な学習の時間）を明確にしておく必要がある。","tg":["年間行事","サツマイモ","しめ縄","もちつき","地域連携","農業体験","運動会","共育フェスティバル","annual events"],"im":[],"s":"向井小学校年間行事予定表","su":""},{"id":"OW-058","c":"disaster","a":"mukai","t":"向井地区の防災教育と津波避難 — 南海トラフに備える極小規模校","x":"向井小学校は尾鷲市南部の高台（標高約45.7m、校舎3階で約53.5m）に位置し、南海トラフ巨大地震における津波避難場所に指定されている。尾鷲市は南海トラフ地震で最大クラスの津波が想定される地域であり、地震発生から津波第一波到達まで最短約3分という極めて短い猶予時間が想定されている。向井地区の津波避難施設としては、向井小学校のほか、向井コミュニティーセンター（標高12.6m）、観音寺（標高26.4m）、向井ふれあい会館がある。学校では11月に防災体験学習を実施し、津波避難訓練を含む実践的な防災教育を行っている。7月と8月にはPTA・地域と連携した安全教室やAED講習も行われる。12名の児童全員の避難を迅速に完了させるためには、児童一人ひとりが自分で判断して行動できる「自助」の力を育てることが不可欠。複式学級では高学年が低学年の避難を助ける「共助」の訓練も重要となる。教頭としては、避難計画の策定・更新、地域の自主防災組織との連携、保護者への引き渡し訓練の運営が重要な職務。尾鷲市は平成26年11月に津波避難計画を、平成27年4月に津波ハザードマップを策定しており、学校の防災計画はこれらと整合性を取る必要がある。","e":"学校安全計画・防災計画の策定に不可欠な資料。教頭として防災主任と連携し、年間の避難訓練計画を立てる際の基礎データ。「3分で津波到達」という切迫した状況を児童にどう伝え、パニックにならずに行動できる力を育てるかは、防災教育の核心。地域の避難場所の標高データは保護者説明会でも使う重要情報。","tg":["防災教育","津波避難","南海トラフ","避難場所","標高","3分","AED","避難訓練","disaster prevention"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"尾鷲市津波ハザードマップ、尾鷲市津波避難計画、尾鷲市公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-059","c":"education","a":"owase","t":"人権教育の推進 — 10分人権とR&C人権フォーラム","x":"向井小学校では人権教育を教育活動全体の基盤に位置づけ、毎月「10分人権」を実施している。10分人権とは、全校または学級単位で10分間の短い人権学習を行う取り組みで、いじめ防止、多様性の尊重、思いやりの心など、テーマを月替わりで設定する。短時間であることが継続のポイントであり、「特別な時間」ではなく「日常の一部」として人権意識を醸成する。12名という小さな集団では、一人が排除されると逃げ場がなく、人間関係のトラブルが学校生活全体に影響する。だからこそ、予防的・開発的な人権教育が極めて重要となる。6月にはR&C人権フォーラム（Rights & Children）が開催され、尾鷲市内の児童生徒が集まって人権について考え、意見を交換する。向井小の児童にとっては、他校の児童と人権について対話する貴重な機会となる。1月にも人権フォーラムへの参加が予定されており、年間を通じた人権教育のサイクルが構築されている。教頭としては、人権教育の年間計画の策定支援、校内研修での人権感覚の向上、いじめの早期発見・対応体制の整備が重要な役割。","e":"学校の人権教育体制を理解するための資料。教頭として人権教育主担当と連携し、10分人権の内容を充実させる視点が必要。極小規模校での人間関係トラブルは深刻化しやすいため、予防的アプローチの重要性を教職員と共有する際に使える。R&Cフォーラムの事前・事後指導の充実も課題。","tg":["人権教育","10分人権","R&Cフォーラム","いじめ防止","多様性","予防的教育","フォーラム","human rights"],"im":[],"s":"向井小学校年間行事予定、尾鷲市人権教育推進計画","su":""},{"id":"OW-060","c":"education","a":"owase","t":"学校運営協議会（コミュニティスクール）— 地域と学校の協働","x":"向井小学校は学校運営協議会（コミュニティスクール）を設置し、地域住民が学校運営に参画する仕組みを構築している。学校運営協議会は6月に第1回が開催され、校長が学校運営の基本方針を説明し、委員の承認を得る。委員は地域の有識者、保護者代表、地域団体の代表などで構成され、学校運営への意見表明、教育活動への協力、地域資源の活用提案などを行う。極小規模校においてコミュニティスクールの意義は特に大きい。12名の児童に対して、学校だけでは提供できない多様な学びの機会を、地域の人材・資源を活用して実現できる。しめ縄作り（11月）やもちつき大会（12月）で指導してくれる地域の高齢者、サツマイモ畑を提供してくれる農家、防災体験学習に協力してくれる消防団員など、地域の「先生」が学校教育を支えている。学校運営協議会は、こうした地域連携を個人的な善意ではなく組織的・継続的な仕組みとして担保する装置である。教頭は学校運営協議会の事務局的な役割を担い、会議の準備・運営・議事録作成、委員との日常的な連絡調整を行う。向井地区の過疎化が進む中、学校と地域が互いに支え合う関係の構築は、学校存続にも直結する。","e":"教頭の最重要業務の一つである学校運営協議会の運営を理解するための資料。会議の年間スケジュール、議題の設定、委員への事前連絡、当日の進行、議事録の作成と報告など、実務面の全体像を把握できる。地域連携を「仕組み」として回すことの重要性は、異動後も応用できる汎用的な知見。","tg":["コミュニティスクール","学校運営協議会","地域連携","地域人材","教頭実務","過疎化","学校存続","community school"],"im":[],"s":"尾鷲市教育委員会コミュニティスクール資料、向井小学校学校運営協議会規則","su":""},{"id":"OW-061","c":"education","a":"owase","t":"ICT教育とChromebook導入 — 2026年度の転換点","x":"向井小学校は2026年度からChromebook 1人1台体制が本格稼働し、ICT教育の大きな転換点を迎える。12名の極小規模校でのICT活用には、大規模校とは異なる独自の可能性と課題がある。可能性として、複式学級の間接指導時間にデジタルドリルやAI型教材を活用することで、教師不在時の学びの質を飛躍的に向上させられる。児童一人ひとりの学習進度に合わせた個別最適な学びも実現しやすい。他校とのオンライン交流授業を通じて、人間関係の固定化という極小規模校の最大の弱点を補完できる可能性もある。課題としては、校内のICT支援体制が限られること、教員のICTスキルに差があること、ネットワーク環境の安定性がある。12名全員が同時にオンラインで作業しても問題ないネットワーク帯域の確保が必要。また、児童の情報リテラシー教育（ネットマナー、情報セキュリティ）も同時に進める必要がある。教頭としては、ICT活用推進計画の策定支援、教員研修の企画、GIGAスクール構想の予算・機器管理、故障・トラブル時の対応体制構築が求められる。向井小のような極小規模校こそ、ICTの恩恵を最大限に受けられるポテンシャルがある。","e":"2026年度の重点課題であるICT導入を理解するための必読資料。教頭としてICT推進リーダーを支え、校内研修を企画する際の方向性が明確になる。FriendlyWorkshopの教育アプリを実際に向井小で試用する構想との接点もここにある。複式指導×ICTの可能性は全国の極小規模校にも応用できるテーマ。","tg":["ICT教育","Chromebook","GIGAスクール","個別最適","オンライン交流","複式×ICT","デジタルドリル","情報リテラシー","ict"],"im":[],"s":"尾鷲市教育委員会GIGAスクール構想資料、向井小学校ICT活用計画","su":""},{"id":"OW-062","c":"geography","a":"mukai","t":"向井地区の地理と暮らし — 海と山に挟まれた尾鷲南部の集落","x":"向井地区は尾鷲市の南部に位置し、南は大紀町（旧紀勢町）と接する集落である。東に熊野灘、西に紀伊山地の山々という、海と山に挟まれた典型的なリアス式海岸の集落で、平坦地が極めて少ない。国道42号線が地区を南北に貫き、尾鷲市中心部へのアクセスは車で約10分。JR紀勢本線の大曽根浦駅が最寄りだが、地区の中心部からは距離がある。向井地区は大字向井として〒519-3625に属し、住宅は海岸沿いの低地と山の斜面に点在している。集落の規模は小さく、漁業と林業を基幹産業としてきたが、過疎化・高齢化が急速に進行し、現在は高齢者世帯が多数を占める。日常の買い物は尾鷲市中心部まで出る必要があり、車が生活の必需品。公共交通機関は限られ、バスの便数も少ない。自然環境は豊かで、森林・海岸・河川が身近にあり、四季折々の自然を感じながら暮らせる環境。尾鷲特有の多雨気候により植生は豊かで、椿（ヤブツバキ）が自生する。地区内には向井遺跡があり、縄文時代後期初頭の土器や石器が約1,500点出土しており、数千年前からこの地に人が暮らしていたことを示している。","e":"教頭として赴任する地域の基本的な地理情報。通学路の安全管理、保護者の通勤事情、地域行事への参加動線を把握するための基礎データ。3年生社会科「わたしたちのまち」で向井地区の地図を作る活動にも使える。向井遺跡の出土品は歴史学習の地域教材として活用可能。","tg":["向井地区","地理","リアス式海岸","国道42号","大曽根浦駅","過疎化","向井遺跡","縄文","geography"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"尾鷲市公式サイト、NAVITIME住所情報、向井遺跡出土品解説（尾鷲市文化財）","su":"https://www.city.owase.lg.jp/"},{"id":"OW-063","c":"industry","a":"mukai","t":"向井のまき網漁と漁業 — 熊野灘の恵みを生きる海の集落","x":"向井地区は尾鷲市の漁業集落の一つであり、まき網漁を中心とした漁業が基幹産業として営まれてきた。まき網漁（巻き網漁）とは、魚群を大きな網で取り囲んで一網打尽に漁獲する方法で、イワシ、アジ、サバ、ブリなどの回遊魚を主な対象とする。熊野灘は黒潮の影響で200種を超える豊富な魚種に恵まれ、尾鷲市全体で10の漁港がある。向井地区の漁業者は三重外湾漁業協同組合（尾鷲事業所）に所属し、漁業権の管理や水産物の出荷を行っている。かつては多くの家庭が漁業に従事していたが、過疎化と高齢化により漁業従事者は大幅に減少している。それでも海は地域の暮らしの中心にあり、児童は日常的に漁船や魚を目にし、海の匂いの中で育つ。尾鷲市は「おわせお魚いちば おとと」や「尾鷲イタダキ市」で新鮮な魚介の直売を行っており、地域の漁業を身近に感じる機会がある。林業もまた基幹産業であり、尾鷲ヒノキのブランドで知られる良質な木材を産出してきた。海と山の両方から恵みを得る暮らしは、向井地区の人々のアイデンティティの根幹をなしている。","e":"5年生社会科「水産業のさかんな地域」を地元素材で学ぶ絶好の教材。実際に漁港を見学し、漁師さんの話を聞く校外学習と組み合わせれば生きた学びになる。まき網漁の仕組みは図解すると理解しやすい。漁業従事者の減少は過疎化の学習にもつながる。家庭科の食育とも関連づけられる。","tg":["まき網漁","漁業","熊野灘","黒潮","漁協","過疎化","水産業","尾鷲ヒノキ","林業","fishing"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_009_fishing_town_stroll.jpg","t":"Fishing Town Stroll","id":"WEB-173","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_024_Owase_Kuki_Fishing_Port_ac.jpg","t":"Owase Kuki Fishing Port ac (2).jpg","id":"WEB-310","u":"https://commons.wikimedia.org/wiki/File:Owase_Kuki_Fishing_Port_ac_(2).jpg","li":"CC BY-SA 4.0","loc":"尾鷲市九鬼町"}],"s":"尾鷲市公式サイト水産振興係、三重外湾漁業協同組合、浜プラン.jp","su":"https://www.city.owase.lg.jp/"},{"id":"OW-064","c":"culture","a":"mukai","t":"向井神社と大曽根定例神事 — 地域の信仰と伝統行事の継承","x":"向井地区には向井神社があり、地域の氏神として住民の信仰の中心となっている。神社は集落の歴史とともにあり、年間を通じて様々な祭事や神事が行われる。大曽根定例神事は向井・大曽根浦地区に伝わる伝統的な神事で、地域の安全と豊漁・豊穣を祈願する。大曽根浦は歴史的に尾鷲神社との結びつきが強く、大曽根浦方文書（尾鷲市指定文化財）には江戸時代の宝永3年（1706年）以降の土地制度、課税、財政、行政に関する記録が残されており、特に漁業に関する記述が豊富である。これらの文書は向井・大曽根浦地区の歴史を知る一級資料である。また、向井地区の児童は尾鷲市を代表する伝統行事「ヤーヤ祭」にも参加する。ヤーヤ祭は毎年2月に尾鷲神社で行われる荒々しい祭りで、「ヤーヤー」の掛け声とともに男衆がぶつかり合う。児童がこうした地域の祭りに参加することは、地域への愛着と伝統文化の継承において大きな意味を持つ。過疎化により担い手が減少する中、学校教育を通じて子どもたちに地域の伝統を伝えることの重要性はますます高まっている。","e":"地域の伝統文化を学ぶ教材として、総合的な学習の時間や社会科で活用できる。しめ縄作り（11月）やヤーヤ祭への参加は、学校行事としても地域文化継承の機会。大曽根浦方文書は6年生歴史学習で「地域の歴史」を扱う際の一次資料となりうる。教頭として地域の祭事・神事への学校としての関わり方を整理しておく必要がある。","tg":["向井神社","大曽根神事","ヤーヤ祭","伝統行事","大曽根浦方文書","文化財","信仰","地域文化","shrine"],"im":[],"s":"尾鷲市文化財ページ「大曽根浦方文書」、尾鷲神社公式サイト、尾鷲観光物産協会","su":""},{"id":"OW-065","c":"culture","a":"mukai","t":"向井工房と地域のものづくり — 手仕事の伝統を次世代へ","x":"向井工房は向井地区に根ざしたものづくりの拠点であり、地域の伝統的な手仕事や工芸品の制作・伝承の場として機能している。尾鷲市は総面積の約90%が山林に覆われ、良質な木材（尾鷲ヒノキ）を産出してきた歴史があり、木工や竹細工をはじめとする手仕事の文化が脈々と受け継がれている。向井地区のしめ縄作り（11月実施）もこうしたものづくり文化の一環であり、稲わらを手で綯ってしめ縄を作る技術は、地域の高齢者が児童に直接指導する形で伝承されている。向井地区では、虎の尾（とらのお）と呼ばれる唐辛子の一種がこの地域でのみ栽培されている固有の農産物としても知られる。地域のものづくりは、単なる技術の伝達ではなく、世代間の対話と関係構築の場でもある。児童がお年寄りの手の動きを見て真似し、失敗しながら覚えていく過程は、学校の教室では得られない体験学習そのもの。過疎化が進む中、こうしたものづくり文化の担い手は減少しているが、学校行事との連携により細い糸でつながっている。教頭としては、地域のものづくり文化を教育活動にどう位置づけ、持続可能な連携の仕組みをつくるかが問われる。","e":"図工や生活科、総合的な学習の時間でのものづくり体験学習の企画に活用。地域の職人・高齢者をゲストティーチャーとして招く際の背景理解に。しめ縄作り（11月）の事前学習として、なぜしめ縄を作るのか、材料はどこから来るのかを学ぶ教材にもなる。虎の尾唐辛子は「地域固有の農産物」として食育教材にも使える。","tg":["向井工房","ものづくり","しめ縄","尾鷲ヒノキ","木工","虎の尾","伝統工芸","世代間交流","craft"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_011_magewappa.jpg","t":"曲げわっぱ弁当箱","id":"WEB-361","u":"https://commons.wikimedia.org/wiki/File:Magewappa_2024_Mar_28_07-24PM.jpeg","li":"CC BY 4.0","loc":""}],"s":"尾鷲市移住ポータルサイト、尾鷲観光物産協会、向井小学校年間行事","su":""},{"id":"OW-066","c":"society","a":"mukai","t":"向井地区の過疎化と未来 — 児童12名の学校が映す地域の行方","x":"向井地区は尾鷲市全体と同様に、過疎化・高齢化が急速に進行している地域である。尾鷲市の人口は令和2年国勢調査で16,252人だが、年々減少を続けており、向井地区も例外ではない。向井小学校の全校児童12名という数字は、地域の人口動態を如実に反映している。1年生と4年生が0名という事実は、該当年齢の子どもが地区に一人もいないことを意味する。この傾向が続けば、学校の存続自体が危ぶまれる。尾鷲市は平成19年8月に小中学校配置計画を策定し、九鬼小学校・三木小学校・三木里小学校・九鬼中学校の統合を実施した実績がある。向井小が統合対象になる可能性は常に意識せざるを得ない。学校がなくなれば、子育て世代の流出がさらに加速し、地域の衰退は不可逆的になる。一方で、移住促進や地域おこしの取り組みも模索されており、尾鷲市は移住ポータルサイトを通じて情報発信を行っている。コミュニティスクール（学校運営協議会）の設置は、学校を地域存続の核として位置づける試みでもある。教頭としては、学校の魅力を発信し、「この学校だからこそできる教育」を示し続けることが、学校存続のための最大の戦略となる。ICT導入による先進的な教育、12名だからこその手厚い個別指導、豊かな自然と地域連携——これらを総合した教育の価値を、数字では測れない「質」として社会に発信していくことが求められる。","e":"学校経営の中長期ビジョンを考える際の現状認識資料。教頭として教育委員会との学校配置計画に関する議論に備えるために必須。「学校の存在意義」を言語化し、保護者・地域・教育委員会に伝えるための根拠となるデータと視点が含まれている。学校存続の議論は感情論になりやすいが、教育の質で勝負する戦略を持つことが重要。","tg":["過疎化","高齢化","学校存続","統廃合","人口減少","移住","コミュニティスクール","学校配置計画","depopulation"],"im":[],"s":"尾鷲市人口統計、尾鷲市小中学校配置計画（H19）、尾鷲市移住ポータルサイト","su":""},{"id":"OW-067","c":"energy","a":"owase","t":"尾鷲市マイクロ水力発電の可能性 — 日本一の雨を電力に変える構想","x":"尾鷲市は年間降水量約4,000mm（全国第4位）、市域の90%が急峻な山林という地形を持ち、小水力発電のポテンシャルが極めて高い。石徹白（いとしろ、岐阜県郡上市）の人口270人の集落がマイクロ水力発電4基で電力自給率230%を達成した先行事例があり、尾鷲は石徹白の1.6倍の降水量を誇る。尾鷲市には高さ35m・貯水196万㎥のクチスボダムという既存インフラもある。100kW級1基の場合、年間発電量53〜61万kWh、FIT買取価格34円/kWh（据え置き）で年間売電収入1,800〜2,100万円。初期投資2〜3億円に対し補助金50〜75%で地元実質負担6,000万〜1億円、約3〜5年で回収可能。設備耐用年数50〜70年、50年間純利益2〜4億円の試算。2023年にバイオマス発電が資材高騰で頓挫しており、おわせSEAモデルのエネルギー部門の代替案として小水力が提案されている。燃料費ゼロ・人口減の影響なし（全量売電）・IoT遠隔監視で運転員最小限という利点がバイオマスとの決定的な差。","e":"5年理科『電流と電磁石』や6年理科『発電と電気の利用』と直結する地元教材。『尾鷲の雨は厄介者ではなく宝物』という視点転換は総合学習のテーマになる。石徹白の事例は社会科の地域活性化学習にも使える。SDGs目標7（エネルギー）の地元事例として全校朝会で語れる。","tg":["小水力発電","マイクロハイドロ","再生可能エネルギー","FIT","尾鷲の雨","石徹白","おわせSEAモデル","地域活性化"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_008_owase_mita_thermal.jpg","t":"Owase Mita Thermal Power Station","id":"WEB-108","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲三田火力発電所"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_012_owase_mita_thermal_2.jpg","t":"Owase Mita Thermal Power Plant","id":"WEB-112","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲三田火力発電所"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_031_owase_bay_mita.jpg","t":"Owase Bay and Mita Power Station","id":"WEB-131","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲湾"}],"s":"尾鷲市マイクロ水力発電導入検討レポート（2026-03-20）","su":""},{"id":"OW-068","c":"energy","a":"mukai","t":"尾鷲市内の小水力発電候補地5地区 — 賀田・古川が最有望","x":"尾鷲市内で小水力発電の候補地として5地区が評価されている。最有望は賀田地区の古川で、県の水位観測所『銀杏』が設置済みで流量実測データが存在する稀有な地点。急峻地形と簡易水道を併設でき、河川直接利用方式が推奨される（評価★★★★★）。三木浦は八十川＋沢を使う水道管路型＋沢方式で独立簡易水道あり・急峻地形で評価★★★☆☆。向井地区は市街上水道系統の余剰水圧を利用する水道管路型で、熊野古道センター付近が候補（評価★★★☆☆）。大曽根は小河川のみで落差が小さく評価★★☆☆☆。又口川は大正9年設置の旧発電所（145kW）が廃止済みで同地点に新設可能（要調査）。マイクロ水力の事業性検討で最も重要な『流量の実測値』が既にある賀田・古川が第一候補。向井地区は水道管路の余剰水圧活用で規模は小さいが導入障壁も低い。","e":"社会科の地域学習で『自分たちの地区にも発電の可能性がある』と気づかせる教材。向井地区が候補に含まれている点は、向井小の子どもたちにとって身近な探究テーマになる。賀田の古川は輪内中学校区でもあり、中学校との連携学習にも展開可能。又口川の大正時代の旧発電所は歴史学習にもつながる。","tg":["小水力発電","候補地","賀田","向井","古川","又口川","水道管路型","流量データ"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_020_Kata_Kotobukiza_2021-07_ac.jpg","t":"Kata Kotobukiza 2021-07 ac.jpg","id":"WEB-306","u":"https://commons.wikimedia.org/wiki/File:Kata_Kotobukiza_2021-07_ac.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市賀田町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_026_Kata_townscape_before_1945.jpg","t":"Kata townscape before 1945.jpg","id":"WEB-312","u":"https://commons.wikimedia.org/wiki/File:Kata_townscape_before_1945.jpg","li":"Public domain","loc":"尾鷲市賀田町"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_045_Kata_Community_Center_2021-07_ac.jpg","t":"Kata Community Center 2021-07 ac.jpg","id":"WEB-331","u":"https://commons.wikimedia.org/wiki/File:Kata_Community_Center_2021-07_ac.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市賀田町"}],"s":"尾鷲市マイクロ水力発電導入検討レポート（2026-03-20）","su":""},{"id":"OW-069","c":"industry","a":"owase","t":"尾鷲は釣りの聖地 — チヌ・トンジギ・船釣り・筏釣りの一大拠点","x":"尾鷲市はリアス式海岸と熊野灘の豊かな漁場を活かした釣りの聖地として、全国の釣り人から知られている。特にチヌ（クロダイ）の筏釣り・磯釣りが盛んで、毎年「がまかつG杯チヌ尾鷲大会」が開催され、全国から参加者が集まる。割亀のハナレなど一級磯が点在し、潮の流れ次第で釣果が大きく変わる奥深さがある。トンジギ（トンボジギング＝ビンチョウマグロのジギング）も人気で、引本港からのレンタルボートで出船する釣り人も多い。アジ・ブリなど回遊魚も豊富。筏釣り、磯釣り、船釣り、岸壁からのライトゲームまで多彩な釣りスタイルに対応でき、初心者からベテランまで楽しめる。Instagramの#尾鷲投稿の過半数が釣り関連であることからも、尾鷲と釣りの結びつきの強さがわかる。観光資源としても漁業振興としても、釣りは尾鷲の重要な柱の一つ。","e":"5年社会科『水産業のさかんな地域』で地元の漁場・魚種を教材化できる。釣り大会は地域の観光資源として総合学習のテーマにもなる。引本港・早田・九鬼など地区ごとの漁業の違いを調べ学習に。保護者に釣り関係者が多い可能性があり、ゲストティーチャーの候補にもなる。","tg":["釣り","チヌ","トンジギ","筏釣り","磯釣り","引本港","がまかつG杯","熊野灘","観光"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_014_kumanonada.jpg","t":"熊野灘","id":"WEB-364","u":"https://commons.wikimedia.org/wiki/File:熊野灘_-_panoramio_(1).jpg","li":"CC BY 3.0","loc":""}],"s":"Instagram #尾鷲 投稿分析（2026-03-22取得）","su":"https://www.instagram.com/explore/tags/尾鷲/"},{"id":"OW-070","c":"nature","a":"owase","t":"オハイブルー — 九鬼地区の秘境、地域で育てる宝物","x":"オハイは尾鷲市九鬼地区にある断崖絶壁の海岸で、透明度の高いエメラルドブルーの海が「オハイブルー」と呼ばれ、近年SNSで急速に知名度が上がっている秘境スポット。九鬼漁港から片道約40分の山道を歩いてたどり着く。曇りの日でもオハイブルーの美しさは健在で、地元では「地域で育てる地域の宝物」として大切にされている。アクセスの不便さが逆に秘境感を保っており、観光客の急増による環境破壊を防ぐため地元住民が自主的にルール整備やガイド活動を行っている。熊野古道とセットで訪れるハイカーも多く、尾鷲の新しい観光資源として注目されている。Instagram上では尾鷲関連投稿の中でも特に写真映えする人気コンテンツ。","e":"総合学習で「地域の宝物を守る」テーマの中心教材。観光と環境保全のバランスを考える探究活動に最適。3年社会科『地域の人々の仕事』で九鬼地区の観光ガイド活動を取り上げられる。写真の美しさは全校朝会で見せるだけでインパクトがある。「秘境を守るルールづくり」は道徳教材にもなる。","tg":["オハイ","オハイブルー","九鬼","秘境","観光","環境保全","SNS映え","熊野古道"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_012_ohai.jpg","t":"エメラルドオハイブルー","id":"WEB-179","u":"https://photo.mie-eetoko.com/photo/2351","li":"三重フォトギャラリー（無料・商用OK）","loc":"オハイ"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_013_ohai.jpg","t":"Ohai","id":"WEB-182","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町オハイ"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_014_ohai.jpg","t":"Ohai","id":"WEB-183","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町オハイ"}],"s":"Instagram #尾鷲 投稿分析（2026-03-22取得）","su":"https://www.instagram.com/explore/tags/尾鷲/"},{"id":"OW-071","c":"culture","a":"owase","t":"早田ブリまつり — 春ブリを堪能する漁師町の祭り","x":"早田（はいだ）ブリまつりは尾鷲市早田地区で毎年春に開催される地域イベント。早田は古くからブリの定置網漁が盛んな漁村で、春に水揚げされる脂の乗った春ブリを地元価格で堪能できる。ブリの刺身・照り焼き・ブリ大根などが振る舞われ、市内外から多くの来場者が訪れる。同時期に隣接の三木浦ではマルシェ（スパイスカレー等）も開催され、はしごして楽しむ人も多い。熊野古道センターでの尾鷲林業企画展と合わせて、食・文化・歴史を一日で体験できる尾鷲の春の風物詩となっている。漁師町の活気と地域の誇りが感じられるイベントで、過疎化が進む中でも地域の結束力を示す場になっている。","e":"3年社会科『地域の人々の仕事』で漁業と地域イベントの関係を学ぶ教材。5年社会科の水産業学習とも連携可能。総合学習で「地域の祭りを調べよう」のフィールドワーク先に。実際に児童と訪れて地域の人と交流する体験学習にも。学校だよりで紹介すれば保護者との共通話題になる。","tg":["早田","ブリまつり","定置網","春ブリ","三木浦マルシェ","地域イベント","漁村","食文化"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/buri_teichami_001.jpg","t":"九鬼のブリ定置網（歴史写真）","id":"WEB-393","u":"https://commons.wikimedia.org/wiki/File:Kuki_Yellowtail_Set_Net.jpg","li":"Public domain","loc":""}],"s":"Instagram #尾鷲 投稿分析（2026-03-22取得）","su":"https://www.instagram.com/explore/tags/尾鷲/"},{"id":"OW-072","c":"education","a":"owase","t":"尾鷲市教育ビジョン — 令和5〜14年度の10年計画","x":"尾鷲市教育ビジョンは令和5年（2023年）4月に尾鷲市教育委員会が策定した10年間の教育計画である。基本理念は「未来を拓き、次代のおわせを担う人財の育成」で、「人材」の「材」を「財（宝）」と表記することで、人を地域の貴重な資源として位置づけている。第7次尾鷲市総合計画の将来像「住みたいまち 住み続けたいまち おわせ」の実現を目指し、基本目標「郷土を愛し、学び・伝えるまちを創る」の達成に向けて策定された。5つの基本方針として（1）次代を切り拓く人財の育成（2）ふるさとへの誇りと愛着を持ち、地域の発展を担う人財の育成（3）誰一人取り残さない一人ひとりに寄り添った教育の推進（4）地域総がかりの教育の推進（5）誰もがいつまでも健康で、学び、活躍し続けることができる環境づくりを掲げる。SDGsの概念も取り入れ、持続可能な社会の実現と誰一人取り残さない教育の構築を目指す。施策の3つの重点は「子どもの豊かな育ちを支える就学前教育の推進」「未来を拓く学校教育の推進」「人生100年時代を見据えた生涯教育・スポーツ・文化振興の推進」である。前計画は平成25年度〜令和4年度の10年間で、国の教育振興基本計画と三重県教育ビジョンを参考に策定されている。成果指標として就学前教育では「小学校体験機会を年6回から12回へ倍増」、関係機関との情報共有は「年55回から60回へ増加」等の数値目標を設定している。","e":"教頭として学校経営方針を立てる際の上位計画として必ず参照する。校長講話や学校便りで「市の教育ビジョン」に言及する際の根拠資料。保護者会で「なぜこの取り組みをするのか」を説明する際に基本方針を引用できる。学校評価の項目設定にも活用可能。SDGsとの関連づけは総合学習の設計にも使える。","tg":["教育ビジョン","基本理念","人財","SDGs","施策体系","10年計画","教育委員会","education_policy"],"im":[],"s":"尾鷲市教育ビジョン（令和5年4月、尾鷲市教育委員会）PDF","su":""},{"id":"OW-073","c":"education","a":"mukai","t":"向井小学校の総合学習 — 地域素材を活かした探究活動","x":"向井小学校の総合的な学習の時間・生活科では、地域の特色を活かした体験活動を重視している。地域の学習素材は6カテゴリに分類されている。【自然】森・海・川、【産業】林業・漁業（まき網）、【施設】福祉・福祉館、【地域交流】地域のお年寄りとの交流、【文化】地域の向井工房との交流、【環境】EM菌発酵・ぼかし肥を使った堆肥づくり、生ゴミたい肥を使った畑・地域のゴミ拾い。総合学習テーマは「地域大好き・がんばい大好き・はればれ大好き」で、1年生は「学校だいすき・なかよしいっぱい」、2年生は「みんな生き物大好き・もっと知りたいまち」、3-4年生は「サツマイモを育てよう！・まちたんけん大作戦」、5-6年生は「ダイコンを育てよう！・しめなわ作りにチャレンジしよう！・地域の行事を知ろう」というテーマ設定になっている。年間行事にはサツマイモ苗植え（4月）→サツマイモ掘り・ダイコン種まき（10月）→焼きいも大会（10月）→しめ縄作り（11月）→もちつき大会（12月）という農業体験サイクルが組み込まれている。12名の極小規模校だからこそ、一人ひとりが主体的に関わる体験が可能になっている。","e":"赴任先の向井小学校で総合学習の年間計画を立てる際の基盤資料。既存の地域素材一覧は新任教員への引き継ぎ資料として活用できる。サツマイモ→焼きいも→しめ縄→もちつきの年間サイクルは、地域の方々との連携計画にも直結する。3年生社会科「地域の農業」との横断も可能。","tg":["総合学習","向井小学校","地域素材","サツマイモ","しめ縄","EM菌","体験学習","mukai_school"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_003_owase_fish_market_1.jpg","t":"Owase Fish Market 1","id":"WEB-103","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_004_owase_fish_market_2.jpg","t":"Owase Fish Market 2","id":"WEB-104","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_005_owase_fish_market_3.jpg","t":"Owase Fish Market 3","id":"WEB-105","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"R7向井小学校経営（p.18-20）総合的な学習の時間・生活科","su":""},{"id":"OW-074","c":"culture","a":"mukai","t":"向井地区の生活・文化学習素材 — 季節行事から民話・方言まで","x":"向井小学校の学校経営資料には、向井地区の生活・文化に関する学習素材が詳細に記録されている。【季節の行事】正月・大晦日・新年・節句・初詣・おせち・お盆・盆踊り・大掃除、桃の節句のお雛様の飾り方、端午の節句のこいのぼり・ちまき。【伝承遊び】お手玉・おはじき・べーごま・竹とんぼ・紙玉鉄砲・竹馬・かっぱん（めんこ）。これらは低学年が地域のお年寄りとの交流で体験する。【祭り】中学年が祭りの由来を調べる活動として、朱印の神事、向井神社のお号、大曽根定例神事、ヤーヤ祭の由来がテーマとなる。【生活の変化】中学年で今と昔の生活や道具の変化を調べる。【向井の工芸品】尾鷲わっぱの「ぬし鉢」が全学年の学習素材として位置づけられている。【食べ物】高学年がサツマイモ・ダイコンを使った郷土料理づくりに取り組む。【その他】高学年が民話・方言の調査に取り組む。この一覧は単なる素材リストではなく、学年・活動形態との対応まで設計された「地域の教育資源マップ」となっている。","e":"総合学習や生活科の単元開発に直接使える学習素材カタログ。「かっぱん（めんこ）」「べーごま」等の伝承遊びは異世代交流の具体的なプログラムになる。向井神社や大曽根定例神事は3年生社会科「地域の昔」にも活用できる。民話・方言調査は国語科との横断学習に最適。","tg":["伝承遊び","季節行事","向井神社","尾鷲わっぱ","民話","方言","郷土料理","mukai_culture"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_011_magewappa.jpg","t":"曲げわっぱ弁当箱","id":"WEB-361","u":"https://commons.wikimedia.org/wiki/File:Magewappa_2024_Mar_28_07-24PM.jpeg","li":"CC BY 4.0","loc":""}],"s":"R7向井小学校経営（p.19）生活・文化の学習素材","su":""},{"id":"OW-075","c":"education","a":"mukai","t":"向井小学校の情報教育 — SKYMENU・Scratch・1人1台端末","x":"向井小学校では1人1台端末（タブレット）を活用した情報教育を体系的に実施している。使用ソフトウェアはEライブラリ、SKYMENU Cloud、Microsoft Teamsが中心で、プログラミング学習にはScratch、Viscuit等のビジュアルプログラミングツールを使用する。学年段階別の目標は明確に設定されている。【低学年】コンピュータに慣れる段階。タブレットの起動・終了、クリック・ダブルクリック・ドラッグ等の基本操作、Think Think!による操作練習、健康面での注意。【中学年】コンピュータに慣れ親しむ段階。学習課題の解決やコミュニケーションの道具として利用、プライバシー・著作権の基本用語理解、ブラウザの検索操作、ローマ字入力・切り取り・コピー・貼り付け、プログラミング学習の開始。【高学年】コンピュータを活用する段階。情報モラルの実践、個人情報の扱い、ネットワーク上のルール理解、有害情報の存在理解と選択力、著作権・肖像権への配慮。全校児童12名という規模であるため、個別指導が手厚く行える環境にある。","e":"教頭として情報教育の推進状況を把握する基礎資料。ICT支援員との連携計画や校内研修の設計に活用。保護者会で「学校でどんなICT活動をしているか」を説明する際の根拠。SKYMENU Cloudの活用は他校との合同学習（オンライン交流）にも展開可能。","tg":["情報教育","ICT","SKYMENU","Scratch","タブレット","プログラミング","1人1台端末","mukai_ict"],"im":[],"s":"R7向井小学校経営（p.22-23）情報教育","su":""},{"id":"OW-076","c":"education","a":"mukai","t":"向井小学校の防災教育 — 津波から自らの命を守る年間計画","x":"向井小学校の防災教育は、地震・津波災害から「自らの命を守ることができる知識と行動力」を身につけさせることを最重要目標としている。年間を通じて月別の避難訓練と防災学習を実施する。4月：避難訓練（学校で休み時間に大地震が起こったら）、5月：防火学習、6月：交通安全教室（帰り道で大地震が起こったら）、7月：水の事故に備え、9月：着衣泳教室・防災の日（9/1）学習、10月：防災体験学習（家にいるとき大地震が起こったら）、11月：外出時の地震対応、12月：予告なし避難訓練（ひとりのときに大地震が起こったら）、1月：三重大学との連携避難訓練（避難所に行かなければならなくなったら）、2月：地震の基礎知識、3月：防火学習。「防災ノート」と「津波防災教育のための手引き：尾鷲市」を教材として活用する。12月の予告なし訓練と1月の三重大学連携訓練は特に実践的な内容で、成果指標として「自力避難率100%」を掲げている。海に近い向井地区の立地を考えると、この防災教育は児童の命に直結する最重要カリキュラムである。","e":"教頭として避難訓練の年間計画を策定する際の基盤資料。月別テーマの段階的設計（学校→帰り道→家→外出先→ひとりのとき→避難所）は、子どもの生活場面を網羅しており参考になる。保護者・地域への防災教育発信にも活用可能。三重大学との連携は学校評価の「外部連携」項目にも該当する。","tg":["防災教育","津波","避難訓練","防災ノート","自力避難","三重大学","向井小学校","mukai_disaster"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.32）防災教育","su":""},{"id":"OW-077","c":"education","a":"mukai","t":"向井小学校の環境教育 — 校区クリーン作戦とEM菌堆肥","x":"向井小学校の環境教育は「身近なものから出発し、人間生活と自然の関係に目を向け、環境を多面的に見つめ自分の生き方を考える」ことを目標としている。全校活動として1学期に「校区クリーン作戦」（地域全体のゴミ拾い活動）、2学期に運動場の草取り、3学期に校内清掃作業と校区の美化活動を実施する。教科学習との連携では、5年生が理科で植物の発芽と成長・魚のたんじょう・流れる水のはたらき、6年生が理科で動物とくらし・生き物のからだのしくみと環境・変わり続ける大地を学び、理科の学びと環境意識を接続する。総合学習ではEM菌発酵・ぼかし肥を使った堆肥づくりや生ゴミたい肥を使った畑作りに取り組んでおり、「ゴミ→堆肥→野菜→食べる」という循環型の学びを体験している。向井地区の豊かな自然環境（森・海・川）を活かした環境教育は、都市部の学校では実現困難な、本物の自然体験に基づく学びである。","e":"環境教育の年間計画策定の参考資料。校区クリーン作戦は地域連携活動としても位置づけられ、学校運営協議会への報告材料になる。EM菌堆肥→野菜栽培→食育の循環は、理科・生活科・総合・食育の横断カリキュラムの好事例。SDGs（目標11・12・14・15）との関連づけも容易。","tg":["環境教育","クリーン作戦","EM菌","堆肥","循環型","SDGs","向井小学校","mukai_environment"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.24-25）環境教育","su":""},{"id":"OW-078","c":"education","a":"mukai","t":"向井小学校の健康・安全・食育 — 12名の子どもの命と健康を守る","x":"向井小学校では全校児童12名の一人ひとりの健康と安全を守るための体系的な計画を策定している。【保健教育】年間を通じた健康診断計画（4月：身体計測・視力検査、5月：心臓検診・尿検査・歯科検診、6月：耳鼻科・内科・プール前健診、9・1月：身体計測、10月：視力検査）を実施。飲料水の水質検査は年2回、教室の照度検査は年2回、ダニアレルゲン検査は年1回。【安全教育】月別安全目標を設定し、4月：通学路を覚える・危険箇所マップ作成、5月：遊具の正しい使い方、6月：雨の日の安全・校舎内の過ごし方、7-8月：水辺の安全・夏休みの交通安全、9月：避難訓練の確認を実施。【食育】「食に関する指導の全体計画」に基づき、月別給食目標を設定。4月：準備・片付け、5月：正しいマナー、6月：手洗い、7月：暑さに負けない食事、9月：バランスのよい食事、10月：よく噛んで食べよう等。デイキャンプ（5・6年）や焼きいも大会も食育行事に位置づけている。食物アレルギーについては学校・家庭・主治医・栄養教諭・給食室が連携体制を構築している。","e":"教頭として健康・安全・食育の年間計画を管理する際の実務資料。保健室経営との連携計画にも活用可能。食物アレルギー対応の連携体制は保護者面談の際にも説明できる。月別安全目標は全校朝会での安全指導テーマに直結する。","tg":["保健教育","安全教育","食育","給食","アレルギー","健康診断","向井小学校","mukai_health"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.27-31）健康・安全教育・食育","su":""},{"id":"OW-079","c":"education","a":"owase","t":"尾鷲市教育ビジョンの施策体系 — 3施策13重点48具体策","x":"尾鷲市教育ビジョンは基本理念「未来を拓き、次代のおわせを担う人財の育成」の下に3つの施策柱を立て、合計13の重点目標と約48の具体的施策を体系的に配置している。【施策I：子どもの豊かな育ちを支える就学前教育の推進】1.就学前教育の充実（教育・保育の充実/個に応じた支援の充実）、2.家庭教育支援の充実（家庭や地域との連携/関係機関との連携）。【施策II：未来を拓く学校教育の推進】1.安全・安心で地域から信頼される学校づくり（安全・安心な学校づくり/地域とともにある学校づくり/防災教育の充実/生徒指導・教育相談の充実/特別支援教育の充実）、2.確かな学力の定着（基礎的・基本的な知識・技能の習得と学ぶ意欲の向上/教職員の指導力の向上/家庭・学校・地域の連携による教育の推進）、3.豊かな心と健やかな身体の育成（豊かな心の育成と人権教育の推進/ふるさと教育の推進/体力・運動能力の向上/食育・健康教育の推進）、4.時代に即した教育課題への対応（グローバル教育/キャリア教育/情報教育の充実とICTを活用した教育の推進）、5.教育環境の充実（安全な学校環境の整備/教職員が働きやすい環境づくり/教育支援センター活動の充実）。【施策III：人生100年時代を見据えた生涯教育・スポーツ・文化振興の推進】1.多種多様な学習機会の提供、2.青少年の健全育成の推進、3.子育てを支えあう環境づくり、4.スポーツの推進、5.郷土の歴史・文化の継承と文化・芸術活動の推進。","e":"学校経営計画の策定時に市の教育ビジョンとの整合性を確認するための正本。学校評価の項目設定にも直結する。「ふるさと教育の推進」は向井小の総合学習との接続ポイント。教職員への校内研修で市全体の教育方針を共有する際にも使える。","tg":["施策体系","教育ビジョン","学校教育","就学前教育","生涯教育","ふるさと教育","教育行政","education_system"],"im":[],"s":"尾鷲市教育ビジョン（令和5年4月）施策体系図（p.13）","su":""},{"id":"OW-080","c":"history","a":"owase","t":"九鬼嘉隆と九鬼水軍 — 尾鷲市九鬼町から戦国の海を制した水軍大将","x":"九鬼嘉隆（くきよしたか、1542-1600）は戦国時代を代表する水軍の将で、三重県尾鷲市九鬼町がその発祥の地である。九鬼氏の祖は熊野別当を務め熊野水軍を率いた湛増にさかのぼるとされ、志摩国英虞郡に属していた九木浦（現・尾鷲市九鬼町）を根拠地とした。九鬼町は熊野灘に面したリアス式海岸の天然の良港に位置し、深く入り組んだ入り江が水軍の拠点に最適だった。嘉隆は織田信長に仕え、1574年の長島一向一揆攻めで水軍を率いて活躍し、志摩国の支配を認められて国主に任命された。最大の功績は1578年の第二次木津川口の戦いで、大砲を搭載した鉄張りの巨大船（鉄甲船）6隻を建造して毛利水軍を撃破したことである。この鉄甲船は世界初の装甲軍艦とも呼ばれ、海戦史上の革命だった。豊臣秀吉の朝鮮出兵では伊勢国大湊で製造した旗艦「日本丸」を率いて出陣。関ヶ原の戦い（1600年）では父・嘉隆が西軍、子・守隆が東軍に分かれ、西軍が敗れると嘉隆は答志島で自害した。現在も九鬼町には約500人が暮らす漁村として歴史的な町並みが残り、迷路のような路地が水軍時代の防衛構造を今に伝えている。「オハイ」と呼ばれる秘境の海岸や、エメラルドグリーンの海は現在も多くの観光客を惹きつけている。","e":"6年生社会科「戦国の世」で地元ゆかりの武将として取り上げられる。鉄甲船は理科（金属の性質）や算数（巨大な船の大きさ比較）との横断も可能。九鬼町校外学習で迷路のような路地を歩きながら「なぜこの地形が水軍の拠点になったか」を考える探究活動にも最適。全校朝会で「尾鷲から日本の歴史を変えた人がいた」と紹介すると郷土への誇りを育める。","tg":["九鬼嘉隆","九鬼水軍","鉄甲船","戦国時代","九鬼町","織田信長","水軍","kuki_navy"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""}],"s":"Wikipedia「九鬼嘉隆」「九鬼水軍」、九鬼町公式HP、歴史人、VISIT HIGASHI KISHU","su":""},{"id":"OW-081","c":"disaster","a":"owase","t":"1944年昭和東南海地震 — 尾鷲を襲った戦時下の巨大津波","x":"1944年（昭和19年）12月7日午後1時36分、熊野灘の尾鷲市沖約20kmを震源とするMj7.9（Mw8.2）のプレート境界型巨大地震が発生した。南海トラフ沿いの東南海セグメントが破壊した海溝型地震で、地震発生後わずか5〜15分で三重県南部の沿岸に8〜10mの大津波が押し寄せた。尾鷲市では38名が死亡し、市街地は広範囲にわたって浸水した。津波は尾鷲湾の奥に集中し、リアス式海岸の地形が波を増幅させたため、湾奥部では特に甚大な被害となった。最大の特徴は「戦時秘匿」である。太平洋戦争の最中であったため、軍部の報道管制により地震・津波の被害は厳しく秘密とされ、新聞報道はごく小さな記事に留められた。学術調査報告も秘密扱いにされ、多くの調査資料が逸散した。このため地域住民の間でも長く語り継がれにくくなった。旧市内には36年後（1980年頃）でも東南海津波に被災した家屋が各所に残り、家屋内に津波の浸水痕跡をとどめていた。この地震は南海トラフ地震の連動型発生の事例としても重要で、2年後の1946年には南海セグメントが破壊する昭和南海地震が続発した。現在の南海トラフ巨大地震の想定では、尾鷲市の最大津波高は17mと予測されている。","e":"防災教育の核心教材。「なぜ戦時中に地震が秘密にされたのか」は6年生社会科の戦時体制の学習と連携できる。「5〜15分で津波が来た」という事実は避難訓練の緊迫感を高める。1944年→1946年の連動発生は「一度来たら終わりではない」という教訓。南海トラフ地震の想定津波高17mは校長講話で数値として示す価値がある。","tg":["東南海地震","1944年","津波","戦時秘匿","南海トラフ","防災","昭和19年","tonankai_earthquake"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"Wikipedia「昭和東南海地震」、津波ディジタルライブラリィ、気象庁、内閣府防災情報","su":""},{"id":"OW-082","c":"disaster","a":"owase","t":"尾鷲市の津波防災 — ハザードマップと片田教授の防災教育","x":"尾鷲市は南海トラフ巨大地震で最大津波高17mが想定される地域であり、津波防災に特に力を入れている。2015年4月に群馬大学大学院の片田敏孝教授の監修で新たな津波ハザードマップを作成した。片田教授は「釜石の奇跡」で知られる防災教育の第一人者で、尾鷲市でも「津波防災教育のための手引き」を作成し、児童・生徒が「自分の命は自分で守ることのできる知恵」を身につける教育を推進している。尾鷲市の「動く津波ハザードマップ」はウェブ上で公開されており、避難のタイミングや災害情報の伝達タイミングが人的被害にどう影響するかを視覚的に理解できるシミュレーションツールである。市内には津波避難場所が地区ごとに設定され、避難路の整備も進められている。国市浜公園など海岸部には津波の危険性を知らせる注意喚起の看板が設置されている。尾鷲市津波避難計画は防災危機管理課が所管し、地域の自主防災組織との連携も含めた総合的な避難体制を構築している。向井小学校でも「防災ノート」と「津波防災教育のための手引き：尾鷲市」を教材として活用し、月別の段階的な防災学習を実施している。","e":"教頭として防災管理計画を立てる際の基盤資料。片田教授の「釜石の奇跡」は校内研修で紹介する価値がある。「動く津波ハザードマップ」はタブレットを使った防災学習に直接活用できる。保護者・地域への防災情報発信にも使える。避難訓練の振り返りで「想定津波高17m」を具体的にイメージさせる教材になる。","tg":["ハザードマップ","片田敏孝","防災教育","南海トラフ","津波避難","動くハザードマップ","防災計画","tsunami_prevention"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"尾鷲市公式サイト「津波ハザードマップ」「津波避難計画」、片田研究室、防災みえ.jp","su":"https://www.city.owase.lg.jp/"},{"id":"OW-083","c":"disaster","a":"owase","t":"1959年伊勢湾台風と尾鷲 — 戦後最悪の台風災害","x":"1959年（昭和34年）9月26日、伊勢湾台風（台風15号）が紀伊半島の潮岬付近に上陸し、東海地方を中心に戦後最悪の台風被害をもたらした。死者4,697名、行方不明者401名、負傷者38,921名、住家全壊40,838棟、半壊113,052棟という壊滅的な被害で、愛知・三重両県の被害が全国の約8割を占めた。尾鷲市を含む三重県南部は台風の進路に近く、暴風と豪雨に見舞われた。尾鷲市は年間降水量4,000mm近い日本有数の多雨地帯であり、台風による集中豪雨は土砂災害のリスクも極めて高い。伊勢湾台風の最大の教訓は、高潮・暴風・豪雨の複合災害の恐ろしさであり、この災害をきっかけに1961年に「災害対策基本法」が公布された。尾鷲市の地形はリアス式海岸で、高潮が入り江の奥で増幅されるリスクがあり、台風災害に対しても脆弱な地形条件にある。現在の尾鷲市土砂災害ハザードマップは、このような過去の災害教訓を踏まえて作成されている。台風と津波の両方に備える必要があるのが、海と山に囲まれた尾鷲市の防災の特徴である。","e":"5年生社会科「自然災害に備える」で、地元の具体的な災害事例として学べる。災害対策基本法の成立につながった台風として、法律と社会の関係を6年生の公民学習にも接続できる。「台風も津波も両方危険な地域」という認識は防災教育の出発点になる。風水害避難訓練の事前学習にも活用可能。","tg":["伊勢湾台風","1959年","台風","災害対策基本法","風水害","高潮","土砂災害","isewan_typhoon"],"im":[],"s":"Wikipedia「伊勢湾台風」、気象庁、内閣府防災情報報告書","su":""},{"id":"OW-084","c":"people","a":"owase","t":"長野泰一 — インターフェロン発見者、尾鷲が生んだ世界的ウイルス学者","x":"長野泰一（ながのやすいち、1906-1998）は尾鷲市出身のウイルス学者で、東京大学名誉教授。ウイルス感染を抑制するタンパク質「インターフェロン」の発見者として世界的に知られる。インターフェロンはウイルスに感染した細胞が産生する糖タンパク質で、他の細胞のウイルス抵抗性を高める働きがある。長野は1954年に小島保彦と共にウサギの皮膚でウイルス干渉因子（後のインターフェロン）を発見し、1957年に論文を発表した。同時期にイギリスのアイザックスとリンデンマンも独立にインターフェロンを発見・命名しており、優先権をめぐる議論がある。インターフェロンはその後、C型肝炎やがんの治療薬として実用化され、現代医学に計り知れない貢献をしている。ノーベル賞候補にも挙がったとされるが受賞には至らなかった。1998年2月9日に逝去。尾鷲という小さな漁村から、世界の医学を変える発見を成し遂げた人物として、郷土の誇りである。","e":"全校朝会や校長講話で「尾鷲から世界を変えた人」として紹介できる。6年生理科「人の体のつくりと働き」や保健体育でウイルスと免疫を学ぶ際に「地元の先輩がウイルスと戦う仕組みを発見した」と結びつけられる。キャリア教育で「地方出身でも世界レベルの研究者になれる」というメッセージにも使える。","tg":["長野泰一","インターフェロン","ウイルス学","東京大学","ノーベル賞候補","医学","偉人","nagano_yasuichi"],"im":[],"s":"mikumano.net「尾鷲市出身の有名人」、Wikipedia「長野泰一」","su":""},{"id":"OW-085","c":"people","a":"owase","t":"尾鷲市出身の著名人たち — 文学・経済・スポーツの多彩な人材","x":"尾鷲市は人口16,000人の小さな市でありながら、多分野にわたる著名人を輩出している。【学術】土井治（英文学者）、宮崎道生（新井白石研究家・国士舘大学教授・岡山大学名誉教授）。【経済】三鬼陽之助（経済評論家、高度経済成長期に活躍）、加藤千速（阪神百貨店副社長・阪神オアシス社長・アジア太平洋トレードセンター社長を歴任、尾鷲市第8代市長）。【文学】宇江敏勝（作家・著述家、山林労働者としての体験を題材にした作品で知られる）、伊吹有喜（作家、直木賞候補）。【スポーツ】福山英朗・中子修（いずれもレーシングドライバー）、黒鷲二千郎（大相撲力士）。【芸能】尾鷲義人（演歌歌手、1989年「恋やどり」でデビュー、日本レコード大賞新人賞受賞）。【野球】石伊雄太（尾鷲市出身、日本生命所属の捕手、2024年プロ野球ドラフト会議で中日ドラゴンズから4位指名）。山と海に囲まれた厳しい自然環境の中で育った尾鷲の人々は、それぞれの分野で「くじけない」粘り強さを発揮してきた。","e":"キャリア教育の教材として、様々な分野の先輩を紹介できる。「尾鷲出身でもプロ野球選手になれる」「作家になれる」「レーシングドライバーになれる」という具体例は子どもの夢を広げる。校長講話のネタとしても豊富。各人物を調べる総合学習の探究テーマにも使える。日本レコード大賞新人賞の尾鷲義人は音楽科とも接続可能。","tg":["著名人","伊吹有喜","三鬼陽之助","宇江敏勝","石伊雄太","尾鷲義人","キャリア教育","famous_people"],"im":[],"s":"mikumano.net「尾鷲市出身の有名人」、Wikipedia、伊勢新聞（2024年ドラフト記事）","su":""},{"id":"OW-086","c":"culture","a":"owase","t":"尾鷲弁 — 敬語のない独特の漁師町ことば","x":"尾鷲弁は三重県尾鷲市で話される方言で、紀州弁の一種であるが独自の特徴を多く持つ。最大の特徴は「敬語が極めて貧困」であること。人称は「オレ（自分）」「イノ（相手）」が標準で、目上にも「ワシ」「イノ」を使う。1958年に『尾鷲のことば』という資料が発行され、数百の独自語彙が記録されている。代表的な尾鷲弁の表現として、挨拶の「ヨウ！」（こんにちは）、「まめなかィ」（お変わりないか）、「ごめんイ」（すみません）がある。形容詞では「ドイライ」（大きい・すごい）、「ガイナ」（立派な・すごい）が頻用される。否定では「わやになってまった」（台無しになった）。独自の名詞も豊富で、「いさばや」（魚屋）、「あいものや」（魚類製造業）、「かんと」（凧）、「くど」（かまど）、「おつごも」（大晦日）、「きんにょー」（昨日）、「おかやん」（母）、「あんにゃん」（兄さん）、「おんじゃん」（伯父さん）、「かこ」（船方）、「ごとびき」（ひき蛙）、「きつねのよめいり」（日照り雨）、「かまいたち」（小旋風による裂傷）等がある。漁業用語が特に豊富で、「あば」（網の浮木）、「あか」（舟の浸水）、「かんこ」（漁舟内の生簀）、「いただき」（魚盥を頭上にのせて行商する女）など、海の暮らしに根ざした言葉が多い。「尾鷲の雨は下から降る」という言い回しも尾鷲弁的な表現で、激しい雨粒が地面で跳ね返る様子を描写している。","e":"国語科の方言学習の最高の地域教材。「おかやん」「あんにゃん」等の親族呼称は生活科の家族学習にも使える。漁業用語の豊富さから「言葉は暮らしから生まれる」という言語の本質を学べる。総合学習で高学年が民話・方言を調査するテーマは向井小の学校経営にも位置づけられている。地域のお年寄りへのインタビュー活動の事前学習にも最適。","tg":["尾鷲弁","方言","紀州弁","漁師町","敬語","おかやん","ドイライ","owase_dialect"],"im":[],"s":"『尾鷲のことば』（1958年）、N氏のブログ「尾鷲弁」、紀州アクセント研究","su":""},{"id":"OW-087","c":"modern","a":"owase","t":"プリンスルパート姉妹都市交流 — 海王丸から一丸記念館まで57年の絆","x":"尾鷲市とカナダ・ブリティッシュコロンビア州プリンスルパート市の姉妹都市提携は1968年9月に締結された。きっかけは1967年6月に日本の練習帆船「海王丸」がプリンスルパートに寄港したことで、日本への関心が深まり翌年の提携につながった。両市は林業と漁業を基幹産業とする港町という共通点を持ち、人口規模も類似していたことが提携の背景にある。提携後は学生の相互派遣、産業経済視察団の派遣など多彩な交流を継続してきた。特筆すべきエピソードは「一丸記念館」である。1987年に尾鷲市の漁船「一丸」がプリンスルパートに漂着し、プリンスルパート市はこの漁船を両市の友好のシンボルとして「一丸記念館」を設置した。現在では観光名所にもなっている。一方、尾鷲市でも1993年4月の文化会館建設の際、前庭にプリンスルパート市から贈られたトーテムポールを建立し、先住民族の文化を伝えるモニュメントとなっている。2018年には提携50周年を迎え、交流の歩みをまとめた資料が尾鷲市から発行された。太平洋を挟んで林業と漁業の町同士が57年にわたって交流を続けていることは、小さな地方都市の国際交流の模範例である。","e":"6年生社会科「世界の中の日本」や外国語活動で具体的な国際交流事例として紹介できる。「漂着した漁船が友好のシンボルになった」エピソードは道徳教材にもなる。トーテムポールの実物を見に行く校外学習も可能。「なぜ林業と漁業の町同士が姉妹都市になったのか」は比較学習の好題材。","tg":["プリンスルパート","姉妹都市","カナダ","海王丸","一丸記念館","トーテムポール","国際交流","prince_rupert"],"im":[],"s":"尾鷲市公式サイト「プリンス・ルパート市との交流」「交流のあゆみ」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-088","c":"education","a":"mukai","t":"向井小学校の学校経営 — 12名の極小規模校が目指す姿","x":"尾鷲市立向井小学校は令和7年度、全校児童12名（2・3年複式学級5名、5・6年複式学級7名）の極小規模校である。学校教育目標は「向かい合い、みんなが楽しい学校をみんなで創る〜つながる・ひろがる・ふかまる〜」。めざす学校像は「みんなが元気に広がる学校」、めざす子ども像は「向かいっ子」（思いやりのある子・くじけない子・元気に遊ぶ子）。重点目標は5つ：（1）確かな学力の育成（複式指導の充実・ガイド学習の質向上・家庭学習は学年×10分+10分）、（2）豊かな心の育成（「10分人権」を毎月実施）、（3）健やかな体の育成（ジョギングタイム・なわとび大会）、（4）地域とともにある学校づくり（学校運営協議会の充実）、（5）教職員の資質向上。成果指標として授業アンケート『わかる』100%、自己肯定感『自分は大切』100%、自力避難率100%、体力テスト全種目全国平均以上、学校評価『地域連携』肯定率90%以上を掲げている。児童の課題として人間関係の固定化、多様な考えに触れる機会の不足、基礎学力の個人差、握力や持久力の弱さが挙げられている。朝の「むかいっ子タイム」（8:00-8:15）では学年別に国語・算数の基礎反復学習を行っている。","e":"赴任先の学校経営を理解するための最重要資料。12名という極小規模だからこそ可能な「全員100%」という成果指標の設定は、教頭として学校評価を運営する際の参考になる。「10分人権」の毎月実施は他校にも広められる実践。むかいっ子タイムの時間設定と内容は授業改善の具体例。","tg":["向井小学校","学校経営","極小規模校","複式学級","むかいっ子タイム","学校教育目標","重点目標","mukai_management"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.1-9）学校経営","su":""},{"id":"OW-089","c":"society","a":"mukai","t":"向井地区の生活インフラ — 交通・買い物・医療","x":"向井地区は尾鷲市南部に位置し、大紀町と接する地域である。【交通】JR紀勢本線の最寄り駅は尾鷲駅で、向井地区内にはJRの駅はない。尾鷲市ふれあいバスがJR尾鷲駅を中心に運行しており、向井地区には「向井」バス停と「向井小学校前」バス停がある。スクールバスはなく、児童の通学は保護者の送迎や徒歩が中心。交通の便は限られているが、尾鷲市街地まではバスでアクセス可能。【買い物】向井地区内にはスーパーやコンビニはなく、最寄りのスーパーは尾鷲市街地の「主婦の店」（本部：瀬木山町、サンバースト：中村町、営業時間9:00-21:00）等がある。日常の買い物は市街地まで出る必要がある。【医療】向井地区内に向井病院（精神科）がある。総合的な医療は尾鷲総合病院（上野町5-25、内科・外科・小児科・産婦人科・眼科等の総合病院）が担う。尾鷲市内には複数の診療所もある。過疎化・高齢化が急速に進む地域であり、買い物難民・医療アクセスの問題は深刻な課題である。地域の方々は学校教育に対して協力的で、学校は地域コミュニティの核としての役割も果たしている。","e":"赴任先の地域理解に不可欠な生活基盤情報。保護者の通学送迎負担を理解するための基礎データ。ふれあいバスの時刻表は校外学習の計画に必要。買い物・医療のアクセス情報は、児童の家庭環境を理解する上でも重要。社会科3年生「わたしたちのまちのくらし」で地域の商店や交通を調べる学習にも活用可能。","tg":["向井地区","生活インフラ","ふれあいバス","主婦の店","尾鷲総合病院","過疎化","交通","mukai_life"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.1）地域について、尾鷲市公式サイト、NAVITIME","su":"https://www.city.owase.lg.jp/"},{"id":"OW-090","c":"people","a":"owase","t":"三鬼陽之助 — 尾鷲出身の経済評論家、高度成長期の日本経済を語った男","x":"三鬼陽之助（みきようのすけ、1902-2002）は尾鷲市出身の経済評論家・経済ジャーナリストである。戦後日本の高度経済成長期に活躍し、日本の産業界・経済界を鋭い視点で分析・論評した。財界・企業経営に関する著作を多数執筆し、「財界の論客」として知られた。100歳で逝去するまで現役の評論活動を続け、その長寿と活力も話題となった。尾鷲の漁師町で育った少年が、やがて日本経済の全体を俯瞰する評論家になったことは、地方からでも日本の中枢に影響を与える人物が輩出されることを示している。名前の「三鬼」は九鬼水軍の「九鬼」とも通じる響きがあり、東紀州の歴史の深さを感じさせる。著作には企業論・経営論が多く、日本的経営の特質を論じたものも含まれる。","e":"キャリア教育で「言葉で社会を動かす仕事」の例として紹介できる。6年生社会科「日本の産業と経済」の発展学習で、尾鷲出身の評論家が日本経済をどう見ていたかを調べる探究テーマにもなる。100歳まで現役だったエピソードは「生涯学び続ける」というメッセージにも使える。","tg":["三鬼陽之助","経済評論家","高度経済成長","財界","100歳","ジャーナリスト","偉人","miki_yonosuke"],"im":[],"s":"mikumano.net「尾鷲市出身の有名人」","su":""},{"id":"OW-091","c":"people","a":"owase","t":"伊吹有喜 — 尾鷲ゆかりの直木賞候補作家","x":"伊吹有喜（いぶきゆき）は尾鷲市にゆかりのある小説家である。温かい人間ドラマを描く作風で知られ、直木賞候補にも選出された実力派の作家である。代表作に『四十九日のレシピ』があり、2011年にNHKでテレビドラマ化、2013年に映画化された。家族の絆や地域のつながり、人と人との関わりの中で生まれる再生の物語を得意とし、読後に温かさが残る作品が多い。尾鷲のような海と山に囲まれた地方の暮らしの中にある人々の営みや、日常の中の小さな幸せを丁寧に描く姿勢は、尾鷲で育った感性と無関係ではないだろう。小説家として全国的に活躍する尾鷲ゆかりの現役作家として、子どもたちの読書活動や将来の夢に結びつけやすい存在である。","e":"読書活動の推進で「地元ゆかりの作家の本を読もう」というテーマに最適。図書委員会の活動で伊吹有喜コーナーを設置する等の取り組みも可能。国語科の「物語を書こう」の単元で、地元出身の作家がどんな物語を書いているか紹介できる。キャリア教育で「作家になるには」のテーマにも活用可能。","tg":["伊吹有喜","作家","小説家","直木賞候補","四十九日のレシピ","読書活動","偉人","ibuki_yuki"],"im":[],"s":"mikumano.net「尾鷲市出身の有名人」、Wikipedia","su":""},{"id":"OW-092","c":"culture","a":"mukai","t":"向井工房と尾鷲わっぱ — 向井地区に残る伝統工芸","x":"向井工房は尾鷲市向井地区にある工房で、向井小学校の学校経営資料において全学年の学習素材に位置づけられている。向井地区の伝統工芸品として「尾鷲わっぱ」の「ぬし鉢」が記録されており、地域の文化遺産として教育活動に活用されている。尾鷲わっぱは尾鷲ヒノキの薄板を曲げて作る伝統的な木工品で、弁当箱や容器として使われてきた。尾鷲ヒノキは年間降水量4,000mmという多雨環境で育つため、目が細かく耐水性に優れ、わっぱの素材として最適である。「ぬし鉢」はわっぱの一種で、向井地区で特に作られてきた形態とされる。木の温もりと手仕事の美しさを兼ね備えた尾鷲わっぱは、大量生産品にはない独特の風合いがある。向井小学校では向井工房との交流を通じて、子どもたちが地域の伝統工芸に触れる機会を設けている。尾鷲ヒノキ→わっぱ→暮らしの道具という流れは、林業→加工業→生活文化をつなぐ教材として優れている。","e":"3-4年生社会科「地域の産業」で伝統工芸品として取り上げられる。図工科で木工に取り組む際の導入教材にもなる。「なぜ尾鷲のヒノキが良い素材なのか」は理科（植物の成長）と社会科（気候と産業）の横断学習になる。向井工房への見学は校外学習の好テーマ。総合学習の「地域大好き」テーマにも直結する。","tg":["向井工房","尾鷲わっぱ","ぬし鉢","伝統工芸","尾鷲ヒノキ","木工","向井地区","mukai_craft"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_011_magewappa.jpg","t":"曲げわっぱ弁当箱","id":"WEB-361","u":"https://commons.wikimedia.org/wiki/File:Magewappa_2024_Mar_28_07-24PM.jpeg","li":"CC BY 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.19）生活・文化の学習素材、尾鷲市観光情報","su":""},{"id":"OW-093","c":"education","a":"mukai","t":"向井小学校の人権教育 — 「10分人権」と差別をなくす教育の推進","x":"向井小学校では人権教育を学校教育の中核に位置づけ、「同和教育をはじめとする人権教育を推進し、人権尊重の意識を高め、差別を見抜き、差別を許さない子どもを育てる」ことを目標としている。特徴的な取り組みが「10分人権」で、毎月定期的に10分間の人権学習を全校で実施する。指導方針は6項目：（1）人権教育を教育活動全体を通じて推進、（2）差別や偏見を正しく認識する力の育成、（3）互いを尊重し合える集団づくり、（4）自己肯定感の育成、（5）発達段階に応じた指導と家庭・地域連携、（6）「10分人権」の毎月実施。年間計画には、6月・9月の生活アンケート実施と結果の交流・検討、11月のいじめ防止集会、12月の老人ホーム訪問活動、1月の人権フォーラムへの参加が組み込まれている。推進体制は校長→教頭→指導・研修→研修委員会→学年指導→各教科の組織で構成され、外部には学校評議員・回同教育推進研究会・尾鷲市人権教育推進協議会との連携がある。成果指標として自己肯定感アンケート『自分は大切』100%を掲げている。","e":"教頭として人権教育推進の体制を理解し運営する際の実務資料。「10分人権」は短時間で継続的に取り組める好実践として他校にも紹介できる。生活アンケートの年2回実施はいじめ早期発見のシステムとして重要。人権フォーラムへの参加は他校との交流機会でもある。","tg":["人権教育","10分人権","自己肯定感","いじめ防止","同和教育","向井小学校","差別","mukai_jinken"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.13-15）人権教育","su":""},{"id":"OW-094","c":"history","a":"owase","t":"九鬼町 — 水軍発祥の漁村が今に伝える海の暮らし","x":"九鬼町（くきちょう）は尾鷲市北部に位置する漁村で、九鬼水軍発祥の地として知られる。熊野灘に面したリアス式海岸の深い入り江の奥に集落があり、現在は約500人が暮らす。町の構造に水軍時代の名残が色濃く残っており、迷路のように入り組んだ狭い路地は、敵の侵入を防ぐ防衛機能を持っていたとされる。路地の壁は石垣で築かれ、高低差のある地形を活かした集落配置は自然の要塞のようになっている。九鬼氏の祖・藤原隆信が北朝の攻撃を受けて伊勢国佐倉（現・四日市市）から当地に移り、地名を取って九鬼氏を名乗ったとする伝承がある。現在の九鬼町は静かな漁村だが、「オハイ」と呼ばれる秘境の海岸はエメラルドグリーンの海が広がる絶景スポットとして近年SNSで話題となり、多くの観光客が訪れている。九鬼町公式ウェブサイトでは歴史館・九鬼宮内家の資料が公開されており、地域の歴史を次世代に伝える取り組みが続いている。1954年の市制施行時に九鬼村として尾鷲市に合併した。JR紀勢本線の九鬼駅があり、鉄道でのアクセスも可能。","e":"校外学習の訪問先として最適。迷路のような路地を歩きながら「なぜこの形なのか」を考える探究活動ができる。6年生社会科「戦国の世」の地域学習にも活用可能。オハイの絶景は図工科の写生や写真撮影の題材にもなる。3年生社会科「地域の様子」で市内の他の地区と比較する学習にも使える。","tg":["九鬼町","漁村","路地","オハイ","九鬼水軍","リアス式海岸","九鬼駅","kuki_town"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_016_kuki_yoshitaka.jpg","t":"九鬼嘉隆の肖像画","id":"WEB-366","u":"https://commons.wikimedia.org/wiki/File:Kukiyoshitaka2.jpg","li":"Public domain","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_012_ohai.jpg","t":"エメラルドオハイブルー","id":"WEB-179","u":"https://photo.mie-eetoko.com/photo/2351","li":"三重フォトギャラリー（無料・商用OK）","loc":"オハイ"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_013_ohai.jpg","t":"Ohai","id":"WEB-182","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市九鬼町オハイ"}],"s":"九鬼町公式HP、Wikipedia「九鬼町」、観光三重、VISIT HIGASHI KISHU","su":""},{"id":"OW-095","c":"culture","a":"mukai","t":"向井地区の伝承遊び — お手玉・べーごま・かっぱんの世界","x":"向井小学校の学校経営資料に記録された伝承遊びは、向井地区の生活文化を伝える貴重な無形文化遺産である。記録されている遊びは「お手玉」「おはじき」「パイ（べーごま）」「竹とんぼ」「紙玉鉄砲」「竹馬」「かっぱん（めんこ）」の7種類で、いずれも特別な道具を必要とせず、自然素材や身近な材料で楽しめるものばかりである。「パイ」はべーごまの尾鷲弁での呼称で、漁師町ならではの力強い遊びである。「かっぱん」はめんこの地域呼称で、紀州方言圏での独特の呼び方。これらの伝承遊びは低学年を中心に「地域のお年寄りとの交流」の中で体験する形で教育活動に位置づけられている。高齢者が遊び方を教え、子どもが一緒に遊ぶという異世代交流は、単なるレクリエーションではなく、地域の文化伝承の場となっている。過疎化・高齢化が進む向井地区では、これらの遊びを知る世代が急速に減少しており、学校での記録と伝承は文化保存の意味でも重要である。竹とんぼや紙玉鉄砲は材料集めから制作まで子ども自身が関わることで、ものづくりの体験にもなっている。","e":"生活科の「昔遊び」単元で地域の実際の遊びとして取り上げられる。地域のお年寄りをゲストティーチャーに招く活動の具体的なプログラムとして使える。「パイ」「かっぱん」という尾鷲弁の呼称は方言学習にも接続する。図工科で竹とんぼ・紙玉鉄砲を作る活動にも展開可能。体育科の昔遊び大会にも活用できる。","tg":["伝承遊び","お手玉","べーごま","めんこ","竹とんぼ","異世代交流","文化伝承","mukai_play"],"im":[],"s":"R7向井小学校経営（p.19）生活・文化の学習素材","su":""},{"id":"OW-096","c":"education","a":"mukai","t":"向井小学校の複式学級経営 — 5名と7名、二つの学級の挑戦","x":"向井小学校は令和7年度、2学級の複式学級で運営されている。第2・3学年（複式）は2年男子2名・3年男子3名の計5名で内山教諭が担任。合言葉は「自分のことも相手のことも大切にしよう」で、つかのよさを認め合い高め合える仲間づくりを目指す。児童の特徴は素直で明るく仲良く遊べるが、自分本位な行動・発言が多く相手の気持ちを考えることが課題。学習面では個人差が大きく、基本的な生活・学習習慣の定着に力を入れる。立腰の姿勢を意識した学習の構えづくりを重視。第5・6学年（複式）は5年男子1名女子1名・6年男子3名女子2名の計7名で西川教諭が担任。合言葉は「やさしく、強く、美しく」で、互いの良さを認め合い助け合える関係づくりを目指す。日々の生活に意欲的だが、自分の意見を発表したり相手の意見を受け入れたりする力に課題がある。複式指導では「間接指導の充実」と「ガイド学習の質向上」が鍵で、一方の学年を直接指導している間、もう一方の学年が自律的に学習を進められる仕組みが求められる。12名全員の顔と名前が一致する規模だからこそ、一人ひとりの成長を丁寧に見取ることが可能である。","e":"赴任先の学級経営を理解するための最重要資料。複式指導の「間接指導」と「ガイド学習」は校内研修のテーマにもなる。5名・7名という学級サイズは個別最適な学びを実現しやすい環境。「立腰の姿勢」は全校で統一した学習規律として位置づけられる。教頭として各学級の課題を把握し、担任を支援する際の基盤情報。","tg":["複式学級","学級経営","ガイド学習","間接指導","向井小学校","極小規模校","立腰","mukai_class"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_001.jpg","t":"向井黒の浜海岸","id":"WEB-383","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_kuronohama_002.jpg","t":"向井黒の浜海岸（市公式）","id":"WEB-384","u":"https://www.city.owase.lg.jp/owatabi/0000017466.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/mukai_benzai_001.jpg","t":"弁財島","id":"WEB-385","u":"https://owasekankou.com/info_news/kuronohama/","li":"引用（ローカル閲覧用）","loc":""}],"s":"R7向井小学校経営（p.37-38）学級経営","su":""},{"id":"OW-097","c":"disaster","a":"owase","t":"尾鷲市の災害リスク — 津波・台風・土砂災害の三重苦","x":"尾鷲市は地理的条件から津波・台風・土砂災害の3つの災害リスクが重層的に存在する、日本でも有数の災害脆弱地域である。【津波リスク】南海トラフ巨大地震の想定最大津波高は17mで、リアス式海岸の地形が津波を増幅する。1944年東南海地震では震源がわずか沖合20kmで、地震発生後5〜15分で大津波が到達した。【台風リスク】年間降水量約4,000mmの日本有数の多雨地帯であり、台風による集中豪雨は市内各所で土砂災害を引き起こす。1959年伊勢湾台風では三重県南部も甚大な被害を受けた。【土砂災害リスク】市域の約90%が山林で覆われ、急峻な地形が多い。海岸線のすぐ背後に山がそびえる地形は景観の美しさと同時に、山崩れ・がけ崩れのリスクを内包する。尾鷲市は津波ハザードマップに加えて土砂災害ハザードマップも公開しており、防災危機管理課が統合的な防災計画を策定している。向井小学校では避難訓練を年4回以上実施し、「自力避難率100%」を成果指標に掲げている。学校は海に近い立地であるため、津波到達までの短時間で高台に避難する訓練が特に重要である。「命を守る教育」は尾鷲の学校教育の最優先課題であり、防災教育は全教育活動の基盤に位置づけられている。","e":"防災教育の総合教材として、津波・台風・土砂災害の3つのリスクを統合的に理解させるのに最適。「なぜ尾鷲は3つの災害が重なるのか」は理科（地形・気候）と社会科（防災）の横断テーマになる。保護者・地域への防災啓発の際にも使える。学校安全計画の策定根拠としても重要。ハザードマップを使った避難経路確認の授業にも活用可能。","tg":["災害リスク","津波","台風","土砂災害","ハザードマップ","南海トラフ","防災計画","disaster_risk"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_028_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(1).jpg","id":"WEB-314","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(1).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_029_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(3).jpg","id":"WEB-315","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(3).jpg","li":"CC BY 4.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_053_昭和東南海地震による被害.jpg","t":"昭和東南海地震による被害(2).jpg","id":"WEB-339","u":"https://commons.wikimedia.org/wiki/File:%E6%98%AD%E5%92%8C%E6%9D%B1%E5%8D%97%E6%B5%B7%E5%9C%B0%E9%9C%87%E3%81%AB%E3%82%88%E3%82%8B%E8%A2%AB%E5%AE%B3(2).jpg","li":"CC BY 4.0","loc":"尾鷲市"}],"s":"尾鷲市公式サイト「防災関連マップ」「津波ハザードマップ」「土砂災害ハザードマップ」、R7向井小学校経営","su":"https://www.city.owase.lg.jp/"},{"id":"OW-098","c":"culture","a":"owase","t":"「尾鷲の市（の市）」— 明和町から尾鷲の魅力を発信するマルシェ","x":"「尾鷲の市」は尾鷲市外の明和町（三重県多気郡）で開催されるマルシェ。オウチノ・ワークス「のヨコ」（照明・スイッチの店の隣のレンタルスペース）で不定期開催。丸清北村商店の干物、土井見世古道具店の和食器、天満荘の大漁旗展示など、尾鷲の「今」を詰め込んだ出店が並ぶ。コンセプトは『の市で出会ったもの・知ったお店を求めて、次はその街まで足を運んでみたくなる』。尾鷲の外で尾鷲を知ってもらう逆転の発想が特徴。Instagramで情報発信し、県中部の住民に尾鷲への関心を喚起している。","e":"3年社会科「わたしたちのまちのしごと」で、地元の特産品を町の外で売る仕組みを学ぶ教材。「自分のまちの良いところを他のまちの人に伝えるには？」の問いで総合的な学習にも展開可能。","tg":["マルシェ","の市","明和町","干物","古道具","地域おこし","culture"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/owase_marche_001.jpg","t":"おわせマルシェ","id":"WEB-391","u":"https://www.owasemarche.com","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/himono_001.jpg","t":"干物","id":"WEB-392","u":"https://commons.wikimedia.org/wiki/File:Himono_01.JPG","li":"CC BY 2.5","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/sanma_himono_001.jpg","t":"サンマの一夜干し","id":"WEB-395","u":"https://commons.wikimedia.org/wiki/File:Pacific_saury_dried_overnight.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #おわせ 2026-01〜03月投稿","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-099","c":"culture","a":"owase","t":"大漁旗文化 — 天満荘に眠る漁師の誇りの旗","x":"尾鷲では船を新しくすると、ゆかりのある人から大漁を祈願して大漁旗が贈られる。すり切れて色あせた姿もまた漁師の誇り。天満荘（尾鷲市の古民家宿泊施設）には多数の大漁旗が保管されており、「尾鷲の市」マルシェでは天日干しした大漁旗の実物展示が行われた。大漁旗は漁業文化の象徴であり、デザイン・色彩・贈答の風習を通じて地域の人間関係も読み取れる。","e":"図工・社会の横断で「大漁旗のデザインを考えよう」の授業に展開可能。漁師文化の学習、地域の人間関係（贈答文化）の理解にも。天満荘の実物を見学する校外学習の候補。","tg":["大漁旗","天満荘","漁師","贈答文化","漁業","culture"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_003_owase_fish_market_1.jpg","t":"Owase Fish Market 1","id":"WEB-103","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_004_owase_fish_market_2.jpg","t":"Owase Fish Market 2","id":"WEB-104","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_005_owase_fish_market_3.jpg","t":"Owase Fish Market 3","id":"WEB-105","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"Instagram #おわせ 2026-02-20投稿","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-100","c":"culture","a":"owase","t":"三木浦海まちマルシェ — 小さな漁師町の賑わいと早田ブリまつりハシゴ","x":"三木浦海まちマルシェは尾鷲市三木浦町の漁師町で開催されるイベント。隣町の早田町でブリまつりが同日開催されることが多く、2つの漁師町をハシゴして楽しむ文化がある。他県からも多くの来訪者があり、小さな町が一日だけ大きく賑わう。鯛めし等の地元グルメが人気。三木浦も早田も極小集落だが、マルシェを通じた交流人口の創出に成功している。","e":"「小さな町でもできること」のテーマで、過疎地域の活性化事例として3年社会科や総合学習で使える。向井小の児童にとって身近な地域イベント。","tg":["三木浦","マルシェ","漁師町","早田","交流人口","地域活性化","culture"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/owase_marche_001.jpg","t":"おわせマルシェ","id":"WEB-391","u":"https://www.owasemarche.com","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_new_三木浦_Mie_Gaiwan_Fishery_Cooperative_Association_mikiura_Kajikaura-01.jpg","t":"三重外湾漁業協同組合三木浦事業所梶賀浦　　三重県尾鷲市梶賀町","id":"WEB-359","u":"https://commons.wikimedia.org/wiki/File%3AMie%20Gaiwan%20Fishery%20Cooperative%20Association%20%EF%BC%88mikiura%20Kajikaura%EF%BC%89-01.jpg","li":"Wikimedia Commons (CC BY-SA 4.0)","loc":"三木浦"}],"s":"Instagram #おわせ 2026-02/03月投稿","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-101","c":"culture","a":"owase","t":"尾鷲おひなさままつり — 矢浜コミュニティセンターの退役お雛様展示","x":"尾鷲市では春に「尾鷲おひなさままつり」が開催され、矢浜コミュニティセンターなどで退役したお雛様が展示される。古い雛人形が昔話や熊野古道、大河ドラマと絡めて展示され、地域の歴史と文化をつなぐイベントとなっている。汐はまや三木里の早咲き河津桜と合わせて楽しめる春の風物詩。","e":"生活科「むかしのあそび・くらし」単元で、地域の季節行事として取り上げられる。高学年の総合学習で「地域の伝統行事を守り続ける意味」を考える教材にも。","tg":["ひなまつり","矢浜","お雛様","春の行事","河津桜","culture"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_002_kawazu_cherry_from_path.jpg","t":"Kawazu Cherry From Path","id":"WEB-160","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_004_clear_sky_cherry_path.jpg","t":"Clear Sky Cherry Path","id":"WEB-163","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_005_blossoms_toward_blue_sky.jpg","t":"Blossoms Toward Blue Sky","id":"WEB-165","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市"}],"s":"Instagram #おわせ 2026-03-04投稿","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-102","c":"culture","a":"owase","t":"尾鷲節カセットテープ — 90分フルタイムの民謡を現代に伝えるユーモア","x":"尾鷲節をなんと90分カセットテープに収録した「Endless OWASE-Busi」が制作された。「終わらない尾鷲節」というコンセプトで、伝統民謡を現代的なユーモアで再解釈した文化的な試み。「尾鷲の市」マルシェでの試聴イベントも行われた。尾鷲節は真田一族の落人伝説に由来する三重県の代表的民謡（OW-012参照）。","e":"音楽の授業で地域の民謡を学ぶ際の導入ネタ。「昔の歌を今の人に届けるには？」という創造的な問いにつなげられる。","tg":["尾鷲節","カセットテープ","民謡","ユーモア","音楽","culture"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_017_owase_bushi_monument.jpg","t":"Monument of Owase-bushi","id":"WEB-117","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲市"}],"s":"Instagram #おわせ 2026-02-09投稿","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-103","c":"nature","a":"owase","t":"+biotop植林プロジェクト — 尾鷲の生物多様性を家具メーカーが支える","x":"+biotop（プラス・ビオトープ）は「自然の生き物が住む場所に寄り添う家具」をコンセプトとする企業で、尾鷲周辺で植林活動を行っている。植林から1年半経過した林地では、成長した木と食害を受けた木が混在し、育てる難しさを実感しながら専門家の支援のもと生物多様性の実現に取り組む。企業の社会貢献と地域の林業文化が交差する事例。","e":"5年社会科「国土の環境を守る」や理科「生き物と環境」の実例として。SDGsの学習（目標15:陸の豊かさ）にも直結。地元企業の取り組みとして総合学習で取材候補。","tg":["植林","生物多様性","SDGs","林業","企業連携","nature"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""}],"s":"Instagram #おわせ 2026-03-02投稿","su":"https://www.instagram.com/explore/tags/おわせ/"},{"id":"OW-104","c":"industry","a":"owase","t":"尾鷲のボートアジング — 真祐丸の夜釣りガイドとベイトパターン","x":"尾鷲の真祐丸はボートアジングの人気チャーター船。ベイト（餌となる小魚）の回遊パターンを読み、入れ食いの時合いを掴む技術が求められる。バチコン（バーチカルコンタクト）方式のアジングが主流で、ピクピクピンテールなど専用ワームを使用。春はベイトが入ってくる時期で「激アツ」シーズン。尾鷲は船釣り・磯釣り・筏釣り（OW-069）に加え、ルアーフィッシングの拠点としても成長中。","e":"地域の産業学習で「観光×釣り」のビジネスモデルを考える教材。5年社会科の水産業単元で、漁業だけでなく釣り観光という新しい形の海の活用として紹介。","tg":["アジング","ボート釣り","真祐丸","ルアー","釣り観光","industry"],"im":[],"s":"Instagram #尾鷲 2026-03-22投稿","su":"https://www.instagram.com/explore/tags/尾鷲/"},{"id":"OW-105","c":"industry","a":"owase","t":"G杯チヌ尾鷲大会 — 全国レベルの磯釣り大会が開かれるまち","x":"がまかつ主催のG杯チヌ（クロダイ）の尾鷲予選が定期的に開催される。全国の磯釣りファンが尾鷲に集まり、割亀のハナレなどの磯で腕を競う。潮の流れによって同じ一級磯でも釣果が大きく変わり、技術だけでなく自然を読む力が問われる。サンラインなどの釣具メーカーテスターも参加するレベルの高い大会。尾鷲が「釣りの聖地」（OW-069）と呼ばれる根拠の一つ。","e":"「なぜ尾鷲に全国から人が集まるのか」を考える社会科の教材。リアス式海岸（OW-003）と潮流の関係を理科と横断で学べる。","tg":["G杯","チヌ","磯釣り","がまかつ","釣り大会","割亀","industry"],"im":[],"s":"Instagram #尾鷲 2026-03-22投稿","su":"https://www.instagram.com/explore/tags/尾鷲/"},{"id":"OW-106","c":"tourism","a":"owase","t":"熊野古道・犬連れトレッキングツアー — くまの川遊び部の馬越峠ガイド","x":"「くまの・川遊び部」は馬越峠の熊野古道トレッキングツアーを主催し、犬連れでの参加も受け付けている。杉並木の石畳を歩いて馬越峠（332m）を越え、希望者は天狗倉山まで登山可能。家族旅行で利用する人も多く、犬のオフリードチャレンジも実施。熊野古道を「歩く文化遺産」から「体験型アクティビティ」へ広げる取り組み。","e":"総合学習で「地域の宝物を活かすしごと」を調べる際の取材候補。体験型観光と世界遺産保全の両立を考えるテーマにも。","tg":["馬越峠","熊野古道","トレッキング","体験型観光","犬連れ","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_029_kumano_kodo_magose_sign.jpg","t":"Kumano Kodo Magose sign","id":"WEB-129","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_001_magose_yonaki_jizo.jpg","t":"夜泣き地蔵","id":"WEB-153","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"}],"s":"Instagram #熊野古道 2026-03-22投稿","su":"https://www.instagram.com/explore/tags/熊野古道/"},{"id":"OW-107","c":"tourism","a":"owase","t":"熊野古道811km完全踏破 — 巡礼の道を歩ききる人たち","x":"熊野古道を全ルート完全踏破した人の記録。歩いた距離811.5km、1人で歩いた道も仲間と歩いた道も全部がつながったという「静かな達成感」が印象的。小辺路（こへち）は十津川村の果無集落を通る山岳ルートで、高野山奥の院がゴール。お遍路のお礼参りを兼ねて歩く人もおり、四国八十八ヶ所巡礼との接続がある。台湾からの巡礼者も増えており、中文キャプションの投稿も見られる。","e":"6年社会の歴史学習で「なぜ昔の人は何百kmも歩いたのか」を考える導入に。外国語活動で「台湾の人が日本の道を歩く理由」を英語で紹介するプロジェクトにも。","tg":["完全踏破","巡礼","811km","小辺路","お遍路","インバウンド","台湾","tourism"],"im":[],"s":"Instagram #熊野古道 2026-03-22投稿","su":"https://www.instagram.com/explore/tags/熊野古道/"},{"id":"OW-108","c":"nature","a":"owase","t":"熊野古道の自然イラスト — えびすだにみさこの森の工房ばんどり","x":"イラストレーター・えびすだにみさこ氏は和歌山・熊野の森を拠点に「森の工房ばんどり」を主宰。熊野古道の花や野鳥（マヒワなど冬鳥の旅立ちシーン）を観察して描くイラスト作品を発信。ミュージアムグッズ企画、環境音録音、絵本制作、生き物イラスト教室など多彩な活動で自然や文化の魅力を伝えている。野中集落での自然観察が創作の源。","e":"図工の「生き物を観察して描く」授業の導入に最適。理科の季節観察（冬鳥の渡り）と横断可能。「自然をいかした仕事」としてキャリア教育にも。","tg":["イラスト","自然観察","マヒワ","野鳥","森の工房","nature"],"im":[],"s":"Instagram #熊野古道 2026-03-22投稿","su":"https://www.instagram.com/explore/tags/熊野古道/"},{"id":"OW-109","c":"tourism","a":"owase","t":"三木里ビーチ — 白砂青松の遠浅海水浴場","x":"三木里ビーチ（三木里海水浴場）は、尾鷲市三木里町にある約1kmにわたる遠浅の白砂海水浴場。後背には紀州藩主・徳川吉宗が植えさせたと伝わる松林が連なり、白い砂浜・青い海・緑の松林のコントラストが美しい。遠浅で波も穏やかなため小さな子ども連れの家族に適しており、砂遊び・シーカヤック・賀田湾につながる八十川での川遊びも楽しめる。夏場は中京・関西圏からのキャンパーや海水浴客で賑わい、ビーチバレー大会なども開催される。トイレ5か所・シャワー2か所・駐車場完備。アクセスはJR三木里駅から徒歩10分、熊野尾鷲道路三木里ICから車で約5分。開設期間は例年7月中旬〜8月下旬。尾鷲市内では最大の海水浴場であり、東紀州を代表するビーチリゾートとして三重県の観光ガイドにも掲載されている。2024年度も7月18日に開設され多くの海水浴客を迎えた。","e":"生活科・総合学習で「わたしたちのまちの宝物」として紹介できる。松林の由来は江戸時代の歴史学習にもつながる。シーカヤック体験は校外学習のテーマにもなる。","tg":["三木里","海水浴場","ビーチ","松林","遠浅","観光","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_045_mikisato.jpg","t":"Mikisato","id":"WEB-229","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_046_mikisato.jpg","t":"Mikisato","id":"WEB-230","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/miephoto_047_mikisato.jpg","t":"Mikisato","id":"WEB-231","u":"https://photo.mie-eetoko.com/city/owase/","li":"三重フォトギャラリー（無料素材）","loc":"尾鷲市三木里"}],"s":"尾鷲観光物産協会、尾鷲市公式サイト、観光三重","su":"https://www.city.owase.lg.jp/"},{"id":"OW-110","c":"tourism","a":"owase","t":"梶賀町 — あぶりの里と100年の燻製文化","x":"梶賀町は尾鷲市南部の小さな漁師町で、100年以上前から伝わる独自の燻製保存食「梶賀のあぶり」で知られる。あぶりは干物でも燻製でもない独特の調理法で、サバ・サンマ・ブリなどの魚に塩だけで味付けし、薪の炎と自然に発生する煙で約2時間かけて手作業で焼き上げる。チップを使う一般的な燻製とは異なり、薪の直火で炙りながら燻すため、焼き魚と燻製の良いところ取りの味わいが特徴。かつては漁師の保存食として各家庭で作られていたが、2010年頃から地域おこし協力隊の支援を受けて「梶賀コーポレーション」として商品化。ふるさと納税の返礼品やオンライン通販でも販売され、2025年には中小企業基盤整備機構の海外展開セレクションにも選出された。過疎化が進む梶賀町（人口約100人）の地域活性化の象徴的な取り組みとして全国的に注目されている。毎年4月〜6月がシーズンで、町内の燻製小屋で生産される。","e":"総合学習「地域の産業と暮らし」で、過疎の漁村がどう地域おこしをしているかの実例として最適。家庭科の保存食の学習にもつながる。","tg":["梶賀","あぶり","燻製","保存食","地域おこし","漁村","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_001_kajika_aburi_mackerel.jpg","t":"梶賀のあぶり（サバの燻製）","id":"WEB-350","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Mackerel_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_002_kajika_aburi_amberjack.jpg","t":"梶賀のあぶり（ブリの燻製）","id":"WEB-351","u":"https://commons.wikimedia.org/wiki/File:Kajika_no_Aburi,_Smoked_Japanese_amberjack_from_Kajika,_Japan.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_001_Kajika_Bridge-01.jpg","t":"Kajika Bridge-01.jpg","id":"WEB-287","u":"https://commons.wikimedia.org/wiki/File:Kajika_Bridge-01.jpg","li":"CC BY-SA 4.0","loc":"尾鷲市梶賀町"}],"s":"Wikipedia「梶賀のあぶり」、colocal、中日新聞、梶賀コーポレーション公式","su":""},{"id":"OW-111","c":"tourism","a":"owase","t":"天狗倉山とおちょぼ岩 — 熊野古道から絶景トレッキング","x":"天狗倉山（てんぐらさん、標高522m）は尾鷲市民に親しまれる名山で、小学校の遠足でも登られる。熊野古道伊勢路の馬越峠から山頂へ至るトレッキングルートが人気で、2km以上続く美しい石畳の尾鷲ヒノキ林を抜け、馬越峠の茶屋跡から山頂を目指す。山頂には修験道の行場だった巨岩があり、役行者（えんのぎょうじゃ）を祀る石碑と祠がある。山頂から東の尾根伝いに40〜50分歩くと「おちょぼ岩」に到着し、尾鷲湾・白石湖・熊野灘を一望する大パノラマが広がる。天狗倉山と隣の便石山（びんしやま、標高599m）の「象の背」も人気の映えスポットで、巨大な一枚岩の上に立つと足元は断崖絶壁。尾鷲観光物産協会は月例のトレッキングツアーを開催し、セラピストガイドと歩く健康トレッキングや「尾鷲よいとこ見つけ旅」ツアーも実施。モンベルのアウトドアイベントでも天狗倉山コースが取り上げられている。初心者でもガイド付きで安心して楽しめるルートとして東紀州の登山ガイドに紹介されている。","e":"校外学習・遠足の候補地として活用可能。修験道の歴史は6年生の歴史学習に、地形・植生は理科の学習につながる。「象の背」からの風景写真は校内掲示にも映える。","tg":["天狗倉山","おちょぼ岩","便石山","象の背","トレッキング","馬越峠","修験道","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_016_tengura_owase_bay.jpg","t":"Mt. Tengura and Owase Bay","id":"WEB-116","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_039_tengura_owase_bay_2.jpg","t":"Mt. Tengura and Owase Bay 2","id":"WEB-139","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_045_tengura_mountain.jpg","t":"Mt. Tengura","id":"WEB-145","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"天狗倉山"}],"s":"観光三重「天狗倉山の三つの魅力」「便石山と象の背」、尾鷲観光物産協会、モンベル","su":""},{"id":"OW-112","c":"tourism","a":"owase","t":"おわせお魚いちば おとと — 尾鷲の台所・水産会社直営の直売所","x":"おわせお魚いちば「おとと」は、尾鷲物産株式会社が直営する地場産品直売所で、紀勢自動車道・尾鷲北ICから車で約3分の尾鷲の玄関口に位置する。自社定置網や尾鷲漁協魚市場から水揚げされたばかりの新鮮な前浜魚介類を直送販売し、目玉は毎朝10時30分から開催される「朝とれお魚市」。併設の「おわせ魚食堂」はセルフ形式の食堂で、地魚を使った寿司・刺身・海鮮丼・惣菜を好きなだけ選んで楽しめる。尾鷲ヒノキの加工品、海洋深層水関連商品、干物、梶賀のあぶりなど尾鷲の特産品も幅広く取り扱う。観光客だけでなく地元住民の日常の買い物先としても親しまれ、東紀州を代表する観光拠点施設の一つ。近年はMSC認証を取得したマグロのはえ縄漁業（尾鷲物産運営）の生マグロも販売され、水揚げ約3時間後にはパックが店頭に並ぶ驚異的な鮮度が自慢。","e":"社会科見学で漁業と流通の学習ができる。「魚が海から食卓に届くまで」の実物教材として最適。3年生の「お店のしくみ」学習でも活用可能。","tg":["おとと","直売所","尾鷲物産","魚市場","海鮮","観光","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_002_owase_fish_market_bay.jpg","t":"Owase Fish Market and Owase Bay","id":"WEB-102","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_003_owase_fish_market_1.jpg","t":"Owase Fish Market 1","id":"WEB-103","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_004_owase_fish_market_2.jpg","t":"Owase Fish Market 2","id":"WEB-104","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲魚市場"}],"s":"観光三重、尾鷲観光物産協会、おとと公式サイト","su":""},{"id":"OW-113","c":"tourism","a":"owase","t":"曽根次郎坂・太郎坂 — 国境を越える熊野古道伊勢路の峠","x":"曽根次郎坂・太郎坂は、尾鷲市と熊野市の境界にある世界遺産・熊野古道伊勢路の峠道で、尾鷲市賀田から熊野市二木島へ抜ける約5.7km・所要約3時間のルート。尾鷲市内にある4つの熊野古道の峠のうち最南端に位置する。「次郎坂・太郎坂」の名は、かつてこの峠が志摩国と紀伊国の国境であったことに由来し、「自領（じりょう）」と「他領（たりょう）」が訛って「次郎」「太郎」となったと伝わる。石畳道、苔むした猪垣（ししがき）、巡礼者の供養碑、鯨石と呼ばれる巨岩、江戸時代の石切場跡など見どころが多い。八鬼山越えの後に控える険しい峠道で、巡礼の厳しさを今に伝える。尾鷲セラピストガイドと歩くツアーも人気。尾鷲市公式の「尾鷲女子旅」モデルコースにも掲載されている。","e":"6年生歴史学習で「昔の人の旅」として熊野詣の実例に活用。国境の概念（藩・国の境界）を地元の地名から学べる。遠足・校外学習の候補地。","tg":["熊野古道","曽根次郎坂","太郎坂","伊勢路","世界遺産","石畳","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/kodo_iseji_002_magose_stone_bridge.jpg","t":"石橋と石畳","id":"WEB-154","u":"https://www.kodo.pref.mie.lg.jp/course/08.html","li":"三重県公式（熊野古道伊勢路）","loc":"馬越峠"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_021_ishidatami_owasemichi.jpg","t":"石畳の尾鷲道","id":"WEB-121","u":"https://openverse.org (Flickr CC)","li":"CC BY-SA 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_028_kumano_kodo_daimon.jpg","t":"熊野古道大門坂","id":"WEB-128","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"大門坂"}],"s":"尾鷲市公式サイト、三重県公式「熊野古道伊勢路」、尾鷲観光物産協会、熊野古道センター","su":"https://www.city.owase.lg.jp/"},{"id":"OW-114","c":"tourism","a":"owase","t":"飛鳥神社と巨大クスノキ — 曽根町の自然と信仰","x":"飛鳥神社は尾鷲市曽根町の海沿いに鎮座し、旧割内村の氏神として古くから信仰されてきた。賀田湾に面する境内は「飛鳥神社樹叢（じゅそう）」として昭和42年（1967年）に三重県指定天然記念物に認定されている。社叢にはクスノキの巨木が生育し、中でも周囲13.4m・高さ32mのクスノキは1988年の三重県巨木調査で県内第3位の巨木と記録された。賀田湾に面した鎮守の森は学術的にも貴重な暖地性植物群を含み、尾鷲の自然環境の豊かさを物語る。例祭は毎年11月14〜15日に行われる。曽根町はかつて紀伊国と志摩国の境界に位置し、室町時代に近江国の佐々木右衛門が招かれて曽根壇正を名乗ったという伝承が残る歴史ある土地。神社から曽根次郎坂・太郎坂の古道入口へもアクセスしやすく、熊野古道歩きと合わせて訪れる人も多い。","e":"理科の「植物の観察」で巨木の測定活動に活用できる。天然記念物の意味と保全の大切さを学ぶ環境教育の素材。6年生歴史で地名の由来から地域の歴史を探る学習。","tg":["飛鳥神社","曽根町","クスノキ","天然記念物","社叢","神社","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_012_tategasaki.jpg","t":"楯ヶ崎（柱状節理）","id":"WEB-362","u":"https://commons.wikimedia.org/wiki/File:Tategasaki.jpg","li":"CC BY-SA 4.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_013_tategasaki_panoramio.jpg","t":"楯ヶ崎（全景）","id":"WEB-363","u":"https://commons.wikimedia.org/wiki/File:楯ヶ崎_-_panoramio.jpg","li":"CC BY 3.0","loc":""}],"s":"尾鷲市公式サイト「飛鳥神社」「飛鳥神社樹叢」、熊野の観光名所、Wikipedia「尾鷲市」","su":"https://www.city.owase.lg.jp/"},{"id":"OW-115","c":"tourism","a":"owase","t":"夢古道おわせと熊野古道センター — 尾鷲観光の中核拠点","x":"夢古道おわせは三重県立熊野古道センターに隣接する観光物産交流施設で、尾鷲市向井にある。築150年の古民家を移築した物産棟では尾鷲の特産品を販売し、地元水産会社直営のレストラン「OMOTENASI」や海鮮レストラン「イサバヤ」も併設。紀伊半島唯一の海洋深層水風呂「夢古道の湯」は、尾鷲市三木埼沖の水深415mから汲み上げた海洋深層水を尾鷲ヒノキの間伐材で温めたもので、保湿性・保温性に優れ、熊野古道馬越峠と尾鷲湾の絶景を眺めながら入浴できる。一般700円（平日）。隣接の三重県立熊野古道センターは尾鷲ヒノキ135mm角無垢材のみで建築した木造大空間のビジターセンターで、熊野古道と東紀州の自然・歴史・文化を展示・紹介する。常設展示のほか企画展・講演会・体験プログラムも開催。熊野古道ウォーキングの起点・終点としても利用され、年間を通じて多くの観光客が訪れる東紀州観光の中核施設。","e":"校外学習で熊野古道センターの展示を見学し、地域の歴史・文化を体験的に学べる。建築材料としてのヒノキの学習にもつながる。","tg":["夢古道おわせ","熊野古道センター","海洋深層水","温泉","ヒノキ","観光拠点","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/yumekodo_yu_001.jpg","t":"夢古道の湯","id":"WEB-373","u":"https://www.city.owase.lg.jp/owatabi/0000017461.html","li":"引用（ローカル閲覧用）","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_010_hinoki_forest.jpg","t":"ヒノキ林（密植林）","id":"WEB-360","u":"https://commons.wikimedia.org/wiki/File:Japanese_cypress_woods_C032473.jpg","li":"CC BY-SA 3.0","loc":""},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/wikimedia_food_011_magewappa.jpg","t":"曲げわっぱ弁当箱","id":"WEB-361","u":"https://commons.wikimedia.org/wiki/File:Magewappa_2024_Mar_28_07-24PM.jpeg","li":"CC BY 4.0","loc":""}],"s":"尾鷲観光物産協会、観光三重、熊野古道センター公式サイト、尾鷲市公式サイト","su":"https://www.city.owase.lg.jp/"},{"id":"OW-116","c":"tourism","a":"owase","t":"尾鷲イタダキ市 — 毎月第1土曜のまちなか朝市","x":"尾鷲イタダキ市は、毎月第1土曜日の朝に尾鷲市街地で開催される名物朝市。新鮮な魚介類・干物・野菜・果物・手作り惣菜・スイーツなど地元の食材が並び、生産者と直接会話しながら買い物ができる。「イタダキ」は尾鷲弁で「ありがとう」を意味し、売り手と買い手が互いに感謝し合う気持ちを名前に込めた。地元住民の日常の買い物だけでなく、熊野古道歩きの前後に立ち寄る観光客にも人気。尾鷲のまちなかの賑わい創出と地産地消の推進を目的として始まり、尾鷲市の定番イベントとして定着している。港町の雰囲気を感じながら旬の味を楽しめる尾鷲らしい催し。","e":"3年生社会科「お店のくふう」で地域の朝市を取材する学習に活用。「イタダキ」の方言から地域の言葉への関心を引き出せる。","tg":["イタダキ市","朝市","地産地消","尾鷲弁","まちなか","tourism"],"im":[{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_010_owase_itadaki_ichi_1.jpg","t":"Owase Itadaki Ichi Festival 1","id":"WEB-110","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/flickr_015_owase_itadaki_ichi_2.jpg","t":"Owase Itadaki Ichi Festival 2","id":"WEB-115","u":"https://openverse.org (Flickr CC)","li":"CC BY 2.0","loc":"尾鷲市"},{"p":"../文章_作業スペース/00_受信箱_Inbox/web_images_owase/images/himono_001.jpg","t":"干物","id":"WEB-392","u":"https://commons.wikimedia.org/wiki/File:Himono_01.JPG","li":"CC BY 2.5","loc":""}],"s":"尾鷲観光物産協会、尾鷲市公式サイト、尾鷲イタダキ市公式","su":"https://www.city.owase.lg.jp/"},{"id":"OW-117","c":"food","a":"owase","t":"尾鷲のカツオ — 日帰り漁の驚異的鮮度
