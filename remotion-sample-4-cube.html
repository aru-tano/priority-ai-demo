<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>4年算数 / 直方体と立方体の展開図</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f8fafc;
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 24px;
}
.header {
  text-align: center;
  margin-bottom: 16px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 4px;
}
.header p {
  font-size: 13px;
  color: #94a3b8;
}
.geogebra-wrap {
  width: 100%;
  max-width: 900px;
  aspect-ratio: 16 / 10;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  background: white;
}
.geogebra-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>
<div class="header">
  <h1>4年算数 / 直方体と立方体の展開図</h1>
  <p>GeoGebra アプレット — ドラッグで展開図を折りたためます</p>
</div>
<div class="geogebra-wrap">
  <iframe src="https://www.geogebra.org/material/iframe/id/z4jM3JdJ" allowfullscreen></iframe>
</div>
</body>
</html>
